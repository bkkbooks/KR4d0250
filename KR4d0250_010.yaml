body:
  text: 雙溪類稿卷十宋王炎撰長短句並序長短句序古詩自風雅以降漢魏間乃有樂府而曲居其一今之長短句蓋樂府曲之苖裔也古律詩至晚唐衰矣而長短句尤為清脆如么絃孤韻使人屬耳不厭也豫於詩文本不能工而長短句不工尤甚蓋長短句宜歌而不宜誦非朱唇皓齒無以發其要妙之聲豫為舉子時早夜治程文以幸中於有司古律詩且未暇著意況長短句乎三十有二始得一第未及升斗之粟而慈親下世以故家貧清苦終身家無絲竹室無姻侍長短句之腔調素所不解終喪得簿崇陽逮今及五十年而長短句所存者不過五十餘闋其不工可知矣今之為長短句者字字言閨閣事故語陋而意卑或者又為豪壯語以矯之夫古律詩且不以豪壯為貴長短句命名曰曲取其曲盡人情惟婉轉嫵媚為善豪壯語何貴焉不溺於情欲不蕩而無法可以言曲矣此炎所未能也曹公論雞跖曰食之無益棄之可惜此長短句五十餘闋亦雞跖之類也故裒而集之因發其意於卷首云嘉定十一年四月朔日雙溪王炎序蝶戀花崇陽縣圃夜飲纎手行杯紅玉潤滿眼花枝雨過胭脂嫩新月一眉生淺暈酒闌無奈添春困喚起醉魂君莫問憔悴顔容羞與花相近人自無情花自韻風光易老何須恨點絳唇崇陽野次雨濕東風誰家燕子穿庭户孤村薄暮花落春歸去浪走天涯歸思縈心緒家何處亂山無數不記來時路臨江仙吳宰生日欲近上元人意好月如人意團圓暖風催趣養花天三山來寉駕萬户識鳬仙手種河陽桃李樹暫時花發春妍綵衣一笑棹觥船明年當此日人到鳳池邊好事近同前時節近元宵天意人情都好煙柳露桃枝上覺今年春早遏雲一曲鳳將雛疑是在蓬島玉筍扶杯瀲灔願黑頭難老水調歌頭留宰生日愛日護輕暖醖造小春時桃溪雲斂一點郎星吐清輝鍊玉顔容難老點漆精神如舊不用摘霜髭厭薄蓬萊景戲踏兩鳬飛潘花底陶柳外細民肥萬家喜色融作瑞氣擁牙緋慿仗春蔥洗玉領略朱櫻度曲引滿又何辭只待琴歌畢安步上丹墀又夜泛湘江江月冷如水江水碧於空晚來一霎過雨為我洗秋容悄悄四山人靜凛凛三更露下天濶呌孤鴻喚醒篷窗夢身在水晶宫揖湘妃招月姊御清風素琴韻逺不覺醉眼杏花紅禹穴騎鯨仙去東海釣鰲人逺此意與誰同倚柂一長嘯出壑舞魚龍又登石鼓合江亭千里倦遊客老眼厭塵煙蒸湘平逺他處無此好江山把酒一聽欵乃過了黃花時節水國倍生寒輸與滄浪叟長伴白鷗間傍江亭窮杳靄踞巉嵓水深石冷聞道别有洞中天待倩靈妃調曲喚起馮夷短舞從此問羣仙雲海渺無際波湧緩移船念奴嬌菊小粧朱檻護秋英千點金鈿如簇黃葉白蘋朝露冷只有孤芳餘馥華髮蒼顔宦情羈思來伴花幽獨巡簷無語清愁何啻千斛因念愛酒淵明東籬雅意千載無人續身在花邊須一醉小覆杯中醽醁過了重陽捻枝嗅蘂休嘆年華速明年春到陳根更有新緑蝶戀花壬子柳暗西湖春欲暮無數青絲不繫行人住一點心情千萬緒落花寂寂風吹雨喚起聲中人獨睡千里明駝不踏山間路謾道遣愁除是醉醉還易醒愁難去念奴嬌海棠時過江潭曉來雨過遍海棠枝上胭脂如滴桃杏不堪來比並信是傾城傾國藏韻收香誰能描貌閣盡詩人筆從教睡去為留銀燭終夕不待過了清明緑隂結子無處尋春色蔌蔌輕紅飛一片便覺臨風悽惻莫道無情嫣然一笑也似曾相識惜花無主自憐身是行客浪淘沙令菊秋色滿東籬露滴風吹憑誰折取泛芳巵長是年年重九日苦恨開遲因記得當時共撚纎枝而今寂寞鳳孤飛不似舊來心緒好惟有花知採桑子秋日丁香一畨染就春風巧細著工夫點綴紅酥此際多應别處無玉人不為花為主辜負芳菲香透簾帷誰向叉頭插一枝好事近早梅玉頰映紅綃攙報東風消息雖則清臞如許有生香真色相看動是隔年期忍不飲涓滴莫待輕飛一片却説花堪惜鷓鴣天梅淡淡疏疏不惹塵暗香一點靜中聞人間怪有晴時雪天上偷回臘裏春疑淺笑又輕顰雖然無語意相親老來尚可花邊飲惆悵相携失玉人臨江仙落梅雪片幻成肌骨月華借與精神一聲羌笛怨黃昏吹香飄縞袂脫迹委紅裙枝上青青結子子中白白藏人那時别是一家春擘泥嘗煮酒拂席卧清隂阮郎歸落花時節近清明南園芳草青東風料峭雨難晴那堪中宿酲回首處自銷凝誰知人瘦生倚欄無語不禁情杜鵑啼數聲青玉案深紅數點吹花絮又燕子飛來語逺水平蕪春欲暮年年長是清明時候故遣人憔悴竹雞啼罷山村雨正寥落無情緒猛省從前多少事緑楊堤上樓臺如畫此景今何處卜算子膩玉染深紅艷麗難常好已是人間祓禊時花亦隨春老喚取麴生來醉賞惟宜早此去隂晴十日間點點粘芳草木蘭花慢莫春時在分寧博山香霧冷新雨過怯單衣正飛絮濛濛平蕪杳杳家在天涯春難住人易老又等間過了踏青時枝上紅稀緑暗杜鵑剛向人啼依依謾嘆鏽生鐔鋏塵滿絃徽想北山猿寉南溪鷗鷺怪我歸遲青雲事今已晚倚小窗誰與話襟期對酒有愁可解擘箋無怨休題浪淘沙令丙寅在大坂流水繞孤村楊柳當門昔年此地往來頻認得緑隂携手處笑語如存往事不堪論強對清樽梅花香裏月黃昏白首重來誰是伴獨自銷魂木蘭花慢同前緗桃花樹下記羅襪昔經行至今日重來人惟獨自花亦雕零青鳥杳無信息遍人間何處覔雲軿紅錦織殘舊字玉簫吹斷餘聲銷凝衣故幾時更又誰復卿卿念鏡裏琴中離鸞有恨别鵠無情齊眉處同笑語但有時夢見似平生愁對嬋姢三五素光暫闕還盈阮郎歸霅川作幾回幽夢繞家山怯聞梅弄殘蕭蕭黃落客氊寒不禁衣帶寬身外事意闌珊人間行路難尋思百計不如間休貪朱兩轓小重山至後一日長興趙宰到郡併招歸安烏程二宰及項廣文同飯日腳才添一線長葭灰吹玉琯轉新陽老來添得鬢邊霜年華換歸思滿滄浪喚客對凝香公庭鳬鶩散緩行觴何須紅袖立成行清談好勝似聽絲簧臨江仙莫子章郎中買妾佐酒魏倅以詞戲之因次韻試問休官林下去何人得似髙年壺中不記歲時遷吹簫新有伴餐玉共求仙有客樽前曾得見月眉雲鬢姢姢斷腸刺史獨無緣誰能聞一曲偷向笛中傳又思憶故園花又發等間過了流年休論升擢與平遷拂衣歸去好無事即神仙況是老人頭雪白羞看紅粉嬋姢鸞孤鳳隻且隨緣莫將桃葉曲留與世人傳水調歌頭送魏倅新漲鴨頭緑春滿白蘋洲小停畫鷁莫便折柳話離愁縹眇觚稜在望不用東風借便一昔到皇州别酒十分酌何惜覆瑶舟從此去上華貫入清流風姿如許自合唾手復公侯老我而今衰謝夢繞故園松菊底事更遲留早晚挂冠去江上狎浮鷗清平樂越上作呢喃燕語共訴春歸去春去從他留不住落盡枝頭紅雨老翁袖手優遊間愁不到眉頭過了麥黃椹紫歸期只在新秋乂兒曹耳語借問何時去家在翠微深處住生計一犁新雨客中且恁浮遊莫將事挂心頭縱使人生滿百算來更幾春秋南柯子天末家何許津頭客未歸柳梢緑暗早鶯啼胡蝶不知春去繞園飛選勝多遊冶當爐有麗姝青翰載酒漾晴暉不忍十分寥落負花時好事近間日似年長又在他鄉春莫柳外一聲鶗鴂怨落花飛絮苧羅只似舊時青人今在何處試問鴟夷因甚載西施同去朝中措杜鵑聲斷日曈曨過雨濕殘紅老色菱花影裏客愁蕉葉香中柳梢飛絮桃梢結子斷送春風莫恨春無覔處明年還再芳叢南柯子秀叔娶婦不令人知以小詞為賀因戲之對鏡鸞休舞求凰鳳自飛珠鈿翠珥密封題中有蠻箋細字沒人知環佩燈前結輜軿月下歸笑他織女夜鳴機空與牛郎相望不相隨朝中措九月末水仙開薔薇露染玉肌膚欲試鏤金衣一種出塵態度偏宜月伴風隨初疑解后湘妃洛女似是還非只恐乘雲輕舉翩然飛度瑶池西江月用荼䕷釀酒飲盡因成此敬呈繼詩蔌蔌落紅都盡依然見此清姝水沉為骨玉為膚留得春光小住鴛帳巧藏翠蔓燕叉斜嚲纎枝休將往事更尋思且為濃香一醉浪淘沙辛未中秋與文蔚逹可飲月色十分圓風露姢姢木樨香裏憑欄干河漢橫斜天似水玉鑑光寒草草具杯盤相對蒼顔素娥莫惜少留連秋氣平分蟾兔滿動是經年柳梢青鄭宰母氏生日葭管風微萊衣香軟歌鳳將雛笑酌流霞問人何處别有瑶池相將月佩霞裾領鳬舄歸朝玉墀管取長年進封大國穩住清都踏莎行木落天寒年華又暮老來多病須調護詩編酒榼總無緣間中贏得瞢騰睡塵暗犀梳香消翠被悄無音信來青羽新愁正自上眉峰黃昏庭院瀟瀟雨清平樂壬申除夜一杯椒醑惜飲難成醉爆竹聲中人未睡共道今宵守歲不如且就衾裯誰能細數更籌三百六旬過了明朝却是年頭卜算子癸酉二月雨後到雙溪渡口喚扁舟雨後青綃皺輕暖相重護病軀料峭寒還透老大自傷春非為花枝瘦那得心情似少年雙燕歸時候又散䇿問芳菲春半花猶未蓓蕾枝頭怯苦寒恰似人憔悴人莫恨花遲天自催寒去雨意才收日氣濃玉靨紅如醉江城子癸酉春社清波渺渺日暉暉柳依依草離離老大逢春情緒有誰知簾箔四垂庭院靜人獨住燕雙飛怯寒未敢試春衣踏青時懶追隨野蔌山殽村釀可從宜不向花邊拚一醉花不語笑人癡虞美人甲戌正月望後燕來鏡中失盡雙青鬢懶更占花信小梅半謝雨垂垂未許輕紅破蕾綴桃枝社前歸燕穿簾語似説人憔悴自緣老去少歡悰不是春寒料峭怯東風南鄉子甲戌正月雲淡日曨明久雨潺潺乍得晴社近東臯農務急催耕又見菖蒲出水青池面縠紋平掠水迎風燕羽輕試出訪尋春色看相迎巧笑花枝似有情南柯子山暝雲隂重天寒雨意濃數枝幽艷濕啼紅莫為惜花惆悵對東風蓑笠朝朝出溝塍處處通人間辛苦是三農要得一犁水足望年豐憶秦娥甲戌賞春胭脂點海棠落盡青春晚青春晚少年遊樂而今慵懶春光不可無人管花邊酌酒隨深淺隨深淺牡丹紅透荼䕷香軟夜行船賀將使叔成寶相寮淡飯粗衣隨分過新成就庵寮一箇靜處藏身十分自在只恁麼有何不可過眼空花都見破紅塵外獨行獨坐也沒籌量也沒繫絆更覔甚三乘四果臨江仙和將使許過雙溪鶗鴂一聲春事了不知苦勸誰歸花梢香露染薔薇小梅酸著齒酒榼正堪携鴨緑一篙新雨過逺山半出修眉仙翁理棹欲來時繞簷烏鵲喜報與主人知驀山溪巢安寮畢工鶯啼花謝斷送春歸去雨後聽鵑聲恰似訴留春不住韶光易過暗被老相催無箇事沒些愁方是安身處栽松種菊相見為賔主終日掩柴扉但只有清風時度不忺把酒又不喜觀書飢時飯飽時茶困即齁齁睡憶秦娥頭如雪塵緣衮衮無休歇無休歇買田築屋是何時節從今事事都休説巢安寮裏藏疏拙藏疏拙許誰為伴溪山風月滿江紅至日和黃伯威宦海浮沉名與字不能彰徹青雲上諸公衮衮難登狹劣結綬彈冠成底事解頥折角皆虛説待黃粱夢覺始歸來非明哲易消釋空中雪多虧闕天邊月算人生必有衰羸時節任是一陽來復後梅花栁眼先春發料明年又老似今年當休歇玉樓春丙子十月生朝壯年糊口謀升斗朱墨塵埃黏兩袖黃粱夢斷始歸來依舊琴書當左右而今藏取持螯手林下獨居間散又問之何以得長年寡欲少思安老朽又大都四序隂晴半天上油雲舒又卷若還心也似雲間老色何由來上面生平辛苦今蕭散得喪榮枯皆歷遍人言不死是神仙我但耳聞非眼見雙溪類稿卷十
