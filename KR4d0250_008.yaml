body:
  text: 雙溪類槀卷八宋王炎撰古律詩賀吳興郡王生日四絶丙寅德聲不減漢間平玉鑑氷壺表裏清休問南山山色翠淡然無欲自長生黃門宣賜出丹墀花蕚樓邊禁漏遲天上龍顔生喜色鶺鴒飛在萬年枝長樂觚稜接未央至尊友愛獨賢王宫中共用家人禮日近清光侍太皇斑衣盩綬兩光輝和氣融融洽孝慈千載蟠桃今日熟喜同王母宴瑶池念往生别有見日死别無返時綢繆結髮初百歲以為期豈意中道間弃我忽如遺玉骨空委蛻青山未同歸晤語永已矣衰懷寧不悲疇昔鏞溪翁重為子相攸謂我稍可教許以相匹儔此德未及報黃髮歸山邱今又捨我去垂老增百憂深念不能置泫然清淚流半生共飄泊所至無定居晚有一區宅乃以喪來歸樂少辛苦多嗚呼止於斯臨沒尚了了警戒皆可書子言不可忘我意當何如有姑共饘粥有子自抱乳人亦有困窮子獨最艱苦晚嵗未即安此身先逝矣逝者不可作在者誰與處欲以理奪情悵然還念起子大有游東山之約以詩相趣因次其韻家如錦里先生甫詩似錢塘處士逋若解山中安穩住定勝軟飽臥流蘇今昔東山約略同但無紅袖肯相從不妨小試游山屐因訪騤騤陸士龍萬杉深處一軒開秀色參天費壅培我為不知林壑趣黃梁夢覺却歸來猛省香山及輞川句中摹寫共流傳煩公檢㸃遺編看二老元曾賦幾篇紙被行瑶姬不觸麒麟紅金壺㶑灔琥珀濃狐裘公子喜夜永杯行暖玉煩春葱簷頭雪花大如掌洞房但覺春融融豈知有客方貪睡漏盡更闌不能寐花紅玉白不相隨賴有楮生為伴侣生家住處近麻姑亦能幻出氷肌膚絶嫌墨客蠅頭汚懶入官黃藏蠧魚寧隨人意任舒卷雖則軟美非胎韋風姨霜女皆退舍稍覺和氣生氍毺梅花破雪催寒去春回人向花前醉女郎霧縠試輕衫至此失時因坐廢緑槐影底夏日長人間只要一味涼青奴元自不嫵媚居然負恃能專房秋風一夜來消息又却見渠先棄擲冬來復挽楮生歸屬付蒼頭輕拂拭用則鋪張舍則藏喜愠未嘗形玉色世事乘除無不然安用動心三嘆息京丞相挽詩嗣聖登皇極真儒秉大鈞三宫方愷樂萬宇浸熙淳碧落龍髯去青山馬鬛新衣冠同墮淚桃李失陽春二山立羣公表朝廷勢自尊逺謀安廟社厚德鎮乾坤帝念經綸廣人思色笑溫騎箕今不返麟閣盡空存三鬱鬱松坡上潭潭甲第成家方藏寶墨地已獻佳城拱極三階動扶天一桂傾祇應餘慶逺遺德在蒼生游東山并序子大約豫游東山足迹不到凡二十年小徑曲折自麓至岡或磐石可坐或結茅可憩大抵視舊有加山中杉木萬根昔所見拱把今日霜皮雨幹亦有老色昔人有言樹猶如此人何以堪然萬古一軌不必嘆也暇日婆娑清談暢飲相與開口一笑身外成虧一切付諸造物足矣子大作而言曰今日之游誠樂明日便成陳迹此山未有雲溪詩為我落筆可乎豫笑曰從公游本冀一日之閒乃反以詩債窘我然技癢亦自不禁夜歸明日酒醒追述其意而尾之以詩田舍結廬稍近樵牧豈亦甘心陸沈自古明時難遇未宜長往山林松風松公奮鬛如嘯終日清風颯然佳處元非宫徵誰能寫入朱絃爛柯手談一局未了葉落花紅幾回只恐雲迷歸路不容樵客重來舒嘯幽人獨坐空谷最愛夜深月明雲外一聲長嘯四山木偃風生待月只有麴生為侣夜涼同迓氷輪未審素娥知否惟豫與影三人棧徑詰曲羊腸中斷小安略彴通行緩臂不携藜杖翩翩自喜身輕入翠路入半山深處穿雲竟日忘歸若扣山中何有濛濛空翠沾衣磐吉客來捧腹一笑抹月批雲療飢只此如何獲吉為無富貴危機披雲上到蒼螭絶頂四邊無數青山下視樓臺一簇超然身在雲間胡清卿來訪留一日亟求去云欲謁鄭宰因以小詩佐其行跋涉山川歲一歸奚奴古錦慣相隨自憐機杼無遺巧却怪珠璣不療飢酌酒挽君澆舌本解驂許我話心期空囊羞澀將焉往笑說鳬仙舊見知用元韻答清卿并簡蔡尉貂裘半敝復來歸正坐剛腸不詭隨見說史君嘗餽贐似聞內子亦啼飢經年一别方相遇他日重來未有期試問此行誰借重梅仙青眼是新知次韻謝胡清卿殷勤訪我到山中一笑依然尚諱窮氣老絶非年少鋭詩新殊勝舊時工劇談不惜麈尾落歸路難淹馬首東若遇故人相借問為言衰朽學農功汪直卿相招以病爽約因成拙句併呈子大一聲鶗鴂落紅稀試問春餘幾許時多謝佳招頻卜日自慙衰朽却愆期但能有酒肯留客莫恨無花空折枝邑下老禪無恙否可同談笑一開眉汪直卿相招子大先至有詩炎後至子大再至因次其韻笋輿嘔軋度何許水滿東臯新過雨主人倒屣出門迎喜氣津津貫眉宇别易㑹難宜少留清談絶倒殊不休青襟誦詩勸客飲客亦歡然爭旅酬向來青鬢今白首自古交情難耐久從今乘興時一來請屬細君多釀酒榖雨後一日子大再有詩次其韻花氣濃於百和香郊行緩臂聊翺翔壺中春色自不老小白淺紅蒙短墻平疇翠浪麥秋近老農之意方陽陽吾儕飽飯幸無事日翻藝簡尋遺芳閒中更覺春晝長酒酣耳熱如清狂自憐藿食徒過計袖手看人能蹶張鱅溪行并序開禧丙寅冬到大坂作此情見乎辭若過於傷感而卒歸於正蓋庶幾變風發乎情止乎禮義云小溪一曲山四合溪邊楊柳藏門闌當時玉人在花下對花窈窕矜紅顔一雙白璧不可聘許我結佩乘青鸞我時年少氣方鋭自負落筆翻波瀾謂趂春風上霄漢可以終老同清歡不知辛苦得一第始見﨑嶇行路難有如萍草無根蒂二紀流落江湖間莫年通籍入金馬虎豹嗔人窺九關天邊失腳身墮地春風破浪扁舟還雲軿未幾舍我去空委玉骨埋青山重來溪上事皆變惆悵齊眉難再見王母麻姑安在哉過眼百年皆露電老身長子恩義深不為向來花映面花枝一謝明年開玉人一去何時回人今不見花亦盡至此終日空徘徊百川寧有西流水萬古滔滔同一軌不堪回首細繹思臨沒之言猶在耳蜀鄉有鳳空求皇秦樹無烏共將子年來年去春復冬此生有盡情無窮一泓清淚灑不斷四山蕭颯來悲風惟有老人老更健年過九十如霜松尊則吾母舅親又吾婦翁收淚相勞問停車少從容悲思無益不自禁暫時借酒澆心胸明年强健再省覲尊前更酌真珠紅次韻子大四絶世路羊腸久憚行歸來自喜一身輕故人零落今無幾獨幸相逢底裏傾一榻塵埃書滿前愧無絲竹宴彭宣而今又斷功名念只擬躬耕郭外田抽身幸免坐氊針鏡裏休憐白髮新杖屨消搖共來往更添林下一閒人主人速客重尋盟不但郊居氣象清家釀滿壺留醉倒驪駒未可度歌聲送僧惠日歸蟠龍山宴坐團蒲穩何緣有此行理元無作止事亦要經營寉錫尋歸路龍宫出化城更於文字外㑹取法無生秋旱得雨子大詩言祈禱所致炎謂不可貪天之功次韻以見區區宦游録録本無竒失腳歸來莫皺眉只合一廛修穡事豈堪千騎把州麾旱乾偶得崇朝雨秋熟應無卒歲飢耕鑿熙熙皆帝力豐年請為續周詩金夫人挽詩兩大家聲著三從婦德全金珠捐玩飾蘋藻薦恭䖍眉夀無遺恨心空悟祕詮生芻來奠客千兩擁新阡萬宣教挽詩家有青箱學文名早擅場諸公爭汲引萬里可騰驤豈料才如此空嗟命不長雲山埋玉樹松柏倍凄涼汪貴之挽詩洗滌膏粱習熟熏班馬香吹竽多炫鬻韞玉獨深藏不作山中相應為地下郎一夔家有子雖沒未云亡周仁甫挽詩人物今難得如君孰比肩干將鋒立斷神駿氣無前官不過為縣天胡嗇與年空聞精爽在廟食桂江邊盧夫人挽詩在室從名父宜家配大賢上公調玉鉉中道失雲軿一品夫人貴千秋列女傳貂蟬今合窆恰值白雞年奏事入都出西湖上成四絶西湖呼舟特地度西湖欲訪山中幽子居山色湖光渾似舊人間萬事有乘除四聖觀羽衣引我度松關借得湖山一眼看去棹來橈皆物役箇中惟有白鷗閒南園花驄油壁隱輕雷消却氷山不復來墳土未乾為餒鬼園花雖好為誰開淨慈鼎新堂殿鬱嵯峩中有方袍千指多未審雪山黃面老樹邊一宿意如何招諸宰飯六客堂以小詩代折簡以下湖州所作雙袖日沾朱墨塵風流那復似前人梅花香裏傾杯酒略與鳬仙一探春通守趙侯改倅㑹稽以詩餞行我來席未溫君去袂難摻所喜相知新所恨相見晚吏能極縝密風度乃蕭散同僚有斯人可近不可逺漕渠新漲生輦路春風滿置之緹屏中驥足終未展夫豈無裏言相與共推挽語别一杯酒何時對青眼願保千金軀努力加餐飯勸農道場山練日遵詔條行春勸耕事擁斾有傳呼據鞍小馳騖兒童競聚觀父老歡來詣松徑度坡陀蓮宫得清閟此行非遨遊所職在撫字示之淺易語諭以丁寧意扶杖既言歸解衣聊少憩山中無俗情物外有幽趣僧閒衆所羡農困吾甚愧不敢飽登臨肩輿下山去招魏倅項教授小飲菖葉青青初出水布榖聲中耕事起去年蝗旱傷農收今年日望嵗豐美聞道郊原麥浪平但慮飛蝗遺孽耳甚欲往來阡陌間稍與田家共憂喜老大心情畏忌多攬轡未行還自止假日公庭吏牘稀祗可清談共揮塵小園春色亦自都醉日杏桃嬌欲語舉杯相屬謝東風莫待枝頭落紅雨用前韻酬魏倅手把一麾求霅水身似痿人方暫起此行本為貧所驅非戀吳中風土美浩蕩煙波隔白鷗間關道路勞黃耳幸而别駕有詩流相逢眉睫津津喜我今白首君黑頭莫訝鐘鳴不知止每因揖客愁下榻豈暇談𤣥頻捉麈忙裏偷閒花下飲更約廣文同笑語把酒消憂憂更來見說東臯今渴雨夜半聞雨再用前韻轆轤百尺汲無水映日四山雲不起朱轓浪說勸農桑衣食何從可甘美禱而得雨不苦旱竊疑此殆偶然爾夜半潺潺簷溜鳴孤枕夢回心失喜兒童挽犢婦餉饁襏襫耕夫亦勤止鼠跡印我榻上書蛛絲罥我壁間麈抖擻胸中三斗塵强欲吟哦無好語請公酌酒更揮毫快寫珠璣歌喜雨魏倅同杜仲髙游黃龍洞次韻風流别駕臨苕溪行厨携客尋幽竒五湖浩蕩三江永緑淨不知凡幾頃憑髙縱望心目開便可一傾三百杯疑與塵寰不同宇彈壓風光須妙語只恐揮毫驚蟄龍金相玉質音玲瓏郡中游觀之地清風樓為第一前此諸公有詩似覺摹寫未盡輒成唐律一篇約魏倅同賦不拘和韻可也山屏四面碧相重苕霅無聲瀉玉虹萬户連甍皆在下一樓飛棟獨當中不容半㸃浮塵到但覺無邊爽氣通安得翛然辭物役披襟終日挹清風和項廣文喜雨雨師雲將莫論功天意元因聖德通不但水生苖厭厭也應土潤黍芃芃田間老稚交相語秋後倉箱定不空絳帳先生妙言語請歌嘉定比元豐與魏倅葛書記同謝雨于黃龍洞回憩小玲瓏晚飯魏倅有詩次其韻政術平生缺講明賴公關決可蒙成食新雖有豐登望闔郡寧無嘆息聲因為賽神携一榼暫能擇勝駐雙旌歸來依舊塵勞在不盡逍遙物外情苦脾泄在告因飲白酒一杯小愈魏倅有詩已而病復作因次韻見意羸老畏風濕河魚將奈何玉友豈不佳終難護天和數息謾吐納鍊形空按摩自笑來日短殘漏鳴銅荷吏事如衣垢濯之費挼挲養痾諒非宜山林歸興多賀皇太子生辰鳳姿日表極髙明講習詩書若性成參決萬機裨獨斷力行三善答輿情綺園何必來為助啓誦安能更擅名日侍兩宫慈孝洽萬年主鬯共安榮鬱葱佳氣擁天庭申命無疆啓震亨少海永重瀛海潤前星長拱極星明螭旗色轉秋風爽雞㦸光凝曉月清遙想宫僚斟玉斚進趍無地倍馳情題歸鴈亭江湖氷泮草生時鴻鴈南來又北歸莫謾說歸歸不早青雲髙處有危機題白蘋亭得句柳刺史築亭顔魯公二賢雖異代千古有遺風苕水永不盡蘋洲今半空老懷多感慨訪古意無窮題碧瀾亭一色挼藍染碧流翬飛恰對白蘋洲風清六月非朱夏氣爽三時似素秋自笑品題無翰墨也知領略缺觥籌鳬鷗定怪霜髯叟難洗胸中萬古愁六客堂一樽相屬更何人六客當年事已陳扁榜特書名尚在篇章深刻字猶新關心吏事方窮日企踵前賢分絶塵涉筆符移憂百謫偷閒來此一嚬呻生日魏倅惠三詩四海眼獨髙江湖走蹣跚帝念風霜飽命之官仙班刺天紛羣飛政爾衮衮難鹿挾朱輪去勇哉支狂瀾二作州豈無人孰别涇與渭仰止雲溪老靜處酌古味庭户令無譁晝閒棠蔽芾吳儂了不知但說物吐氣三門左何煙霧挾將小春還千鍾酒拍浮一笑衣斕斑醉上樓百尺可仰不可攀定應切星辰天風吹酡顔酬俞子清侍郎惠畫韻筆端元有畫中詩寫出三浯一假竒追憶舊游如昨日艤舟細看中興碑一去星沙二十年夢魂時到橘洲邊從今不起南征念移得湘山在目前送蓬庵梵老緩行聊復倩人扶炯炯精神兩碧矑落筆語言清透骨恐公胸次有氷壺為我衝寒特地來扁舟興盡又須回相思若要問消息早寄一枝墻角梅梵老以小詩為夀和韻答之不問鸞驂鶴駕仙且游無色界中天更煩辦取詩千首一歲從公索一聮呈游大冶昔在桃溪少壯時而今衰颯鬢成絲悲歡三十年中事付與寒窗酒一鴟送游大冶歸建陽震澤黃柑熟苕溪紫蟹肥天寒留客舍嵗晚念親闈抱負須時用行藏與志違臨分話情素衰謝亦謀歸魏倅和銛老一詩因次其韻俯為生靈與敵和君王何忍憤揮戈信行塞外還交聘人在軍中可雅歌金帛莫嫌今重費丁黃將見歲加多漢淮千里惟青草乘此屯田可就麼趙處州挽詩秀邸多英俊惟公最有聲君陳兼孝友子政極忠精白璧千金價青雲萬里程皇天無老眼名位止專城二白首來苕霅深知有故人登門雖不數傾蓋本相親浮鷁行方逺烹魚墨尚新青山埋玉樹老淚漫沾巾題墨妙亭晉唐行草可同科樂石雕鐫便不磨幾載雨淋兼日炙一朝雲集又星羅要知訪古搜求盡應為凝香暇逸多瀟灑髙懷堪健羡簿書堆案意如何送魏倅俗士不聞道利欲熏其心陽浮外酬酢中有機穽深宛陵有君子殊不同今人矯矯鵷鷺姿入俗不受塵挹之淡於水即之暖如春筆端奏金石妙處無新陳念我久頓挫晚歲乘朱輪烹鮮易以擾御黠難使馴賴有賢二車一心同撫循遂於吏事外拂拭緑綺琴為我肯屬耳領㑹山水音持此定交契愈久情愈親東風二月初梅花照溪津語别一杯酒莫辭十分斟聚散亦常事豈必含酸辛重念髮種種不禁憂患侵君今入觀闕我亦返山林行藏異塗轍何日再盍簮所藴勿卷懷朝廷須世臣二月望日留越上偶成此以下紹興所作擺脫軒裳纍此身今自由餘生能有幾外物已無求婺水自堪隱稽山姑少留千岩并萬壑春暖一遨遊謁告成廟玉帛何年㑹衣冠此地藏物存惟窆石神變失梅梁並海山川盡踰河道路長六臣陪廟食千古共蒸嘗游稽山失腳來苕霅春風一棹還尋幽探禹穴問訊到稽山意在煙霞外身居井邑間桃花應冷笑頭白不能閒題大禹廟夏后南巡地登臨一慨然卑宫今造寺菲飲孰名泉古道知難復人情信誤傳不隨時俗改惟有舊山川鑑湖粼粼萬頃碧玻瓈今日耕鋤半稻畦菡蓞開時還自好買舟一醉玉東西二月中休日黃帥領客登望海亭有詩因次其韻翬飛棟宇壓危峯面面風光入座中潮汐近通天闕下蓬瀛疑在海門東巡行誰說秦皇事疏鑿今餘夏后功空濶無邊惟此地君矦心與境相同追悼昭叔弟昭叔弟不祿數年夫婦皆未葬危坐悲念時自吳興罷官來越上候歸當為卜地此詩所以志也老去無他念追懷手足親學成雖漫仕客處只長貧在昔為三友如今少一人青山未歸窆回首獨傷神贈岩電道人胸次有藻鑑聲行朝野間我來勾踐國君住少微山青眼肯相顧白頭今得閒窮通無可問歸去掩雲關賀監宅輕解金龜呼酒徒却問君王求鑑湖歸來蹁躚著鶴氅自辦米帛供妻孥鸞驂一去杳無跡數畝荒園生草棘惟有青青秦望山曾識湖邊老狂客游景德老怯鶯花笑春殘一出游城隅尋古寺柳下繫扁舟身健聊乘興心閒不著愁支郎能欵語清坐小遲留即事故里只十舍滯留猶未歸湖山無此好父子且相依白璧難磨玷黃間暗發機平生丘壑在一笑釋前非麝香萱草穠緑叢中出嫩黃折來時吐麝臍香朝開夕謝休惆悵我已無憂不待忘寄潘維節黑貂裘敝君窮甚黃犬書來我慨然肯到越中同住否秋深即上歙溪船兩鶴仙家墮下兩騏驎寄食庭除未易馴正為白頭違世路要須丹頂伴閒身髙飛橫絶心雖在短舞婆娑意亦真同返故山依蕙帳莫思三島十洲春食楞梅是處楊家果求如此種難色深渾是紫味美更無酸磊磊堆盤潤津津繞齒寒品髙何以辨但把一楞看㑹稽六月初五日新米入市價減舊以升計之凡十二三聞海商米船方集亦損其直大侵難宿飽小熟有晨炊歲事早如此人情喜可知田家甘糶賤海賈恨來遲粒粒皆珠玉無忘餓殍時七月二十二日遣懷寥落求凰鳳凄涼䑛犢牛有時追往事無處著清愁世故今猶古年華春復秋西風乘一舸歸去理莵裘二十五日聞德瑩弟訃音越三日悲不能禁以小詩自解我以官為纍君因病得衰豈知成永訣不及待歸期遣至書來疾賫回藥去遲餘生來日短終不免深悲病中書懷秦望山光翠欲流荷花落盡鑑湖秋不堪衰病歸心切難為湖山更少留雙溪類槀卷八
