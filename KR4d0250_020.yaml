body:
  text: 雙溪類稿卷二十宋王炎撰書上劉司業炎嘗聞富貴則安榮貧賤則困苦其勢然也人情不甚相逺誰不欲釋其所困苦者而趍其所安榮者然自一命之士等而上之至於天子之宰輔其為富貴始極而天子之宰輔天下之人豈可盡躐等而進居其位聖賢以為使人仰視其上之富貴而不以為過俯顧其身之貧賤而不以為歉不可無以節其情之逐逐也故明義命之説以示天下曰可則求不可則止量已審分無僥幸以爭其所欲者義也求之有道矣而得與不得特未定也得與不得未定雖智力無所施焉者命也士誠安於義命則其未達也亦徐徐云爾於中無躁心其卒於不達亦悠悠云爾於中無怨心自夫義命之説不明於天下而後士之羞貧賤而茍富貴者不可復禁甚矣夫風俗之弊也今世之士自其為學之初取古人紙上之陳言手抄而口誦其身之所營其心之所思無非為利達計爾試於有司幸而在選則其求進之心愈亟今朝廷之法必用舉主三人而後許其關升既關升矣又用舉主五人而後許其改官自改官而上其階秩始可以歲月積久而得之則夫未脫於選人者固以舉主為重也所重在此則所急在此患其求之不得也於是有諛辭諂説以為説遇事詭隨以為容求諸公貴人之書以為之推挽談義命於今日人不掩口而笑其迂者幾希而聖賢之教芻狗矣且夫薦舉之法本以搜羅天下淹滯之才及其既弊士不安於義命而惟茍得之為貴故其姓名之登於奏牘者固雜出於賢不肖能鄙之間也必賢者能者得之則人無覬覦自夫雜出於賢不肖能鄙之間有所謂尋常庸流者亦幸而獲進無惑乎士之不安於義命而亟於有求也士誠居山林事枯稿長往高蹈而不返其亦可以無求矣一出而從仕欲少伸其所懷則不能袖手緘口而無求此炎所以猶有望於明公也且炎之不才容貌不足以動人而言語不足以自文其甘心於貧賤久矣天假之幸明公不棄其不才而許其趍走於馮茵之側瞻望顔色粹然以溫聽教誨之言清明和緩而不怒則炎之有求誠未可以不安義命自疑也明公閲人見其眉睫而知其肺肝炎之可取而不棄與夫可棄而無取無以逃執事者之照察矣然非飾其不腆之辭則無以自見其區區之情惟明公不以為不安於義命而矜之幸甚干冒台嚴不寒而栗上蘇郎中炎聞仕於州縣者雖微官小吏莫不各有其職不稱其職而居其位竊位也而食其祿竊祿也郡文學不聽獄訟不治金榖仕者類曰是其職簡靜而易為而其才不足以趣辦一切者亦樂於居之人往往指目之曰是職大抵不才者之委也然自大體觀之朝廷開設學校所以養人才厚風俗將於是乎在人才之不成風俗之不美為教官者則亦有罪矣炎不肖備員庠序方其始至不能有所建明有所更革是則猶有可諉者曰當路之人未能通也諸生之能鄙賢不肖未能辨也是以姑徐徐云爾今將一年矣猶默默在此視學校之弊不能舉手一有所為啓口一有所言不謂之竊位竊祿可乎故其職有不可不為不可不言者請試陳之惟郎中聽焉其一曰本學聚生員溢於百人所恃以為倡率者其大則正録直學經諭其小則齋長諭也而法度不立升黜不正為大職事者多以請託經營而得之其人非有行義可觀文學可取足以為諸生之法者也而諸生之中因春秋二補而入學者又不能無假手之弊故雖市井庸流或得以竄名寄籍於其間聚而食者賢者常少不肖者滋多欲以法度繩之則謗議起矣不然則牒訴興矣玩習為常恬不知怪而士風掃地無遺故父老之愛其子弟與夫鄉曲之善士自愛其身者視學校望望然去之招之且不肯來况欲其以補試而住學破供乎今者秋試之後請告而歸者十且六七炎以為於此時招致士類之賢者而使充大小職事之闕員以倡率諸生則庶幾喧躁浮競鄙薄之風可以一變今采諸公論而得之者無慮二十餘人或志氣堅正或操守淳篤或聞識淹博或文采秀麗雖不能盡識其面目然公論所與則與夫請託經營以求為職事者固萬萬不侔矣此事在炎雖可以專行然有所甄别黑白分明則不肖者有所不樂必臺府主張其説不為浮議所搖而後士人修潔博習者可以使之朋來矣其二曰仕之在官者士之在學者凡有祿必有職也無職而有祿不可以與而與之傷惠矣不可以取而取之傷亷矣今潭之學有學賔者二三人在外而請俸者也有養老者十人無職事而得俸者也夫此十餘人者率之以事則曰吾老者也不當以事相凂裁之以規矩則曰吾老者也不得以法相繩甚者倨傲簡誕無所不至而月取俸錢三緡總而計之月費近四十緡使一學之財用有餘捐此四十緡以與之猶可以不計今財用己竭矣以生徒百員為率則俸雇供給之類月俸四百餘緡歲度用五千餘緡而雜有支費不與焉而所得於府者與所斂於白地者近三千緡爾其餘則取給於所收之米舊米之可糶者倉廩既空而此十數人者無職事而月取俸焉如執劵以責償莫敢少緩其期此誠不可不削也雖然是十數人者或孤老可憐或利吻可畏或險薄可猜若決於削去其俸則謗詈不旋踵而騰踴矣此誠不可以遽削也然朝廷近旨凡職事在學令所無者皆罷焉學賔養老俱非著於學令者也茍隱默而不言臺府亷而知之炎則有不奉條令之罪矣且以職事論之直學掌一學之出八經諭分一六之講説而月得兩緡齋長諭主一齋之事務而月得一緡彼十餘人者為其老而優之許其住學破供是豈不可乃月以三緡與之雖直學經諭反有所不若不已過乎况又有年未七十實未嘗老粗有生理實未嘗貧而因緣在學規圖三緡之獲則尤鮮亷寡耻矣是又不可不削者也夫豫之則喜奪之則怒則怨人情大抵然也今一旦削其俸給則此數老者之怨怒萃焉炎固不敢避也事無細大使人人俱欲避怨而市恩則僥幸之門不窒矣惟臺府主炎此議斷在必行則庶幾節冗食減虛費可以少寬一學財用之急矣其三曰本學自湘西遷于郡城者逾四十年而殿堂門廡至于齋舍往往損弊不可不修使學之錢榖有餘猶難於興工况匱乏乎故熟視其弊無如之何夫道宫佛廬金碧相映而先聖之殿御書之閣書生之室頽敝不支此炎所以有感也然計其用度欲略葺之非千緡不可少加工焉其費又再倍於是此炎所以不得不有所請而難於遽言也曩者侍郎李公在此炎乘間一言之李公曰方修郡治復修貢闈俟二役既畢則次修郡庠炎由是不敢再有所請在今日則不可以復默也炎寒鄉之晚出也家世中衰為貧而仕非敢激昻奮發趍赴事功然汨汨隨俗備員素餐心亦耻之近者望見郎中之顔色溫然以和侍坐聽言又諄諄然不倦是亦可以有言矣故其事目具之公牘而其情曲折見於此書惟少垂頃刻之暇俯賜采覽察其區區之懷而不拒其僣瀆之罪不勝幸甚干冒威嚴無任戰栗又炎嘗謂學而欲仕仕而欲達天下之情一也然達者常少不達者常衆則亦有由矣韓淮隂國士也不遇蕭相國則終身一都尉爾張柬之竒才也不遇狄梁公則終身一司馬爾士之浮沉於下寮者雖當世之豪傑且不能自奮况碌碌而無竒者乎故掃門以見相君執御以事先達非躁且諛也刮磨滌濯借之聲光其勢固有待也郎中用心之公如權衡用智之明如止水士非賢且才者雖有竿牘之薦葭莩之援牙頰之助未始一舉手引之則固嚴於所取矣雖然郎中家世之光融人物之俊偉後進者望之以為龍門此炎之不肖所以亦起掃門執轡之念也且炎新安賤士也挹英風聞髙誼願自託者有日矣備員侯泮而王節之光實照臨之此天畀以幸會也然炎承乏垂及一年方其始至望郎中之顔色淵然而靜辭氣肅然而簡退而思之曰是上下之情未通也欲有請焉而未可既數月顔色凜然而嚴辭氣愀然而厲退而思之曰惟其不才而取棄也欲有請焉而不敢比者望郎中顔色盎然以和辭氣衎然以樂退而自喜曰是可以言其私矣失今不言是自棄也抑又聞之龍泉太阿之劍天下之利也方其埋於牢屋之下曽頑鐵之不若也一旦雷張二人者知之則騰而為紫氣變而為蛟龍世皆驚焉人之有所遇猶夫物之有所遭也郎中其進之歟則炎命之通也其棄之歟則炎命之窮也通窮之占決於今日不言則無以自見多言則瀆矣干冒威嚴不勝恐懼上王右司炎聞六經載事之簡嚴而用法之精密者莫過於春秋春秋於城一邑築一臺一囿作一觀新一廄無不謹而書之僖公賢君也在位三十二年雖新作南門亦筆之以示貶以為有國者當惜民力節財用也至於泮宫敝而修之春秋無見焉則無譏乎爾矣不惟無譏魯頌四篇皆美僖公而泮宫之詩居一焉非不役民力費財用也無譏於春秋而有美於頌何也天子之學曰辟雍羣天下之士而教之諸侯之學曰泮宫羣一國之士而教之故學校者人才所從出風俗所從始也學校之廢則無以養人才厚風俗故青襟之譏見於鄭風而泮宫之美著於魯頌今之州郡古諸侯國也郡有校官即侯國之泮宫也潭衡湘會府也使節帥符蒞焉其學校宜崇麗顯敞始足以稱價藩之體今為屋數百楹養士溢百人而先聖之殿御書之閣師生之廬寖以頽剝炎以為此臺府所宜垂意也或曰今之學校文具爾非實能養人才厚風俗也方州縣用度告乏而欲用工於學校其事緩而不切其言亦迂而不足知時變矣炎竊以為未然夫因其敝而修之其為費尚輕也少緩歲月俟其大壞則必當更造大壞而不更造以會府之學校而鞠為荆榛不可也必更造之其費視今數倍矣此不可不修者一也道宫佛屋其徒竭力為之丹碧相照而先聖之居熟視其敝不過而問焉可乎且先聖所為尊於萬世者固不在乎屋宇之閎麗然上漏下濕生徒肄業者無以庇風雨焉則青襟散矣此不可不修者二也夫告朔之禮雖廢而餼羊不可不存教養之法雖壞而學宫豈得聽其自壞哉郡文學未必人人不能訓導也諸生未必人人不能率教也葺屋廬以待之則養人才厚風俗者其意尚存此不可不修者三也且所修之費嘗試計之矣略葺之度用千緡加工焉其費當倍於是臺府有意為之其事亦無甚難者炎寒鄉晚出家世中衰為貧而仕默默在此且一年矣右司持節鼎來炎旅進退於屬吏之中辱降辭色眷豫之是以敢有所請惟少垂頃刻之暇察其區區之懷而恕其喋喋之罪不勝幸甚干冒威嚴流汗無地上薛大監書炎聞朝廷之法度官吏之規矩繩墨也無小大行乎規矩之內則名正而義順出乎繩墨之外則無名而義悖吏之賢否政之美惡民之從違皆於此乎決炎出於一介孤生學古入官固非其所能而三尺之法當畏而守之則亦固知之矣不幸擇地不審逐來臨湘臨湘陋邑也有名之財州專之無名之須縣任之自早至暮凡所以對吏民者不復論教化不暇謀撫字不及議獄訟又不及語催科惟違法以取錢物則汲汲焉炎固嘗言之大監則固嘗知之矣近準朝旨為闕乏之縣減無名之須憲使直閣丁公方行下問而大監鼎來炎遂可以脫身於罪罟之中此不可覬覦之福也炎雖未獲侍慿茵望顔色聆謦咳然大監所以待之者如門下士而炎所以自待者亦曰身蓋薛公之客也故有不可覬覦之福遂有不可覬覦之請惟大監試垂聽焉炎之所請者不過有三而已矣其一曰本縣令佐之俸給鋪兵之添支馬綱之批支一歲約用米凡三百斛雇夫匠用水手所支之數不在焉稅米盡赴州倉送納舊來州司計縣下截撥百斛繼而又削其半今日縣邑之窘無錢者有之矣未嘗無米者也春夏間倉庾空然令佐或至闕食而鋪兵馬綱無米可攴遂不免折支官錢一升十文夫支米本色也攴錢折攴也錢又不足減尅其直違法也使臺既為減無名之須而禁其違法之罪則鋪兵馬綱至於無米可支而折錢無錢可攴而減尅則又不免違法矣欲乞台慈照炎所申公狀行下本州許本縣截留米正耗共三百斛以充一歲官兵馬綱之用則非特不至闕乏炎亦可以免於罪戾矣其二曰本縣前此無名之錢凡有八色一曰馬草錢使司既為本縣蠲之矣二曰捕盜錢三曰招軍錢四曰陳設錢憲司既為本縣蠲之矣五曰揀汰使臣錢六曰煮酒錢本州以上供為名而取之事屬總所名曰上供未敢有請七曰供給錢八曰遙領錢此二者歸於本州公庫縣既不可有違法之取則將何以應無名之求且委守臣節浮費以寬屬縣則近降指揮也責官吏以遵法奉令則近日詔書也今若蠲此二項則於縣可以少寬而於本州所謂上供送使留州之財備公家經費者初無所損若蒙台旨行下豈特炎受其賜百姓亦深受其惠矣其三曰本縣夏稅盡歸州庫送納陸地水田紐計家業皆當納絹此則上供之物也今也不納絹而納錢乃於常賦之外本縣又敷上供絹七十二匹州無本錢拋下在縣縣無價錢支散在民而白行科敷西而江陵東而鄂渚皆無是也朝廷方禁違法之事詔令森嚴則夏稅絹既折納價錢而額外白敷上供絹帛其法乎抑違法乎尹鐸之為晉陽宰也其説曰為堡障不為繭絲今炎之為令也反是為繭絲不為堡障上則有違於法下則有歉於民內則有愧於心炎今照本縣夏稅有絹不納本色而折納價錢元額不過五十二匹二丈而已矣今計每歲本州所納之數凡二百九十六匹折價錢一千四百八十貫文比之元額增至六倍今若蒙使司行下上户成端匹者使之納本色下户合零者使之納價錢既可以得錢又可以得絹於上供初無所損而於民户深有益但於本州羡餘之數微有所虧爾此計之善者也凡炎之所言者非獨為一己之利蓋一縣之利也非獨為一時之利蓋久逺之利也且炎之終更有日矣然為一縣之長則當任一縣之責是以不得自謂將去而不言雖然炎之言民之所願而非州之所樂也前日違法而有取則得罪於民今日慮其違法而有言則得罪於州然抑有説焉何者易于之為益昌令也有詔𣙜茶易于焚之夫焚天子之詔若有司議法當得大不恭之罪易于不顧而行之其意曰焚詔之迹雖若犯義焚詔之心則在愛民不察其心而論其迹罪之可也略其迹而原其心恕之可也太守之賢亦必有以察炎之心矣而二天之庇則實有望於門下是以敢僣言之干冒威嚴不勝戰懼上盧嶽州炎近蒙使府差人索前官任內舊欠錢物自惟下邑屬吏升沉去留有福有禍皆在判府之頥旨豈敢不敬以承命惟其窮乏之甚無所從出是以詳悉申稟乞賜蠲除方懼以螳螂之臂抗隆車之轍得罪無疑乃蒙頒賜誨劄封示使牒仰見薰慈待遇之厚然尚未賜蠲免炎是以不懼再三冒瀆之罪猶欲有所開陳更乞少霽威嚴以終其説炎竊謂州府財用必取之邑邑之財用必取之民上有所取下所不可辭也然臨湘財用則無所從出何也夏秋租稅縣下所謂常賦也而臨湘不然夏科有錢秋科有米一文一粒以上並赴使州交納無常賦可催無奇零可取無羡餘可得無滲漏可察財用無所從出一也酒𣙜征稅縣下所謂生財之源也而臨湘不然一市百家無十金之肆一鄉千户無百鍾之藏既無交易商旅不來况又阻以團山窖港二渡客旅出於管下者東自鴨欄西自道仁磯取捷以行不入縣門所收稅錢每日不過數百至一緡極矣榷酒之利除米麴柴水之外每日不過得數緡之息爾則財用無所從出者二也除此二者既無所從出其他如魚湖之利可以供版帳之定數此則華容之所有而臨湘之所無者也如茶山之利可以補經總制錢之失額此則平江之所有而臨湘之所無者也不免因詞訟乞丐錢物以充月解而臨湘民訟又且至少固有終日坐於庭而無一紙牒訴者偶然有之分決曲直遂乞錢物身為長吏官號親民職當撫字而自蚤至夕汲汲然惟以乞覔錢物為事此何等舉措哉上有戾於法下有愧於民中有歉於心炎所以亟欲求去者蓋為此也况入四月以後江水泛漲商旅不行農桑之務民在田野縣市寂然謂之荒月於匱乏之中又最匱乏之時而責其補解舊欠則其勢尤難幸遇判府萬間之庇汗顔茍祿其罪多矣月解見在無欠炎也何能皆判府覆護之賜也然究心趣辦亦己不遺餘力矣而責以前官之舊欠若之何而承命哉譬如尫羸之人荷簷而趣方以顛沛隕穫為憂而又曰其力未盡也必使之身負百鈞日趍百里則折骨絶筋而死矣且據使府行下所欠者千緡更除豁權官任內所支俸錢所欠亦止五六百緡爾在使府得此未必大有所益在陋邑辦此則不翅如挾山超海之難也在使府蠲此未必甚有所損在陋邑免此則不翅尫羸之人一旦獲釋重負也再三違使府之命當受誅譴然茍且承命他日決無以應則亦終不免於得罪是以首鼠於依違之間卒一吐其情而告也且縣庫之錢公家之物也分文以上悉留以申解歸府為長吏者第視簿書守管鑰焉爾若其有餘不肻申解即其意謂何今方日夕憂慮以不足為患非有餘而貯蓄之也夫順之則喜違之則怒者世俗之情也順之不喜違之不怒惟其是而已矣此大賢君子之心也炎是以無畏懼而一言之如蒙大造特賜蠲免非特炎之幸亦一邑之幸也况判府之入覲有期矣敷奏之間必及荆湖之利害為聖天子極言之使無名之科敷或如江陵一州派之人户或如鄂渚一州責之酒稅而科罰獻助之説不行焉豈惟臨湘一邑之幸乃一州四邑無窮之福也干犯威嚴罪不可恕不勝戰栗上章嶽州書炎近準使府帖行下本縣截撥月解版帳錢貫收糴米約一千碩炎已嘗具因依供申訖今蒙台判及簽廳所議行下未賜蠲免且炎身為屬縣賤吏事無巨細自合惟命是從所以未敢承受台旨收糴上件米斛非敢故違使府指揮照得臨湘雖名為縣元來止係巴陵一鄉上半鄉依傍山林今歲雖云成熟然土廣人稀開墾未遍僅能自足下半鄉邉近江湖被水浸蕩或彌望絶粒不收貧民見己艱食本縣管下委是無可收糴此其不能糴者一也况其地僻陋井邑蕭條商賈米船泝江而上則聚於鄂渚沿江而下則先經由華容巴陵本縣所來者不過通城步擔而已步擔所般能有幾何粗可以濟被水人户收糴目前日食官司茍下收糴之令則步擔之夫日下持疑未必便來縱使其來而官悉糴之則千碩未必可集而被水之民則有飢而無所告糴者矣此其不能糴者二也上鄉之民方以來春不給為憂下鄉之民正以目前不聊生為患近日炎奉命按視水傷兼又議行賑糶民方日夜望官司有以利己也今未有以利之而遽曰和糴與民爭收於艱糴之時則民必曰知縣前日之議賑糶欺民也不然胡為於災傷之地而反和糴耶民既失望來春老弱或至流移餓死萬一有意外之患丁壯或至攘奪則炎何所容身此其不能糴者三也江西玉沙之民方脫水患收取魚鮮道臨湘蒲圻之境以易通城之米邑民猶有聚議欲官止其泄今官若收糴窮民固未敢有詞然豈能無怨此其不能糴者四也且炎食公家之祿任公家之事又有判府台旨使令豈得不盡心力而為之况炎向年為崇陽簿嘗攝曹職于武昌是時吕判院為守令炎收糴二十萬斛炎受其責不一月而辦蓋以舟車商賈之聚故也今千碩之米比二十萬碩二百分之一爾然糴於無米之地艱糴之時則雖欲盡心力為之事必不辦此炎所以惴惴而慮喋喋而請也雖然炎亦豈敢無説而徒不任事自湖南至於鼎澧茍非歉歲則商賈興販艫舳如雲水溢則必由華容水落則必出巴陵官茍置場收糴則千碩之米可談笑而得也與其分拋於臨湘無米之地艱糴之時而收糴步擔者固有間矣炎一介孤寒技能無取獲𨽻下邑以茍寸祿譬如孤根易搖徒手可拔也弱羽見墜虛絃可落也所恃者判府太中廣厦萬間之庇爾非不知承順教令以為一時容悅之為利不然則重得罪然今日以為可辦而他日米或不集有誤使府指凖則其得罪又必無所逃仰惟判府剛毅能行天下之至公寬洪能受人之盡言仁厚能憂民之疾苦炎是以敢再三有請伏惟台慈憐其情而察其意之無他特賜蠲免不惟逭炎一身之責上則不誤使府他日之經費下則為臨湘一邑之利干冒台嚴俯伏俟命上劉嶽州炎嘗謂君子畏義中人畏法小人犯法而趍利天下之君子常少小人常多故為國者不可廢法所以禁其趣利而道其畏義君相立法者也內則御史外則監司行法者也郡守奉法以治其屬縣縣令奉法以撫其民民微矣與令最親去郡守逺去監司又逺去朝廷則又大逺令賢歟則法存而民安是為國培護其根本也不賢歟則法廢而民擾是為國戕其根本也天下之為令者不能皆賢然違法不顧惟嶽州四縣為甚就四縣言之惟臨湘尤甚和糴上供米實無價錢湖北一路皆然無議焉可也詞狀到官則買印紙耕牛倒死則納綱解錢此特其小小者爾無議焉可也其他違法者殆不可纍數詞訟已畢獻助版帳錢一也報役已滿獻助版帳錢二也牙儈里正攬户給價直之半歲買聖節銀三也公吏里正攬户僧寺歲敷煮酒錢四也僧寺師巫月納醋錢五也屠户科買聖節豬羊給價直之半六也四時祭祀豬羊亦給價直之半七也冬至節儀不給價錢獵户名下科敷鹿鹿八也知通以下公用里正名下科絹工匠名下科漆九也塑畫春牛里正名下科敷工匠雇錢十也上供煮酒里正名下科敷米本十一也馬綱經過大小保名下科敷榖斛十二也上供絹於正稅外又於上户名下白行科敷十三也役人雇錢錢會中半支出暗行尅落十四也鋪兵添支馬綱批支縣倉無米折支官錢其錢又無窠名每升折錢十文十五也夫豈他處之為令者皆亷潔而臨湘之令皆貪汙他處之為令者皆長厚而臨湘之令皆刻薄其弊則固有由矣縣有二稅不得受納歸之於州魚湖之利不得移用歸之於州營田之麥不得移用歸之於州州專有名之財而縣應無名之求一曰馬草錢派之於縣二曰招軍錢派之於縣三曰捕盜錢派之於縣四曰陳設錢派之於縣五曰㨂汰使臣錢派之於縣六曰供給錢派之於縣七曰遙領官錢派之於縣八曰醋息供給錢派之於縣九曰上供絹𣲖之於縣夫此九項初無名色財非天降非鬼輸不取諸民於何取之本州又立在版帳書之青册立定期限斷不可違違法之罪大而緩欠錢之禍小而速為縣令者寧避小禍而不顧大罪循習至今凡數十年臨湘之令其難甚矣臨湘之民其窮久矣今者奉朝廷之德意承外臺之約束曰馬草錢則漕臺為縣蠲之曰招軍錢曰捕盜錢曰陳設錢則憲臺為縣蠲之而縣之不以法取者惟上供絹無錢可支不以法給者惟鋪兵馬綱無米可支其他則一文以上不敢違法而使州之於縣奉承德音於縣則未有所減放此炎所以不能無言也曰揀汰使臣錢曰煮酒錢州以上供為名此𨽻於總所本州未可減免至於供給錢五十貫文州之公庫有之遙領官錢十貫文州之公庫有之其取之也於上供無益其免之也於上供無損不審判府能為縣免之可乎况惟聖旨丁寧明詔守臣節浮費以寬闕乏之縣今此兩項錢貫以供公庫之用不審判府裁節所費以寬屬縣可乎昔者聖人之作易也損上益下其卦謂之益揖下益上其卦謂之損判府於公庫之用薄有所損然上以推廣朝廷之德意下以寬屬縣之匱乏又其下以慰斯民之願望一舉而有三善焉不審判府能聽愚直之言乎夫出言軟美雖剛直之士初惡之終或喜之季布之於曺丘生是也盡言切直雖公正之士初喜之終或怒之司馬溫公之於蘇子瞻是也夫為人如司馬溫公可謂賢矣猶不能虛心以受盡言然則盡言者固無有聽之者歟前輩謂李文靖淡然無欲王沂公屹然不動其人品在溫公上使世而有斯人則盡言者可以容其喙矣然則炎之言固以二公望於門下者也不審判府能容而無怒乎且炎為外縣小吏本州財計不能知也二稅之所入幾何魚湖之所入幾何𣙜酤之利得無有虧折否征商之利得無所滲漏否炎皆不得而知之但供給遙領官錢每月共六十貫文本縣不可妄取則其辦之也難公庫裁節所費則其捐之也輕故不避誅譴敢有所言蓋以君子之好義固判府之所優為而中人之畏法炎不敢不自警也恭讀今月二十三日詔書到縣曰奉法遵令無或不虔倘有違戾當置重典天威不違顔咫尺敢不戒哉敢不懼哉惟其言之狂妄罪不可逃俯伏待命不勝恐懼雙溪類稿卷二十
