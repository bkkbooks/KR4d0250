body:
  text: 雙溪類槀卷九宋王炎撰古律詩舊苦左臂痛今春自霅川罷官寓居㑹稽秋中聞德瑩弟訃音幽憂無聊背脅得疾痛楚殆不可忍早夜思家恕子慨然投劾同歸壯年游宦計日月為攷舍之而去可謂愛親矣予年過七十兄弟凋落人生非金石誰能長存有子而孝使予返故園父子相依鐘鳴漏盡終於牖下可以含笑入地成唐律一篇以著其意蕭蕭華髮更何為元是窮鄉一布衣同産弟兄誰見在餘生父子獨相依我縁多病念家切汝為愛親投劾歸出處不齊難逆定時來還自刺天飛西興阻風小市西興渡年來一再行花開方淑景木落又寒聲雲破日還晦潮回江未平壯年曾試險遲莫敢輕生江亭曉望天在空濛外山横杳靄中潮翻江水白日射海霞紅旅食思鄉社歸舟待便風老懐誰共語注目送飛鴻夜宿閔灘下歙江兩岸山立壁一水潭潭浮紺碧嵌空老石出中流觸碎玻瓈成沸白灘髙水落定難行莫雨淋浪新漲生三更風怒山欲吼催喚金烏回曉晴篙工倚柂笑相語但上閔灘無所阻明日日晡過歙渚艤船沽酒勞辛苦將使送玉堂春花江南竹笋次韻二絶自紹興回小白長紅盡絶塵不將朱粉汚天真應憐三畆荒涼地乞與鰲扉一種春此君長得籜龍兒不為供人口腹資養就翠梢如結實來儀當有鳳師師題詹氏佚老堂矍鑠精神鬂未斑翛然青坐對雲山兒孫滿眼生涯足贏得壺中日月閒凶年慨然嘆久生成贅因以長句述此意頻歲田家苦旱蝗劇思小稔活丁黄稻稉久渴三秋雨菽麥俄經一夜霜未保溝中無殍死已聞道上有流亡白頭屏處山林下只怕羣偷慣奪攘落花小園數樹雜花開零落無聲覆緑苔休恨五更風雨急明年春色自歸來春日苦雨桃花開時苦多雨花似啼粧悄無語桃花謝時雨更多奈此輕紅委地何明年花似今年好明年人勝今年老是誰留得長少年對此不須空懊惱雙飛燕子營新巢舍後舍前穠緑交長鬚但為釀麴米春色尚餘紅藥梢宻室壬申冬宻室可附火小窻聊借明風寒皆不到温飽更何營省事事自少養心心亦清床頭猶有易座右不須銘久雨而雪兩港水爭長四山雲未歸忽聞雷虺虺飜見雪霏霏蠟屐老難出竹爐誰共圍金烏無恙否何事隠明暉清明日先塋掛楮錢癸酉昔人最重去墳墓絶喜歸來老一邱豈是他山無笋蕨只縁故國有松楸百年暫住人間世千古俱為地下游色境悲歡雖夢事楮錢聊掛樹梢頭將使有詩許移厨雙溪次其韻艤舟柳岸載清尊招我花邊一賞春莫笑㸔花人已老白頭曾是少年人石上窪尊可置杯石邊更可著浯臺旁人不識溪山趣將謂尋春特地來莫春天氣漸清和枝上紅稀地上多惟有松筠四時好風枝雨葉緑婆娑新晴度臘殊多雨開年亦未晴地卑常礎潤月墮忽霜明茅舍煙猶濕秧疇水可耕幽花并細草隨意也欣榮和董叔重韻秀色驚老眼見此千丈松門如翟廷尉人愧王君公驪珠損佳惠衰遲豈宜蒙三復不能已一室生清風題黄元靜廣先樓聞道樓居好翬飛百尺餘箕裘能襲舊丹雘遂如初生理萬鍾粟義方千卷書家聲將益大車馬炫門閭社日日暖泥融燕子飛海棠深淺注臙脂一杯社日治聾酒報荅春光爛漫時喜晴雨過千畦䆉稏黄趂晴刈穫可登場田家子婦開眉語白粲新炊滿屋香雨過兒童飽飯牛趂晴耕墾種來牟田家作苦無儲蓄待哺全須麥有秋舟行到滿塘壬申蘋花雙港靜蓮葉一舟輕白石波間走青山路外行鯈魚方自樂鷗鳥不須驚擁鼻蓬窻底翛然午吹生秋夜索索風葉響寒生秋夜深閒思千古事虛費一生心命薄謀多拙年衰病易侵黄粱今夢覺髙枕卧山林壬申十二月二十八夜雷殘臈方淫雨中宵忽怒雷更長頻展轉夢斷但驚猜凍雪何時解春風幾日來龍蛇今在蟄墐户不宜開初春苦寒久不到雙溪成長句書懐老去頗多病苦寒摧折之袍襺非不温不能䕶清羸蒲團穏附火蓄縮如凍龜西山有桃李借問惟枯枝好花何時開仲春以為期榮悴自相代出處亦有宜天寒但深藏日暖當游嬉强健不須喜老死何必悲曉日升扶桑莫還入崦嵫置之勿復道理達心何疑及時且行樂花邊傾一巵和將使早雪甲戌曉日藏明恐雪羞逺山含暝更雲浮不須苦道豐年瑞擁衲爐邊索酒舟又和早雪韻夢覺流蘇寒栗冽曉起方知天釀雪松公變色失蒼髯竹士垂頭摧直節倚樓四望無紅塵疑是身居銀漢津千林一色皆玉樹不許梅花先得春梅花園林都未覺春風蓓蕾枝頭茁小紅要識十分清絶處暗香疎影月明中欲向花邊把一杯喜逢臘盡又春回直饒百歲為期限能見梅花幾度開咏便坐梅花時病起去年花下立踟蹰搔白首今日花邊坐病起更衰朽老與病交侵歡悰尚何有人老不再少花謝還復開對花堪酌酒畏病不舉杯寂寞重寂寞春風何事來病起羸軀方伏枕凍骨倍加綿自覺脾為約醫言脉太𤣥不禁腰痛楚仍苦膝拘攣搔抑方能定扶持僅可前緼袍藏被底熾炭倚爐邊衰謝誠宜爾風寒實使然迍邅雖有數調䕶不無愆初日憂難療兼旬幸稍痊是身無實相何術保餘年不死方成佛長生乃是仙闔棺寧再起拔宅謾虛傳力豈能加命人終不勝天災生雖或免算盡必難延只合情無滯毋為疾所纏窮通皆任運逆順但隨縁南畆無千斛西山有數椽飢當量腹食困則曲肱眠此樂人知少浮休永息肩雙溪種花雙溪漸有雜花開每日扶笻到一回勝似名園空鎻閉主人至老不歸來蒼頭為我斸西山扶病移花强自寛縱不為花長作主何妨留與後人看春日有感拍岸晴波蘸柳絲一雙鸂䳵浴紅衣可憐陌上花開盡不見魚軒緩緩歸題汪尉立之快閤市㕓屬耳太喧囂林藪藏身又寂寥負郭面溪開小閤箇中登覽獨逍遥傍簷古木緑隂隂下有清溪可洗心燕坐紅塵飛不到何須風過一披襟將使有詩欲移具相邀到雙溪因次韻緬思花下飲歲月易侵尋人老今華髪春深半緑隂揮毫來妙語移具有佳音草木生光彩青藜肯下臨和何元清韻九絶春深遶屋緑隂稠却掃無人識冗侯獨肯敂關相勞問不妨挾冊共藏脩絲竹無縁在後堂肉羞不辨出東房金徽彈罷惟清坐共挹熏爐一穟香屋邊花蕚自離披屋底臞儒但著書游冶郎君應冷笑不能暇逸獨何歟老來視聽稍精明休問如何太瘦生還信閒中安樂否龜巢蓮葉喜身輕覔官安用羡登仙求富何須願執鞭洙泗從游多達者簞瓢顔子獨稱賢青眼雖慚阮嗣宗為君解榻席相重菜羮蔬食能甘否自昔人言儉易容莫年築室北山邊自笑渾無塞屋錢巾褐翛然窮亦樂豈曾有夢到金蓮一洗平生箏笛耳極知緑綺有遺音君臣慶㑹休三弄泉石膏肓不可鍼焦桐為我發哀彈但覺清風遶指寒老大雖思聞古調莫彈别鵠感離鸞雙溪即事乙亥竹底開幽徑山根結小樓誰知多病苦自判一生休舟著平沙尾橋横古渡頭往來皆物役却掃獨無求清老畫雙溪壁以詩謝之乙亥老夫哦詩聳兩肩落筆不停稱腹槀縁詩寫出無聲句畫史追之誰得到為予壁上留真跡水墨纎濃任揮掃石根竹樹極蕭森中著羽蟲疑呌噪雖然畫意不畫形形意兩全方筆老熟視時時自首肯從旁見者皆稱好師言此亦吾餘事佛祖𤣥關須探討未宜直說色是空不著色空斯見道用元韻答清老巧匠胸中有全室能文紙上無脫槀老禪善畫亦如是毛錐未出意先到解衣盤薄小經營驀然揮洒筆如掃我思詩畫本一律衆作徒多等蟬噪畫手無如王右丞一似詩中杜陵老正縁此老襟韻髙工拙竒常無不好斵輪妙處不可傳此事難從筆端討由來萬法生一心貫徹精粗無二道再答清老篆車創始自椎輪莞簟從初但蒲槀詩到晚唐非不佳少似國風能理到嗟予耄矣弃頴泓卧病終年長却掃客無脫屨一榻懸人不到門羣雀噪敢意支郎念岑寂時將妙語起衰老若人搜句乃餘事雖不雕鐫自精好況於佛祖可呵罵豈無魔外宜攻討早辦山居一把茅為我長歌歌證道平生言語苦不工甲乙未能成類槀曩時陶謝以詩鳴竭力追隨終莫到上人詞鋒極痛快睥睨千人軍可掃長須驚喜見此客無怪繞枝鳱鵲噪師言能詩且工畫筆仗須先知嫩老復言能畫亦飽參亹亹𤣥談聽更好吾聞法海深又深性珠可得不可討若除詩畫與談禪未審云何真悟道舟行到􅰠莪和清老韻沙尾維舟傍水楊主人延我坐中堂山焦石裂方亭午借得微風一霎涼詩中巧手妙穿楊便可階陞屈宋堂句挾氷霜堪却暑令人心地亦清涼和清老韻不作麒麟楦方知外物輕杜門便野處躡屐飽山行未說窮通樂宜無寵辱驚頽齡寧有幾聊爾憇勞生再和元韻蟬蛻塵埃外翛然世累輕開堂聊演說杖錫遂飛行畫妙人難及詩豪我亦驚筆端游戲爾法忍貴無生雙溪即事築室依林麓開門向水涯經過無俗駕附近少人家洄洑潭成沫嵌空石有窪幽居誰是伴鳬雁聚平沙舟行過白石見將使夜宿毛家林翌日到􅰠莪却回和清老蒼頭倦晨炊卯飯幾及午泝流赤日中舟子亦良苦魚躍戀芳餌鷗飛避鳴櫓仙翁所退藏好境自呈露溪水清可鑑山雲横不度坐斷泉石幽不受塵土汚問之何所得妙處難悉數初非練玉泉亦不鳴天鼓人癯道方肥心逺貌亦古老衲同我來得句時一吐物色盡詩材筆底隨指呼行行更前之繫纜日未莫轉柂渉奔湍支笻入幽塢倦甚宿茅茨睡熟不能寤遲明又蓐食凌風上前浦重露雨㸃疎晴嵐雲氣布蝗蝻尚飛揚禾稼難愛䕶村落有狗偷耄倪且狼顧念此一悄然回舟雙港渡空羡皎然師詩成有神助哭吳耀逺孤陋無如我交親賴有君方圖來往數豈意死生分自卜牛眠地今歸馬鬛墳不能澆斗酒忍遽述銘文俞義夫挽詩恩愛周姻族寛和善里閭年髙無悔吝身沒有名譽願見今何及從游舊亦踈若修耆舊傳言行可追書拒霜花池上木芙蓉曉寒摧折之緑葉未盡彫紅芳已先萎空得拒霜名憔悴不自持人生亦如此榮盛須及時少壯不久留老疾仍相隨騰騰當任運慘慘徒自悲萬古同有盡華顛無再緇及今幸强健不樂將何為冬至日雪乙亥十一月二十三日日脚初添一線長飛花撩亂壓微陽朱門滿酌羊羔酒誰念茅茨有絶糧次日快晴曈曈曉日射窻明急雪漫空快得晴田父飯牛應喜甚東臯澤澤可深耕早梅似無還有暗香來知是春風到早梅一歲一畨花似玉老人見得幾畨開脚婆竹奴夏日涼脚婆冬夜燠二物不同時皆堪伴幽獨自吾失伉儷一紀誰與宿年髙氣血衰日短天地肅魚眼夜不暝雞膚凍生粟伏枕屢展轉挾纊但拳曲脚婆當此時貴重如金玉㸑釜蟹眼生汲之滿皤腹暖氣所燻蒸羸軀任伸縮粉黛工取憐自可薦衾褥豈不辟沍寒而能動情慾不如此瓠壺但可暖吾足貌醜不嫵媚坐穏無顛覆妄想何從生黎明睡猶熟李忠甫見惠長牋以詩謝之寂寂羅雀門日見交游疎短李不我弃一年憇琴書青衿孺子軰共喜得範模黄鵠有逺志樊籠不可拘今將舍我去雅意何勤渠駢儷出妙語簡潔無費辭捲置懐袖間報之欠瓊琚惟期在明秋刷羽摩天衢病中即事三首附火膚革燥逺火寒慘慘坐卧置湯婆稍覺兩足暖抓搔不停手苛痒殊未減飲食固多忌所幸能强飯客至不出迎予非敢疎懶二塊坐小窻下簷牙烏鵲語飛飛去復來遶樹鳴不已料汝必不誤顧我亦何喜恐有行人來未知誰氏子三旬浹不見日凍雲塞天宇兒童相與言雪意恐未已一月見三白為瑞亦足矣老夫固畏寒貧者憂凍死六出亂飛花不如晴可喜子用惠魚四軸以詩謝之四幅溪藤任卷舒管城幻出化龍魚風雷定似梭飛走莫誤呼兒覔素書掉尾揚鬐氣象閒或潛或躍出毫端非魚知得魚如許豈在濠梁子細觀石倅宗卿挽詩并序嘉泰中婺女石宗卿來宰婺源時炎自中都罷歸得楚東之命之官不數月又以罪罷杜門却掃郊外罕至縣庭而宗卿睠睠衰朽恩義甚篤炎竊觀前後來為宰者或髙明不可欺以事或剛介不可干以私求其潔白清真樂易外不事邊幅内不立城府粹然有儒者氣象惟宗卿一人而已他不及也炎是以親之敬之宗卿自婺源解印得倅宜春嘗一交信自後音問斷絶嘉定八年冬宗卿之子武自郡城以書及墓誌銘來則宗卿捐館祥禫矣炎與宗卿交淺而情深宗卿沒於泉南病不及問䘮不及弔比其葬又不及執紼死生永決莫年失此良友豈止一哀出涕武以挽詩見屬炎不待屬也故詳序其交友之情而申之以詩以寓其哀云潔白心如玉寛和氣似春索居當晚歲取友得斯人婺女書難再泉南迹已陳天髙不可問反袂獨傷神二能吏今非少純儒古亦稀斯人胡不夀吾道豈其非才自堪時用心難與義違九原無起日誰復可同歸病中書懐丙子寉骨雞膚不耐寒那堪癬疥更斑斕開年慘淡隂兼雨終日抓搔寢不安未可給扶親几杖豈能見客攝衣冠人言剥復相更代頻把韋編反對觀追念將使叔青山横白雲野色極瀟洒見者必屬目寶相在其下此翁强健時門外無車馬夫豈固絶交欲與無可者獨我時扣關辭色頗相假𤣥禪到佛祖妙句近風雅萬事已陳迹哀思淚盈把即之不復見去之不忍捨優婆塞何為酌水日奠斚三徑草易荒悲風遶松檟和汪誠之韻昏昏未必晦昭昭未必明渾渾未必濁漻漻未必清吾道本自貴國爵亦可并所以魯素王但欲比老彭嗟予久斂退用志難崢嶸吾友暫蟠蟄側耳春雷轟韞櫝足豈刖扛鼎肩不赬鼓行當擅場敵者誰為勍佇看慶多馬為彼酌兕觥下視俗子陋未識仁者榮譬如黄流汚寧涴皎月晶相期在逺到所急非小成頗恨㑹遇疎未免鄙吝生大篇何舂容雅思真和平知君培其根許我擷其菁虛靜能養心篤實可存誠此理君得之底裏期再傾丙子重陽日有感南山木葉赤北山木葉黄秋色日夜變白露將為霜𤣥鳥去已久候㕍方南翔携壺登髙侣滿手茰菊香佳節不可負而我病在床人老自多病何為苦悲傷去年重陽日貴孫在我旁知我愛敬客拱立傳壺觴十五未冠巾總角頎而長望其有成立門户生輝光前樓千卷書可以識義方南畆千斛榖可以充積倉一旦捨我去氷炭交中腸萬物皆有盡死生理之常修短百年間何必論彭殤豈不自開釋念之終難忘長歌意無盡歌罷還凄凉悲風扣林木為我號清商九月二十九日到思溪莊避人事十月初四日過生朝方歸初三日早恕子遣人來送酒食并詞二闋因成唐律二首僻逺無來客尫羸厭久生擁爐便獨坐扶杖懶徐行中嵗失怙恃晚年無弟兄絶知來日短萬事可忘情二人事有酬酢山居方寂寥三時纒宿疾十月見生朝瘦骨添綿䕶枯腸怯酒澆為予歌一曲亦足慰無聊與滕元英自武口至湯郊不過十里元英一年不相見丁丑正月來訪留一日問其再來以秋為期因成唐律一首云君尚精神徤吾真氣血衰肯來同晤語别去即懐思不厭經過數惟憂後㑹遲春暄宜緩歩何必以秋期贈平首座家在青山下投閒嵗月多杜門長却掃杖錫獨經過學佛非無法哦詩恐是魔願言行古路莫遣覆藤蘿再贈平首座平大用輟參靈隱歸南澗謀起淨坊於煨燼中持鉢回自楚東見予於千秋山下求以數語賛其事八十老人投棄筆硯已久況子謀已定願施者衆其成有日何以賛為堅辭不獲乃成拙句從㬰之雖然伽藍興壊乃是色境於色境中營繕亦是幻事向上更有一閤乃到實地末句及此未審以為何如他日當増一重公案也南澗誰人掃劫灰行纒恰自冷泉回式公昔日曽留誓大用今生乃再來應是伽藍當更造豈闗回禄故為災上頭更有華嚴界彈指重重殿閤開杜工部有同谷七歌其辭髙古難及而音節悲壯可擬也用其體作七歌觀者不取其辭取其意可也有客有客字晦叔東臯歲收可饘粥何為得飽尚多憂豈是老窮無止足十日之中九日病以杖扶行懼顛覆嗚呼一歌兮歌意長風林助我鳴悲商有母有母年七十一室枵然徒壁立茹蔬啜粥不怨尤卧病在床無藥物我為舉子得一官南陔之養嗟何及嗚呼二歌兮歌轉悲羞見慈烏隨母飛有弟有弟手足親與我鼎立成三人叔氏鰥居苦多病季子宦遊依舊貧吾兄既終弟亦逝歲晚惸惸惟一身嗚呼三歌兮歌意放歌罷無言坐惆悵有妹有妹家苦貧補紉組織多辛勤二男三女未婚嫁已見宿草生孤墳問疾弔䘮俱不及念此不置長酸辛嗚呼四歌兮歌更苦往事關心誰可語有子有子共七人六子短命一子存後固無窮前萬古浮生脩短何足論天屬情鍾在我軰嵗月雖久哀如新嗚呼五歌兮三嘆息理不勝情難自釋有孫有孫未冠巾頎頎狀貌如成人謂其長大習詩禮他年可望髙吾門豈期一旦舍我去白首老翁徒痛心嗚呼六歌兮音調急獨坐吞聲襟袖濕有婦有婦嬪吾孫僅能朞月問晨昏吉凶自古不可定所以賀弔更在門人言貧家女難嫁豈料既嫁俄不存嗚呼七歌兮意不盡頻年多難天難問七夕一絶句輕雲捲箔月鈎垂正是青樓乞巧時牛女相望隔河漢浪傳天上有佳期贈劉術士聞子能知筭逢予屢索詩諸公多妙語老我更何辭久客丹心苦脩途蠒足疲秋深風露冷歸去莫遲疑與趙道人欲上青雲却垂翅歸來掃軌空山裏道人說相來敂關酒半醺酣談亹亹我今布褐終餘年豈論燕頷并鳶肩謂予形是朱頂寉兩眼藏神髙頰顴彭殤夀天誰無死不將動目摇湛水道人去後若復來定應難相壺邱子嘉定丁丑十二月謀葬貴孫老病不能與事但此心傷痛因成小詩以寫其哀念汝方青鬂嗟予久白鬚在亡終不免夀夭太相殊有恨心如割無言淚隕珠何堪植馬鬛玉樹閟黄壚與三山相士林子和三絶年登八十更何為手足支離視聽衰自笑已如雞失旦不須苦說寉知時鳶肩燕頷刺天飛自顧而今已後時巾褐蕭然成野老有何情緒更哦詩魚蝦𤨏細不堪求水澁溪寒欲斷流若敂侯門逢短李釣鰲便可月為鈎雙溪類槀卷九
