body:
  text: 雙溪類稿卷二十四宋王炎撰序送洪宰序新安在今日為輔郡而婺源壯縣也自縣抵郡治二百里而遙地巖險部使者按行不至郡將雖有方略耳目亦無由盡得民利病租賦獄訟浩穰寖不治豪右得乘間窟穴為姦執持吏短長目指氣使必如意吏巧於舞文者又上下其手以招權鬻獄其勢幾出長二上羸丁下户有事無所訟縣公熟視不誰何例坐罷軟下職去番陽洪應賢先生來宰邑政明足以發摘隱伏剛足以執法無骫而不解足以行之早作視事率夜二三鼓乃休曰當仕有官職某何敢以煩為諉雖精悍少年其力有不逮宿弊無問纎悉細微絲解髮櫛之殆盡曩時武斷於鄉曲者無一人敢搖手觸法禁老姦畏首尾常若救過不暇屏息奉命惟謹犴獄清平租賦不待督而前期以辦聞民詣郡丐留不已郡將及部使者上先生治最于朝成命從中下需終更宜顯庸以為郡國長吏勸某竊謂聖天子喟然欲濺滌振刷興起治功而士大夫拱默無所建明間有出意見論事者其言良善每用輒不效誠得如先生者十數人位諸廷言即可用用有功國其庶有瘳乎從者行矣無負輿議所期者幸甚韓毅伯詩序始庚寅冬蜀人韓毅伯自行在所欲往豫章道婺源而西過余於雲溪之上一見歡如平生論文字説時事可否無不意合豫挽而留之毅伯亦為余弛擔盤旋如過故鄉依依不忍去明年夏始入楚東值尚書陳公之上饒邀而館諸其門又明年余不幸有家艱毅伯得訃音走數百里來唁問豫握手收淚相勞苦勤甚復留一月將過衢梁下錢塘其再來未有日也因出篋中所作凡二百篇曰我去家萬里在道塗五年隨所遇見於詩羇旅無聊之辭大半噫豫窮甚矣惟子知我者昔之詩人得名於世如楓落吳江冷不過一句耳風暖鳥聲碎日高花影重桞塘春水漫花塢夕陽遲不過一聮耳此等語吾輩未肯多遜幸為我敘之或者可以不朽於他時毅伯余畏友也為詩無問長篇險韻握筆翩翩立就汗漫如鵬翼垂天之雲奔放如滄江八月之濤淡泊如朱絃三歎之音遒緊如蒼隼之迫秋風雍容如良馬之就熟清厲如夷齊之食薇都嫻如西子之靚粧豫不能盡狀也夫文者士之一藝詩者文之一端此非毅伯刻意并心為之者以毅伯之才如此而造物者吝一第使困頓至是何哉天之生才也不偶然其生之有以用之故夫飢寒切於身者富貴之資而謀事齟齬不合者功名之兆也毅伯為人志氣倜儻近似郭元振議論慷慨不下杜牧之用意堅忍折而不沮是豈老於布衣者上方當寧太息回瞻中原思鳴鑾汴京北舉河朔西舉函秦此志士馳騖之秋也行矣豫豈以一詩人期毅伯而已哉送江靜之序篆至於李陽氷楷書至於顔魯公行草至於王右軍今古不復敢異論蓋古字法以倉史為鼻祖自科斗大小篆𨽻凡四變而其苗裔有真有行有草以草書得聲者自張伯英始世傳伯英學書濺滌筆研池水皆黑則藝之精非一日之力也而猶未究其極右軍一出毫釐不加矣昔人論筆法曰如印印泥如錐畫沙工書者以是為筆端有骨字內藏鋒而觀者不見此乃其自得之妙所以獨立無輩也最後至唐張長史及魯公僧懷素徐會稽之倫皆號能草書一時從事於筆墨者無不甘心落後塵然而猶在右軍下噫事之難工如此哉余同邑人江靜之以草書名者往余寓海寧靜之倦遊以歸道過焉實初識之後十有三年余方杜門辟俗于雲溪之上而靜之又來相問勞既畢因作而言曰我用力於書且三十年管城子之秃者凡閲幾輩矣縱不能著鞭於怒猊渴驥之前亦合可遊創於春蚓秋蛇之間然足幸不刖瑟亦不售造物者不肯赦我一窮何也我將道新安而東厯訪平生舊遊子故人之知我者可無一言為贈乎某曰豫何以贈君雖然豫不能工書而能論其意世説書之病曰筆枯者易健而瘦甚多露骨筆重者易圓而肥甚多剩肉痛快則無尺度不快則不遒側筆取妍則工左而右不副然未甚害也而最忌者惟俗人俗則陋文俗則鄙字之俗亦無足觀矣靜之壯年咀嚼詩書掉鞅走場屋間睥睨自許不薄不得志棄去俯首於書欲以竒自見故其筆勢翩翩橫斜上下曲直自得其餘力盤薄於規矩繩墨之內方將拍會稽之肩攬長史之袂求與右軍相周旋其視世之俗書薰猶不類也靜之行矣遇胸中有黑白者必能識之玉潛於山白虹照夜劍埋於獄紫氣干霄苟懷竒而抱異未有終鏟沒不著者太學之經岱宗封禪之銘浯溪磨崖之頌雖不用草書草書豈終無用於世哉送齊彥邦序以五行之休王五緯之伏逆進退而決人之得喪夀夭窮通以卜筮而占事之休咎二術難乎精者也而同邑人齊君彥邦實兼之其胸中所得極有根源扣之衮衮不竭如江流於峽河析於龍門底柱之險懸流下走而東其扺掌議論旋轉而掉厲如擲丸于阪走珠於盤鷙鳥髙翔于千仞之上而迫於疾風其愈試而愈中中而愈竒又如巧有力者開數石之弦注鏃于百步之外而飲羽于的也戊子夏始識諸城之東彥邦謂豫曰吾詳考於術執事今年秋登名于鄉書明年春中太常第無疑也豫笑曰子言過矣幸無以我為戲也不然豈輕有所許以求容者乎彥邦不平曰借術賈佞者吾羞焉何待我薄也吾據術以自獻其情縱不信庸何傷豫因以失辭為謝心實未之然也既而皆如其言庚寅春來過敝廬談笑道舊而不以既中之言自矜豫於是始知其心蓋向之自負其術以介而今之不矜似義得其術未得其為人則知彥邦之淺者也彥邦不幸喪明且不樂苟合聞其言者多不恱故余詳論其術與其為人以餞其行苟有問焉者勿苦其言之不甘庶幾可以盡其所懷云鱅溪老人集序文與行相符亦與行相異酒德一頌可以知劉伯倫之曠逹陳情一表可以知李令伯之純孝此文與行符者也陶靖節之沖淡宋廣平之毅而間情梅花兩賦詞旨婉麗若非二君子所道之語此文與行異者也外祖鱅溪老人汪公倦遊庠序退而徜佯自放於丘壑之間蓋晦其光而不耀矣苐其幽懷清興時自見於詩文而尤喜為小詞模寫物態染繪風光意有所寓筆下翩翩立就其髙處視張子野晏叔原秦少遊分道並驅未知孰先後也求諸翰墨意其為人必以風流自命而公平生素履有與其文極不相似然者其待物胸次明白不立城府人百欺之無疑百忤之不愠也其平昔自處薄嗜欲不喜飲酒不商度財貨有亡終身未嘗一乘肩輿曰吾布衣不敢以人代畜也年過九十步履輕強對短檠閲蠅頭細字雖少年有所不逮其見素抱璞厚自頥養殆如古所謂有道之士者非耶公沒七年某宦遊自沔鄂來歸始見舅氏收拾殘藁既成編恐覽公之文者謂其止於詞藻清麗也故敘其編首槩見公之隱德奧行云送黃夢符序豫備員長沙郡文學同舍聚而處者千指而七閩黃夢符在焉未踰時即辭去問其所向將沿湘水過洞庭下鄂渚皆屈原賈誼經行之地使彼人可以慨然增感者也誼由博士來為王傳未為不得志也然涉湘弔原其辭氣憂憤無聊不平及其賦鵬也同死生輕去就太史公讀其文為之爽然自失然有心於會理則已與理為二用意於遣情則已為情所滯矣吁一窮固難忍哉夢符曩攝武岡教事將翔矣又跌而不升千里倦遊顧安能無感然豫聞栁子厚年少氣鋭軒翥臺省而附離非人遂擯外以沒韓退之應舉則黜立朝則斥連蹇半生暮年尹京兆班從臣人生得喪榮悴悲喜相乘除耳鋭進則亟退先抑則後伸知道者所以不汲汲戚戚也夢符行矣遇晴暉淑景隂雨悲風把酒哦詩旅懷怏怏不自釋試補誦豫説當為豫悠然一笑也送滕彥真序二廣鹽策初變桐廬詹侯以從臣開藩桂林天子既下明詔戒官吏無得妄言沮吾法又發大司農宿藏以補其用度故人滕彥真奉辟書往從之豫家于歙歙睦擊柝相聞詹侯在先逹中有重望於一時豫恨未拜下風也及來湘中聞洺水李公之言曰詹侯愷悌君子也其眂民肥瘠究心焉聞鄉先生彪德美之言曰詹侯學術髙明有得於聖賢之傳者也夫以愷悌之心輔之以髙明之學變政易令以便利其民彥真入幕府位賔佐無議焉可矣抑古人有言曰利不百不變法工不什不易業恐其事未集而弊滋也豫不知二廣利病然聞之道路謂官不鬻鹽聽民自貿易此廣東之利廣西弗便也且曩時官收再倍之息州縣經費一趣辦於是今許商賈鬻之則利歸私家而官困瀕海之地大半斥鹵遮邏弗嚴私鬻者負擔竊行則利歸姦民而商困况商賈懲法之屢變且前且却弗譁而趍吾令也私鬻者行於瀕海去海浸逺鬻者浸少若是價且翔踊矣而欲無食淡則農民又困夫有天子詔旨可以杜議者之口有大司農緡錢可以佐用度之乏然法弗精民弗便支吾一時易矣惟經久計逺無以其難遺後人詹侯始可以復命于上彥真始可以無負知己也彥真勉之哉發青雲之軔在此行也桂林山川清淑然嶺海間風氣終與中州不類當為太夫人自愛為逺業自厚也送相士張舜舉序蜀人張君習於唐舉許負袁天剛之術其言人貴賤憂喜多中往時李夀翁侍郎未逹張君曰公且貴李公弗之信不十年登法從出守當塗將告歸既得請矣張君曰公之祿未也其尚為連帥乎李公笑其言不逾年奉詔起鎮長沙李公門下無食客獨館張不厭以其言不妄也方李公在中朝時趙渭師守臨安張君曰是不旬日當以罪斥也已而果然衆皆以其術為異吕伯恭在館中人謂且入西掖北門矣張君曰非貴人也其相法不過一倅衆又以其言為謬及後伯恭得參議官以沒蓋去通守無幾耳是則其言之驗也然張君為人言休咎簡而不浮質而不諂故挾其術以售而囊無留資豫謂之曰若相人中多矣自視何如張君笑曰相形不如論心此至論也不以心相而以形相豫言烏能盡中况又骨寒命薄乎其窮宜也豫雖知其術惜其窮而無以振之將有適故以言贈其行庶幾好事者肯一問焉送韓毅伯序豫昔屏居黟歙間韓毅伯自在所西行過焉凡再至而再留抵掌論事意謂棄繻而出乘傳而歸富貴可以立致豫甚壯其志而羡其健決後十有七年豫得邑臨湘毅伯遊武昌泝江而來相見掀髯一笑既又厯道别後﨑嶇艱苦之狀白髮蒼顔相視而嘆豫深悲其不遇而惜其志之不伸留一月將行則曰豫不復能返蜀矣今將歸老于淮山言畢其意愴然不樂豫解之曰人生非鹿豕豈能聚而不散離别不足恨也水涸魚處于陸相詬以濕相濡以沫不如相忘於江湖子莊子之語云耳關山間隔相忘可也然毅伯與豫一别十有七年而後一見於此又十有七年則存亡未可知於其行也豈能無言凡物壯與老異壯宜出老宜復木之歸根水之返壑龍蛇之蟄月之晦雷之收聲皆是物也毅伯壯年去家足迹幾半天下今老矣而不免於布衣此命也男子生以弧矢六射天地四方示有志也然窮通有命存焉其得志也舉而措之事業其不得志也卷而藏之環堵之中故逹則身泰窮則心亨在我何庸戚戚哉馬文淵謂大丈夫窮當益堅老當益壯夫窮當益堅是矣文淵之壯蓋謂雖老而豪氣不衰耳其言未盡也士之少也用其壯於功名老也用其壯於道義文淵或未之知也昔林類鹿裘帶索拾穗而行歌其言曰貧者士之常死者生之終此能自寬者也而未若顔歜歜之言曰晚食可以當肉緩步可以當車此巧於處貧者也而未若原憲子貢相衛結駟連騎排藜藿入窮閻見原憲憲攝敝衣冠見之子貢曰先生豈病耶憲曰無財者謂之貧學道而不能行者謂之病若憲貧也非病也子貢聞其言慚而去悔之終身憲之安於貧賤蓋聞道者也毅伯歸乎哉淮水之瀕土厚泉甘米賤而魚肥雖非故國亦足以息肩弛擔矣偃仰衡茅之下嘯咏東臯之上回軒冕之眼收功名之心以求原憲之所樂浮雲富貴亦於我何有哉夫玉在石珠在泥塗而其光彩見於山川餘潤及於草木士之所以不朽者富貴不與也逹者或光耀於生前而寂寥於死後窮者或枯稿於一時而芳馨於百世彼此相較其得孰多毅伯試歸而圖之東山集句詩序風雅逺矣自柏梁賡咏以來詩體不一最後始有集句曩時荆國王文公喜為之有胡笳十八拍最髙妙或謂蘇東坡靳公集句索公咏几間硯公第道巧匠琢山骨不復更能措辭豫聞文章天下公器非人口舌所能翕張公有積李縞夜崇桃炫晝之句東坡謂自楚詞後無人能道此語豈應以不能卒然集句窮公公亦不應一句之外更無他語或者之説陋矣東山先生吾州前輩之賢者來丞分寧吟哦二松千竹之間其集句尤工孫居易集而編之凡二百餘篇先生既去而豫來寓居居易出以示豫誦之終帙見其即事體物委曲親切如肺腑中自出機杼無附離牽合之態使東坡見此必擊節嘆服不疑然先生非特胸中富於詩什也其學貫穿經史根原深長非如後來綴緝文字於舉子事業外叩之空空無有也其蒞官為政練逹世務視書生誦紙上陳言不習吏道者不可與為比也抑又有進於此者先生年且七十矣面有光彩紅如渥丹視聽聰明不衰其殆有道以自養者耶若專以集句窺其胸次乃管中見豹之一斑云耳豫弱冠從先生遊故知之最詳遂書於編首歸居易藏之送劉監序上饒劉君朋舉為臨湘酒稅官與某同寮且二年會靖之會同缺令部使者直祕閣丁公行部至臨湘訪邑吏賢否某具言朋舉廉謹習為吏即檄攝會同邑事將行余不得無言靖之民與蠻猺雜居議者往往謂非我族類其心必異然欲靜而患擾喜和而惡乖尚廉而賤貪其情與吾民同非如虎豹蛟鱷不可擾馴者漢永和中議增羣蠻租賦尚書令虞詡持不可曰異俗貪婪難束以禮今猥增之必有怨叛不從蠻果爭貢布非舊約遂叛豫聞今猺人衰困邉徼防托吏士不無侵漁甚者掠其子女為臧獲諺曰禽困覆車此可戒不可玩也固當撫之以靜先漢開涼州四郡吏民相親酒禮之會上下通民是以其俗風雨時節榖糴常賤少盜賊有和氣之應賢於內郡余聞猺人與吾縣吏相見若結以恩信至於臠肉行酒與之飲噉不立崖岸則歡然相親否則悍然而怒遂為怨讐故當接之以和昔孟嘗為合浦太守郡與交趾比境前此守令採珠無節珠徙交趾嘗到官未踰嵗去珠復還百姓以為神明今黃金丹砂皆猺人巢窟所産也蠻猺之性本貪為吏者毫髮無求則彼必敬慕有求焉則以我為可易矣故當示之以廉是三言者非無驗之言也夫富者贈人以財而仁者贈人以言余不敢言仁然同寮之義又不敢無言古今贈行之言衆矣大抵多頌而少規而余於朋舉有規而無頌言之他人必以我為戇言之朋舉必以我為忠魚鱗保甲編序止盜令職也警盜尉職也令不能止盜故警盜之事始切而尉之責始重臨湘前此盜區也其所以多盜有三遊手小民遷徙無定一也逋竄黥徒出沒不常二也堆泊之人家於林藪為盜窟穴三也鄉俗間往往剽劫無虛月吏士罷於奔命前縣尉三衢吕君謙始籍編户為魚鱗保甲法選其丁壯聨什伍備器械斷賊蹊徑譏察之謹甚遇有警鳴枹鼓衆即雲集盜皆緣手擒獲無脫者繇是臨湘無盜吕君去保甲之法隨弛閲三年盜再發于境巴陵簿趙君師移尉臨湘復修保甲法視吕君所規畫加詳焉於是小民之遊手者黥徒之逋竄者俱無所容蓋趙君臨事精悍御下嚴明往來田野毫髮無侵於民故有所施為民樂趣之是以盜賦屏迹境內安堵將具其事上之臺府某曰趙君勤其官能如是尉之職舉矣若夫教足以馴暴政足以禁姦固有任其責者尉不與也剗弊撮要序曩者某脫選調詣天官自念居無廬食無田難以需逺次遂來臨湘不知其自投罝網也交遊相厚者憂其殆相踈者笑其愚某亦意首鼠不自定既至問何所取財無一事與三尺法合者乃大悔且懼即欲挈孥徑東歸時徽猷潘丈帥長沙某走一介持書具道所以然潘丈復書曰見幾而作全璧去固善然一令不交職事朝廷豈為是廢一縣况舍而之他亦猶是將如何第不為已甚則民自知德老者之見如此熟籌之某得書反覆紬繹如陶彭澤元魯山髙蹈逺引誠所未能遂留即首與府史等定要束雖一錢出納必書于籍以視民無欺然每一深念則背負芒刺食不能下咽寢不能交睫以病請告者屢矣州不許侵尋且三年危哉某之措身於此也其能自脫僅如氂毛耳適有天幸臺府奉上旨蠲減板帳無名之需憲使直祕閣丁公以救時行道為心斂大惠施諸一路行部至縣俯已而咨詢焉某竭情以告即慨然欲抆拭一賤有司於垢汙之中而膏澤數千户生齒於憔悴之餘提舉趙公之平恕合志行之太守劉公之溫厚篤意承之居無何漕使大監薛公鼎來奉使郎中張公又來二先生皆一時之望也顧某何者凡有請無不曲從數十年宿弊一旦剗革略盡遂裒其顛末刊木以傳然符移案牘重復煩碎觀覽不快乃掇其大要綴緝之自為一編簡而不遺詳而不贅某所以拳拳不釋者蓋為一已免於罪戾自喜又為邑人瘠而肥病而蘇與之同喜也故發其意於編首林待制奏議序淳熙癸邜秋三山林公帥長沙時某承乏泮林公察其不諂又喜其稍有志於學也而盡出諸經解示某所見有未合或反復論辨公雖不能皆從而亦不以為非自諸經解説外他文字則未之見也紹興辛亥調官在所陳英仲舍人初為郎間往見之從容道長沙舊遊因出公奏議一編公時捐館一年矣相與嘆其文章雅健議論鯁切英仲曰夀皇清燕閲公舊章疏故自豫章召還徑除夏官聖意所向蓋不止以從臣處公也某得公奏議如獲至寶以歸侵尋至今五年英仲亦逝矣私念此文豈終幽晦而不彰泯沒而無傳然英仲既亡見者猶少則某不可閟之篋笥也遂鳩工刻諸清江官舍而序其編首曰公少有俊聲而沉潛六藝篤志於學蓋老而不倦故見於文章筆力高逺難及指陳時事辨明得失其言切而不浮直而不詭大抵通逹之識徑正之氣悃欵之誠與漢賈太傅誼劉中壘向唐陸宣公贄可以相為後先公曩帥夔門施支郡也有豪民談汝翼者其勢力可以挾守倅動臺府根盤蔓熾久且為亂公欲剪除之汝翼與官兵傳戰既敗反遁入中都訴於登聞公慨然卻天子之命殱其黨類施人以是德公而祠事之記者謂公拔山以一臂扛鼎以半肩則仁勇之實亦可略見於此然此特小試之效耳使公端委廟堂平居無事未有以愈人臨大節之際當如底柱屹立招之不來麾之不去不可誣也文字又其緒餘自昔漢俗病於軟美而以汲長孺為戅朱遊為狂晉俗壞於曠誕而以卞望之為鄙唐俗弊於朋黨而以韓退之無所附離為褊僻士大夫卓然不隨流俗以靡者難矣哉故某思公之賢而有感焉不覺其言之盡也送彭雲翔序曩者某浮食長沙泮林士肄業者踰百員時彭君圖南雲翔嘗鼓篋其間及某去長沙二年試邑於臨湘雲翔實來又二年佐郡於清江雲翔復來僕僕於行役栖栖於羇旅每相見必以學問為請今世之士應舉覓官其所當為就之不足以為汚不就不足以為髙雲翔將種學績文以應有司之程度則上而逹官貴人有聲於當世者下而鄉黨庠序之耆儒見推於後進者皆可就而學焉乃獨有意於某之不肖何哉某場屋陳人又汨沒於金布之塵埃豈復可以論文雲翔為計拙矣秋賦有期辭豫西歸於其行不可以無言大抵學者涵泳乎義理使見明而識正志定而氣充其於為善強立不反此根株也榮華其言幸中於一夫之目此枝葉也培護其根株使根株鬯然日茂者有之矣欲繁其枝葉而賊其根株枯稿可立而待也雲翔歸哉雖今秋與計偕明年奏第南宫傳臚北闕枝葉將無所用而吾之根株不可一日廢其培護之功也士之隨流俗以靡者多以欲蠧心利蝕義異端賊正道皆吾根株之病也雲翔戒哉清江集後序士生而有才與有才而獲用用而獲盡其所緼皆天也賈誼洛陽一少年耳而論事漢庭諸老先生盡出其下今觀痛哭流涕一書終西京二百年其文章議論未有及之者誼之才髙矣絳灌輩非其比也東京之末士方馳騖於功名而諸葛孔明龎士元隱約襄漢之間不輕以身從人司馬德操曰孔明卧龍士元雛鳯也先主用之俱以為軍師則其才有以先人未有以相先而誼之爵位不及絳灌士元之功業不及孔明何哉其才富其年嗇也誼之死僅三十有三士元三十有六耳然則生而有才才而獲用用而不盡其緼人歟其天歟使誼不遽死漢之制度禮文不應盡襲秦陋士元尚存則先主兼據荆益可以北爭中原二君短命非特其身不幸也清江朱元成某同年生也其為人工屬文喜論事而年止四十遂賫其志以沒某來丞郡元成沒已二十年矣從其子逹得君文一編讀之筆力驅馳意旨開闔可以髙視輩流謝艮齋為序其文曰元成智足以決大疑氣足以任大事勢足以馳大名艮齋許與固甚嚴而評論元成斯言不浮也元成官爵不顯于時事業不著於天下而徒見於文如玉有白虹珠有五色雖掩於瓦礫汨於泥沙終不可奪其光彩使天假以年閲義理益精更世故益多而䇿天下事益熟可以不朽者詎止於是哉方今人物眇然士大夫徑特自立者蓋少故某讀元成之文嘆息以悲非特為一同年生之無祿也尚書小傳序夫子刪書始自堯舜訖于平王凡百篇秦火煨燼之後伏生口所傳授才二十餘篇漢壁腐壞之餘孔安國手所校定止於五十八篇老翁幼女齊語之訛脫簡科斗秦𨽻之變必有失其真者西漢諸儒經學各自名家其訓注行於今者惟毛氏詩孔氏尚書昔人有言孔安國説書不如毛公説詩毛公時發大義孔安國章句而已其説誠然然章句所以訓故亦不可略也某不足以知書之大義古語有曰天下無粹白之狐而有粹白之裘為其緝衆腋而成之也今所解亦不過會緝先儒之遺論間有未安者或以已意發之既終篇因序其大略曰四代之書堯舜言動載於二典禹之治水見於禹貢武王功伐其略見於武成周公遭變其要見於金縢其餘皆君之格言至論蓋右史之所記也堯舜禹啓盤庚髙宗成康穆王之為君臯陶益傅説召公君牙之徒之為臣正也湯武征伐與堯舜不同伊尹箕子周公進退去就與臯陶益傅説不同變之正也正者道之經變之正者道之權經權舉而聖賢之道盡矣金剛經序世所誦金剛般若波羅蜜經皆鳩摩羅什所譯本語似明白意或不圓偶得龍舒王日休校正六譯本其一則羅什所譯次則魏三藏留支陳三藏真諦隋三藏笈多唐三藏玄奘唐僧義淨是為六譯日休所釋不足以發能仁之旨其校正不可廢也劉元城嘗言須菩提解空第一故金剛經佛專為説空其言未然須菩提既解空矣佛又諄諄演説不已煩乎豫聞佛為大士説六度為中根説十二因緣為下根説四諦須菩提所問首言佛以最勝攝受以最勝付屬最勝無上法也所攝受所付屬必指菩薩欲超四果因緣也佛所答粗自遊根六塵多至一切有為法等而上之至佛法皆無實相不可染著又不可斷除無斷除無染著方全佛性是為般若波羅蜜六度中般若最勝故佛謂此善謂為發大乘者説是為菩薩根器説也為發最上乘者説是為諸佛根器説也然經中有三布施一財寶二身命三佛法其福德多少懸絶世人見有福德之説乃晨興頮靣盥手誦紙上陳言為惡者欲以除罪貪利者欲以規福此經之旨隱矣佛謂以財寶身命布施雖如諸世界須彌山恆河沙之多布施業盡福德亦盡法施異此最勝波羅蜜是大乘法可至諸菩薩位中是最上乘法可至諸佛位中以此為人解説使人聽受使人修行得無所住之真佳皆為諸佛菩薩是故福德無量無數無有邉際經之本旨如此故發大意於卷首若字字解釋蠅鑽故紙於般豈復夢見程允夫集序豫與程君允夫居同邑學同術允夫在輩流中藉藉有聲而豫出處差池未之識也及隨牒宦遊始解后于廬陵見其説經史論古今亹亹令人屬耳不厭於是始恨相識之晚允夫亦為豫傾倒底裏過於舊交豫自清江秩滿入中都為博士久不聞問因詢鄉人之來者則允夫已捐館舍矣又四年豫始來歸其壻黃君昭逺集允夫所著詩文屬序豫讀之終編大抵理勝而詞彩附之淘鍊櫽括俱不苟作蓋允夫早列薦書晚綴仕籍素所藴蓄不獲見於事業而惟寓於其文故所成就如此此足為不朽計於地下無憾矣昔者先友竹溪居士張公生平嘗為豫言為文猶之善釀稻秫必時麴糵必齊水泉必香投於一器既熟去其糟粕沈濁在下菁華在上其色澄清其氣芬郁其味醇旨此良醖也惟文亦然讀允夫之文者當以是觀之雙溪類稿卷二十四
