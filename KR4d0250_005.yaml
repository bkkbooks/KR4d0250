body:
  text: 雙溪類槀卷五宋王炎撰古律詩次韻韓毅伯趣諸先軰送茶脫腕符移日旁午魚眼浮香湏一煮客来捧腹共軒渠暫時撥置官文書喜客恨無鮮可擊滿盂脫粟飢時喫睡魔不待巧擠排雪花小啜清風來人生何苦浪馳逐但得所求心自足意在春風曉露邉愛惜一旗輕萬錢碾破雲龍還不飲灧灧金荷扶玉筍渠方醉魄甘沉迷我自詩情要勾引再用元韻因簡縣庠諸先輩書生卯飯動及午薑糝莱絲煩自煮異時甘脆屋渠渠出自空腸千卷書竹間杵臼相敲擊茶不療飢何苦喫泉新火活費裁排呼奴更挈銅缾来蜀客見之心逐逐暫借紙窻休繭足歸歟家在淮湖邉草魁可買無青錢不辦雲腴供粥飲空有束詩如束筍青箬小分鷹爪香江上拏舟當逺引和韓毅伯擬别踉蹡揖客客為誰依舊驪珠色陸離不謂逺遊来此地未能小隱待何時慣看覆手仍翻手休問開眉與皺眉歸去淮山訪猿鶴清風滿袖自披披江上為韓毅伯訪得便舟銅墨纏腰雪上頭人生一飽亦難謀天明忽暗釀梅雨風暖又寒催麥秋老矣不堪時節換粲然方幸故人留白雲呼去淮山住强為江邉問買舟再用元韻二首牛千蹄角橘千頭嘆息斯人善自謀文氣如虹徒貫日筆耕有榖不逢秋悠悠何啻十年别得得纔為一月留女嫁男婚吾未了夢随鷗鷺學操舟倦㳺莫忘大刀頭老去行蔵要熟謀少病若能如萬福上書安用學千秋碧雲合處來何緩黄鶴飛時挽不留後夜月明烟水濶更呼兒輩洗瑶舟次韻韓毅伯誌别江頭三老風檣急詩叟欲行還却立剛腸不解兒女悲肯為别離襟袖濕翰墨場中空白眉宦㳺不遂休奔馳平生訥室有秘訣持以贈君君可歸静而無譁氣方定清而寡慾心自正耳根毁譽等風波眼界枯榮俱泡影得此還家雖退蔵被褐懐玉中含光踏破青鞋行萬里猛省昨非今近是但看汚瀆有靈龜莫道蹄涔無尺鯉次韻韓毅伯别許宣教自說覉懐老更慵淮山入夢碧叢叢一尊醽醁人将别三疊陽闗曲易終此去若無鴻鴈信相望未免馬牛風耕雲釣月平生事我亦謀歸古歙中題岳陽守張仲駿浮光亭三邉水墨畫遥山下有玻瓈萬頃寒蟾兔上時留倒影魚龍無處動微瀾舊來樓觀東西出未覺乾坤表裏寛更向上頭髙着眼湖光今作一杯看又題月臺天心湖面月團圓中着胡床坐廣寒玉鑑照空無盡境氷輪碾水不生瀾搗成兔藥人難老舞徹霓裳夜未䦨願躡兩鳬陪鶴駕従公飛到九霄看縣圃黄梅半堕草間荷鋤芟草喚畦丁手拾黄梅遶樹行結子青青随雨老開花白白本氷清嘗新争擘紅泥酒知味誰調玉鼎羮齒軟眉顰遭棄擲誤従雪裏競欣榮招同官諸宣教一飯用舟字韻成拙句士要飛騰及黒頭肯來揮麈試同謀已擕荷葉招歡伯莫笑花枝欠杜秋老我餘年思釣渭諸君他日合封留胸中器度須深濶江漢方行萬斛舟飲䦨月上不能留客再成一篇緑幄隂深數樹梅胡床相對手行杯茫茫世事愁眉斂亹亹談諧笑口開欲把清風留客坐更呼明月出雲來咄嗟難辦厨中具興盡翩然命駕回居民多疫為散藥不信醫方可活人但随巫語去迎神憑誰妙手如和緩調䕶江臯萬户春聞田家挿秧已畢聞道田家日夜愁黄雲白雪不全収稻畦挿遍青如染滿望今年倍有秋偶行後圃成三絕繁紅飛盡緑成隂更有忘憂草色新吏隱何心来對景化工随意自留春琅玕十丈籜龍孫已向梢頭㪚緑隂他日雪霜顔色好正縁外直内虛心園蔬入市不論錢忍口休參玉版禪留得新梢過舊榦清風六月亦蕭然小鳬母雞伏得兩鳬雛馴食庭除不待呼水浴泥行随分足不知鷗鷺有江湖蛙聲官蛙不問雨兼晴閣閣無端聒耳鳴對客自誇聞鼓吹稚圭此語豈真情勸農出郊三絶小煩脚力上崔嵬意為仙翁特地來只有白雲蔵古洞不知黄鵠㡬時回古仙洞桃花一笑弄春晴布榖瀾翻亦勸耕十雨五風蒙帝力願同父老慶秋成勸農邉頭萬馬似雲屯凖備秋風壓戰塵何日将軍収虎帳道旁築屋免勤民馬驛出郭視田訟三絶撥置文書小據鞍舉頭厯厯見青山老農指㸃黄雲好為駐雙鳬一解顔木末鷓鴣相應鳴路危笑我不能行湖光淺緑山容碧頗覺心清境亦清草生棄地沒牛深豈是膏腴畝一金野老雙蓬俱半脫尚憑蝸角起争心覓李尉白犬長安少年好狗馬日日遨逰五陵下八尺騰驤行地龍突過無前追疾風一箭穿空兩鵰堕尚挾白羽腰騂弓回鞭更踏南山路射殺山中白額虎却解重環四尺獒快逐豐狐捜狡兔獵罷歸来喚歌舞釃酒割鮮供笑語窮巷書生那有此毛頴陶泓守環堵老来無力跨蹇驢少日青鞋只徒歩何况平生非獵師何須有犬如韓盧青氊舊物猶在室吹燈未滅憂穿窬似聞黄耳雲來孫豐顱拳尾雪不如従公覔取扞門户主人髙枕偷兒避和黄先卿即事五首見說幽棲地長年只杜門誰知雙井後今有此公存釣月操蓮葉批雲卧竹根静中觀物化畫外識乾坤二鴻鴈南随暖璣衡北轉杓忍貧居自穩得句興偏饒藜杖難頻出蒲輪合見招惜無推轂手寂寞老漁樵三水落洲争出天寒日易昏倦逰来異縣小隱住荒村鶴骨縁詩瘦雞膚借酒温長鬚煩洒掃吾欲叩柴門四生理今何似豐年亦屢空有愁催髮白無樂駐顔紅歸計何時决詩家乃爾窮悲風吹宰木吾亦夢江東五此客来湖上驪珠照北垠山林成獨往風月許誰分寂寂無波井悠悠不雨雲莫年詩更好何止掃千軍題巴陵宰鄧器先北窻權利炙手熱争道俱着鞭雞鳴已盥櫛日莫未息肩中宵一假寐夢想㳺鈞天達人袖手觀方寸常超然氷壺不受暑凛凛含清寒消摇北忩下俯仰宇宙寛千詩句有眼一曲琴無絃開尊對白堕拂榻飽黒甜功名不挂念氣定神自閒淵明亦一出未倦飛已還我常疑若人本不欲閉闗漫仕今墨綬閱世垂蒼顔卷舒各有時隱顯皆足賢先正文昌丞玉立四近班風流被後昆世以忠孝傳丹扆新日月黄圖舊山川故家喬木髙義氣許國堅前賢經濟心不在軒冕間才猷時所須何得無裏言髙枕恐未穩鳴珂終小騫煌煌漢元侯事業光青編用元韻寄周推蕭法隔岸好山羅數峯遶簷脩竹添深叢雲溪有此兔一窟将雛徳曜随梁鴻一飢難忍出謀食志鬱不伸成怪松彼美湓城二君子昔未識面先聞風一如龍媒氣深穩不騖㨗徑行怱怱管城之外别用志懶哦五字呉江楓動中養定自有道鬚豈不白顔甚紅一如鵷雛出丹山律吕節奏蔵扵胸即之肅肅又盎盎意在寥廓觀鴻濛蹣跚勃窣我何者亦許附在交㳺中少時浪迹鹿在藪垂老能言鸚入籠心官鄙吝如膩垢見此水鏡一洗空霏霏伏雨濕楊栁滴滴寒露凋芙蓉日月逝矣足可惜夢魂不入槐安宫破觥暖浪侵浮蟻小鼎生烟明宛虹為公更作商聲歌朔風惨淡吹葮蓬精金美玉有定價嘆息鉅眼無坡翁用元韻荅汪廣文十丈花開玉井峯藤蘿亦附灌木叢可憐浮食不根着南北羇旅如燕鴻倦飛欲返返未得夢魂時遶三徑松故人相見發孤笑執熱一濯清穆風小傾家釀歌驪駒有懐未吐行怱怱山寒不開北枝梅地逺誰樹南荆楓欲談此意無為領撥灰消盡麒麟紅未免随俗且折腰薄以今古澆其胸六經之澤溉萬世譬如畦稻宵露濛陳言有味可涵泳環堵差勝朝市中退之一賦吾未許二禽雅意豈願籠乗軒執珪何有哉日光熠熠塵飛空由來賢達多下位髙原不解生芙蓉龍魚仙伯妙此理垂雲小憩来儒宫洞庭湘山入詩句借與光彩勝赮虹百聞不及一見面獨對霜月搔飛蓬清光何事亦多闕試為問之修月翁用元韻荅鄧宰兼簡華容孟宰我行六六黄山峯山中瑶草多芳叢浮丘笑我無此骨倐然飛去如孤鴻随流遂轉水上萍失地更屈澗底松絶憐拄笏頻㸔山未免舉扇一障風長沙三嵗坐兀兀洞庭千里來怱怱擁衾時作故鄉夢寒鴉無數啼丹楓繭絲未辦竟何補强飯空耗桃花紅巴丘健令工製錦况有奎璧星羅胸明月璀璨堆我前老眼照開春霧濛西寄華容雙鯉魚欲挽淵明來社中頗聞餘事戯毛頴亦舞𤣥蛟蒙碧籠心雖入俗不受塵出岫白雲行太空蒹葮四澤風露冷有此美徳如芙蓉尋幽或訪墨山寺弔古可賦章華宫何時冄揖兩鳬仙共喚麴生行偃虹無邉湖水似少海一㸃君山疑小蓬城南老樹無恙否煩渠試為呼回翁用元韻荅徐尉于越亭亭羊角峯下有團團桂樹叢何人為賦反招隱虞羅亦罥碣石鴻學詩妙處如學仙功成換骨參喬松肯來洗我箏笛耳檿絲古曲彈南風喜君到此極亹亹惜君去此尤怱怱百年莫作千嵗調試往一㸔楓橋楓湘山幸有數斗酒江蟹肥大霜橘紅梅仙陶令連兩璧得酒可澆丘壑胸漁蓑風月笛三弄虬龍起舞凌空濛馮夷不得閟此境湖山収入奚囊中沙寒往事有銅鏃波穩清時無水龍人生所須行樂爾嗟我愁絶逃虛空己悲朽質悴蒲栁豈解巧笑開芙蓉青燈照牖似書舍素琴挂壁疑僧宫懸知堂上一杯水難飲天邉千丈虹大用自當擁金蓮小用亦合登少蓬騰身雲路五千里定笑白鳬成老翁和許尉小洞庭韻古縣周遭臨水涯中有勝地蔵幽竒向來墨綬不領畧付與漁樵輕棄遺我乗蒼螭上其頂憑髙小築誅茅茨未能隱去學魯山且可尋幽如退之炊烟百堵共一市民氣稍稍春臺熈至尊豈為繭絲計老令恨無桃李蹊解衣一浣三年緇㣲風碾碎青琉璃魚龍悲嘯吹白浪煙靄吐吞蒙翠㣲湖中一㸃小君山誰琢瑶琨圓中規朱絃一曲舞馮夷凌風駕我雙鳬飛逺喚古仙笙鶴来月寒共醉玉東西天髙可逐霞佩去兒女牽衣吾未宜一官傴僂百僚底蒼髯欲雪将何為徘徊在此為五斗時亦諷誦淵明詞兹亭信美非我有夢遶故園還欲歸再用元韻少時耕釣為生涯早知臭腐空神竒一丘一壑有佳處人棄我取如拾遺晚将數雛就斗食非願厚禄多如茨山林習氣今尚在前身疑是王獻之君王垂拱似虞夏朝野多暇時雍熈公庭日晡鳬鶩㪚屐齒小穿山徑蹊隱仙一見即首肯百鍾索酒傾琉璃湖山亦為開畫笥烟霏空翠俱熹㣲㓜輿風度極灑灑計然䇿畫徒規規蒼松奮鬛倚風嘯候鴈張羽粘天飛君山洞庭日在眼不復引領巴丘西急呼泓頴共着語境勝頗與詩相宜詩成却憶梅子真烏用一官黄綬為江頭誰是吹笛叟為公度此瓊瑶詞喚起羣龍出平湖屬渠扶柂従東歸和吳秀才二絶楮幣半千米一斗聊為逆旅之費割俸故不能多承惠佳句敬用元韻成兩絶丐一覽句法洪徐可逼真摩挲老眼見斯人憐渠袖有釣鰲手要試虹竿欠李紳世人相馬苦嫌瘦誰識龍媒氣逸羣歸傍青燈對賢聖漢庭射䇿待方聞送相士管明甫嵐光野色共扶輿見說壺天氣象殊疊巘吞雲圭角露寒泉觸石篆文紆荒凉佛屋存遺像窈窕仙嵓有别區何日青鞋親扣厯細評佳致染松腴臞仙窟宅獻幽竒付與藍田煅鍊詩佳處盡従公指出勝逰應笑我來遲品題泉石非無意依約烟霞未有期獨幸胸中丘壑在不湏目擊始心知右清水嵓老南蛻骨㡬何年揖客支郎謾曲拳本自心清無染着豈因境静息攀縁我行不值揮犀語公到惟堪掃榻眠尚有詩魔降未得不禁物色巧勾牽未聞衲子着深功但見龍孫送好風尊宿尚留雙塔在衆丘皆讓一山雄禪闗暫到何須住法窟雖深豈用窮若問如如心自在夢魂不入大槐宫右黄龍山和陸簿九日二首西風拂面飲微酣小摘茱萸手自簮極羡酒兼詩共好正縁人與景相參杜門不復貪㳺賞落㡌無由際劇談嘆息登髙兄弟逺目随鴻鴈過天南風露蕭蕭葉半黄老来情薄似秋陽一樽冷落思佳客九日凄凉在異鄉採菊何心追靖節哦詩無語荅仇香危䑓戯馬今安在休惹清愁攪石腸喜晴行呈陳宰秋盡黄雲漲南畝修我囷倉築場圃不堪雨脚如懸麻坐見禾頭欲生耳令君意與神明通爐熏未斷来天風吹開六出花數㸃轉盼杲杲扶桑紅日下鳥烏聲亦樂村北村南争刈穫白酒香浮老瓦盆樵歌緩扣烏犍角有客擕家来受廛豐登未見如今年老農扶杖笑相語只恐雙鳬朝日邉陸簿生日冬令始嚴肅淑氣回晏温簾幃映瑞色見此天上麟蒙羽有再来機雲定前身清標入黄綬胸次不受塵洗玉酌流霞眉間喜津津飛龍御天位喬木思世臣功名固自有難得惟青春溪上晚歩二首山静色不改溪深流自遲緩行聊寓目小立却支頥樵斧寒尤響漁舟晚更移老夫無伴侣穉子獨追随二風定留黄葉波清湧白沙前山惟道院斷岸半漁家老去忘時事閒中度嵗華經旬如再出便可探梅花宋可挹挽詩萬卷蔵書富千金市義多斯人今止此造物意如何風月空投轄烟波冷㬠蓑林間誰挂劔清淚堕悲歌用十梅韻荅馮簿今代馮野王聲滿東海濵可敬亦可愛温然氣如春緑綺絃朱絲為我調白雪此亦公緒餘所長兼五絶嘗試評公詩崖岸極孤絶同僚筆可焚後學巾宜折清真去邉幅明白傾底裏枳棘見鸞凰十倍跫然喜講道師友少稽古編簡殘何以起斯文念之心為寒銀鈎入翠珉文字本膚淺以書不以辭恃此或行逺人品如許髙不卑一官小居之以廉勤王事豈難了霏霏玉麈談鄙吝堪澡雪每見輒有聞敢憚頻磬折道本無垢净境自有喧寂願聞禪說中何以得真實黄門執㦸翁晚乃薄詞賦我宜草𤣥文未必知妙處和何應辰過山谷墓韻何年馬鬛埋玉樹上有喬木清風寒琳瑯金薤落四海萬象頓挫随毫端追攀前軰豈無意偶来弛擔鳴珂里生恨與公相後先臨風三嘆不能已論詩誰解鍼膏肓人間今日無黄香經過一酹尊中碧明月灣頭山閴寂新晴出溪上因訪王伯明詹望之萍轉滯巖邑簡出而深居兒輩不自量妄意㳺璧池日占烏鵲喜不寄黄犬書積雨蒸溽暑客思鬱不舒新晴一散策消摇滌煩紆意行入幽徑籬落相蔽虧竹萌茁鳯尾𤓰蔓纏龍鬚物化日夜流嗟我方棲遲莫受憂患煎素髮無再緇扣門謁二友清坐俱久如荘語間善謔相視一解頥静窺勢利場疾足争驅馳自念甘斂退非黠仍非癡茗乳泛輕雪爐熏駐㳺絲且勿談世事揮犀聊說詩用元韻荅詹望之随牒久浮食弛擔來卜居鷦鷯一枝足不羡飛天池盥濯朱墨手拂蠧理故書識字非子雲下帷慚仲舒第喜官情薄未解歸思紆對境有喧寂即理無成虧動以静為根輪柅常相須㨗徑易傾覆夷途固逶遲巷南有廛隱白玉不受緇熟視眉睫間容色常穆如伯仲吹箎塤北堂奉期頥時亦踏街塵意馬不外馳見我床頭易信我殊不癡喜言雖溢美老眼眩色絲相期到妙處不止奚囊詩溪上尋梅不遇𤣥冬用事秃千林蓓蕾凌寒瘦不禁已喚蒼頭篘臘脚未逢玉頰吐春心客居避俗遨遊少老境㸔花感慨深屬付緑衣歌舞地吹香一笑慰幽尋寓居分寧去故鄉千里不歸者二年思念松楸成長句曖曖風日暖林薄皆蕃鮮好鳥仍嘯歌晚花亦嫣然問之此何時春莫将禁烟家家饌觴豆拜掃墟墓間飛鳴烏攫肉叢木挂紙錢而我獨不樂慨然坐長嘆開編不能讀當饋不能餐豺獺尚有祭誰忍忘其先念為貧所驅随牒二十年少壮不可留覽鏡将華顛空慚北山移未表南陽阡闔門有百指負郭無一廛坐此客異鄉歸思空纏綿憶昔初筮仕吾母猶朱顔三釡不及養遽悲蓼莪篇侵尋嵗月久百感難具言傷心思宰木清淚如流泉狐死必首丘古人亦重遷况我雖宦㳺十世家星川親朋日在眼可以相周旋土風有不同客意終未安花落草凄凄青山啼杜鵑即事六絶焚香清坐對韋編妙處懸知不可傳三畫分明寄𤣥㫖誰将脩綆汲深泉半生飄泊将雛意百感凄凉䑛犢情露電終非真實相彭殤何者是長生布衣蔬食且随縁睡起時参柏子烟欲倚繩床拈白拂何人真解意中𤣥了無俗駕到蝸廬隱几閒翻貝葉書屬付蒼頭休洒掃緑苔随意上階除拂拭青奴供晝眠半晴半雨釀愁天夢回不到南柯境風過緑隂號晚蟬孫竹新添緑玉枝穉禽學習遶簷飛動中㑹取歸根意雨過白雲横翠㣲遊南山寺題澹軒雲根露竒怪上有青蓮宫軒窻極净麗疑入懸壺中凭檻俯寒流披襟納清風跏趺坐少定滯念氷雪融人生蟻旋磨世故鳥印空道眼一回光味與嚼蠟同此意誰為領白雲横逺峯用元韻荅麟老登臨倚木末下瞰魚龍宫我方解墨綬着身丘壑中翩然一清㳺飛舄可御風前瞻鳯山尾老衲如懶融見處詣實際非色仍非空笑我蠟屐行亦與玩物同燕坐不出門心㳺妙髙峯再用元韻荅麟老七閩名家子祝髪隱梵宫碧海掉尾鯨不堕世網中熏爐起香霧㯶拂生清風寂寂枯木巖中有春意融杖屨厭山水習氣一洗空違俗非崖異入俗非雷同乃知行市廛宛如坐孤峯述懐三首久客二年半故鄉千里餘兒曺穿草屨老子挂柴車世事杯中物生涯篋裏書一廛何日辦衰晚憶吾廬二宦薄因謀拙心安任數竒功名半幅紙權利一鈎絲已作絡頭驥殊慚曳尾龜暫時深袖手風月話襟期三百指久轉食一身今倦逰事無非堕甑心本是虚舟儻不嘗艱阻渠能寡悔尤管城雖解語懶賦畔牢愁次韻荅熊朝英杜門燕坐閱黄庭道在靈䑓莫與京少日忍貧吾志得莫年為吏此身輕始知軒冕有塵累不似山林無俗情綘帳先生應撫掌南箕北斗只虛名再次韻秋風相挽出門庭東望雲邉白玉京婚嫁自嗟何日了利名誰信本来輕揮毫為我光行色傾盖知公不世情文字清新有如此底縁淡墨未題名勝賞亭路入三家市墻圍十畆園雲山如畫出人住小桃源贈郭相士兩眼明如月江湖度十春問誰當鼎貴笑說未逢人雙溪類槀巻五
