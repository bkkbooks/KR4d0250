body:
  text: 雙溪類稿卷十四宋王炎撰啓謝林寶文啓小儒干祿但傳誦於陳言大府掄材乃濫充於舉首所謂隻字榮於華衮不啻一諾重於黃金恐知已之難酬祗捫心而有感竊謂貴賤以定天下之分禮義以為人心之間躁求而得者於義有愆自媒而進者在禮不許豈惟韋布之類因幣聘而後行雖若罝罘之人以旌招而不往此士氣所以無挫而人才可與有為至於掃門以見相君執御以事先達雖若此身之自屈亦非以利而相求逮亷恥之寖衰致賢愚之同滯既欲䇿其足以速步未免大其聲而疾呼貴游有援常先得之寒士無津徒自辱爾逺矣雲霄之路凄然氷雪之鄉雖有彈冠之思但能仰屋而嘆孰肯提衡於達宦獨存推轂之公心分涇渭之清濁於胸中定春秋之豫奪於筆下有名世力行此道乃善人胥待而興可備搜揚宜求茂異如炎者賦才甚下涉世多竒歸耕缺負郭之田謀仕無封侯之骨秪緣糊口未免折腰獲居半水之中獨竊二天之庇可以摳衣而請益不惟斂版以隨羣前望亨衢思染指於羊鼎退疑薄命或㸃額於龍門况主人之㕍雖有取其能鳴而大冶之金莫不祥於踴躍意雖汲汲貌若徐徐敢圗特達之深知驟賜吹噓之餘論評其學則腐儒之陋烏得淹該論其守則俗士之愚豈能純固謂有似於恬靜遂曲加於品題與不待求聞者太息方鄭朴初投於周肆固匪珍竒及海槎一上於星河便非凡物兹蓋伏遇某官諸儒華蓋六學指南剛大之氣塞乎兩間仁勇之聲震于一世繄誰之屋燕雀不喧樂我之園蕭蘭有辨當今日蓄儲於人物圗異時經濟於王廷籧篨戚施之病夫且猶有用欂櫨侏儒之散木亦可兼收遂使賤微仰勤推挽炎敢不篤於稽古返以省躬講習其所未聞操持其所當守有如皎日窮通必義命之安敢在下風進退惟步趍之學願由斯而報德庶無纍於知人謝潘憲啓庇身節下苟安獨冷之官薦士臺中首拔孤寒之迹不敢自售無為先容誤辱噓枯而使生實非懷玉而待價施厚則難乎為報喜極而繼之以慚嘗謂仕非止於為貧欲行其志義不可以苟得當固其窮惟亷耻之風衰而利名之念重榮枯之變隕穫於中在下位而俯仰乎人第曰志於得爾居要路而抑揚在我惟其求則與之乞憐以一已之情借重於諸公之請若此者衆莫知其非沉靜自如必誚其棲遲而無援剛方有守又疑其矯激以邀名故起家而宦游或終老於選調世方靡靡而不能返有識所憂人但營營而自為謀公家何補孰處提衡之任獨懷推轂之誠振此滯淹消其奔競有名世力行斯道乃善人胥待而興可備搜揚宜求茂異如炎者質既不敏數亦多竒謂行藏之所宜雖當稽諸古訓然涵飬之未定無以愈於庸流若附於大賢之門固出乎平日之願意雖汲汲貌若徐徐敢圗特逹之知驟拜吹噓之賜評其學則腐儒之陋未免空虛語其操則下士之愚烏能端慤謂有似於恬退遂曲加於品題得之甚榮聞者太息某官世系東吳之望道原西洛之傳聲名重於一時許與信於四海必欲得士汲引不謂之私恩初無容心可否但付之公議要在知其中之邪正非但度其才之短長意其朴訥而無華可以扶持而有立特勤推挽不使弃遺炎敢不講習其所未聞操存其所當守治心飬氣志須久而益堅從政臨民學欲行而有用進修則勉其在已得喪則歸之於天無纍知人是為報德回黎季忱啓肄業修藏足以率校官之後進擅場識論卓然冠鄉曲之時髦人無間言上有公舉某人貌若怯而勇於為義識雖敏而養之以恬不徒非舉子之文蓋欲探古人之學得尊王之微㫖伸行義之誠心稍吐緒餘即居首選豈但馳聲於澤國行將發䇿於天廷自喜知賢在他人之先願言入仕行平日之志其諸贊慶莫既名言回楊宰啓宰于壯縣來自中都方當問塗而上蓬萊亦肯為民而栽桃李銅章墨綬既藹先聲桑䕃麥畦自生和氣某官諸儒華蓋六學指南不為盈川絺繪之文而有子雲深湛之思璞玉指以為石何損乎萬鎰之珍祥鳯使之在笯孰儀乎九㲈之舞行止姑隨所遇欣戚不入於心歐陽子斂板於趍庭之時昌黎伯讀書於領邑之際景仰前哲低回小官未應三年而不飛决知七日之來復炎久聞髙誼獲在同僚將喜登門快睹青雲之雉遽蒙受簡暗投明月之珠悃愊有懷編摩罔既賀施參政啓代渙號揚廷真儒當軸股肱宣力欲求文武之全才羽翼在前遂處東西之兩地豈特臣鄰謹於觀法蓋亦夷裔懼而寢謀九鼎尊安三階明耀某官凖繩有守琮璧無瑕氣涵天地之純極乎剛大學得聖賢之用揆以中庸方其留簮槖之班蓋已儲鈞衡之業越從黃闥進翊洪樞浸符岩石之瞻宜斡魁星之柄中書立政顓論道於廟堂右府本兵欲折衝於樽爼不有經綸之素孰堪委任之隆贊襄萬事之幾密運三軍之末道揆既正庶績咸熙王靈惟宣四方無侮暨湯咸有一德既契前旒惟說命總百官行登上衮某逺分郡寄側聽郵傳雲起龍驤欣見千齡之㑹夏成燕賀倍懷一已之私望東閣之崇深悵左符之拘係其為咏頌罔既編摩賀隆興程帥啓代入覲天顔出臨方面甘泉奏計上知亷訪之勞章水分符國有藩宣之重歡聲四溢條教一新某官縝密自將溫良無競得於醖藉粹然金玉之純動以周旋謹此樞機之發東臺批勑既著直聲南服觀風暫將睿㫖逹九重之德意勤六轡之馳驅爰自使軺遂分帥閫惟是大江之右亦登艱食之餘公往頒春民如望歲凝香燕寢不妨慿刺史之轓曵履龍墀行即荷從臣之槖某自惟遲暮獲際風猷驛傳所臨恨賜環之既去鄰封孔邇喜擊柝之相聞慶慰之懷敷陳莫既賀湖北吳憲啓代入覲清光出恭讞事三尺垂寬平之法容有舞文一麾竭撫字之勞是宜將指修途遄邁逺俗來蘇某官應物清明禔身亷靖蔚然儒雅壓江左之名流藉甚政聲似京西之循吏上魚書於嶺嶠持龍節於湖陽惟吏議至於吹毛則民情無所措手簡求膚使欽恤祥刑為聖明布不殺之仁使鰥寡有平反之喜雖揚旌跋履小留鶉尾之墟然簮筆論思即上螭頭之陛某有懷晤語喜見除書側聞騎從之來敬伸賀悃願備餼牽之禮少展交情回袁州曹守啓代榮膺芝檢分守竹符五馬鼎來聞說賢侯之撫字雙魚拜賜首勤君子之撝謙修慶未遑懷慚不敏某官英材頴秀深識踈通剸劇撥煩解數千牛而刃無闕折發姦摘伏照十二乘而珠有輝光持虎節於靈山援魚書於湓浦治聲聞上遺愛在人日邉丙夜之憂欲孚德意江右宜春之奧今號名藩暫領一麾即歸雙闕某聞風惟舊披霧末由魯柝相聞幸依仁之孔邇郇雲有爛感陳誼之甚高喜愧俱深編摩莫寫回湖北吳憲啓代抗旌問道幸從者為一日之留持節觀風知逺民有二天之喜未修賀語先辱徽音拜賜瞿然撝謙肯爾某官有學以飬其德遇事即見其才方結綬於中都旋把麾於南嶠是皆小試未展素懷豈伊藉藉之先聲而不駸駸於要路果膺細札出駕輶軒要推旒冕之心無有不被其澤必使桁楊之地亦自以為不寃上既深知公寧久外某歸田未遂分閫何堪平世功名所願登崇於俊乂暮年志意但思盤薄於邱園頌咏之深敷陳莫究謝趙總卿啓代改轅八桂脫嶺海之﨑嶇乘傳三湘見湖山之清淑仰奉九重之寵渥密瞻一節之光華推轂有因捫襟知幸某官天資警敏人品高明秀出金枝絶無貴公子之習氣名聮玉筍不作諸老生之常談發揮黃卷之經綸軒輊青雲之步武寬平不擾有西京循吏之風儒雅自將在南省望郎之選遂以懿親之重出將使指之嚴豈但舉鞭如見錢流於地上懸知聚米可令敵在於目中佇奏計於甘泉即升班於文石某親仁已久聞命惟新自顧暮途既竭馳驅之力仰依夏屋兾寬飛挽之程謝荆南陳帥啓代乘嶺嶠之單車初無課最分湘中之一節復玷除書既揆日以班條乃瞻風而依庇可無尺牘敬白雙旌某官文掞國華學窺道奧聲名藉甚握蘭曾上於中臺風采嶤然持斧屢行於列郡雖要路騫翔之莫禦然此心恬靜而無求荐膺中詔之榮起殿上游之重伍符尺籍盡提組練之羣緩帶輕裘自壯金湯之險寧久淹於外服即入覲於清光某受命惟新親仁伊始封疆聮絡可聞魯柝之音帥閫崇深尚覺膺門之峻謝吳提舉啓代踰嶺以南遍覽海邦之陋浮湘而下乃鄰星使之光既揆日以攽條敢遡風而修敬某官高文行逺敏識絶倫方身游璧水之中已志在瀛洲之表白虹騰上莫韜韞櫝之珍凡馬洗空始見躡雲之足枚選外臺之膚使孰先南省之潜郎豈惟斡山海之富饒將以問閭閻之疾苦佇奏甘泉之計即通文石之班某叨奉除音來恭漕事分持英簜敢言有志於澄清獲近皇華少慰此心之景仰尚期警䇿免致曠瘝回邵州潘守啓代祗膺璽詔移守銅符蔚然戚里之英屢騰治最分此名城之寄益簡清𠂻甫聞五馬之來驟拜雙魚之貺某官清修自立俊邁不羣家有朱輪獨薄膏梁之味學該黃卷俯爭韋布之衡繇國貴游為時循吏昔襦今袴已留灃水之去思森㦸凝香更散扶江之和氣雖暫留於外服即入覲於修門某久倦馳驅頗嗟間濶舊綰東陽之綬獲際英猷兹乘南服之軺復聮王事其為贊慶莫究敷陳回武岡趙守啓代乘軺嶺表易節湘中方視龜拜改命之恩乃烹鯉辱修辭之問某官琢磨素履被服古文在貴介公子之中居賢士大夫之選回旋膴仕章徹能稱以卓然公室之長材撫蕞爾偏方之孤壘發硎游刃姑小出而試之䇿足要津即疾驅而進矣某逺將睿㫖更奉除音聖主憂民當體寬平之意賢侯為郡豈煩亷問之勤言則有窮情終莫寫回趙帳幹啓代榮奉宸綸來司計籍屈此宗枝之秀增吾使節之華方竊喜於同寮乃首勤於貽問某官銀潢漱潤棣蕚聮芳騰逹先聲自合問津於天上逶迤緩步尚煩借重於臺中然宗盟在異姓之先豈賢德無裏言之助逮兹脂轂恐即賜環某比拜除音甫恭漕事聞兔園之令譽甚幸鼎來得魚素之好音更懷謙抑其為贊慶莫究敷陳回蕭參議啓代侯藩植屏軍事尚謀惟金匱六韜出竒而無窮則虎符尺籍可借以為重密資逺畫小屈儒英某官恬靜無求清修有守文章固其能事本韓栁之正傳智略不以自名與孫吳而暗合當即鳴龍墀之珮乃來挹燕寢之香緩帶從容暫對湖山之清淑賜環優渥豈遺人物之風流某久矣聞聲喜於聮事據床而分風月在我固所願然聽履而上星辰恐公不久淹耳其諸贊慶莫既名言回全州趙守啓代榮疏芝檢守重竹符惟至尊勤恤於逺民雖支郡精求於良翰歌袴襦之來暮擁旌斾以行春某官育德清明秉心肅括才堪國器宜翔翥於中都志在民庸尚藩宣於外服帶衡山之南麓居湘水之上游不惟壤沃而泉清蓋亦俗淳而事簡是為樂國易以撫摩更得賢侯使之懷附佇看凝香之暇即聞召節之趍某久稔英猷欣聮王事方辱貽箋之溫潤可占臨政之慈祥贊慶之私敷陳罔究回馬宜州啓代肅將漕事行嶺海之遐陬叨奉除音得湖湘之善地敢謂隼旟之逺遽勤魚素之頒某官投筆志高枕戈義壯飛騰燕頷壓山西六郡之良舒卷龍韜得圯上一編之祕把旌麾而畫諾總弓劍以護邉逺俗清平羣蠻讋服賢長城逺矣小施智略之竒借前箸籌之即赴功名之㑹某曩因乘傳喜獲同寮受命改轅方嘆山川之隔修辭授簡重煩使介之來感愧之私敷陳莫究回林撫幹啓代芝封新命蓮府英游得佳士於幕中佐元侯於閫外未施婉畫已藹先聲某官擢秀儒林鉤深聖域文采織天孫之雲錦清修佩楚客之幽蘭橫經半水之宫飛舄一雷之地恬於進取飬以沈潜燕寢凝香始暫煩於參贊龍墀委珮當嗣有於褒嘉某久矣聞風喜於聮事辱貽緘之委貺知㑹辨之有期贊慶之私敷陳難究與靜江詹帥啓代久去中都逺內朝之簮槖叨分外闑鄰大府之旗旄雖欣擊柝之相聞又屬剖符之有守往徹𨽻人之聽可無行李之勤敬問興居少伸繾綣某官斯民先覺此道正傳志定氣完得古人之渾厚識清學正析至理之精微外流愷悌之聲入罄忠嘉之藴為時宿望結上深知羽儀文石之班調護青宫之德然天子憂勤之念下及閭閻而海邦凋瘵之餘宜更鹽䇿遂繇禁從出撫價藩海宿山行自此有阜通之利蠻煙瘴霧變而為清淑之風豈齊鉞之能淹即介圭之趣覲某自惟孤拙獲厠交游問五管之途將乘一傳在三湘之上遽換雙旌聞啓殿之徐來幸封圻之孔邇中心欲寫但慿烹鯉之音書㑹面無因徒渴揮犀之晤語炎州地暖青陸春回願精饔寢之調上副冕旒之眷回張運幹啓代當軸掄材庸示超升之漸乘軺將漕獲資趣辦之能雖未識於英姿已稔聞於高誼某官凛然豪氣飾以清文干將紫電之輝不應久晦騏驥青雲之足乃肯徐行居半水以橫經倚二松而搜句頗淹雋軌寖藹休聲接天廷金馬之游正須公等佐澤國木牛之運暫借賢勞某方幸同寮遽蒙貽問决知臨事必無袖手以旁觀恐不淹時即有裏言而迅召賀楊提舉啓代天廷出節澤國乘軺上顧周行深欲純儒之在內民多凋瘵正須膚使之觀風六轡載馳百城胥慶某官正學可以經濟清文乃其緒餘在東閩多士之中早騰妙譽居南省望郎之選寖著英猷自合留中乃來將指惟此三湘之外頗困荐飢方登一稔之餘僅能平糴曩者儲蓄稍闕其備是以水旱或為之災佇多紅粟之藏因時斂散即擁紫荷之槖入侍嚴凝某幸並里居獲申交契兹分外闑喜聞一傳之來屬剖左符當受六條之察其為贊慶罔既編摩謝廣東熊憲啓代馳湖右之單車未能平糴分湘中之一節服畀祥刑願依鄰燭之光適近使星之次可無尺牘往白雙旌某官曠度深沉英姿果毅飛揚燕頷壓山西六郡之良舒卷龍韜得圯上一編之祕合上齊壇而受鉞姑乘驛傳以褰帷庶獄得情益振繡衣之風采羣蠻奪氣不勞白羽之指麾使里閭無枹鼓之音雖嶺海如輦轂之下上方嘆息而思頗牧欲壯王靈公既智略之似孫吳宜當戎翰某服膺甚久識面末由兹叨奉於除音遂來供於讞事漢條所察敢言有志於澄清魯柝相聞少慰此心之景仰其諸悃愊莫既編摩謝廣西詹經略啓代一節觀風未及修於荒政十行出命驟改畀於祥刑望帥閫之崇深幸鄰封之聮絡往徹記曹之聽可無行李之勤某官拱璧含章元龜見曉精微自得靜而探聖域之傳詳練有餘動則中事機之㑹行藏無枉義利必分羽儀從槖之班翼贊儲闈之德係時雅望為國老成冕旒軫念於逺民牙纛開藩於南海議法欲公私之兼裕鹽策流通臨邉貴威惠之交孚戎車整暇豈但璽書之狎至即聞環賜之遄歸某久隔慿茵洊更軺傳敢不體九重之欽恤未能盡五聽之清明念攬轡以馳驅周行原隰想凝香之宴笑尚間雲山願賜誨言免貽官謗賀史舍人啓代中宸疏寵右掖升華上顧周行喜黃閣帥臣之有子士無異論稱紫微書命之得人王猷一新國體增重某官志定而有立材全而不形正大之學得諸家傳俊秀之聲孚于民聽文章直餘事耳素蓄經綸富貴吾自有之不因閥閲超西京視草之手居北省判花之聮彼常衮但長於除書難顓潤色而崔琳可問以今事詎曰淹該得我鴻儒光於鳯閣某外分符手側聽郵傳演綸誥之音既發攄於妙語補衮職之闕必簡注於清𠂻贊慶之誠敷陳莫罄回趙機宜啓代出綸新命入幕英游暫煩棠棣之親增重芙蓉之府某官潜心儒業擢秀宗盟早聮玉筍之科荐著銅章之最聊資婉畫來贊名藩鼓角清閒無待揮毫而草檄湖山平逺不妨寓目於登樓姑以養資佇聞迅召某曩嘗識面久不嗣音烹鯉得書乃有同寅之喜揮犀晤語可諧道舊之私賀王侍郎啓代擢自儀曹升于選部雖中臺正位久居簮槖之清班然小宰掄材尤號衣冠之極選龍光滋厚爵列逾高某官正學得於家傳敏識周於世務危言無隱卓然副當寧之心特立不回足以作搢紳之氣乃由烏府徑上丹墀右掖代言既絲綸於訓誥左行議禮以黼黻於典章職豈弗清材猶未展仰承帝制進二天官入仕之途雜而流品莫澄循資之格密而賢愚同滯若欲釐法之弊未免咈人之情惟藻鑑之精明必權衡之平允某外分符守側聽郵傳上意方隆姑付以三銓之重物情益附必居於四近之聮贊慶彌深敷陳罔究賀史侍郎啓代選賢右掖正位中臺誥命流傳既用舍人之樣典章明備宜新禮閣之儀官以德居士皆心服某官吾儒華蓋今事指南望實俱高家有公師之赤舄忠良相繼人宜父子之緇衣國所重者世臣班遂升於汝從揮翰紫微之省潤色綸音授經蒼震之宫琢磨玉質遂承晝接晉二春宫清識淹該亦暫持於荷槖逺猷經濟終必上於槐庭某久託餘光逖聞新命為公朝而贊慶知善類之方亨回趙道州啓代承命分符㳙辰洗篆所以慰逺民之觀聽在於宣上意之慈祥風動一麾春回千里某官操修之篤靜重而文繇國懿親之賢居時能吏之選舂陵奧壤瀟水上游雖泉石清幽可發元子新竒之句然閭閻雕瘵宜殫陽城撫字之心惟其游刃於盤根繇此著鞭於要路某近方㑹面洊辱嗣音郡有循良何待六條之察帝思俊彥佇聞一節之趍贊慶惟深敷陳罔究賀趙總領啓代天陛疏榮星軺將指重上游之勢選望實於宗盟總外計之權調盈虛於兵食風行六路恩浹三軍某官恬靜無求清修有守動則見太阿之鋒頴粹然藏璞玉之圭璋三剖銅符推仁心而撫字兩持繡斧伸直道以澄清惟江漢之要津有荆襄之重鎮雲屯萬竈日費千金必得能舒卷之通才乃可致公私之兼裕遂繇郎省來護師干蔚然棠棣之親賢送以皇華之禮樂舉鞭而錢流地上既趣辦於軍儲聚米而敵在目中必習知於邉事佇上甘泉之計即升文石之班某久矣仰高兹焉借潤門䦨在望幸鄰雙節之光竿牘將誠乃殿百函之末其為欣愧罔既編摩回趙知軍啓代侯藩撫字不憚勞心治最升聞豈煩薦口輒冒推賢之美備言奏課之優某官繇國懿親為時良吏德慈祥而能愛政簡靜而不煩森㦸凝香據黃堂而畫諾無襦有袴藹赤子之歡謡雖不為赫赫之聲而獨收上上之考擁一丈之蓋衆固願於借留攽十行之書上方嚴於趣召某觀諸賢業酌以民言拔茅茹以同升善宜無隱投木桃而獲報義不敢私謝宰執啓代義釋羲經徹冕旒之乙覽恩疏漢詔奬鉛槧之辛勤仰瞻咫尺之天光垂照尋常之穴見喜雖榮於寵錫懼莫稱於褒嘉竊以道載六經易關三聖理存於畫文王重以生爻意見乎言尼父述而為傳顯足以措諸事業妙至於行乎鬼神奈何後人以為卜筮之書繇此學者莫探乾坤之藴田何所受流於京孟之誣王弼未知雜以老莊之說自開户牖輕弃筌蹄論互體者略而未詳辨繫辭者信之不篤泛考衆言之異精求至當之歸四象具則八卦之體全十翼明而二篇之義著仰望虎文之變聖則生知俯慙馬智之專學非自得妄謂食芹之可獻敢期采菲之無遺給簡示優遂成緗帙奏篇稱善驟錫璽書爝火至微何益日華之明潤璇霄雖逺獨瞻奎畫之光芒不有先容曷膺殊渥恭惟某官為時先覺得道正傳贊乾之元斡機衡於國秉致賁之飾煥經緯於人文示盛世之崇儒推公心而與善顧此編摩之久矜其探索之勞未窮緑字之深微亦被玉音之勸奬某要當守其所學毋徒託之空言細札十行為終身之焜耀陳編三絶愈篤志以沈潛又代西州乘傳愧無亷問之能南海剖符誤玷藩宣之寄思叨逾之所自荷記録之不忘延見耄倪布宣德意念五羊之㑹府統百粵之偏方內撫列城欲蠻陬之不擾外通諸國期海道之無虞宜得長才用綏逺服如某者本無實用徒有朴忠平日行藏僅不違於義命莫年游宦豈復忘於事功繇均餼於殊庭得觀風之一節歲祲民病未聞振乏之勞俗弊獄繁莫著明刑之效悵道途之僕僕閲日月之悠悠此於責實之朝難在陟明之列驟頒詔璽俾領州麾升之延閣之華付以元戎之重冒榮已甚揣分奚堪錫命自天感恩有地某官清明洞照博大兼容程職業以齊百工使皆陳力執道揆以詔八柄初無容心遂令楶梲之微材亦被鈞陶之大造某敢不益堅素守務答鴻私訓治兵農考難書於上上懷來夷裔䇿惟出於平平庶推君相之仁遍及要荒之外回趙參議啓代璽書疏寵油幕談兵常棣懿親難抱長才而退處芙蓉大府可無重客以咨謀婉畫未施先聲甚美某官宗盟擢秀士論推賢二政京城小著鞭而展驥撥煩望郡無迎刃之全牛兩怒者必多惡言三已之終無愠色特煩參贊用壯藩宣鼓角清閒不草陳琳之檄江山平逺宜哦工部之詩姑以養資即聞趣召某曩嘗識面久不嗣音烹鯉得書甚喜故人之至揮犀晤語庶伸僚友之情賀王侍郎啓疏榮書贊正位儀曹必待積德百年適逢熙運有能典朕三禮允屬洪儒王度備成物情胥慶某官忠精許國文獻承家藴於中者碩大而深純發於用則光明而超卓南臺端簡既於抨彈見御史之真西掖演綸不止文字傳舍人之樣士論翕然歸重帝意知之愈深式彰晝接之勤遂陟春官之二朝廷縟典固能兼三代之質文臺閣新儀亦欲刺六經而述作留清班於簮槖儲雅望於鈞衡某久挹英風欣聞新命侯藩有守莫陪賀客之塵賢路既亨敢贊公朝之慶其諸頌咏罔究編摩雙溪類稿卷十四
