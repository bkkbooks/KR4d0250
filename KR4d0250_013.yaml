body:
  text: 雙溪類槀卷十三宋王炎撰表湖州到任謝表便朝賜對近輔班條起諸閒散之餘付以蕃宣之寄喜非所望懼不能堪中謝伏念臣曩以散才濫升清貫老隨災至命與志違入三館者四年瑕疵不掩把一麾者數月瘡痏已成坐此罷歸宜其永廢乃從家食驟得守符況古稱苕霅之間湖山清逺而今比京畿之內事物浩穰自揆何人可居此地第緣疏賤不敢控辭識暗慮疏何以撥煩而治劇年衰氣憊難於扶弱而仆强縱欲佩韋終虞傷錦兹蓋恭遇皇帝陛下皇明日照聖度天函在知人而能官人雖加遴選善救物而無棄物亦或兼收臣敢不益戒曠官深思補過寧催科之政拙惟務便民但寬大之意行是為報國賀立皇太子表明聖御天元良主器儲闈一建萬世垂無疆之休霈澤旁流四方同莫大之慶臣民闓懌家國榮懷中賀竊以神器之重欲其久安天下之本貴乎素定雖云今古之通義實係皇王之逺猷恭惟皇帝陛下鞏固鴻圖光昭駿德兢兢業業審於應萬機之繁繼繼承承求以接千嵗之統定大謀於黼扆升上嗣於青宫下足以係億兆之心上足以重宗祧之守肆頒優禮佩玉契以趍朝行講上儀服朱明而見廟臣密依象魏濫守虎符少海淵深幸為蒼生而涵泳前星位正益知紫極之崇髙皇后箋肇建儲闈丕承宸極雖由黼扆之獨斷亦賴椒廷之叶謀宗社儲休邇遐同慶中賀恭惟皇后殿下志存警戒德備柔明坤為母以順天震得男而主器人倫既正益暢二南之風國本不搖何煩四老之助臣謬分符竹密邇觚稜既瞻離日之明象垂繼照又覩軒星之次祥著重暉皇太子箋神聖御圖元良二極主器藉於蒼震繼明協於黃離喜溢天庭慶覃海宇中賀恭惟皇太子殿下夙成岐嶷日就溫文惟皇家所重者繼承則儲禁宜嚴於監撫一孚大號四洽歡聲益綿卜世之休允藉承祧之重念阻陪於象魏方分守於魚符位正前星但快觀瞻於瑞色澤流少海共欣涵泳於餘波賀改元表運獨斷以當陽權綱既正順羣情而更始年紀維新散和氣於熙春溢歡聲於華夏竊以近稽仁祖弭災開景祐之祥逺考漢宣討罪保元康之治以今凖古其義隨時恭惟皇帝陛下慈儉庇民寅恭事帝虛心無我本如天地之兼容方命者誅一發雷霆之震怒念邊陲之多故與嵗事之不登渙發德音盡釐宿弊迓三陽之開泰申五始之體元納庶類於亨嘉班六師而耆定始於父子君臣之懿德並純全極乎神祗祖考之安福將曼羡臣身縻印紱口誦絲綸正朔所加皆聳聞於大號耄倪相語永同樂於升平慰皇帝小祥表小祥而練悽愴猶深長樂之朝著存如在恭惟皇帝陛下俯同曾閔仰奉姜任慨念含飴之恩永違侍膳之養軒龍一掩隙駟難留惟追逺而弗忘雖過時而寧戚然福已兼於夀考數必有終而德又極於哀榮事誠無憾願少寬於聖意庶允協於人情遙望清光控陳愚欵皇后箋萬世不祧廟已嚴於陟配一朞而練服亦貴於稱情恭惟皇后殿下協贊孝思丕承內治慈顔如在無由日侍於東朝懿範具存益致風行於南國願謹節哀之禮用全送往之仁皇太子箋東朝仙去俄閲朞年北內哀痌豈拘易月恭惟皇太子殿下侍至尊之側念太母之恩義莫重於承祧豈無悽愴禮獨勤於問寢宜致溫文庶殫子職之恭少解聖心之戚賀太子遷東宫表黼扆宅中儼向離於南面青宫在左彰出震於東方歡洽帝廷慶覃海宇中賀恭惟皇帝陛下紹天明命鞏國丕基肇建儲闈密依宸極就少陽而正位㳙元日以取新地接龍樓貴便安於問寢門施雞㦸示嚴肅於承祧臣叨守五符阻趍雙闕竹苞松茂知並受於安榮海潤星輝喜益增於昌熾賀講和表使軺復命玉帛交修邊瑣班師干戈永戢堯言誕布禹服均歡中賀竊以渭水之盟敵人終屈澶淵之誓方內久安將欲保民莫如耀德恭惟皇帝陛下天涵夷夏子育黎元止秋殺以春生收雷聲於淵默能忍所以有濟是為中國之至仁善勝在乎不爭何論胸奴之長技申講丹青之信竟銷金革之彊軍散于郊共習騶虞之射民安其宅載歌鴻㕍之詩臣恭職蕃宣逢時泰定身縻印綬阻雙闕之追趍口誦絲綸與一圻而率舞進東都紀年表垂世規模莫盛本朝之列聖編年凡例宜如古史以成書削牘鋪張扣閽登進中賀惟一祖八宗之繼序與三王四代以比隆載在縑緗藏於金匱其道榮華而不朽其文浩博而難窮自顧陋儒素慚鴻筆嘗塵清貫越在麟臺歷十載以究心具四時而繫事逮兹斑白畢此汗青究而言之固多疏略識其大者亦頗著明恭惟皇帝陛下濬哲自天憲章于古蒼姬而上逺則難行炎漢以來卑而無取闡皇猷而善繼捨家法以何求察進退於羣才稽弛張於百度內綏黎庶有省刑薄賦之仁外靜邊陲有習戰講和之䇿討論故實採托舊聞庶便鑒觀但提樞要所傳者信非徒殫精力於空言可舉而行願以致隆平於當世東宫箋編年紀事可輯舊聞據舊鑒新是為成憲不量固陋遂有編摩竊以南渡以前東都之盛祖宗傳序相繼者九朝德業垂休將關諸萬世論撰於麟臺虎觀祕藏於石室金縢豈有他書可參正史然漢紀成於荀恱而唐厯出於柳芳倣其序嵗月而書之欲以記事辭之要者視李燾長編而稍簡比熊克通略而加詳甫上奏篇願徹宸旒之邃輒緘副墨進干儲禁之嚴恭惟皇太子殿下禀睿哲之資廣緝熙之學㑹道之要考以聖經揆事之宜質之家法庶因記注兼備參稽仰祈英鑒之髙明俯察愚衷之悃欵啓上張南軒啓元戎整暇方宣威嶺海之間膚使光華遂將指江湖之上雖屬部喜公之持節而搢紳望上之賜環蓋以將相必有世家不為創見至於父子俱係人望未始前聞諸葛瞻之視武侯則功略無傳李吉甫之似贊皇則剛方少貶其在今日非為美談當紹興搶攘多故之時賴先正扞禦艱難之力勳存宗社道濟生民故上天隂相於國家宜後嗣繼生於豪傑恭惟某官宗師先聖法象古人探六經所載之微言紹千載不傳之絶學愛君憂國誠心貫日月而無欺疾惡排姦直節頽岱嵩而莫壓視諫官御史逡巡而失色對公卿侍從慷慨而必爭得喪齊一毫之輕聲名增九鼎之重仁人義士信知何世之無賢走卒兒童亦識元臣之有後去中州凡千里而逺在南服有三年之淹擁齊鉞以澄清移輶軒而廉問桂林象郡勤父老之去思漢水洞庭覺山川之改觀風采足以肅百城之屬吏慈祥足以蘇一路之疲民轉漕軍儲實為餘事謀謨王體自合還中而況朝野注目以大用期之聖明傾心其見知深矣鋪張前烈興起事功必規模先定於胸中則設施可觀於天下佇聞趣召即慶登庸炎才薄而無堪見愚而未達浮湛州縣所謀固出於為貧啜嚌詩書此志未忘於稽古飽聞南軒非今世之君子極欲北面與承學之諸生豈期墮朱墨之中乃獲在門闌之側恨無羽翼亟瞻盛德之輝光敢布腹心庶見平生之景仰賀趙丞相啓代命出中宸任顓右揆協同心德九重倚謀國之有人綏靜華夷四海信用儒之無敵物情胥慶宗社匹休竊以事業之成就雖出於人為明良之㑹遇乃存乎天命中興之運作配以賢髙宗舉傅說則得之夢寐之間明皇用姚崇則契以立談之頃上既灼知而不惑下非先入而後量及經綸終底於有功則擢任不嫌於太速篤生上聖紹復丕圖豈無命世之才出輔有為之志恭惟某官學關百聖氣蓋諸公黼黻之文足以賁邦國之華蓍龜之識足以照事幾之變奮就功名之㑹曾無嵗月之淹衆拱手以推先帝屬心而圖任然而軍國之務寄諸一相位望之重冠於百工慰天下之觀瞻立朝廷之風采愛惜名器維持紀綱裕民和衆以固根本之安選將練兵以壯爪牙之助䇿惟自治實不先聲在當今事勢之非輕必平日謀謨之有素佇聞施設仰副倚毗某久託餘光欣聞盛事掌北門之管鑰方備蕃宣望東閣之衣冠莫陪趍進上為天廷贊得賢之慶下知海宇有開泰之期咏頌之誠編摩罔既賀王樞使啓代顯頒制冊分秉政機尉相等尊貴選材於已試聖明注意信謀國之無疑孚號一傳歡聲四溢竊以輔相之責任至重君臣之㑹合尤難惟作哲之明曉然見天下之是非則在位之人足以關國家之輕重風采聳動決無間言規模弛張終底成績某官忱恂自信碩大有容靜以秉心莫測謀猷之素藴形於臨事始知文武之兼資下所具瞻政將焉往延登揆路以寬和為百辟之師進長樞庭有道德運五兵之末名符於實事副其言圖我舊人亞於元宰用見始終之同德能踰前後之數公位望愈髙獨尊重本朝之勢功名不朽將大書盟府之藏某久隔英風欣聞成命方出分於符節阻趍進於門闌欣抃徒深敷宣罔既謝劉司業啓邑下棲遲敢聞知於當路臺中廉訪肯薦寵於孤生恐傷左右之明實過平生之望嘗聞官爵乃厲賢之公器古人無援下之私恩孰抑未伸所知必舉故秀民皆可以類進而仕者不貪於躁求今昔異時品流滋濁墮在選人之數限其舉主之員初以拔才久而貽弊膏粱有援翩翩馳驟於通衢韋布無津往往浮沉於下位不堅素守寧免自媒乞憐以諛佞之辭借世以請求之力志於苟得恬不為羞既士氣之不張於人才乎何取誰肯提衡於達官獨加推轂之公心矯俗之非收人所棄有名世力行此道乃善人胥待而興可備搜揚豈無茂異至如炎者半生挾冊千里攜孥欲達而窮殆類痿人之思起何因以進懼疑拱璧之暗投國士無雙揆能不爾貴人數百知己者誰已甘流落於窮途亦辱吹噓之餘論許之以清苦之節則察其粗識廉恥期之以逺大之業則欲其益務操修自慚拜賜之屏營人嘆見知之特達兹蓋伏遇某官清明無蔽剛毅不回聲名重於一時許與信於四海出為天子之耳目詳辨是非如見衆人之肺肝灼分能鄙欲州縣無滯淹之士為朝廷廣採擇之誠不遺一介之微俯借片言之寵炎敢不治心養氣潔已奉公知軒冕外物之儻來安其有命誦詩書古文而不廢守以終身無纍知人是為報德謝吕鄂州啓五馬之貴方幸瞻依一鶚之稱誤蒙收録顧承乏在衆人之後而見知處屬吏之先不勝踴躍之私曷報生成之賜且先民非不欲仕然君子未嘗自媒惟持養之有餘寧浮沈而無悶既在下者得失舉安於定命故先達者薦揚非市於私恩有才豈病於無聞不肖雖窮而何憾古道寂寥之已久物情躁競而不還凡登名薦士之書亡為國擇人之意非有宦游之契好即因權要之請求孤寒無津流落者衆孰能矯此末流之失必有卓然命世之豪宜得異才乃堪公舉如炎者謀身甚拙涉世多艱投簡冊之鉛黃對簿書之朱墨適有依仁之幸僅無速謗之虞猶未能忘情軒冕之間豈不願託迹門䦨之下第畫㦸開藩之始繄青衫為𨽻之新半載一章焉能兼及同寮諸彥俱合在前敢期特達之恩獨借吹噓之寵兹蓋伏遇某官禔身肅括鑒物清明帝所倚毗澤國持專城之虎節士皆景慕家聲為四海之龍門謂異時經濟於王廷宜平日蓄儲於人物侏儒斷木不使有遺籧篨病夫未必無用假以齒牙之論奬其鞅掌之勤炎誓當增益未能潔齊所守敢為矯激求居官赫赫之聲專務省循竭為善孜孜之力少圖報稱無負品題上周總領啓按部十州方見繡衣之風采總財六路又傳金節之光華凡預帡幪率同欣抃惟荆襄之重鎮在江漢之上游鐵馬萬羣誰何要害木牛千里繹絡轉輸非芻粟之有餘雖金湯而何恃要在使公私之兼濟必有能舒卷之通才恭惟某官簡易而有文疏通而知要物流而金石獨止能沈潛道德之淵龍翔而雲霧必興終奮發功名之㑹見諸歷試動則有聲既乘軺大江之西即持斧重湖之北提一旅貔貅之衆解五溪蜂蠆之屯奏此膚功升於拱著然上意撫摩於戰士欲異時馳騖於中原調度軍儲肅將使指錢流地上固不勞鞭算之精敵在目中當預定廟謀之密計日以俟遄公之歸炎牢落小儒浮沈少吏攝官三嵗依德二天少寬速謗之虞適有事賢之幸寒鄉之氷氏窮甚敢期自貢於姓名髙漢之星使非遙即卜進瞻於顔色其為悃愊罔究編摩回万俟監鎮啓望先丞相如古人之逺恨不及於門墻聞貴公子有儒素之風喜將瞻於紳笏尚無一紙以修敬忽拜朋緘之好音恭惟某官世系光融人才膚敏先聲騰踏宜立上於通津緩步從容乃不卑於管庫然主上博訪名臣之華胄在執事必有諸公之裏言雖脂轂以啓行即賜環之亟下炎半生不偶千里倦游拏短艇以東歸有懷鄉社裹青衫而浪走更落天涯敢期聮事於王官乃獲依仁於長者烹魚得尺素甚慚厚德之撝謙窺豹見一斑行快平生之景仰回趙運判啓代申錫湛恩榮顓外計慰逺方之觀聽增膚使之光華郡國歡傳交朋相慶共惟某官禔身肅括涖事清明被服古文用志俯同於韋布發揮素藴美名自滿於搢紳將指漕臺觀風南紀舉鞭而計盡知錢榖之盈虛攬轡有懷詳問閭閻之疾苦海濵嶺嶠如在中州父老兒童熟知德意帝從人欲衆願公留雖持節以按行少淹外服然賜環而入覲必有裏言某獲預雅游欣傳新命山川遼逺未遑修一紙之書使介鼎來乃重拜朋緘之貺彌深贊喜罔罄敷陳回吳憲啓代疆埸敉寧冒据中權之重山川聮絡旁鄰英簜之光深感撝謙不忘舊好恭惟某官家聲碩大人品髙明負立事赴功之志而居以靖恭懷牧民御衆之才而加之豈弟懋昭賢業自致通津簡在上心肅將使指惟梁益去朝廷之逺尤急綏懷而巴夔在岩谷之間不無幽枉為上布好生之德使民見持法之平行奏最於甘泉即通班於文石某與時寡偶有志未成兹當㑹府之藩宣亦藉同僚之推挽緬懷先世嘗共濟於艱難在我後人宜相孚於聲氣言辭不敏喜愧惟深與郭判院啓傳誦杜紫微之文久思焚筆願識韓荆州之面恨不登門豈期小官為墨綬之僚適值長者佐繡衣之治殆天幸而抵此非人謀之能然恭惟某官心藏萬事之蓍龜筆落四方之膾炙豈止敵數百人於禮部氣壓同儕不勞奏三千牘於公車聲聞當寧志在青雲而自許德如白玉之不緇意謂驊騮騰踏已升於要路何期鵷鷺徘徊未上於層霄暫翊使華屈臨吏事雖輶軒金節非竒才不共於官聮然文陛赤墀在內服尤需於豪傑固知積薪無長孺之望必將前席喜賈生之歸炎孤陋無聞﨑嶇多難甫上南宫之第忽有北堂之憂未能糊口於食貧寧免折腰而干祿方且逡巡在九品之賤孰能推挽於諸公之間念兒時聞執事之名若瞻北斗乃今日快平生之願可見景星安敢內交庶幾依德宦游如幕上之燕少假扶持學術類甕中之雞尚期開發賀李參政啓中宸出命南服開藩上既起公於燕閒之中委之卧護公惟撫民以清淨之政允也來蘇將令老稚歌舞於湖山不過樽俎笑談於庭户十州聮絡一意瞻依某官備道得中和之全修已盡篤欽之實靜而充德業之藴如海涵地負之含洪作而應事物之幾乃燭照龜占之昭晰以堂堂柱石之老應兩兩台階之符身上黃扉意安緑野傲睨功名之外已雖處之淡然經綸明聖之時衆固望之久矣胡不秉圭而入覲乃煩擁節以來宣命申伯式是南邦姑以慰逺民之願有伊陟格于上帝豈其緩同德之求佇聞三入於中書豈但再參於大政炎無適時之用有信古之愚知命之窮難容心於僥幸為貧而仕但苟祿以浮沈敢期半水之孤蹤忽近二天之大庇雖云自售可作進士上宰相之書更願公歸繼為聖主得賢臣之頌其諸欣抃罔既敷陳又代左符分守中詔趣行真館燕閒公固無心於寵利名城卧護上深注想於忠嘉一州喜元老之來四海願舊人之用某官直方有守篤實無欺逺猷贊天緯之幾微厚德為王官之儀表雖經綸之有道而舒卷之隨時功名之慮既輕但願從赤松耳朝野之望方切不出如蒼生何起自殊庭付之輔郡將欲還諸左右豈惟賴以藩宣民自得於湖山事但責於丞史洪河之潤九里福既及於京師泰階之次六符位宜升於上相某逖違墻仞側聽郵傳畫㦸開藩遙想春風之及物介圭入覲即觀霖雨之濟時賀王倅啓細札疏榮二車來翰屈相門之華胄贊帥閫之壯猷藹然先聲副此輿願辱在泥塗之中久矣自附鄉曲之末可乎某官妙論風生英標山立惟先正是似當奮發功名之途與儒素相髙獨沈潛道德之奧挾龍淵之犀利展驥足之奔騰北極九重念鈞衡之舊德長沙千里乃節鉞之大藩爰得象賢暫臨别乘衡山湘水不妨攬秀氣於胸中文昌紫微行即問要津於天上炎虀鹽半世簿領三年窮鬼驅來冷官在此念由王子而得姓疑同鳳閣之宗況居鄰郡而受廛密邇龍門之側自顧一書生之貧者今有半刺史而依焉望公鼎來何翅黍苖之仰膏雨同列相賀亦如荆棘之近慶雲欣抃之私編摩莫既回李監庫啓望門䦨百里之間未能修好隨宦牒三湘之外敢意同僚坐客無氊方嗟獨冷呼童烹鯉驟得好音某官巋然閥閲之髙加以才猷之美金更百鍊而游刃無滯寉在九臯而孤標不凡平日先聲已騰湧薦紳之譽青雲緩步聊低回管庫之卑恐裏言之亟聞即中詔之催去炎蒼髯欲雪黃卷生塵幸執事接踵而來有鄉人㑹面之喜拜貽問發緘之始如獲瓊瑤願定交傾蓋之時相為金石謝李侍郎啓計臺下逐客之令幕府致招士之誠棄官而歸已決髙飛逺走之興慕義而返敢辭驅去復來之羞誰云一介之書生能屈十連之元帥親勤枉駕不許褰裳士類以為美談見者無不改觀顧禮意如此其厚雖豪傑亦何可當心非木石之無情施等丘山而難稱凡蓄於肺腑而未白者請滕其頰舌而備言之夫憂道不憂貧者信窮通之在天可殺不可辱者厲廉恥以立已自鳥能擇木之說不行於世而猿欲投林之情但切於中惟利重而義輕寧身伸而道屈居上者喜怒難於自克在下者去就失之不明如其奮螳蜋之臂以當隆車所謂用蚍蜉之力而撼大木然吾黨之論有是非而無利害流俗之見明利害而昧是非雖知其難烏得不勉如炎者奮身孤苦用意濶疏謂仕者有時乎為貧雖匹夫非可以奪志幼而務學亦既講之詳矣學以從政遂自貶焉可乎矧兹庠序之官號曰師儒之職儻不守凖繩以治已豈能為領袖以率人奈何疾惡太甚則怨所由生知人不明則過亦未免初有含沙之蜮讒忒潛行遂來㸃璧之蠅訟爭遽起苟鄰人舉似竊鈇之態則慈母且有投杼之疑而況上下之情難通固宜鄭廣文遭官長之罵曲直之理未定孰信陽司業有諸生之留無復麾之不去招之不來亦姑悠然而辭泛然而受又念半生挾冊方得一官千里攜孥本圖薄祿為郡督郵投劾而去嘗疑靖節之太髙對部使者納敕而爭難學濂溪之大勇纍有啼飢之百指家無破屋之數間若非真喪心而病狂何遽不旋踵而疾走蓋欲留而不可非得已而遂行幸而不見絶於大君子之門察其不徒為是小丈夫之怒兹蓋伏遇某官負四海之公望為一時之耆英育德本乎剛方待人濟以夷易愛惜後來如場師之養桐梓收拾善類如良醫之聚參芝觀其困窮有此顛沛特加憐憫若已推而納之溝中未忍棄捐以禮羅而致之幕下擁前旌而一出陪後乘以旋歸無忌虛左以迎侯生第矜豪俠之節益州備禮而見嚴子本非真實之情以彼相方惟兹專美可以激懦夫之氣不徒為寒士之光炎敢不深防朋比之嫌益戒讒邪之害蠆尾之毒蓋小小爾蝸角之爭亦洶洶然衆口風波於今少定一區玉石從此遂分容我庇身有公知己非韋思謙何足為重如石處士其尚肯來敢為矯激之言不合中庸之行珥筆喜訟者數輩既削迹而無餘纓冠往救者百人皆同聲而相應共加講習日務省循進人若加諸膝退人若墜諸淵終亦付升沈於度外忿言不返諸身惡言不出諸口但思逺恥辱於方來報德之懷濡毫不盡謝蘇漕啓情可疑而貽咎事既白而辨誣知君侯不立城府於胸中使寒士終託帡幪於節下昔者凛焉何恃而不恐今則坦然自安而無憂蓋越人關弓姑付之一笑而非怨而曽母投杼其聽以多言而易疑公既開心能釋於小疵炎亦齰舌自悔於前失載惟草莽之賤辱在泥塗之中欲與諸生稍明此道靜而觀得喪之變患乎無上下之交直情徑行孤立自信蜮含沙而射影犬吠雪而同聲盡心力後必有災嘆關防之所不及畏首尾身其餘幾見風波之易以危豈宜斂版以羣趍只可褰裳而疾走某官喜怒以類是非無欺方變白為黑而未分小加訶譴及惡紫奪朱之既審曲賜函容乃知剛決之威中有和平之德炎敢不體寬假之意守操履之常豈願棄官鹿走險而急何能擇既容尸祿鵲繞樹而枝有可依感激之懷編摩莫寫賀李侍郎致仕啓抗章得謝解印言歸上心雖欲其少留難回雅志士論皆推其勇退莫繼髙風惟聖賢行藏出處之幾如天地消息盈虛之運居靜所以止其動用晦所以全其明庶無招損而害盈是謂守謙而持滿故先王之待耆德雖賜杖以示優然君子之守禮經必懸車而佚老自夫義不足以勝利而昧於辭受道不足以制欲而怵於榮枯聽其言則競思返駕於山林察其情則無不攖情於軒冕是以進退不失其正惟聖人然後可能至於明哲以保其身在大雅亦所深美必治氣養心之有素斯樂天知命而無疑用能蟬蛻塵埃鴻飛霄漢以知足而保功名之美以見幾而無悔吝之疵以辭榮而上全明主之恩以守節而下激貪夫之志誰謂今世獨無斯人某官篤實而不欺清靜而寡欲剛大而有守恬退而無求德為天下之老成學到古人之微密達惟徇道入升法從之班志在為民起殿價藩之重去就有禮卷舒以權收身於康彊之時用志於寵辱之外蓋德之貴則三旌之位非重仁之富則萬鍾之祿非多自養之厚則視外物而皆輕自信之堅則入流俗而不變方將以雲山為户牖以泉石為樽罍以緩步為車輿以清談為絲竹嘯咏風月偃仰煙霞招里社之故人時同燕笑訪山中之幽子相與過從初非韜光匿迹而兼園綺之髙不待吐故納新而得喬松之夀能令後進識前輩之典刑却笑舊聞少先賢之完傳然而忠力方壯德齒俱尊國家有事足以折千里之衝朝廷願治足以揆百工之政或不免因時而特出恐未能與世以相忘炎求道無聞事賢甚切斂版獲依於棨㦸摳衣許附於門墻既耳提之以發其顓䝉又手援之以扶其危殆如嚴父察兄曲加愛於子弟豈腐儒小生所敢望於公侯廩粟俸錢方墮泥塗之賤幅巾藜杖莫從邱壑之游倍懷贊慶之誠不勝瞻依之切雙溪類槀卷十三
