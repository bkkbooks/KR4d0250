body:
  text: 雙溪類稿卷十六宋王炎撰啓通臨江丁守攝官躐等幸充竹使之丞恭職前期不俟瓜時之代偶塞上之失馬致楚人之得弓將聽命於黃堂敬通名於尺牘某官器周于用實副其聲有卓越之行而裁以凖繩有精練之識而斂其鋒頴晉居內服思訖外庸分士品流雖待陽秋之鍳問民疾苦尤深丙夜之憂乃輟含香小煩慿軾况此江瀕之地適當水溢之餘擁和氣以頒春慰空頥之望歲政遂成於五月人皆有於二天白叟黃童已受撫摩之賜赤墀青瑣猶虛英俊之躔即可趣裝不惟增秩炎半生平進垂老倦游郡博士之素餐自宜氷冷邑大夫之墨綬亦分陸沉豈期玷於二車乃獲依於瑞錦事從其長敢勤教戒之再三志在斯民願贊循良之萬一與孫判官竹符立二驟戒戍期蓮幕得賢相為交契通問之初宜先於下執同寮之好當倍於他人某官冠冕甲門圭璋寶器英才在外衆固惜其少淹婉畫佐州民實受其隂賜乃者江流之羡溢至於歲事之大祲既有潛郎蒞黃堂而畫諾亦資上佐班紅粟以振飢廣此仁聲趍於夷路炎浮沈州縣荏苒歲時茲叨剖竹之丞不俟及瓜之代雖曰幸而承乏恐戾官針惟其有以告新願聞誨藥答蔣教授二五馬之守忽及戌期登三鱣之堂將親寮友緬想采芹之樂重歌伐木之章某官吾道醇儒清時名士圭璧不鬻於市內心惟貴於韜藏黼黻以昭其文衆目皆驚其炳蔚羞著鞭於捷徑小休駕於泮林青佩聞風必欲懇切作新而後已黃堂畫諾不妨從容諷議於其間華問寖高亨途可卜炎半生隨牒垂老佐州雖細務米鹽難凂師儒之聽然忠言藥石宜資道誼之交願蠲苛禮之拘攣共展雅懷之繾綣上趙漕攝丞支郡偶前一歲之期受察外臺幸近二天之庇必先齊宿以請命方敢諏辰而造官某官學正而識深材全而氣徑風采冠充庭之鵷鷺入處郎闈威稜重固圉之金湯出分帥閫欲廣九重之視聽尚勤四牡之驅馳馭吏在於選才秉公心而藻鑑足用夲乎厚下擁仁氣以薰陶值水溢之為災致歲祲之告病賴有皇華之將指平頒紅粟以振飢衆若更生共咏輶軒之德朝多虛位合歸文石之班炎氷冷起家陸沉隨牒泮林職散已愧空餐凋縣財殫嘗憂傷錦心未忘於竊祿才不足以佐州當務檢身仰俟六條之亷訪預期拭目前瞻雙節之照臨賀周丞相一札疏恩十連移鎮執玉以翼天子孰踰舊弼之良衣錦而歸故鄉暫借專城之重幸帡幪之逮下輒薰沐以輸誠某官命世真儒爽邦耆哲親逢舜禹之揖遜力罄臯夔之贊襄雖端委廟堂獨持天下之正然錙銖爵祿兼得聖人之清不可招麾自為舒卷歸休間館疑與世以相忘卧護價藩乃為民而特起以整暇練和門之步騎以威懷綏徭户之狌鼯田里即安京師䝉福兹上湘中之節遂分江右之符衮繡鼎來山川改觀輿情所向甚於從二老以歸周宸眷有加何止倚二公而分陜其忠誠足以主善類其仁勇足以定大疑諒方急於辰猷必難稽於信處炎侵尋平進流落倦游為客異鄉驟庇身於節下得丞支郡行聽命於府中心方懷疏逺之嫌天乃假攀援之便望緑水芙蓉之地願晉拜於上公無落霞孤鶩之詞敢濫陪於下客上謝尚書二剖竹之符祗戍期而代匱問鳴珂之里依耆德以為師况䝉推轂之私倍切升堂之願某官識精而學正志定而氣全淡泊深醇與世浮誇之習異清真樂易使人鄙吝之意消曩在帝廷嘗居言路方未帥諌官而叩閣孰知陽子之賢及其對人主而引裾乃服辛毗之勇故身退江湖之上而名垂宇宙之中間館飬髙雖友赤松而謝事嚴宸注想政資黃髮以詢猷炎陪健樂以從游辱艮齊之與進兹玷緹屏之任可聆革履之聲閲郡事以通行深懼官針之戾趍門庭而雅拜願聞誨藥之詳通韋倅太常奏第偶聮淡墨之名别駕攝官獲在鳴珂之里三紀嘆差池之久一朝有解后之因行且登門可無削牘某官學窮道奧文掞國華試其才於繁劇之間不難製錦充於養以安恬之守聊復題輿有如執事之賢實列勝流之數其鴻博宜紬書於虎觀其清修可端簡於烏臺胡不高飛尚兹平進正恐未下車之際即聞不俟駕之招炎揆日將行瞻風伊邇同年筮仕雖慚玉笋之英序齒論交乃等棣華之好儻或許其承教庶不至於瘝官夏令清和燕居暇豫願謹寢饔之節益申戩榖之休通向倅抵戍期而承乏濫陪五馬之車親耆德以為師獲在八龍之里非先揆日以貢竿牘可遽趍風而望慿茵某官六世故家五朝夀俊文簡之典刑未逺薌林之聲烈如存閲義理以飬其心夲不矜於進取攄才猷而見之事曾未究於施為脫屣如遺挂冠不顧傲睨功名之表倘佯泉石之間雖外物輕於浮雲可激清風而厲俗然世臣重於喬木當勤聖意以貪賢暫安鳩杖之閒别有蒲輪之召炎仰高甚久披霧無因豈意是行獲酬所願從郡太守之後將勠力以奉公近鄉先生之尊宜齊心而請益瞻承伊邇寤寐不忘夏令清和燕居暇豫兾精調於寢餗用倍納於休祥通劉倅散才無取濫充别乘之員厚德可親獲在鳴珂之里幸登龍之有便值展驥之未行某官行修潔而無疵學高明而有用飛王喬之舄嘗自試以撥煩題仲舉之輿姑少安而養望况渚宫之巨鎮實邉瑣之上游中權必屬於重臣二政亦資於名士如執事之素藴乃諸公之熟知恐未及於下車已即趍於召節炎曩嘗披霧久不趍風抽毫難究於深𠂻揮麈佇諧於晤語通王文州通行郡事濫充别乘之員少憩里居知有分符之守將欲前瞻於顔色合先自貢於姓名某官練逹多聞靖恭有守世家所自源既逺而流長人品不羣華亦榮而實大甫金閨之通籍即畫㦸之凝香䦧循吏於漢京欲埒龔黃之豈弟數勝流於江左宜班羲獻之清真佇拜賜環寧淹間館炎仰高甚久䝉潤有初自慚非鳯閣之崇所願識烏衣之俊瞻承伊邇抃頌惟深通趙知軍二車代匱偶前宦牒之期五馬旋歸聞有宗盟之重將欲詣門而伏謁可稽削牘以修辭某官胄出神明志如寒素凖繩其行斧藻以文棣萼聮芳掩周室懿親之美竹符分守追漢京循吏之風既外振於能聲宜入升於華貫忠精劉向嘗紬中祕之書儒雅李程亦視北門之草真材是用公族為先上心方徯於來朝除目即頒於異數炎覬䝉霧潤久仰山高日虞召節之追趍莫遂賔階之跪起有懷悃愊不盡編摩上汪提舉聽尚書之履銜恩早玷於師門瞻使者之車受察今居於屬部况以佐州之别駕近於駐節之行臺代匱之初竭情以告某官承家文獻許國忠嘉三典用中平竹書之讞議一經垂逺廣金匱之舊聞凝旒欲審於觀風攬轡遂煩於將㫖管山海之利上專贍於大農備水旱之災俯尤詳於荒政皎皎皇華之芘陳陳紅粟之頒隂德無窮何止萬人之活休功不掩佇聞四牡之歸且國莫重於世臣而治必生於君子太傅股肱之美蕭咸嘗至於大官贊皇骨鯁之剛吉甫遂登於上宰將由賢而佐聖可考古以驗今炎喜及戍期懼無治狀晚途猶滯空慚鯉躍於龍津舊物不遺尚覬蠅隨於驥尾有懷悃愊莫既編摩上談提刑攝丞支郡偶前一歲之期受察外臺仰戴二天之庇甫諏辰而恭職即齊宿以修辭願霽威嚴仰陳悃愊某官為時先覺得道正傳充所飬則器大而聲宏見於文則芒寒而色正順詩書以造士討論何止於解頥發倉庾以振民愛利悉形於將指陋矣青蠅之㸃璧翻然黃鵠之摩雲有以自娛堅杜門而避俗不容退處竟衣繡以觀風其教條簡易而不苛其讞議清明而能恕環今日乘軺之地無曩時珥筆之氓載考昔人崛興南紀逺則開元之輔相近而慶厯之諫官惟山川之炳靈獨鍾間氣如麟鳯之罕見為瑞清時是宜五管之提封今復一賢之顓美暫勤攬轡即拜賜環高掩前修盡攄素藴炎起家氷冷隨牒陸沉製錦之傷偶爾終更於為縣覆車之戒難乎承乏以佐州自知無尺寸之長未免戀斗升之祿預期拭目前瞻雙節之光華當務檢身仰俟六條之亷訪答陳宰揆日將行叨二魚符之守瞻風伊邇習聞鳬舄之賢辱貽問以相先愧謄書之不敏某官文傳正法學造大原聲問最高宜立登於渠觀進趍有節乃屢試於琴歌寧圎枘而方穿不直尋而枉尺其清介益堅於信道其慈祥逾篤於字民熙春常滿於花隂凶歲不憂於菜色觀其感召已流三異之稱自此騫騰何待十竒之薦炎愧當佐郡喜獲同寮抽毫莫究於深𠂻傾蓋兾諧於晤語答常宰花縣得賢恨親仁之無自瓜時越次喜聮事之有期想聞百里之琴歌遽枉五雲之筆札某官東吳秀士西蜀名家望驥足於亨衢尚淹遐武露龍鱗於錯節自試長才昨聞秋潦之餘適值歲祲之病細民相視固有空頥荒政具修皆無飢色繇此可書於優最即當徑入於修門炎流落陳人浮沉拙宦志未忘於仰祿才不足以佐州恃寮友之切磋兾能聞過贊教條而關决庶免瘝官上張總領分教泮林嘗藉計臺之庇攝丞支郡又瞻使節之光有天幸而能然如自謀而至此况視前車之顛覆尤依夏屋之帡幪某官行應四科學包六藝緬懷先正勳勞在盟府之藏今見名卿忠力篤世家之美洊更劇任茂著真材將漕湘中蘇民情於逺服總儲淮右壯國勢於留都冕旒有北顧之憂襟帶惟上游之重方急采薇之遣戍必先積榖以實邉江漢數屯半天下徑兵之聚湖廣四面給軍中經費之須爰仗信臣肅將隆㫖望獨高於喬木禮宜備於皇華既士飽而馬騰亦粟陳而貫朽武昌風月清談無取於元規赤壁江山英氣可追於公瑾熟籌疆事歸贊廟謨明良相遇之難已親逢於熙運公侯必復其始當力纘於戎功炎起自孤生安於拙宦強顔為縣不無傷錦之羞妄意佐州復有懲羮之慮方俯啄而仰顧孰右挈而左提雖曰恪勤要在米鹽之必計如其遲鈍尚期轡䇿之少寬免曠微官實慿大造賀趙提舉近輔解符大廷出節澄清所寄遣膚使以觀風選擇有加命懿親而將指輿情胥慶德意來宣共惟某官系胄出於神明文雅同乎寒素外司天族使之崇信厚而無違入佐地官有以調盈虛而不匱少緩金閨之步聊凝畫㦸之香上念大江以西民更儉歲之患里閭張頥待哺之後政急撫摩州縣摶手無措之時尤期假借遂自股肱之郡來顓耳目之司先聲一聞和氣四逹然雅望素高於中外且明時兼用於親賢誦棠棣之詩豈不懷於召穆閲麒麟之畫亦有取於城陽恐甫駐於華軺即趣還於文陛炎濫叨佐郡深懼曠官當務檢身仰候六條之亷察預欣拭目前瞻四牡之光華贊慶之私編摩罔既賀張提㸃使名加大帝命更新廣一時軍國之儲莫先泉府罄諸道山川之産悉𨽻星軺幸藉庇庥敢稽贊慶某官勝流華蓋今事指南方居璧水以談經聲已高於周士及入金閨而通籍望遂冠於漢庭右府編摩外臺斂散雖階華要未究猷為孰能操天下之贏資要在考古人之圎法盡權實貨專任真材赤仄大錢不待三官之鑄黃金上幣兼充二等之藏竊謂儒先出逢昭代其宿學宜讐書於東觀其清文可揮翰於西垣恐持節之鼎來即賜環而趣覲炎懼叨佐郡喜獲事賢自顧拘縻雖難瞻於四牡有懷悃欵輒仰貢於雙魚賀張提刑光膺中詔移按祥刑地環江右者十州寄乘軺之亷問境接鄱陽於一水同衣錦之光華望實素高恩威易洽某官清通而知逺簡易而有文閲中興諸老之賢孰踰先正歷膴仕四朝之久益振家聲湓浦偃藩湖濵將指上心求舊深思喬木之世臣臬事持平無易皇華之膚使况此俗工於訟牘繇其家習於刑書遂煩四牡之驅馳仰逹九重之欽恤以清明而察其浮僞以寬大而息其紛爭佇徯褰帷當無珥筆然睿主龍飛之始乃真才鴻漸之秋恐攬轡之鼎來即賜環而入覲炎懼叨佐郡喜獲事賢居近鄭鄉慕誼固非一日身瞻漢節依仁獨有二天頌咏惟勤編摩罔既賀趙帥光膺一札就鎮十連攬膚使之繡衣久煩攝事開元侯之幕府今乃為真條教素行歡謡增慶某官嘉猷經逺深識見微昨自郎闈出當戎翰其䇿事如輕車之行熟路其撥繁如利器之剸盤根報政既成亟上夔門之節還中有漸來乘楚尾之軺屬大廷謀帥之難且方面偃藩之闕擁雙旌而將漕聮三組以兼官孰踰文武之全才終畀兵農之重寄煥壁奎而進直跨章貢以分符以惠慈綏四野之耕桑以整暇總十州之步騎然睿主龍飛之始乃真賢鴻漸之時授任專城雖有加於眷倚遄歸清禁始大展於經綸輿誦云然宸心可卜炎曠官是懼佐郡何堪三月于兹已積素餐之譏誚二天在上倍懷丹悃之瞻依咏頌惟勤編摩罔既賀陳運使天廷出節澤國乘軺申命維新獨奉計臺之使指選才已試無踰延閣之儒英望實素高恩威易洽某官識精而學奧志定而氣全司出納於南宫知足用裕民之要正稽違於右轄有奉公振職之稱小出緒餘未攄素藴屬淵𠂻之重外寄清視以觀風權義利於重輕寧急舉鞭之算謹德刑於先後豈專持斧之威遂增六轡之光華來導九重之志慮藉甚先聲之美藹然和氣之浮苐泰道之方亨值離明之繼照以辨博參稽於國論以忠嘉啓沃於君心宜有追鋒按部難淹於鶉尾即聞前席班朝首綴於蛾眉炎無以佐州未能忘祿方自憐其坎壈乃獲近於帡幪小吏之事上官當恪遵於約束晚學之從先進又有覬於品題贊慶惟深敷宣罔既上周丞相名位至於絶百寮斯難攀附道德足以服一世可不依歸况善類宜有主盟則來者固無絶法飛走之從麟鳯殆欲去而莫能山海之集㳙埃未有辭而不受輒伸悃愊仰瀆威尊某官命世真儒爽邦良弼從容造膝贊揖遜於睿謀懇惻沃心迪清明於初政號召四方之豪俊鋪張萬事之規模風采凛然肯燕坐江沱之表浮言過矣何毁傷日月之明敬惟元老之去留實係本朝之輕重願從赤松爾豈昔賢之雅懷當如蒼生何有天下之同欲况值皇明之繼照正資耆德之告猷雖優游固可以保身而繾綣豈忘於體國其重望則在廷之九鼎其深謀則當寧之元龜恐逺人必問萊公不宜在外苟中國既相司馬又復何憂人心有孚天意自定炎起家氷冷隨牒陸沉年不後人時無知己妄欲通名而自獻初非附勢而有求士上龍津皆受三沐薰之賜身行驥坂亦期一盼睞之榮占小己之賢愚在片言之可否賀趙提刑淵𠂻所向天指有加民吏聳聞益尊嚴於持斧山川不改無勞勩於乘軺協氣滋多歡聲逾洽某官係時宿望為國茂親分漢郡守之符治高近輔持周行人之節望著皇華千艘內給於日畿六轡偏行於澤國其風采精明而可敬其教條簡易而不煩上念祥刑欲逹虞廷之欽恤孰能淑問少懲楚俗之輕佻乃煩棠棣之賢暫聽甘棠之訟况清明之初政資夾輔於諸公豈淹耳目之司即在股肱之列炎佐州何算曠職是憂既無一日之長難於自免幸近二星之次照以餘光贊慶之私編摩難寫答歐陽倅熊軾在前愧乏題輿之譽龍門居右喜諧傾蓋之私輒修敬於尺書預通名於丈席某官操修清介醖籍溫醇究撫字之心嘗不卑於墨綬二藩宣之政亦聊擁於緹屏顧兹一壘之封限以重湖之阻半刺雖分符之亞未展猷為諸公有推轂之言宜升華近即見賜環於帝所詎容稅駕於里居炎妄意攝官何能佐郡如將弛擔值從者之未行尚可負牆聞仁人之餘論答劉監酒逺宦棲遲偶在八龍之里高情灑落驟來雙鯉之書欣㑹面之有期愧馳詞之不敏某官摛文華贍秉德清修鬱喬木於百年家聲猶在騁驊騮於千里才氣無前暫安管庫之卑以養搢紳之譽涵今茹古益新黃絹之色絲發䇿决科當復青氊之舊物炎仰高甚久披霧無因豈意是行獲酬所願逡巡傾蓋可攄棠棣之思勉強抽毫莫報木瓜之贈回江宣義東朝衍慶北闕疏恩嘉黃髮之修齡賜緑衣之新命某官儒流前輩昭代逸民緬想幽居有擊缶引觴之樂决知雅志無彈冠結綬之思然子心必貴於顯親而帝德方均於錫類喜夫婦康寧而偕老值朝廷希濶之殊榮庭户增輝里閭改觀異王符之縫掖徒號潛夫笑德曜之荆叉空隨高士方圗奏記遽辱貽箋齒雖宿而意新深嘆屬辭之妙麗年彌高而德邵尚期承教之從容喜愧交懷有言莫盡回崔秀才力役先於溫户法所當然追逮及於寒儒吏安取此薄正舞文之迭遽承執贄之恭閲㸃綴於華箋知沈潛於黃卷既免訟庭之牒訴可專黌舍之修藏然籍𨽻民雖受地一廛而勤動若登仕版則占田千畝而安閒因險阻之備嘗請激昻而自奮用酬來貺少效愚𠂻尚兾高明特垂鍳察謝沈察院北闕上書合俟刑於司敗西垣出命驟假寵於成均恍如得仙疑以為夢且今日求言之匭如古人進善之旌當離照之初升蓄乾剛而未發權臣跋扈僞黨附離人誰無私專欲排於利己事既太甚曽不畏於欺君動震怒於雷霆投渠魁於魑魅丕顯龍飛之華旦旁羅鴻漸之真賢乃採嘉謀以裨新政豈無智者之慮安用狂夫之言如炎者粗讀古文不知今事亦欲求於富貴圎枘方穿孰肯薦其姓名左書右息政緣氷冷遂至陸沉蒲栁之質望秋髮雖種種葵藿之生向日心則拳拳願輸一得之愚仰徹四聰之聽書既成而復毁意欲却而更前竟干蕭斧之誅盡獻芻言之陋鈞天帝所烏知蟣虱之微臣璧水英躔忽玷鵷鴻之末綴出綸有自推轂為誰某官德備清和氣函剛直鳯九苞而為瑞識者心降豸一角以觸邪聞之膽落薰蕕無臭玉石自分坐致朝廷之清明因搜人物之淹滯青雲今日未易攀援白首同年自甘流落何一貴一賤之勢異而三沐三薰之意勤殆欲與之同升不使終於獨困拔於散地置在勝流自省何人可當此選未憂博士之得咎先慮諸生之見嘲炎敢不仗此挈提起其衰懦籌當世之務非矜掉舌之空談講先聖之經必使洗心於僞習儻無曠職是曰酬恩回蔣教授才識之優素聞第一師儒之選果見無雙得龍友於渥窪空馬羣於冀北某官鈎深學海掞藻士林八卦六爻研羲文之妙㫖一風二賦振屈賈之遺音負此兩長超然獨步暫時緩帶肯處諸侯半璧之宫不日曵裾徑登上帝羣玉之府豈圗孤陋獲識英髦健筆驚人共嘆陽春之寡和高軒過我乃䝉明月之暗投藏以為榮報於何有謝張尚書代諫坡承乏初無補衮之忠起部升華遽玷出綸之寵處非其稱愧溢於榮某非有長才素安拙宦久更州縣之役誤被聖明之知凡十薦而齒周行不三年而聮法從晉居騎省兼侍金華既未能盡五諌之規亦無以發六經之㫖苐欲明於國是義不顧私嘗力詆於邦誣言多咈衆方祈補外以避咎乃更留中而得遷顧晚節之浮沉遂班常伯念平生之夢想不到文昌自視歉然何由得此某官承家文獻許國忠嘉御衆牧民分吾君之憂顧好賢樂善如先正之公平靖言僥幸之多必借游談之助方圗叙謝遽䝉賜錦繡之章但喜拜嘉終莫致瓊瑶之報賀張尚書代一札疏榮十連移鎮赤文緑字冠學士之清班絳節碧幢開元侯之幕府教條風動民氣春回某官敏識照微宏才經逺出遇孝宗之神聖遂亟上於亨途仰承魏國之忠勤將大恢於前烈乃由武部洊偃價藩壯邉瑣之金湯謹陪京之管鑰賢勞如此王覲何遲正緣謀元帥之難且復借中權之重披圗輿地撫一道於西江占象璇霄煥二星於東壁消里閭之愁嘆變旗幟之精明既訖外庸上心所向即還近列僉論攸同某厠跡日邉受廛宇下擬謄書而未果愧貽問之相先久隔英姿思聽漢庭之革履既知世德請賡鄭國之緇衣回丁茶馬代諌省充員甚慚無補文昌分職乃獲超遷靜言徼幸之因殆有游揚之助某官敏鋭而便煩劇激昻以赴功名歷井捫參萬里肅將於使㫖摘山市駿六軍增壯於戎容裔夷信服其亷平屬部聳聞其風采泛閲當今之人物孰踰執事之才猷豈無裏言猶在外服有如戇拙洊列清華欲修謝而未遑辱貽音之下逮木瓜有贈不能視施而酬茅茹同升但兾勞來之喜回吳兩府代擢司事典甫再閲於旬時晉長兵曹遽洊膺於新命殆因長者之借譽遂玷公朝之誤恩某官貴重至於上公清苦同乎寒士居京師奉朝請絶無悔吝之疵開幕府班教條輒上循良之最醖籍之美雍容可觀左戚右賢雖曰祖宗之舊典經文緯武孰知天下之全材宜繇肺腑之親入在股肱之列某自登朝著獲際下風竊揆雅懷蓋尊主庇民之是念孰觀曠度亦好賢樂善以為公故此超踰出於推挽未遑叙謝先辱貽音櫽括之工文從而字順金珠之重意盛而禮勤徒極銘藏莫酬珍貺回朱經幹上書論事自哂其狂倚席談經甚慚非據誤被聖明之采擇殆因朋舊之吹噓恭惟某官學知本原文有典則始偕郡計早飛第一之聲旋入郊庠果見逸羣之氣詎宜屈高士以主簿聊復為上客於諸侯蓋舂容旁薄而其進也徐則演迤淵淪而所行者逺將益充於器業以大奮於功名顧惟學問之荒濫處師儒之後方圗叙謝遽沐貽音八桂間關念故人之方逺雙魚繾綣感厚意之難酬銘佩之私編摩莫既雙溪類稿卷十六
