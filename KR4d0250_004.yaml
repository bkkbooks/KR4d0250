body:
  text: 雙溪類槀卷四宋王炎撰古律詩春日叢桂書舍偶成二首江潭所作芳草青青晝掩關倦遊心緒歎重山寒生怪雨盲風後春在斜陽暮靄間杜宇勸人歸小隱桃花笑我欲蒼顏腐儒未解謀生理魚蠧陳編不自閒簷頭燕子話新晴客裏春來何似生短榻曲肱眠未穩好花刺眼笑相迎生憎重碧杯中物懶趂踏青江上行燕坐翛然有佳處耳根更聽讀書聲用前韻答彌明聖言二首清晝渾無客叩關不知春色滿溪山少年側目雲霄上今日藏身翰墨間揮麈逢君談世事舉杯為我變衰顔歸來更倚繩床坐賸得勞生一日閒遊絲落絮弄春晴挽我花邉喚麴生挈榼在門驚剝啄褰裳出户喜逢迎小園曲折藏三徑暇日從容共一行且復解頥談衮衮聖賢深處不容聲冉用前韻答繼周丈二首雲路鵷鴻度九關誰知霧豹隱南山追懷先世交朋舊幸拜英姿丈席間歎我壯年猶白髮知公有道養朱顔運斤肯試成風巧當許摳衣侍燕閒士女春逰喜得晴焚香燕坐太清生繞枝烏鵲如相語排闥青山不待迎倦客琴書來寓處前人杖屨昔經行平生父黨惟公在發藥宜聞謦咳聲家僕來叢桂告米粟不繼來時花栁未全春燕子將雛已夏深破鏡望中占逺信扊扅歌裏有悲音青衫得祿猶彈鋏白髮欺人欲上簮築室買田謀小隱探囊何日有黃金書舍遣興二首意裏謀功業閒中度嵗年詩囊渾漫興酒榼更無緣久客荒三徑歸耕缺一廛懶扶藜杖出回眼入陳編二山好晴邉出風微雨後凉憑欄幽鳥語步屧草花香塵事何時了浮生有底忙此身垂老大不自决行藏即事桑盡蠶皆繭秧成麥已秋山雲翻黑雨溪樹沒黃流紅粟方翔貴蒼生未病瘳茅茨烟不起飽飯得無憂賀吳繼仲母氏生日青都仙子玉鍊顔五雲深處乘青鸞桃花欲實王母老桂花半落嫦娥寒芝英瓊蘂薄滋味絳霄倒景窺人間風微水麝香可掬雨定海榴紅欲燃中州風物亦自好翩然萬里來雲軿潭潭院落春不老别有日月藏壺天狻猊不動烟縷直吹笙伐鼓開賔筵九重紫誥照環佩兩兒緑綬扶金船南山可平海可竭髙堂歡樂無窮年清化寓居委巷何深僻僑居太寂寥古墻行絡石喬木上凌霄賦就貧難逐詩成隱莫招固窮吾輩事心地要逍遙秋旱得雨下田出龜兆髙田半黃埃禾穗槁欲死益以蟊賊災鉦鼓競禱祈民病神所哀劃空走笑電隱地鳴怒雷雲將為前驅頗送甘雨來老稚喜欲狂稍覺生意回雞豚賽秋社屈指篘新醅米價免翔貴我亦懷抱開凉聲繞松梢披襟可徘徊執熱汗如雨得此亦快哉短歌當氓謡因以侑一杯夜坐偶追悼豬哥不覺流涕因以絶句寫其悲三年娠孕疑希有千里鄉關不共歸旅殯新墳今宿草西風老淚更沾衣除夜官舍獨坐此以下潭州所作半世更憂患微霜入鬢邉旅懷尊有酒官况客無氊故國踰千里浮生又一年遙憐小兒女今夜話燈前到城南園瞻南軒先生遺像入門荷香净步屧栁隂濕欲寫情鬱陶翻引興蕭瑟瞻望堂中人玉色而山立六學妙經綸未試百之一身存天下望身沒海內惜此道付誰傳丹青但陳迹樓邉好山近竹底凉風入兩鶴韻亦髙導我轉湖側獨遊何太清滯念亦可釋門關莫返鎖願言日散䇿用前韻答彪講書薄遊城南園墮睫衣袂濕斯人既騎箕有客猶鼓瑟凛然氣如生可使懦夫立當時道義交彪子居其一嘗試問所疑傾倒無吝惜逝者不可作往訪杖屨迹欲返更徘徊逺岫邀日入緬懷經世心伐輻置河側立朝道不容憂國意難釋敢負門下知晨夕自警策送李侍郎歸衡州二首繫纜南風直轉柂北風微輕雲載雨來凉意生綌絺江神真解事穩送六幅蒲篷忩卧胡床鷗鷺相追隨落帆衡陽岸新舊迎公歸兒童競挽袂父老前捋鬚明時有勇退晚嵗善自頥稍添數髭白不改兩頰朱松菊對主人亦自清而腴門外無車馬室中但琴書青鞋時出逰不用藜杖扶翛然萬物表意得樂有餘乃知上要津不若還幽居道重物自輕心清內無欲未定胸中見難行天下獨冠蓋上青雲著鞭競馳逐南山有德人一笑遺寵辱巋然殿諸老足以鎮浮俗一出上禁林再出擁牙纛本無圭組纍歸去便野服譬如山中雲潤澤滋草木未雨出嵓岫已雨反幽谷明月共樽罍清風滿松竹問誰從之遊韋編能熟讀人生了婚嫁意願何時足儻肯割半山誅茅從卜築和謝安國求硯靈均葬魚腹賈傅問服臆挽我來訪古窮鬼信有力敢恨客氊寒私喜無吏責稍稍集韋布時時論文墨濯纓湘水清拄笏湘山碧陶泓耐久朋笑我𤣥尚白今代謝叔源人物居第一詩來招石友願費黃金鎰氷絲固希有霧縠亦罕得何以報明珠更覺意羞澀回首歙溪上寂寞子雲宅當求玉堂樣特來獻詞伯胸中五色絲一用可華國視草須若人擕之上文石和謝安國韻虎豹嗔人上九關不妨拄笏看雲山家聲元是封胡後人物還如晋宋間解組聞公真有意折腰顧我亦何顔故園無地開三徑敢說歸耕是等閒送謝安國歸清江軒冕喜而憂山林靜而閒寵辱皆妄事請看槐夢安世人悟此少低頭縳微官足跌尚欲趍翼倦不肯還謝公湖海士著眼髙塵寰心如玉壺氷當暑氣自寒懷璧不願市懶上青雲端親朋勸之仕晚出彈其冠未令據槐㕔亦合登蓬山造物拙用大束帶來侯藩掉頭厭多事袖手思故園眉間已黃色鏡裏猶朱顔家住玉笥西别有壺中天千畝稻秫肥三徑松菊繁妙得詩酒趣小作杖屨緣鴻飛霄漢外蟬蛻塵埃間我方自窘束仰屋坐長歎欲仕苦無津欲歸苦無田野鹿念豐草老驥困短轅終當抱琴書從公掩雲關題王倅來泉寒泉一竇行修渠日夜輸來為納湖荷花菱葉並籬落平分十頃青玻瓈錫山老湫暗流注此泉疑自玉龍吐問公泉中何所有明月可弄不可取又題巢林闤闠深居似林谷緣坡手種青青玉市聲不向耳根來蒙密中間深結屋鷦鷯但願巢一枝鸞停鵠峙意何如青雲千級風在下飛翰穩去摩天衢過浯溪讀中興碑日光玉潔元子辭銀鈎鐵畫顔公書百金不憚買墨本摩挲石刻今見之猗那清廟久不作其末變為王黍離春秋一經事多貶魯頌四篇文無譏漁陽鼙鼓入潼華公卿徒步從六飛朔方天子扶九廟京師父老迎千麾紫袍再拜謁道左上皇萬里旋鑾輿牝雞鳴晨有悍婦孽狐嘷夜有老奴扶桑杲杲未翳蝕但歌大業吾何疵首章義正語未婉前輩不辨來者疑正須細讀史克頌未用苦說涪翁詩許張徑節震金石李郭壯武如虎貔斷崖蒼石有時泐諸公萬古聲烈垂天憐倦客有所恨雨濕江寒催解維神州北望三嘆息翰墨是非何議為和趙行之三首未暖栁梢緑已暖花梢紅胸次有天和本與春意同士戒溺于欲物忌居其雄西山有理窟一室惟清風二義利毫髮間其末分舜跖葛藟多攀援喬松但孤立陽鱎貪芳餌鵷雛食竹實知道貴含光露牙多召敵三轉㗋有觸諱拭面或逢嗔刳心踏風波未免悔吝生葵猶衛其足况此千金身山林本逍遙無虞莫從禽湘中雜咏十絶朝陽嵓下莫雲冷冉水磯邉秋樹深欲弔元和栁司馬溪山無力挽歸心江樹踈踈兼密密雲根怪怪復竒竒風光冷落無人問付與漁翁理釣絲昨日北風頻打頭今朝風定却安流江山如畫供詩眼隂雨無端釀客愁有懷冉水栁司馬更憶浯溪元道州仕宦兩公俱落莫斯文千古共傳流順流鳴櫓不論程上水開帆取次行逆順自從人意轉風生波湧本無情江天雲暝雨垂垂日暮移舟口岸時拈筆欲題還袖手細搜摩詰畫中詩中流四顧浪花平雙櫓夾船鵝觀鳴欵乃聲中山水緑不妨緩緩計歸程蕩槳妨人擁衲眠篷忩細雨濕炊烟江神念我怯行險收却風波穩放船江頭昨夜雨何似新漲平添一丈强倚柂穩如天上坐順流明日到衡陽舴艋輕輕載短簑蘋花風急起滄波憑誰喚取𤣥真子更作湘中漁父歌秋懷二首鏡中忽忽老侵尋政坐文窮自陸沉獨對西風搔短髮欲謀小隱背初心江湖鴻鴈天將冷籬落黃花秋又深拄笏看山聊爾耳懶彈緑綺索知音朅來雲夢澤南州風物蕭蕭兩見秋三徑草荒真左計一官氷冷更何求莫招毛頴論時事且喚麴生澆客愁短艇輕蓑良不惡此心何敢負江鷗遊嶽麓三絶湘山湘水極清逺特地來登百尺臺不盡胸中丘壑意又從沙尾喚舟回百級蒼珉到佛宫汲泉煮茗聽松風不須騎鶴摩雲去只要心遊碧落中山椒却立小遲留欲傍江山洗客愁不覺憑髙來逺念此心潜與水東流冬日書懷四首治身如治玉所貴無瑕疵玉美不願市身修豈求知人生為糊口乃爾斂板趍漸失兩鬢青莫浣雙袖緇勿用懷不平張急聲易悲韲鹽雖淡泊義理極雋永士唯知此味未語已相領同流有淄澠何用勤造請不敢眼青白口諾心未肯平生環堵中三徑自氷冷客來倦捉麈客去徐挾書兒曺厭官冷數問何時歸豈知庇風雨未辦蝸牛廬老我懷百憂又自一解頥雨流木偶行久矣無定居結茅緑隂下四壁但圖史時亦有好事相過欵名理捨之學宦遊蓬轉不自已豈無山水音塵埃被緑綺幽夢繞雲溪拏舟弄清泚雪中官舍獨坐聞薪炭翔貴因成長句天寒吹墮一尺雪官冷釀成千斛愁酌酒到花非所欲束薪如桂若為謀風前鶴氅誰擕策江上漁蓑自艤舟憑仗六龍回日轂稍分輕暖到南州蕭參議雪中宴客朱僉判有詩因次韻飛花落絮自何來勾引詩翁酌梓罍濯鼎有冰宜煮茗擕笻無路可尋梅江城瓊玉踰千頃古錦珠璣溢百枚聞道夜䦨車馬散難窺寉氅御風回不慣長安曵履遊貪看氷柱滿簷頭素花一色如梅嶺碎玉無聲缺竹樓蠟炬欲殘方夜永金叉半醉自春浮無氊獨坐君知否也捲陳編索酒舟和林寶文鹿鳴宴韻材如杞梓總堪論氣壓龍媒定躡雲畫㦸凝香供張飲彤墀射策待方聞月中折桂雖堪喜馬上看花未足云憂國愛君伸素志始酬勸駕意殷勤和林寶文喜雨山椒靄靄暮雲徂一雨翻盆物盡蘇父老相逢笑相語今年和氣舊時無豐年謡五首滿箔春蠶得繭絲家家機杼換新衣五風十雨天時好又見西郊稻秫肥縱橫南陌接東阡婦餉夫耕望有年前此丁黃飢欲死今年米賤不論錢洞丁猺户盡歸耕篁竹無人弄寸兵要識二天恩德廣黃雲千里見秋成睡鴨陂塘水慢流離離禾稼滿平疇共言官府催科緩飽飯渾家百不憂稻如馬尾覆溝塍桑柘隂中雞犬鳴收穫登場便無事輸租人不入州城和林寶文吹暑軒二絶木末長風送雨來田家逺近稻花開披襟燕坐黃堂靜一笑江山爽氣回藕花香裏畫船橫人靜惟聞洗玉聲四野清平公燕喜隱然方面有長城再和林寶文三絶要知好雨自何來和氣連雲撥不開廊廟為霖須妙手即看力斡大鈞回千里山川含秀色四郊雞犬散歡聲更呼屏翳從頥㫖潤澤無邉浹屬城陽開隂闔四時更誰解均調玉燭明畫㦸香中沛恩澤祥風甘雨自流行李閣學挽詩三首代林寶文物望推耆哲巋然可鎮浮莫年登近侍再起殿南州不樂分銅虎方期杖玉鳩胡然歸未久仙去杳難留二止水中心靜浮雲外物輕行藏無悔吝存沒備哀榮士類思前輩朝廷失老成衡湘人物盡念舊若為情三頻嵗仍饑饉三湘要撫綏分憂承帝命遺愛結民思自有欒公社何須叔子碑若書耆舊傳清德不磷緇魏丞相挽詩三首代林寶文士論崇髙節宸心眷朴忠調元才玉鉉均佚即琳宫補衮嘉謀密平衡道揆公惜哉當國淺不及究成功二冠劒青雲士艱危孰奮身向來持漢節徑去犯邊塵既用公為相方知國有人凛然生氣在端合畫麒麟三衮繡遺三事松梅共一川小溪空勝景先隴忽新阡上悟流言妄人思舊弼賢忠嘉雖削槀合付殺青傳黃致政挽詩二首後學資模楷先生久里居兩兒聨玉筍三命佩銀魚米廪無重席蓬山孰校書如何遺此老宰木遽蕭踈二祿養更迎侍消搖介夀康壯圖雖偃屈潜德竟輝光可惜今埋玉無由自奠觴他年觀上冡千騎擁龍岡賀東宫誕辰代林寶丈萬國乾符正千齡鼎祚長春禖膺眷顧甲觀肇休祥紫極聨前曜青宫位少陽五雲凝喜色重日爛榮光繼體臨崇福承顔侍未央犀簮羣后表象輅兩宫旁氣接金行爽天開火德昌慈皇年有永大帝夀無疆欽愛誠彌篤溫文德自彰喬枝方疊䕃瓜瓞寖垂芳儲禁銅扉肅官僚玉佩鏘旌麾張十㦸筍簴列三廂恭命來南紀馳情望左坊也叨持虎節莫預獻鸞觴海潤涵羣彚霞騫映四方願言申戬榖夷夏仰元良和王右司遊南嶽得晴笑披鶴氅上坡陀風籟無聲日氣和絶頂瓊瑶蒙竹樹上方宫殿隔藤蘿雪花夜墮方如許天宇晨開豈有他一㸃春陽溫厚意積隂消釋自無多和蕭參議遊嶽麓八絶登臨須返意須留目力無邉不著愁收拾風光歸古錦千嵓萬壑獻清秋逐客當年出帝鄉不容蹤跡到黃堂蒼崖屐齒今安在公獨懷思未忍忘憑欄落照俯江天睥睨詩翁翰墨傳試為江山重著語筆端桃李恰爭妍泉繞雲根玉雪清蒼珉百級可階升汲泉煮茗松風起誰識無塵有髮僧清風峽裏水清泠不但琮琤可靜聽秋桂秋蘭在深谷更堪鼻觀挹幽馨每到精廬即少留品題清境甲湘州遊山腳力猶强健緩步曽登最上頭蕭寺相望湘水西談𤣥誰解析精微聖門自有超凡地懶向林間問衲衣近來曾與二三子凖擬誅茅紫翠間老石摩挲堪篆刻恨無筆力記西山和王右司遊南嶽三絶懶跨狨鞍趂曉班却穿蠟屐小遊山山頭草木生光彩玉節曾行紫翠間喬嶽雄于楚粵間衆丘迤邐釀髙寒青藜拄到雲霄上見得心如眼界寬祝融獨秀壓羣峯登覽雖終興未窮人物與山爭峻特也宜班爵視三公林寶文生日乾健運元氣斗杓默回旋千嵗生一聖半千生一賢間世有異禀天意非徒然皇極在人心俗學無自得天意興斯文公獨抱深識微言發緒餘河漢浩無極士氣久不振罷軟無剛風天意眷吾君公獨奮精忠雷霆不能驚正色攖神龍膏澤不下流閭閻有憔悴天意佑斯民公獨藴慈惠春風小披拂萬物回生意既賦以全德必益以夀祺其顔如渥丹天意可測知再拜上黃堂一洗玉屈巵戬榖既鼎來何以致祝辭在外守麟符十連蒙寵綏在內調金鉉四海無憂虞邦人丐公留天子遄公歸臞儒願控鶴雲路從先驅和王右司回鴈峯韻宦途多逺遊王事無寧居人生亦何求意足即有餘候鴈到衡陽不肯更南去達人識其幾青雲首回顧不受寵辱驚進退皆裕如平生金石心此詩豈欺豫田園歸去來千載淵明語妙句當並傳來哲定深許送王右司移江西憲日邊好音來繡斧移軺車九重寄視聽四牡煩詢咨才德難兩全有即時所須平生經綸學豐蓄乃嗇施底柱閲頽波去就難招麾湘濵督飛挽未曾費符移舉鞭有流錢民瘠亦自肥攬轡不可留父老結去思星臺照芹水寒士增光輝心旌繞門䦨意往身縶維叱馭豈憚行願言謹馳驅遙知章貢上喜色生里閭舊聞珥筆風家有城旦書公行將直指淑問如臯蘇桁楊無幽枉雨露皆沾濡東望尺五天入覲聊假途善類望主盟至尊渴謀謨正須畫麒麟未用思蓴鱸和馬宜州卜居七首卜居一丘一壑胸次來在市廛結廬只恐飛騰燕頷未容袖手深居足堂身外成虧萬事人間寵辱百年絲毫不挂念慮一榻清風晝眠復齊哲人欲不喪道昧者是難勝非學貴復之不逺在知心體危微退圃爭利欲心汲汲爭名私智閒間公獨退身一步靜中著眼回看欣欣亭卉木俱含喜色日迎杖屨床前晚秀早芳相續四時留得春天氷雪軒史君甚愛竹弟欲與渠為二難嵗晚青青玉立不須俗眼同看白蓮池處士幽居安在荷花十里西湖無謂一池褊小以人為重何殊九月到白石先妣塋所此以下自長沙歸鄉所作不瞻宰木過三年霜露凄凉倍愴然馬鬛但驚荒宿草龜趺未辦表新阡平生鍾釜空遺恨舊物杯棬半不傳鴻鴈差池風雨急吞聲清淚徹黃泉次韻胡元龍擕詩相訪杜門度永日蒼苔生栁隂欹枕喚黃妳頽然厭披吟剝啄來者誰一笑逢知心試歸與婦謀無酒堪共斟解頥只𤣥談清風拂衣襟奚囊出妙語戞玉而鏘金為公歌數詩絃以緑綺琴歡伯舊有盟可寒猶可尋丙午中秋夜玉斧經年不暫閒修成今夜月團圓老蟾是處光皆滿飛鵲如豫意未安免與朋儕爭翰墨聊呼兒女具杯盤飲酣尚起飄然興欲訪羣仙到廣寒次韻李仲永擕詩相别將赴臨湘李侯人物極清真氣似靈犀可辟塵平日論心思益友而今刮眼見詩人有官墮在蒹葭境為政恐無桃李春撫字要須寬猛濟誦公佳句合書紳和至卿叙述三首長年英氣易消磨窮達其如有命何進德要須涵養熟讀書不在見聞多揮犀欵曲思君話烹鯉殷勤約我過鏡裏素絲侵緑鬢著鞭聖域莫蹉跎木偶漂漂無定蹤歸來依舊嘆途窮與君趍向元相似涉世行藏略不同縱使寒松生澗底也勝澤雉蓄樊中一丘一壑平生願他日俱為桑苧翁襟期難與俗人論擺落浮名莫絆身妙理自能中酒聖清談不肯問錢神世情一任手翻覆此道元如肘屈伸隱約形容不枯槁秪應胸次有陽春和至卿述懷二首管城脫帽即詩成尚挾琴書困筆耕自可追風千里去何妨警露九臯鳴心于外物無榮辱身與虛名孰重輕醉裏工為青白眼定應阮籍是前生老氣軒昻驥躡雲丘園盤薄不求聞詩方平淡如摩詰人亦清真似右軍無以為家那得爾幸哉有子不徒云鳯雛自是堯廷瑞翰墨場中早䇿勳弔禰正平并序此以下臨湘所作蜀人韓毅伯遊武昌作詩弔禰正平専詆黃祖祖不足責其言蓋有為而發也昔孟子謂盆成括小有才而未聞大道則足以自殺其軀正平未免坐此就東京人物論之郭林宗徐孺子黃叔度之樊墻正平未能窺也乃書數語述此意曺瞞忍殺楊德祖不敢復害禰正平區區黃祖雀鼠輩乃以嬉笑生五兵才雖可愛亦可忌人間險過羊腸路不鋤驕氣禍之媒祖也不仁衡未智黃鶴樓前江水平鸚鵡洲邊春草青憑君酹酒弔孤冢古來賢哲非貪生處士一死泰山重文舉一死鴻毛輕和韓毅伯知命春風盎盎杯中酒流水潺潺膝上琴箇裏有人真得趣槐安一夢莫關心和韓毅伯求鹿皮韻文豹以皮豜以肉鹿兼坐此命難贖梅花膚革充鞾材人恰跣行畏傷足次韻韓毅伯病瘧胸襟玉氣吐長虹扶老猶須藥物功示病維摩非實相戲人瘧鬼助文窮筆頭排悶詩千首甕面消愁酒一中無悶無愁始安樂此身何日不春風次韻韓毅伯謝人惠茶一線金沙泉脉來官焙初香春未雷雲龍小餅到天上露芽濯濯千嵓隈縑緗空滿石渠閣鴻漸經成方有託喚作酪奴真薄夫雪乳雲腴何可無哦詩舌本費澆灌畏遭水厄徒拘拘豈知佩印乘軒客醉飽犧尊羊鼎側要試江山第一泉紫鳯盤旋蒼璧圓書生品味惟三九性自嗜茶如嗜酒和韓毅伯述懷洗盞從容對聖賢笑談未了意悽然折腰我既慚陶令肆志公宜學仲連三沐三熏嗟已晚一觴一詠樂餘年人窮愈甚詩方好留取珠璣向後傳雙溪類槀卷四
