body:
  text: 雙溪類槀卷十二宋王炎撰表賀重明節表禮部郎官望氣鬱葱紀千秋而志始游心淡泊増萬夀以儲祥夷夏蒙休山川貢瑞恭惟皇帝陛下成功不宰藏用難名上仁為而無為民莫知於帝力神䇿朔而復朔德自合於天心渾然太極之函三繼以重離之明兩逺符禹啓下視喬松臣等幸服邇聮親逢華旦絲嚢金鏡嵗申喜慶於人間鳳輦龍樓日仰孝慈於天上賀瑞慶節表神聖方興是日肇非常之慶華夷咸頼自天増有永之年歡洽兩宫貢來九牧恭惟皇帝陛下聰明秉籙熙洽題期上仁為而無為自得長生之道神䇿朔而復朔是開受命之符發祥佇見於多男介福永承於王母按六經而校德克傳舜禹之中參萬嵗而成純下視喬松之夀臣等幸逢華旦獲望清光非煙非雲長近漢庭之瑞氣如山如阜願賡周雅之和聲謝郊祀赦表嚴精禋於泰畤茂對神釐發渙號於端門俯從民欲散為和氣薫作升平竊以天覆物而好生聖配天而同大故親祠於三嵗必均慶於萬方恭惟皇帝陛下鞏固丕圖欽承慈極上帝監馨香之明德可以告䖍斯民待惠澤于下流為之錫福備成熙事誕布鴻恩開以自新洗愆尤於犴獄樂其共利蠲逋負於閭閻根荄畢遂於生成雨露無私於滲漉臣逖聞奠玉有守分符瞻仰魏闕之遙未能就日倍喜置郵之速無不回春謝厯日表璿璣不忒職在日官鳳厯惟新布為時令庸示守藩之寵俾知敘事之經中謝竊以三百六旬之中四時宜定八百餘年之後一日或差無失其紀以為常必在其中之置閏恭惟皇帝陛下大參天地妙斡隂陽輔相裁成雖本星辰之運盈虛消息亦窮象數之粗用夏建寅如周頒朔臣外居侯服獲奉賜書月要日成當首勤於吏治春耕秋斂務兼厚於民生又清臺測候順天道以惟新温詔布宣授人時而有序叨在觀風之列獲承攽朔之恩中謝竊以八十一分而起元漢厯雖詳於古法三百六旬而置閏堯仁獨厚於農功凡裁成輔相之宜在消息盈虛之節恭惟皇帝陛下彌綸有道通變無窮寒暑平三光全孰越範圍之妙天地順四時當兼明占步之機躔起蒼龍日行黄道釐百工而成務率九扈以服勤載觀玉燭之成和皆自璿璣之齊政臣敢不謹於奉令推以諭民東作西成期嗣嵗豐登之慶春先秋後體至仁温厚之心又法垂象魏將新布治之經政協璿璣先謹授時之節叨奉侯藩之寄恭承王正之頒中賀竊以一元轉二氣於無形太極行三辰於有象往來迭運盈縮難齊自非用智之精莫盡先天之妙惟聖斡旋於造化乃能推䇿於幽微恭惟皇帝陛下出震宅中體乾行健隂陽和而萬物得曲全輔相之宜天地節而四時成奉若變通之序因建寅於夏令參告朔於周官内允百工外同萬國臣敢不遵而作事詳以訓民辰起蒼龍之躔俾趍東作日行黄道之上同慶昇平又辰起龍躔將肇新於嵗序數研鳳厯爰欽授於人時凡在侯方恭承王正竊以日官底日法固重於履端天子繼天義尤嚴於頒朔惟其一大統以賦政可以齊庶邦而勸功恭惟皇帝陛下道妙彌綸誠參化育上稽垂象三辰不失其經俯遂函生萬物各全其性均調玉燭黙運璿璣追漢太初甲子之元行夏小正建寅之始協用五紀允釐百工臣敢不仰體聖心率循時令春先秋後觀八風律氣之和東作西成占五榖金穰之利謝侍讀表代鳩工無補既陞戎部之班勸講何功又進邇英之讀控辭弗允惕厲難安伏念臣才不逮中識非致逺衝風鷁退素安州縣之塵勞少海龍飛忽玷朝廷之清貫自備員於諫省及分職於文昌獲侍宸旒許陪經幄竊揣愚衷之固陋何禆聖學之緝熙宜不掩於瑕疵乃更叨於寵渥況繹舊聞而勸誦將因往事以盡規訓備先朝鑒兼厯代由三晉訖於五季有安危軌轍之殊惟一祖繼以二宗見剏守規模之逺用備燕閒之省覽合資鴻博之敷陳臣實何人身當此選兹蓋伏遇皇帝陛下成能天縱盛德日新逺考先民可知興替近遵家法無作聰明雖羣臣莫望於清光靡忘求助而大度不遺於舊物尚肯包荒遂申錫於綸音俾久親於玉色臣敢不仰承睿眷俯罄朴忠執古道以御今固莫髙於獨智識前言而蓄德願少贊於多聞謝除制帥表代守符假寵方稍幸於偷安制閫分憂乃驟蒙於改命控辭徒切莫返誤恩受任非宜終虞曠職伏念臣樸忠自信拙直少諧適逢初政之清明亟被公朝之選擇首當言責積彈擊之怨仇躐冠從臣無論思之補報既年侵而多病恐福過以生災丐均餼於祠庭尚把麾於輔郡盡憑覆䕶未至顚隮敢期謀帥於坤維遽使充員於人乏身隨漢節職𨽻犧圖内閤班崇中權寄重丹心未折豈無意於功名皓首何為已難勝於驅䇿是不能而求止非以逺而憚行竟閟俞音莫從私願陛下仁天丕冒智燭周知惠恤逺民思固藩垣之助矜憐舊物嘗為議幕之游或諳練於事情可布宣於德意趣之就道雖明令出而必行許以造朝特示眷深而不替望龍顔而結戀浮鷁首以遐征蜀道青天此身易老華陽黒水何意重來誓當竭節以奉公少寛西顧終冀投閒之得請早遂東歸謝冬衣表時權禮部郎官時令有經已及授衣之節聖心兼愛遂推賜帛之恩拜手知榮捫躬増感恭惟皇帝陛下内行禹儉外廣堯仁万遵周禮之始裘嵗云秋矣因念豳詩之無褐寒者衣之乃班在笥之華遍逮充廷之士雖存舊典實出洪私嚴凝變而春温被服資於天覆妻孥喜甚不知機軸之勤勞臣子深情可乏絲毫之補報謝加食邑表代肅路寢以蕆儀備成煕事拓爰田而加賜驟拜湛恩得不因勞受之増懼竊以一人之大賚行於三嵗之親祠雖曰舊章實惟新渥伏念臣宗盟是託天幸最多視公府而班朝列王藩而疏爵有何功伐膺此寵光逮與宗祈尤慚顯相敢意均釐之普及乃先異姓以叨榮兹蓋伏遇皇帝陛下至孝寧神深仁厚下親九族以致其禋祀黙薦馨香斂五福以錫厥庶民遂行慶惠洪私所被左戚無遺俯念孤惸曲荷上心之友愛力防滿溢誓堅小已之寅恭謝賜衣帶鞍馬表代奏徹銀臺俯拜土田之貺命傳丹陛隨頒服乘之華中謝竊以内府襲衣束之寶帶帝閑上駟飾以鏤錫是曰殊榮難乎濫授伏念臣才尤綿薄性復鈍遲獨荷聖神之見憐不嫌名器之多取初非有德乃分在笥之珍況復罔功亦辱解驂之賜茲蓋陛下義雖左戚仁則先親懋賞衆賢以示勸能之意推恩九族又明馭幸之私遂至寵光不遺微陋便蕃如此報塞謂何順以承君庶協為裳之象勤於修已敢忘睎驥之心饒州到任謝表祝釐散史甘弛檐於田廬起廢誤恩濫把麾於鄰郡榮似晝游之繡懼増夕飲之氷中謝伏念臣踽踽獨行栖栖平進晚遇聖神之採擇遍更學館之清華兼攝郎曹躐升戎監得踰其分自速顚隮行負於言徒深懲創方念過都之鷁退敢期出塞之馬歸再閱朞年洊叨新命起之閒館畀以守符雖徽饒一水之相通最為便地而顔范二賢之所治亦號名城第旱澇之相仍且公私之俱困欲施舍則財於何取務趣辦則民將不堪駑緩無庸鴻私難稱兹蓋伏遇皇帝陛下知人則哲御衆以寛捨其舊而圖新俾之改過用所長而去短試以撥煩雖合棄捐特加抆拭臣敢不省躬玷闕厲志廉平因宻邇於里居易講求於民瘼廣朝廷寛大之意專務撫摩消田里嘆愁之情稍蘇凋瘵慰皇太后牋光堯太上皇帝升遐漢宫興慟堯屋告終不堪聞玉几之言無復見彤車之出恭惟太上皇帝游心清靜介福夀康豈意彌留杞國或憂其天墜迄臻大故鼎湖莫駐於龍騰皇太后殿下久共尊榮曷勝傷痛願抑過哀而就禮期偕嗣聖以保邦對越顧成之靈安於長樂之養臣守藩於外奉慰無階莫伸同軌之誠徒結遺弓之恨慰皇帝表慟發九重莫致日嚴之舜孝痛纒六合共懐天覆之堯仁遺誥一傳悲號曷已恭惟太上皇帝游神清靜體道希微因朝覲訟獄之歸未倦勤而授受備富夀康寧之福獨顓美於古今是宜神䇿之難窮豈謂夢齡之有盡乘雲既逝就日何因恭惟皇帝陛下光奉貽謀克全至德雞鳴問寢期解文王之色憂龍上遺弓遽傳黄帝之仙去愛慈之篤思慕惟深然而纂南面之丕圖於以奉東朝之至養願從天下之望少抑聖心之哀臣久荷洪恩忽聞大恤顧竹符分守于外莫望天顔念麻冕返服之初難禁雨泣慰皇后牋遺誥下傳神已乘於雲馭嚴宸追慕痛兼極於坤輿恭惟太上皇帝道濟中興仁登上夀方安受天下之養乃厭為人間之留恭惟皇后殿下孝協帝心順全婦道遽罹大恤豈勝深悲願遵禮制之中務抑哀情之過永匹休於北極用致養於東朝臣遙睇宫闈外分符竹徒有抱弓之泣莫馳同軌之誠慰皇太子牋神游不返慈極如存仰黼扆之宅憂洎青宫而致戚恭惟太上皇帝夀康介福清靜凝神逺邁堯仁鳳厯莫窮於授受遽辭舜養龍胡不可以攀援皇太子殿下孝極事親義嚴尊祖念太帝乘雲而在上固自逍遥顧元孫出震以承天豈勝悲悼然上侍九重之邃且下為萬國之瞻宜節哀情俯遵禮制臣欽聞遺誥拘守左符但同民吏以攀號莫望京師而奔赴請聴政表母儀仙去痛莫返於神游聖孝情深忍遽親於幾務不虞何譴輒有開陳竊以貴賤雖殊於䘮致戚朝廷所重以義掩恩道不可以無權禮惟期於中節恭惟陛下至德極乎明察誠心主於愛欽四海瞻依共仰天庭之具慶羣情震駭忽聞雲户之上賔越在淵衷難勝大恤然慈皇付託方觀神器之久安則庶政修明豈可繁機之暫弛非曰勿矜於細行尤宜致念於逺圖伏願陛下强抑哀情勉承睿訓既返乘輿於廣内因以聽朝遂行衰服於宫中初非違禮又仁由中出固難遏於哀痌令必上行豈可稽於聽斷敢中懇請冀獲矜從竊以母子之恩深一因天性帝王之禮異各有時宜事難泥古而非今道或趍權而合正恭惟陛下行髙曽閔德協舜文遽失母儀之慈豈勝孺慕之切然娱侍大安之膳與欽承長樂之顔苟惟自過於皇皇何以上寛於戚戚伏願陛下俯從輿議參考舊章抑素蹕之深哀既以順兩宫之意即清廂而親事又因慰四海之心又銜哀中禁瀝懇需章雖聖心摧慕而難移亦愚悃閔陳之未至竊以海内之治必由獨斷之專天子之尊蓋異匹夫之孝仁主於因心之愛義行乎合理之宜致其愛則有餘哀用其宜則無過制因節文而為禮乃舒疾之歸中恭惟陛下修胸中之誠極膝下之養彼蒼不弔罹此閔凶哀素難勝若為創痛然衰用麻而不斬以避所尊且貌若枲而非疏亦明其稱矧問安於大寢思保乂於皇家一已充充雖至朞年而猶戚萬幾亹亹詎宜曠日而不親伏願陛下勿徇難能求為至當奉太上丁寧之訓蒞治于朝念母儀顧復之恩致哀於内用副臣民之願是兼仁義之全請御正殿表縞冠銜恤尚蒞事於西廂黼依宅尊未詔儀於南向黙而不請義有未安竊以宫壼深憂固有居廬之次朝廷極辨難虛當宁之嚴豈宜執一而失中自可並行而不悖恭惟陛下孝根於性戚見乎容繇祲氛一集於慈闈而憂服弗違於哀次遂致喁喁之衆阻瞻穆穆之光雖創巨痛深難以俯而就禮然任大守重貴乎變而從宜伏願陛下入服衰裳出臨路寢聖人達節靡拘䘮紀之常天子當陽大舉邦儀之正又執宫中之䘮羣下無敢奪吾君之志辨門外之治一人亦難屈大義之公以迫切而有陳可逡巡而遽止竊以朝廷幾務今日最詳前代禮文後王難復縱欲守謹終之小節豈宜妨為政之大經恭惟陛下勤奉母慈曲全聖孝居必問安而養志疾先嘗藥而致憂中外共知初終惟一竟愆夀考之福莫曉皇天之心哭踊之哀殆幾於無數供須之厚弗委於有司無所不用其情非止可觀其愛由此報坤元之厚德何以加焉如云虚天極之常居疑於過矣伏願陛下遵太上之猷訓酌先朝之憲章出向離明荅萬邦之瞻仰坐行夬決免庶務之稽留第於哀敬以無虧是即情文之兩盡又行天下之通䘮必自致中心之戚宅聖人之大寶所宜正南面之尊顧此二端疑於兩重惟權以義乃得其中蓋哀痛無所窮者孝子之仁而品節不可踰者先王之禮由周而上及朞為祥禫之期自漢以來易月有細纎之制古今之時既異軍國之務浸繁豈能釋庶事以居憂不免抑至情而蒞政未純吉服皆御法宫恭惟陛下行可通於神明孝在安於宗社願體慈皇之畀付深思列聖之創垂内雖切於念親外必嚴於正位向明而治以裁刑政之詳當宁曰朝以肅臣工之衆是為達孝不止從宜請聽政表萬姓攀號永莫瞻於慈極九重追慕難即蒞於繁機輒進瞽言妄干聰聴竊以摧傷如割是為父子之深恩聽斷必親則有朝廷之大義恩不專於哀瘠義莫重於繼承恭惟陛下光奉貽謀聿勤養志雞鳴問寢覬有疾而必瘳龍去遺弓遽登遐而不返人心共痛聖意難勝第遺大而投艱任誠至重在節哀而順變理有當然伏願陛下仰對在天之靈勉遵易月之制日居北内寧寛罔極之私時御西清宜出惟行之令用荅揚於末命以俯慰於輿情又孝思之切雖難以理而自寛幾務之來豈可有憂而廢治既伸懇請未賜俞音竊以商宗居諒闇而不言蓋厯三年之久周后出應門而作誥僅踰七日之間時有不同禮無相襲恭惟陛下小心肅肅深愛蒸蒸節近千秋將上奉巵之夀痛纒六合忽傳憑几之言況國恤之頻仍尤宸心之難處然奉道揚之命已稽聴覧之期願抑過哀深思大計俯觀臣庶懐仁共至於烏號宜審政刑述事永承於燕翼又衰服宅憂宜無二事訓辭諭㫖再却庶言竊惟父母之通䘮固有帝王之經禮貴猶遂服義不掩恩自漢文戒於傷生為之易月至晉武志於復古終以隨時故内致宫中之哀而外聽天下之治始者曰權宜之制久而為典故之常蓋事體之已然非人心之或薄恭惟陛下憂勤蒞政愛敬事親何期三月之間併有再朞之戚敢言哭踊聖情為無益之悲但念纂承君道有至難之責若執居廬之古義恐非經國之永圖願參考於舊章仍遵行於遺誥情與文而相稱乃不過中哀以敬而為先是能盡孝雖知煩凟終冀矜從又致愛盡仁謹終執禮釋萬微而弗慮閱三請以如初上既摧傷下皆隕越義難遽止辭則已窮敬惟太上之尊初棄天下之養國家大故日月猶新豈臣民慟哭之相聞而明聖憂思之可解所以執䘮而衰絰未遑審事之樞機然而哀至於有餘是則過猶於不及共惟陛下承正統於三聖奉慈顔者六年今在亮隂實殊訪落將欲充至德以光四海莫如勤治道以撫萬邦願回獨見之髙明俯從衆志思奉貽謀而繼述永固丕基又行天下之至難斯能髙世循古人之通制乃不過中禮有貴於從宜事何嫌於徇衆且物無不備人君固可以弗言而言或未聞臣下何從而禀令庶政之弛張在此斯民之休戚隨之故至哀雖出於眞情然古禮難施於今日共惟陛下丕承景命恭奉慈廷盡其敬則備寶冊以歸尊致其樂則奉玉巵而稱夀憂色屢形於甞藥戚容復見於衰麻由此道以事親已著上仁之實推是心而繼治乃為至德之全況於遺誥之徽言莫匪保邦之逺慮命之聽政無踰三日之期今也宅憂既至一旬之浹伏願陛下念祖宗之傳序思億兆之依仁措神器於久安運天機而洞照深居䘮次間延見於諸臣總攬政經示必專於獨斷幸垂淵聽毋咈輿情不敢憚煩惟蘄賜可請御殿表清廂聴治既不免於從權路寢視朝乃尚遲於正位敬稽舊典率籲僉言竊以父母之䘮厚於仁古稱重服君臣之分嚴於義國有彛儀詎宜銜恤於内心而輟宅尊於南面恭惟陛下愛慕同乎虞舜慈良合於武丁謂食稻衣錦而難安其情非偽故衰麻苴杖以為飾於禮加隆方在倚廬遂虛當宁然丕承於基緒合大正於等威伏願陛下閱累朝之通行遵大行之遺訓出則俯臨於軒陛以明踐祚之尊入則如見於羮墻何損宅憂之戚又百僚咸在覬聞稱警之音一扎未俞堅守居廬之義知聖心之痛甚感衆志以愴然竊以漢制纎衣主於易月唐人慘服遂以臨朝變禮何嫌隨時為是共惟陛下以仁守位以正承祧方孚慈孝之誠遽有閔凶之變所以釋蟻裳而返内至於虚黼扆以居中夫禮不足而有餘哀可以矯常情之薄然事雖遽而弗凌節謂之循至理之中矧遵舊典之已行且順人情之所欲願當正宁示上徳之天臨用俾羣臣望清光而星拱又内行䘮禮民咸嗟嘆於深仁外曠朝儀下願觀瞻於晬表屢陳愚悃莫奪聖情念慈懿之上賔俄夀康之厭世蒼黄失措縞素相仍夏凊冬温無復父母俱存之樂天傾地坼難勝國家莫大之災再傳遺誥於臣民孰不如䘮考妣共惟陛下篤於至孝罹此重憂不忍視朝未為過制但帝居之前殿乃天子之正衙若非攝袂以面南尊嚴於上曷俾在庭之拱北肅敬無譁非得已而用權亦當然而合義仰祈報可勿拒控陳又䘮寧過戚乃由仁愛之中存事或從宜無惡節文之小變蓋禮常以義而可起故正亦待權而後行嘗聞商有賢王三年諒闇滕雖列國五月居廬古人之行皆然此意之微久矣洪惟孝廟欽事思陵獨畢再朞之哀欲還三代之舊然稱情而憂服亦聽治於便朝共惟陛下議禮之詳捨漢書而不論制行之篤有曽閔之所難方執親䘮當從先祖矧殊鄰之來弔行且造庭而大享之告䖍又先卜日非端居於法座曷具舉於邦儀念承顔養志之歡于今無及惟繼體守文之重其事當嚴願回聖意之皇皇俯徇羣情之懇懇又服制之勤不免俯從於易月公除之後曷為未可以視朝熟慮於心乞終其說竊謂再朞祥禫用於朝廷則不通七日釋纎施於父子則為薄惟無恩義之相奪莫若經權之並行入而遂服者足以伸自盡之誠出而負依者所以示至尊之體縱使舜文之君而處此必兼周漢之道而行之共惟陛下之至仁克盡聖人之達孝未即外庭而恭已蓋疑憂服之在躬然康王見羣后之初䘮甞受幣圭於門外而晉武聞諸臣之異議但終縞素於宫中按古昔之舊聞參祖宗之故實今罷朝者一月衆且有疑若廢禮於三年理誠不可願正當陽之位庶傾就日之心辭説已窮徬徨俟命謝到任表代命以恩頒方訓戎於浙右職由叙進旋均餼於湘中祗荷寵榮若為報稱中謝伏念臣素無籌略徒有樸忠執丈二之殳結髮驅馳於下列懐尺一之詔致身參佐於中權積金革之微勞分玉鈐於外服戴履乾坤之大造保全鋒鏑之餘生載惟湖嶺之間兼雜蠻苖之俗酋豪畏慕既溪山之自清步騎精明亦鼓旗之有節於兹尸素可以偷安兹蓋伏遇皇帝陛下大度包荒至仁善施龍韜獨運必駕御於英豪馬老無庸尚矜憐其衰朽臣敢不篆銘肺腑鞭䇿筋骸緩帶優游雖幸全家之温飽据鞍矍鑠敢忘報國之忠勤謝除經畧代驅馳澤國洊叨一節之華屏翰海邦誤玷十連之寄材雖弗稱義不敢辭幸風壤之咸和覺雲天之非逺伏念臣遲回平進拙直少諧自再易於州麾即屢更於軺傳賑飢湖右欲民病之少瘳折獄湘中期刑清而不枉雖思夙夜以匪懈未閱嵗時而輒遷莫殫鞅掌之勞蔑有絲毫之補敢圖寵渥俾任蕃宣特分南紀之符既逾其分又進西清之直以賁其行伏遇皇帝陛下智燭照臨仁天覆幬心非泄邇而忘逺治務選賢而使能知臣用志悃愊而無華意臣臨事靖恭而有守擢之外服付以中權臣敢不仰佩龍光俯鞭駑鈍率先屬部返身必貴於廉平鎮撫裔夷為政則調其寛猛但喜漢封之廣敢言魏闕之遙謝生日賜物表代來星使之光華不遺初度出天厨之豐美獨荷醲恩寵冠宗盟榮生私室伏念臣識非警敏才謝英竒託體皇家顧此身之甚幸視儀公府曽何德之能堪敢期軫記於微生亦受匪頒之異數兹蓋伏遇皇帝陛下仁先九族施及多方謂屬近則愛深宜物多而意厚爰示慈於臺餽俾共喜於庭闈感厚下之鴻私若為酬德念教忠之遺訓惟有銘心賀正表牋三道慈福宫春回北闕喜集東朝迓淑氣於三陽衍宏休於萬夀恭惟皇太后殿下儉慈為寶清靜長生獨乘天地之亨嘉備膺多福兼享聖神之至養俯庇羣方臣等陪侍未尖阻趍長樂願覽頌椒之祝永觀厯莢之新重華宫禮謹三朝方慶漢京之㑹德齊七政本由舜厯之傳凡在嘉生倍勤善頌恭惟皇帝陛下心清無欲道妙難名見萬物之情雖施仁而發育御六氣之辨獨藏用於希夷宜乘月吉之和益斂陽升之福臣等親逢華旦共樂熙春太極函三熟測元功之不宰重離明兩幸瞻久照之無窮文德殿東郊春至首一嵗以成和南面天臨即三朝而展寀神祗薦祉夷夏均歡恭惟皇帝陛下繼體重離躋時開泰奉玉巵為夀承慈極以儲休振木鐸於朝警官聮而謹始用導迎於和氣兼覆育於函生臣等宻侍清光欣逢華旦六典昭垂於象魏恪遵布治之經九賔肅序於鴻臚共贊履端之慶雙溪類槀卷十二
