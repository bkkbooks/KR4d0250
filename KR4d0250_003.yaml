body:
  text: 雙溪類槀卷三宋王炎撰古律詩秋懷五首簡陳巽叔徐伯老西風脫數葉木末秋有聲團扇內篋中肅肅庭户清公退頗無事解衣坐東榮本乏霄漢心未斷丘壑情日月不肯留奪我雙鬢青陳編堪解頥凉夜親短檠二凉風挾秋回蒲栁青欲黃桂樹枝相繆采采含幽芳清香美無度坐憂露為霜志士有所懷後時多慨慷三西南天漢流蟠蟀鳴露草黃鵠垂其翼坐看嵗年老寸隂輕尺璧進德恨不早百圍飽風霜蹭蹬何足道四我來今幾時寒暑已一變回首望江東天末鴈行逺弧矢四方志别離詎能免有懷先君子生理只鉛槧相憶可相忘問學當自勉五我家南溪上老屋四立壁俗子呼不來巷無車馬跡公庭有將迎未免眼青白陳徐臭味同吾獲雙拱璧拂我榻上塵與君商六籍又五首以遊子悲故鄉為韻一身將百指就食家浮遊清霜木葉黃弊笥無完裘平生三釡心山阿種松楸圓枘運方穿命不與己謀盥濯朱墨手清江操釣舟擇友得石交心腹管城子可憐老而秃我窮正坐此玲瓏玉其音六學有妙理抱此為身媒前賢恐不爾翩翩肉食飛書生懦于武東風黃鳥鳴白露寒蟬悲去日何太短種種髮欲踈人言了婚嫁此事今何如欲耕無一廛兒女牽人衣蠶以繭自纏深念難為娛跣行我足傷涉世無夷路三復貝錦詩讒口古亦惡兒女附耳言譽喜訴其怒勿用驅青蠅玉質自如故竹間有數椽讀書樂未央稻粱自為謀風散鴻鴈行叔氏從我來季子天一方人生手足愛念之攪中腸誰不思息肩我豈樂異鄉何時一青燈夜雨同對床用前韻答黃一翁五首天寒鴻鴈低客子亦倦遊憶昔少年時風埃蔽貂裘欲辦一束茅不種千章楸黃鵠入雞鶩亦為飲啄謀豈有斗升水能行千斛舟吾友西家黃筆力壓餘子金馬可曵裾胡為亦留此整整插架書拂蠧自料理三年飛不翔袖手今且爾儀鳯五色文霄漢終接武楚客抱玉虹刖足只自悲有寶不韞櫝此計亦未踈子虛一賦成日邊問相如老眼閲人多君豈一布衣篋中有瓊瑶把玩聊自娛秣馬踐古轍經術導先路士要人品髙與俗殊好惡忮心蠆尾毒褊心螳臂怒唾靣令自乾吾今乃非故青雲諸貴人鳴玉朝未央我無封侯骨難入鵷鷺行生女不出門生男志四方十年九不就食薺苦我腸未能返故園且可歸醉鄉細君諭此懷春溜鳴糟床廨舍梅花欲開三絶花開不肯待春融恐混繁枝深淺紅潔白天然貞女操清癯獨立古人風懷人不寄隴頭信寓興亦無東閣詩坐裛暗香供鼻觀小忩寒月浸踈枝頗怪涪翁錯下言水仙許入弟兄間恨無好語供題品花定嗔人頽玉山郊外見梅再用前韻三首四山有雪未全融蓓蕾梢頭茁小紅也欲索花同一笑蒼顔羞澀見春風皎如玉雪不容緇乞我寒香苦索詩輸與西湖閒處士解吟籬落忽橫枝故園踈竹蔽柴關手植孤根在竹間别後踈枝無恙否寂寥風月冷溪山題咸寧江宰德先清逺堂築屋俯平湖百頃風漪漣湖底行白雲湖外橫青山仙官踏兩鳬遊戲來人間清都在天上欲去懶著鞭百里可盤薄苦無敲撲喧試出持蟹手為民奏鳴絃潘郎兒輩爾栽花作春妍淵明未甚髙料理種秫田捲箔坐繩床香吐一縷烟白鳥入空濛飛鴻度雲邊箇裏不著愁心與物共閒漁榔勸客飲玉色亦粲然目極意不盡老蟾生莫天生朝無以自慰作留貧薦一杯私居飯半菽官舍食無肉何乃太清生囊無一錢蓄人言骨相寒有智不如福貧者輕于葉富者重如玉輕重信然否世情手翻覆相彼守錢虜無厭溪壑欲口不談古今枵然瓠壺腹渠固笑我癯我亦笑渠俗珊瑚數十株胡椒八百斛冥冥鬼瞰室一跌赤其族未若貧而安髙枕睡常熟我家雲溪陽欹側數椽屋屋後蒔菘韭屋前種梅竹室中四立壁但有書可讀世故驅我來營此升斗粟仕不上青雲何如返耕牧頗怪草𤣥翁乃謂貧可逐卒嵗一布裘終朝一饘粥此外何所求吾生無不足用前韻答黃一翁二首緼袍敵狐裘晚飯可當肉諱窮竟未免豈不愛儲蓄嗜利顙有泚恐愧王承福財固禍之媒越鄉忌懷玉君看座右器已滿即傾覆聖賢用功處清心而寡欲于世淡無求乃能實其腹誰令入青衫失策混流俗黃子振鷺姿筆力扛百斛笑人龜手藥欲售先聚族知豫頗清苦應物未圓熟遊宦不能巧俯首立矮屋鍛鍊知精金祁寒見松竹自立不堅定庸行徒聖讀誰謂漆園髙俯首欲丐粟窮作扣角歌老厭淄川牧古道寖斫喪時人方逐逐有田南山南可辦一盂粥請賡歸去來世路早收足豆羮采藜藿鼎食厭梁肉士欲齊得喪胸次要涵蓄我晚頗聞道寧有慧無福外物皆浮雲此道等珠玉閲事如閲棊已過安用覆回光照諸妄稍稍淡無欲與君共𤣥談一笑時捧腹更以詩留貧此語頗驚俗細看苜蓿盤豈減檳榔斛見金不見人渠輩非吾族君獨臭味同吾固知之熟平生求益友今日並墻屋不肯兄事錢寧以君呼竹力學追古人經史費抄讀我方病少瘳擁衲膚有粟百念漸灰冷有牛不須牧君如汗血駒墮地必馳逐甘為走踆踆耻作雌粥粥有玉未嘗獻豈憂終刖足過幕阜山昔聞幕阜古洞天偶馳瘦馬行山前諸峯却立一峯出蒼龍墮地走復蟠誰燒丹竈汲丹井絶頂萬丈巢飛仙捫蘿攀磴敢憚險欲往未有一日閒仙翁見我定拍手笑我詰曲來人間雨淋日炙行路難何如鸞鶴遊雲端人生不比金石堅向來青鬢今蒼顔百年富貴草頭露何乃自苦縻一官雖無道骨可不死亦欲早挂頭上冠南山之南北山北築屋翠微髙枕眠平江道中筍輿踏瘦石揮汗日亭午山斷忽眼明人家住溪滸解衣近緑隂隔枝鳥相語好風送凉來坐久失畏暑潭潭一水緑可以浣塵土樵歌響空谷漁艇散前浦丘壑太寂寥從俗祗自苦征夫問前途欲往空顧佇喜雨歌去年夏旱田原枯龍骨取水禾不蘇張頥待哺神所憫吏既禱之甘雨隨東阡西陌喜相賀化我磽確成膏腴炊粳釀黍作秋社翁媪醉飽兒孫嬉今年種藝方入土梅天宜雨還不雨髙仰之田龜兆開汚邪亦半無流水帝從人欲不待祈豐隆擊鼓羣龍趍山南山北起雲霧雨腳急來如綆縻富家安坐有紅粟田家作苦惟饘粥丁壯力耕兒飯牛旱時得雨勝珠玉㳂檄如蒲圻訊民之食菜事魔者作詩憫之三代日方中為民破重昏既蝕復光融孔孟道益尊古禮今則亡陳編意猶存飲燕用觥籌薦享羞羔豚瞿曇何為者髠首徒實繁不飲非畏義不殺非知仁舉世昏不悟跣足行荆榛胎禍産妖幻與佛岐又分俗愚有罣誤吏議多深文怒言必溢惡疑似恐不根黔首亦何罪可憫不可嗔大道若返古怪說難眩民帝居虎豹守此語誰扣閽和沈粹卿登南樓韻鼓角聲悲城上頭沈郎懷古一登樓下臨平楚容回顧北望神州定欲愁呌日征鴻雲路冷嘶風戰馬塞垣秋人間俯仰更興廢江漢滔滔萬古流晚春書懷簡陳巽叔二首畏病不多酌遣情時自吟絮飛春漠漠樹密午隂隂壯縣今岑寂微官有陸沉青山啼杜宇未斷故園心二花片已零落緑隂遮短墻園蔬春笋長官酒臘醅香揮麈故人少杜門閒日長不妨時過我談笑倚繩床和廖守嶽陽樓韻三首湖水無波赤蹴天君山蟠結獨巋然未須弔古懷騷客聊復憑虛揖吕仙霽月光風供笑傲長篇短句總流傳尊中况有蒲萄緑試作長鯨飲百川蛟螭旗尾擁樓頭偃仰胡床護一州水濶三江成滙澤風髙六月有清秋長吟不減白蘋句坐嘯能分黃屋憂憑檻可窮千里目角聲嗚軋楚帆收清香燕寢憩儒先出對湖山一莞然紅斾小驅聊緩帶青雲直上且揚鞭肯容坐客同揮麈莫憚行厨費擊鮮種就巴丘桃李徑不應畫諾更留連和留獻之出郊勸農瀾翻布榖喚春晴浩蕩花風擁斾旌野老無知須户曉長官著意自山行四郊烟火皆新集百里汚萊未盡耕前日惰農今力穡閭閻閒暇政寬平和遊堯臣勸農韻傳呼穩憑筍輿行喜見漫山麥浪平道上老農皆好語年來瘦地有新耕草深黃犢陽坡暖雨過青蒲野水生桃李隂中春事好田家雞犬亦歡聲到胡道士草庵二首清風颼颼竹萬箇白日寂寂茅三間春深只有鳥呼夢地僻略無人叩關豈但壺中堪避世也勝圖上可遊山出門回首不能住輸與道人閒復閒緑隂啼鳥户庭幽解帶聊為一夕留行李未知何日了轉蓬方覺此生浮市朝役役兔三窟今古悠悠貉一丘得似黃冠林下住何須控鶴上瀛洲旅中書懷燕子未歸寒已退海棠半落雨初晴他鄉異縣見春色逺水平蕪關客情道路不來黃犬信烟波深負白鷗盟數竒落在千官底敢嘆儒冠誤此生到夀安精舍佛宇崇崇倚翠微萬株松蓋碧相圍﨑嶇短策頻行路盤薄胡床暫解衣自笑將身為馬走不妨著眼趂鴻飛枕流漱石平生事却為蝸蠻定是非嵗莫官舍書懷二首九霄側目不飛揚落在荆湖又一霜寒日無輝溪水凍春風有信野梅香少年豪氣今揫斂小隱生涯尚渺茫歎息衣襟漬朱墨鏡中容易鬢毛蒼三徑無資出宦遊歸心日夜繞松楸絡頭不盡奔騰志側翅聊為飲啄謀捉麈縱談無好客捲書獨坐有清愁陶泓毛穎成何事彈指人間嵗月流聞杜鵑稻秧出水緑初齊憶在田間把一犂留滯天涯歸未得杜鵑何苦向人啼野鳧白水滿塘蒲荇青野鳧相對浴春晴背人飛去猶回顧我已忘機莫浪驚林監生日玉融秀參天人物時炳靈小春氣候佳産此千人英酌酒為君夀不惟祝年齡君家屋渠渠鶴髮居中庭前有棣華秀後有蘭芽馨安用執象簡始足為君榮置身瓶盎間恐損雙鬢青試占眉間黃身閒即蓬瀛留獻之初得孫藍田美玉驪龍珠天馬之駒丹鳯雛平生眼底未曾見物以希有為珍竒世間凡子乏英骨㹠犬雖多安用為留侯豐下宜有後更積隂德栽培之大兒嶄然露頭角胸中篋笥羅詩書文章機杼有家法睥睨雲漢思髙飛小兒學語解揖客眼如㸃漆膚凝脂家庭有此萬金産何憂門户無光輝乃翁昨日坐堂上津津黃氣溢兩眉女奴走報子舍喜紫蘭玉樹生孫枝不須老釋親抱送此真天上麒麟兒我來欲與湯餅客對翁夀以金屈巵看渠一嵗能識字八嵗落筆驅文辭三衢之留世冠冕公侯衮衮當無疑他年我未髮鬚白已見此子摩天衢野次欲訪于從周不果因寄二首見說南山下雲霞好隱居草深幽徑斷心逺俗人踈倚杖時觀穫焚香只讀書宦遊無此樂令我憶吾廬二佳士不可見清遊難豫期此心雖眷眷欲去却遲遲白酒應新熟黃粱亦可炊稍閒當躍馬說與主人知過鳯隱山落日孤村靜青松一徑斜問程愁客路託宿到僧家香鼎生雲穗茶甌湧雪花胸襟添道氣隱几息喧譁出遊郊外七絶漠漠野田新水生花枝一笑欲傾城孤村曲塢皆春色信有東風不世情幽鳥共歌春意好閒花巧笑客愁多酒徒詩社俱踈隔如此東郊景物何閉户不知春色佳栁梢欲暗可藏鴉鴨頭新緑齊腰水女頰輕紅刺眼花道上東風掠面輕一犂雨足得新晴草頭蛺蝶自由舞林下鶌鵃相對鳴孤烟近見數椽屋急水時行獨木橋入眼異鄉風景别修眉一抹暮山遙快馬駸駸穿野徑春風處處見山花不須舉首看回鴈家在南頭天一涯雲昏山色收圖畫雨過泉聲雜管絃馬上得晴春滿眼好花迎客亦嫣然旅中思家野田既雨水皆滿山路無風花自香且復將身供世事也能隨處對春光絶嫌俗物眼多白未辦生涯髯已蒼待看樝梨粗可教老夫耕釣即韜藏至灌溪豫瓌老二首春風一路百花開踏遍空山特地來莫道漚麻池水淺千尋飛瀑吼春雷食肉定知非虎頸騰身自笑不鳶肩相逢莫話青雲事借我清風一枕眠瓌談相宿野人家破籬犬吠月將落曲沼蛙號天欲晴日出東方塵滿眼不如欹枕夢魂清聞蟬緑隂遮日忽鳴蟬墮地殘紅色未蔫兩岸垂楊低蘸水夢魂時到故溪邊山行二絶路回穠緑屢低蓋風定落紅時㸃衣行李馳驅無暇日客情鄉思兩依依盡日扶輿度亂山石根古澗水潺潺孤烟時傍翠微起疑在新安道路間春日二絶栁影人家燕子飛東風落絮罥遊絲欲題崔護桃花句惆悵春深子滿枝野花無賴作紅白香力也能來著人古澗寒泉山下路道人别作一家春到常清寺豫哲師三絶哲亦徽人扣關解后老支郎見我丁寧問故鄉自說病身歸不得花開葉落幾凄凉寂寂松門古道場暫容倦客拂橫床老僧欲盡殷勤意林下春風茗碗香古井寒泉久不波豈貪好夢到南柯夜來雨過嵓花落好鳥留春自嘯歌晚憩田家二絶家書未到鵲先喜春事無多鶯又啼偶對好山留客坐緑隂遮屋日將西山間一徑牛羊迹林下數家雞犬聲底事居人苦爭畔閒田官正募民耕留山間即事暫留野次倦征行差覺山林氣味清日釀梅酸新雨過山連空翠淡烟橫東臯水滿起農事南國草青回鴈程撥置文書聊隱几笙歌一部聽蛙鳴出郊書懷扁舟蓑笠寄平生元是江湖一白丁偶著青衫持手版懶占黃色上天庭正須每事問三尺未暇對人談六經啼鳥數聲春事了故鄉回首幾長亭野次遇雨木末雲屯飛雨音栁梢水到小溪深身隨王事有行役家在江南無信音但得林泉堪著眼莫將軒冕更關心拂衣何日徑歸去青鬢不禁愁緒侵酬陳叔裕四首扣關倒屣略從容驚見文章豹管中水濶山遙俱倦客花明栁暗又東風錦囊收拾語皆好黃卷沉潜經可窮㑹看卧龍騰踏去知賢吾或似龐翁花枝破蕾作輕紅漸有春愁入眼中儻可登樓銷暇日幸無舉扇障西風朱絃自奏難諧俗白璧深藏莫醜窮樽酒論文期欵曲驪駒催客陋江翁未能築室隱墻東偶爾書名宦牒中羅雀門空無俗物騎鯨客至有仙風刀頭雖折故鄉逺錐末不營生理窮意欲挽君來酒國接䍦倒著任山翁天台逺在浙江東景物應曽到夢中但有錦囊盛白雪苦無羅襪舞回風閉門花鳥春心薄隱几詩書日力窮益友琢磨吾豈敢西鄰仙吏有詩翁上已莫春祓禊好天氣不到水邉流一杯旋擘紅泥嘗煮酒自循緑樹摘青梅淹留異縣客多病迢遞故鄉書不來厯厯舊時行樂處憑欄小立首空回過靈塔寺蕭寺經新雨山間六月清松梢凝翠滴蕉葉自風生古塔巋然在僧魚冷不鳴旅懷多感激髙樹又蟬聲過西崙莊一宿南首巴陵道籃輿小作程欲隨王事去頗戀佛廬清一雨暑欲退四山秋有聲流年欺鬢髮搖落又關情酬李秀才繫馬松根倦欲休入門解逅得詩流暑天客裏難行路莫雨山間便覺秋共對青燈談世事惜無斗酒破牢愁黃花可摘吾當返肯過桃溪一醉不湘隂道中道出昌江險翩翩馬足輕流萍嗟逺宦行李偶南征地帶長沙濕川通湘水清凄凉懷屈賈天濶莫雲平喜晴雲上山椒鳴竹雞愁行客路踏青泥窮人也得天調護乞與新晴可杖藜雨中山行暝烟有客投茅舍春水無人渡板橋滿地落花愁寂寂連天芳草思迢迢春日即事四絶晚晴鸜鵒自相語春冷海棠猶未花把酒排愁先畏病擁衾作夢欲還家年少逢春喜欲狂長年心事易凄凉胸中不可無今古坐閲陳編自炷香著人春氣濃于酒老眼倦看深淺紅只有睡魔降未得銅瓶魚眼沸松風小園桃李怯風雨春事一年渾得晴燕子欲相牽率去踏青吾不敢徒行雨後繼成二絶草泥融處墮蔫紅社近寒生雨又風未辦把杯供一醉花開花落太匆匆水搖山影緑沉沉雨打花光故惱人賴有海棠傾國色嫣然一笑解留春陪留宰遊灌溪回飲縣圃六絶泥融紫燕欲營壘日暖黃蜂爭取花試向靜中觀物化蒲團相對坐僧家花暖不勝胡蝶狂松間支徑午隂凉漚麻别自有春色鼻觀同參佛土香樽中歡伯解人意乞我桃皮杏眼紅一笑勞生那易得回鞭落日馬嘶風入眼山花盡笑迎雙鳧飛處雨初晴二年踏遍桃溪路擕酒尋春只此行髙燒䗶炬照深紅恐負一年花信風惡客敢辭今日醉明年别去定匆匆東風桃李可招客吏事塵埃能困人醮甲一杯留我醉知公胸次有陽春和留宰賞荼䕷二絶郎官喚客坐花旁盡日杯行笑語香醉看緑雲籠暖雪不知憔悴落他鄉得酒衰懷亦滿觴不禁花氣逼人香醒時忍見風吹盡玉質溫柔是故鄉陳推官幽居十詠彭蠡歸舟三老檣邊爾汝頗疑居士知津賴有白鷗無恙肯來迎棹相親山堂曠望俗物令人眼白鈎簾領略湖山袖手倚楹獨立孤鴻滅沒人間重湖泛月四顧水光無際自操一葉輕舟天濶氷輪欲墮短橈猶在中流星灣晚釣割据一灣風月棹行衝破青蘋未有霜鱗貫栁注心不在垂綸雨後觀瀑銀漢倒傾波浪玉龍怒挾雷霆雨後遙看更好斬新泉白山青松徑閒步兩行松蓋遮護下有蒼苔地衣試我青鞋布襪支笻却立忘歸溪上賦詩閲遍岸花汀草撚髭危坐漁磯一笑冥搜得句溪山爭吐光輝林下避暑灌木樛枝密葉南風細細無聲不用蒲葵到手箇中六月秋清載酒尋梅幽花信美如玉不願遊人見知喚取麴生同載為春物色南枝雪中訪隱寒氣侵凌鶴氅蒼頭急打柴門鵲把氷枝欲語山人喜色春溫宿公安二聖寺蒙城一市萬人聚一堤如虹作遮護風濤悍怒魚龍宫瀕流壓以青蓮宇潭潭廣殿不動尊夾立二丈力士身楚帆蜀柂日銜尾過者蹴然生畏心粥魚齊鼓二千指我貧未辦作檀施明朝踏霜出江頭借佛定力扶扁舟寓江陵能仁僧舍二首客裏嵗月晚春生梅栁枝弟兄嗟别久兒女話歸遲拙直將安用飛騰敢自期老支剛笑我底事作癡兒二容膝非無地安心即是家焚香翻貝葉汲水養梅花無客同持酒呼僧共煮茶夜寒風力徑誰是老丹霞夜坐月白侵衣冷窗閒對一燈淹留歸未得進取我何能空室無夫女清談只衲僧不嫌身寂寞絶喜睡瞢騰復州道中二首嵗事已告華客行殊未歸蔞蒿穿雪長水鳥背人飛沮洳蒹葮逺村墟烟火稀邊風吹莫色短策度斜暉二私喜歸期近天邉更逺逰士須嘗險阻吾敢恨淹留塵事蟻旋磨浮名魚中鈎春風桃李月倚柂看東流夜宿江上夜宿江邉蘆葦叢江流浩浩吼天風西南闕月淡無色擁衲不眠聽塞鴻贈李居士棄官為僧二絶踏破青鞋走四方年來收腳坐禪床更無言下商量處靜對忩間一炷香遮寒破衲雪蒙頭笑我浪懷千嵗憂解下腰包只如此赤無莫莫與休休雙溪類槀卷三
