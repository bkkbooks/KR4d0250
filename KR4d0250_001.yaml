body:
  text: 雙溪類槀卷一宋王炎撰古賦水西風光賦并序隆興癸未冬龍圖閣待制吕公來守新安覽其山川而樂之後八年卜居于城西南隅榜其樓曰水西風光門下客王炎賦之附于衆作之末其詞曰古歙為郡山水竒秀飛仙往往窟宅于其中號居江左十州之右至于水西之勝槩又稱甲于一州挾以披雲之孤峯繞以漾沙之寒流昔翰林之詩伯騎鯨魚而來逰至今墨客騷人無不劇談其髙風而漁翁樵老亦能尋訪其遺迹人與景而俱勝首尾三百餘年而不可再得那知神嵩夫子之卜居而氣象反髙乎疇昔豈非人物為主山川為賔故風光雖滿于天下然大半落莫而無聞苟有恃而獲傳厯千載而不朽有白傅而知香灘因叔子而知峴首浣花寄聲于工部醉吟之篇輞川託跡于右丞丹青之手况如我公三朝廊廟之夀俊六世軒裳之故家何紫乎文石鳴玉乎金華一旦丐閒引身而退傲睨于烟塵之表袖手于功名之外遂令水西之聲稱自于今而益大飛檻渠渠壓城之隅豫雖未獲寓目于几席之末緬想其臨髙眺逺凡可以恱耳目而娛心志者一皆領略而無遺公舊為伯于此邦留去思于千里父老兒童見公而喜故雖山靈與溪神爭欲回巧而獻技攬波光空翠于冥濛杳靄之間閲雲烟沙鳥于旦莫晦明之際飄然如坐蓬萊方丈而下視人間之世憩曲几以缺伸撫修欄而倚徙彼謫仙放浪而一來非可同日議也無已則猶有太公望之事乎處則釣渭水之璜出則佐六州之王方聖天子之仄席登耆英于廟堂胸中之策十未用其五六恐未可留意于山水之風光竹賦并序小人之情得意則頡頏自髙少不得意則摧折不能自守君子反是竹之操甚有似夫君子者感之作賦以自針其詞曰晦叔讀書南齊之上門巷僻左交遊日稀環以桑麻之場帶以瓜芋之區路折西南萬竹蒼然下緣乎曲澗之湄其清可以延風月其髙可以擾雲霓珊珊乎鳴蒼玉之佩搖搖乎舒翠鳯之旗森森乎甲胄之雜峙而切切乎矛㦸之參差其偃蹇挫折者如忠臣節士赴患難而不辭其嬋娟蕭爽者如慈孫孝子侍父祖而不違其挺拔雄徑者氣毅色嚴又如俠客與勇夫其孤髙介特者格清貌古又如騷人與臞儒豫雖朝夕吟嘯于其下曽無以名其美而狀其竒然泛觀宇宙之中萬物均函育于一氣而有剛柔堅脆之不齊榮者必悴盛者必衰實繁者易剝色麗者早萎惟松柏之有心及竹箭之有筠足以閲寒暑而貫四時春日載陽山川含滋零露兮宵潤惠風兮曉披或萼或條或茁或荑含英吐華夭夭怡怡竹于是時清而不腴冬日祁寒天地積威雪慘兮冰堅風號兮日凄川原千里木脫草枯香盡芳歇掃迹無遺竹于是時秀而不癯今而後見其含德之有常特操之不移此吾所以無羡渭川之千畝有取淇奧之猗猗願定交于金石邀嵗寒以為期否泰兮消長剝復兮乘除秉吾心之堅一視此君乎庶幾雉賦并序之野外見一雉為野人所得悼其輕敵不戒而斃焉因作賦以自警其詞曰絳冠兮緑跗翠襟兮錦衣耿介兮自守雄鳴兮雌隨平原兮淺草徐啄兮卑飛何野人之機巧乃以媒而致之方氣驕而賈勇敢直前而不疑事常敗于輕敵碎身首于須臾肉不登于鼎爼毛或用于旌旗子玉無禮而殞命趙括狂勇而喪軀酆舒怙俊而遭殺卻至稱伐而見尸苟謀身之有纍皆災害之所罹翠有羽而就羅雞以尾而為犧鴈不鳴而先烹鸚巧言而長羇信涉世之孔艱雖後悔而何追惟羽族之至靈獨丹穴之鵷雛噰噰兮音聲鏘鏘兮羽儀摩千仭而髙翔豈矰繳之敢施兹吉人之能事于鄙夫兮何誅夏日郊行賦四月維夏先晦三日子王子散策于東臯之上爾汝老農問勞既畢遂曵履乎委巷之間反而息肩乎喬木之側喟然嘆曰以吾流目之所見物化之亟如此哉麥穟穟而餅餌桑隂隂而繭絲麻斾斾而沒人秧芃芃而布畦蜩解甲而效鳴鶯遷喬而載飛雀繞屋而孳尾烏俯巢而哺雛是孰斡其機緘至于日運而不齊也耶吾聞二氣噓吸一瞬不留向之溫然者俄而為今日之夏今之燠然者又且為後日之秋所以使人慷慨增懷踴躍自激感嵗月之遄邁畏功名之湮沒故志士之競時殆不容乎寢食如豫之椎鈍遲魯則姑苟安而休息者也人方逐逐我獨徐徐人方役役我獨于于諒愚智之懸隔宜動靜之殊塗其在武水之曲有先人之敝廬一裘一葛日飯一盂非掃軌以謝物且杜門而讀書付榮枯于自然庶順命而無違抑古人有言曰優哉遊哉聊以卒嵗是其獲我私者乎喜雨賦并序丙申夏四月武昌闔郡不雨越五月三日崇陽宰吳侯以誠禱雨遂優渥按春秋僖公三年春正月不雨夏四月不雨六月雨說者曰書不雨者閔雨也書雨者喜雨也喜雨者有志于民也今吳侯禱雨以誠不崇朝而雨隨之可謂有志于民矣作喜雨賦其詞曰嵗行于涒灘之辰斗建于實沈之次環鄂渚之七縣值亢陽之為沴風自南而且霾日將北而如燬雲霓鬱而不興旱魃驕而孰禦策余馬于郊牧喧龍骨之咿嚘滮池瀦其既竭陂堰支其斷流視衍沃而龜坼况髙田之未耰苗已悴而半槁懼西疇之不收幾張頥而待哺舉蹙頞而增憂粵桃溪之令君念民命之惟穀兹土曠而農惰雖儋石而無蓄繄告糴之少艱米翔踴而如玉儻既月而旱甚民必仆于溝瀆講雩祀之故事虛心齊而竭誠謁梵王之蓮宫羞蘋蘩之潔清欵仙伯之靈巖釋輿馬而草行隂曀曀以隨蓋颸悠悠而擁旌柱礎濕其有汗鐘鼓鞳其無聲紛舉手以加額曰雨兆其已形龜日蕆儀肅我庭宇駕龍驂螭攸屇攸止雲將前驅雨師踵至越三日而為霖罄一同而均利稼芃芃而驟蘇澮汨汨而如注免為殍于凶年占築場于樂嵗沸輿頌而載涂歌令君之隂賜其歌曰霡霂兮涵濡汚邪兮滿車其餉兮有黍稻粳兮可炊豈弟之澤民肥不臞我字我撫公留勿歸均此大惠公歸勿徐吳侯聞而哂之曰父老之言何美之溢也向也民憂而憂此吏責也今也民喜而喜吏不敢以為德也然旱而禱禱而雨如重負之獲釋也酌我醑醴旅我殽核合僚友而一笑吾敢忘夫帝力中隱賦并序三衢留侯以中隱自處范石湖為書二大字以表章之侯有中隱對自叙甚詳夫若隱若顯內心泰然不為圭組所纍侯之志髙矣顧進為于世功大名白民受其賜侯未可辭此責也乃賦之曰子留子道髙而位下豐蓄而嗇施發揮所有可以雷霆一世而畏人之知沈酣自得于理義之府盤薄不鶩于功名之塗乃以中隱扁其室廬圑蒲曲几詩編酒壺凡世間尤物一切無有蓋淡乎如逋客之舍幽子之居吾見其鼻間栩栩芻豢顔色殆將貴吾身于隋侯之珠眇外物于秋蟬之翼此所謂與道逶迤一龍一蛇不露文彩如玉如石者耶夫孤竹二子采薇西山揭日月于百世之上可望而不可攀槁項黃馘山澤下士徒恱其風未喻斯㫖友麋鹿于閒曠之墟玩魚鳥于泬寥之涘惟陸沈而無用徒牢關而固拒故荷蕢與耦耕均聖門所不許萬夫一賢天地間氣海涵嶽負以育德遊創迎解以為智陽潜于泉則草木無色雲出于山則膏澤千里古之抱此道者屣脫富貴而無纍蟬蛻塵埃而不緇然燕坐一室而經營四海未嘗泊然與世而相遺投耒耜而執玉釋版築而乘車萬物賔從受其寵綏蕭條陋巷之布衣詰屈乘田之小吏非為我而不為蓋欲為而不遂先生彈冠而出曵履而趨豈無意于斯人而何以隱為漆園傲睨達近乎詭金馬玩世和失之鄙凖繩以中又安取此有如樂天可謂賢矣不膏盲于邱壑之下不柴柵于紳修之間招釋子于匡廬之阜呼酒徒于香林之灘得喪兩忘去就俱閒無乃欲眇今世而尚友與斯人而比肩雖然進退有正以義為主可否無固因時為度元和之際猶莫盡其所懷長慶之後可飄然而引去時既異而轍殊何必追其故步曲阜之野麟出而非岐山之陽鳯鳴而宜可隱而見其中躁可見而隱其德孤吾欲與白傅異議乃申以招隱之詩其詩曰白銀雙闕髙巍巍佩印如斗生光輝藥石之妙國可醫縮手未試衆遲之前旒側席九天上青雲發軔遄其驅釣臺賦并序自乾道丙戌至紹熙辛亥凡四過嚴瀨此身老矣閲世寖久更事滋多感今懷古有慨然于心者􅋈舟徘徊久之遂賦曰理豫舟而東逝兮言將至于中都過釣臺而屬目兮少弭節而躊躇山寂靜而江空兮中有髙人之祠去之千有餘嵗兮清風至于今而凛如慨豫懷之有感兮思鬱紆而欲攄昔者卯金嘗一仆而再起兮真人翔于參虛羣公攀附其鱗翼兮䇿髙足于天衢功烈藏在金匱兮封爵載諸丹書大冠長劍之陸離兮又寫以南宫之圖先生適際斯時兮獨深潜乎江湖雖可致不可屈兮思魚釣吾其徑歸羞富貴耽貧賤兮夫何眇一世而偭馳粵若聖賢之制行兮其大致惟出處之兩岐人臣仗鉞而觀兵兮二子餓首陽而采薇君王溺冠而傲士兮四老遁商顔而茹芝意固各有所為兮非好惡獨與人殊載考西都之將季兮先自裂其廉耻之維饒悻直剄于闕下兮章忠諫斃于縲纍彼豢于寵祿而不去兮惟其上所招麾孰肯為我死亡兮金城圮而莫枝莽上下其目以旁睨兮敢挾斗筲而覬覦雄作美新以蒙羞兮歆獻符命以導諛可勢奪與利啖兮龜鼎遂隨之而轉移世祖折節以下巖穴兮蓋懲夫覆轍之車訓仁義而戒阿諛兮亦豈無意于當時重臺閣之繩督兮輕廟廊之訏謨前有軒冕之榮兮後有斧鉞之誅朝正位于公府兮夕隕命于囚徒羊裘逝而不留兮非特先見乎幾微上以警一人之失刑兮下以厲多士之廉隅噫有國者亂亡相尋兮未始不自夫名節之先隳麟鳯曠世不一見兮是焉可以縶維瀝酒扣舷而遐想兮乃申以斐然之辭玉帛雖不到藪澤兮豈無逸民老于樵漁私其身不憂其君兮何取夫逺走髙飛而獨居林霏賦并序致政胡丈思成燕居之所扁以林霏模寫其景寄于詩囊畫笥誦其詩觀其畫令人心志翛然厭薄塵垢因成古賦一首其詞曰倚蕭灘之北漘萃闤闠之萬家獨德人之結廬却市聲而無譁開樓觀之淨麗納江山之幽遐疑老仙之一壺藏物色之清佳招鷗鷺與忘機湛方塘之淺緑衛以竹君之蕭森絢以蓮娃之溫淑鬱喬木其參天輸清隂而覆屋抱虛白而不染攬空翠而可餐酌癭藤之釀玉彈素琴之無絃睇飛鴻之冥冥覺燕處之超然主人為誰澶淵居士方時承平家在中土偶赤縣之陸沈隨一龍之浮渡非無意于著鞭可聞雞而起舞恥捷徑之别驅甘康莊之徐步張使旜于蜀道把州麾于淮浦回老眼而內觀笑浮名之絆身遂選勝而卜居以頥神而保真規子美之浣花摹樂天之香林尊德誼者陪鳩杖而舂容談勢利者望龍門而逡巡乃相與竊議曰此非持已之潔而矯俗之汙者歟有卷舒之道而無悔吝之疵者歟眇外物于螽股而貴吾身于驪珠者歟徜徉塵垢之外而與喬松為徒者歟居士聞之局局然笑曰斯言過矣吾何有于是其歸來若差後于淵明其止足尚庶幾于疏傅既婆娑而即安亦逍遙而無纍客乃櫽括其辭以命管城簿寫林霏之佳趣石菖蒲賦并序豫書室中有石菖蒲一本鬱然暢茂蓋資水石之清幽以遂其性此物醫經所論可以延年可以成仙第人取而食之蒲喪其生矣然則為人養生者非蒲之願也因讀北山翁集有水菖蒲賦一篇三折四復詞既妙麗而興託髙逺乃拾其遺論而賦之曰老石嶙峋金鐵貞兮浮雲所根氣潜蒸兮下漱冽泉玉鏘鳴兮蹙節盤屈託以生兮附堅涵潤密如積兮四時青青不改色兮烈日凝冰無能厄兮潜蓄幽馨如有德兮后土富媪載品彚兮其秀其英拔類萃兮虬髯者松負徑氣兮惟竹虛心古君子兮蘭有國香儕髙士兮梅也如玉勝靜女兮得土則繁否則悴兮獨根于石孰如蒲之精粹兮有荇有藻産漣漪兮可薦可羞播聲詩兮亦有芙蓉媚芳池兮紅衣素裳美且都兮下視其本著淤泥兮潔淨不汚孰如蒲之清癯兮來自澗谷入吾室兮鑿石瀦水保蓊鬱兮零露宵泫珠的皪兮甘雨時濯淄塵滌兮中心愛之久無斁兮方士者流言可餐兮養心益髓將引年兮一寸九節可登仙兮帝經君録其言然兮豫乃獻疑進末議兮彭聃最夀終亦逝兮喬松飛升今安在兮屑而餌之蒲何罪兮毁璞雕刻玉不幸兮枯骨抱易龜隕命兮破為犧樽木失性兮彼美維蒲吾良朋兮前有韋編後黃庭兮全真育和共欣榮兮優遊卒嵗淡然其忘情兮辭鳴水洞辭并序艾西有澗水自黃龍山西流達于巴陵郡之平江而注于湘水平江故羅縣以地志考之此水即汨之原也其間泉石最佳處曰鳴水洞青山中裂水行石上懸注崖下為瀑流逺望之如曵縞素迫視如撞璚玉而碎之瀑布上水徐行則皺緑度石齒間多沸白如操琴筑音又其上石絶水為亹石之窪大小不一皆如古樽罍錡釜狀水與石爭怒聲澒洞如風旋雷吼兩崖皆峭險不可陟降蒼松數百株相扶瘦立枝格偃屈据木末俯眂崖下使人神凄髮竪有蕭條遺世之意崖上有轉雷亭韓舍人子蒼作而名之嵗久亭壞惟故址僅存沈粹卿擕酒邀豫逰其上愛其景清甚欲去復留豫不能飲亦纍數觴不醉薄莫始歸粹卿曰此境視之不減匡廬三峽畫之當勝輞川惜其在窮山深谷人無知者移而近通都大邑其價可值萬緡豫謂泉石之奇絶山靈愛護留以遺幽人勝士非求知于世俗也馬蹄車轍不至山間乃能全其清耳粹卿以豫言為善因識其大槩而系之以辭曰艾之西兮汨之原山石劃斷兮穹㠌而嶄嵓瀑流下注兮其上絶而為亹有蛟有龍兮伏而不怒雷鳴崖下兮窮年風雨誰斧鑿此雲根兮遺豫以罍洗松有樛枝兮屋之深深苔蘚斑斕兮織繢以為茵觴酒于上兮聽潺湲西峰䘖日半規兮徘徊猶未忍旋豫欲縆朱絲兮節清音而度曲招𤣥鶴使舞兮醉豫醽醁有玉韞櫝兮幽人之軸秋蘭之珮兮夫容之服瘦石寒泉兮矢其弗告四墉無隙兮巘崿青青白雲漠漠兮截洞口以為扄輪鞅莫來兮無傷我清不執劵而兼并兮莫豫與爭懷忠堂辭并序顔魯公知湖州作放生池又刻碑池上其碑見存池畔有魯公祠堂題曰懷忠北山程公嘗作楚辭一章刻石廡下其辭甚古然未盡事實因以辭續之跂逸駕兮前修佩武符兮典州迹已陳兮德新可敬而慕兮幾春復秋意其存兮閟千萬年之原謂其逝兮乃在浮羅之顚奮忠精兮取義貫羲娥兮爛然隘塵寰兮上征揮八極兮為仙黃鵠脫驂兮素虯停駟幾弭節兮念遺民而來顧髙辨蒼蒼兮清苕瀰瀰公來遊兮湖山增美遊觀罷兮來歸有蒲與荷兮清泠之池魚鳥懷生兮欣欣焉其有依銀鈎蠆尾兮燦翠珉而陸離絃琴兮擊鼓羞羔豚兮酌醑跪起以薦兮願公燕喜公燕喜兮吾民樂康却災沴兮蠲除不祥雲來兮萬祀蒸嘗兮不忘頌太廟瑞芝頌并序聖天子光奉貽謀嗣守神器兢業不懈日親萬幾間五日一朝于兩宫蒸蒸翼翼問安侍膳惟謹聖孝昭假天地祐助祖宗顧歆乃慶元五年秋八月壬申玉芝産于太廟太室之西楹越十日辛巳有司以聞詔丞相帥百僚縱觀參考圖諜是為上瑞維時近重明節鑾輿詣夀康宫奉香以進太上燕豫天顔怡懌越六日丙戌朝于夀康宫欵侍至日中昃清蹕始還九月庚寅朔用家人禮奉玉爵上千萬夀于宫中孝慈浹洽佳氣葱鬱于是公卿大夫及都人士女外薄海隅無不歡喜乃知國有大慶中外禔福廟社奠安休徴之來符應彰灼如此臣不肖秉筆𨽻太史氏敬敷叙本末書之汗青藏諸金匱石室以昭示來世永永無極又念昔漢甘泉宫九莖效異唐延英殿三花吐秀與産于廟楹不可同語而一時君臣動色相賀歌而詩之以自夸詡載在方冊猶為美談今瑞不虛出慶事鼎來福祿曼羡是宜被之管絃播于樂府以鋪無前之宏休臣職在鉛槧喑無歌詠附入英莖之奏則歸美報上義誠有闕心甚懼焉謹拜手稽首獻頌曰宋紹天命列聖重光丕緒舄奕施于無疆少海日升慶元五祀淵默面南格于天地於穆清廟玉芝呈瑞蔓蔓其華麗于丹楹匪根斯殖匪葩斯榮和氣融液不春而生其瑞維何祖宗咸喜神孫致孝孺慕無已有開必先産祥隤祉其孝維何神明可通問安寢門四輔翼從洗爵為夀雍雍在宫莫大之慶朝野攸同賚爾髙年曰豫錫類頒爵輔臣曰汝豫助三宫豈樂萬姓歌舞維我髙廟中興集勳神器所傳藝祖之孫重華之斷夀康之仁凝神冲漠不俟倦勤羣黎屬望天啓元子四聖揖遜千古顓美主鬯匪易秉心肅莊以奉重闈媚于慈皇崇德尚賢心膂股肱盡擯浮僞慈皇是承酬酢萬微未明當依不蔽不疑慈皇是以民附于仁天鑒厥誠對越在上祖宗之靈貺以瑞物胙其德馨昔在紹興芝嘗再茁仁皇英皇二祖之室曾孫篤之克肖其德受是珍符寵綏四國曷以祝之萬夀無極又曷申之子孫千億有德有瑞隱顯合符自今以始史將婁書皇德日新勿替厥初樂府明妃曲掖庭國色世所稀不意君王初未知欲行未行始驚惋畫史乃以妍為媸約言已定不可悔氈車萬里隨單于玉鞍紅頰空回首烏孫公主王明妃髙皇兵敗白登下歸遣帝子稱閼氏欲平兩國恃一女烏乎此計何其疏至今和親踵故事延夀欺君何罪為此生失意甘逺去此心戀舊終懷歸塞雲慘淡氣候别風沙四面吹穹廬琵琶曲盡望漢月塞鴈年年南向飛公無渡河黃河浩浩不可航腰壺欲渡何其狂嫗挽翁衣願無渡忠愛深言反逢怒河流滔滔翁溺死老嫗搏膺淚如雨行人勸嫗莫痛傷痛傷之極能斷腸古來愎諌多不祥鴟夷浮江吳國滅老臣疽背霸王歇雉朝飛飛飛野雉雄挾雌相與孳尾為之妃人生誰不有配耦我生垂老為鰥夫永巷蛾眉幾千指一妻一妾庶人禮壯年受室不及時老去自憐身獨處短布單衣誰為縫東臯種黍誰共舂蒼天髙髙不可問願照衡茅有孤悶關山月隂山蕭蕭木葉黃風髙馬健弓力强鐵衣萬騎向北去仰看鴻鴈皆南翔身在邉頭家萬里嗚咽悲笳壯心死功成歸取漢爵侯戰敗沒為邊地鬼團團霜月懸中天閨中少婦私自憐捐軀許國丈夫事莫恨不如霜月圓白頭吟青絲織作雙鴛鴦紫絲繡成雙鳯凰在家不敢窺屏著心願出門逐夫壻琴中解道人心事不辭半夜將身去君親滌器妾當壚豈料賦成天上知臨邛舊事不記省千金多買青蛾眉嫁時衣裳今尚在妾貌未衰君意改當時去家恨太遲今日思家翻自悔玉環既斷不復連青銅既破不復圓古來佳人多薄命不見鸞膠能續絃但願新人同燕婉桃花長春月長滿飲馬長城窟春風塞草青邊城區脫靜秋風塞草黃邊騎角弓徑秦人驅丁夫築城備胸奴城成有虧日胸奴無巳時哀笳中夜起戰馬竪雙耳蒼茫沙上月幽咽隴頭水征人悲故鄉閨人守空房安得霍嫖姚飲馬瀚海旁門有車馬客烏鵲繞屋鳴有客停征騑問客何自來君家寄家書攝衣起迎客開書多苦辭蕣花不長好玉顔亦易衰水行有却流人行無反期置書拜謝客豈不心懷歸事君有明義不得顧所私作書附客返路逺幸勿遺上言重自愛下言長相思相思勿相怨自古多别離出塞曲羽檄走邊遽虎符出精兵壯士卷甲起骨肉送之行擊筑歌易悲挈榼酒更傾關山殺氣纒寒日無晶明箭落紫塞鵰馬裂黃河冰豈畏敵騎多只憂將權輕閫外不中制一賢當長城鼓行渡沙磧願勒燕然銘逺别離靜女不下堂游子志四方五花驕馬金絡腦出門僕從生輝光草青沙軟濕春霧玉蹄聮翩踏花去樓頭明月闕又圓西風一夕生庭樹明璫綴以木難珠錦衣繫以貂襜褕青眉玉頰為誰好天濶飛鴻無素書今年花落容華在明年花發容華改離鸞别鵠不自憐人生難得長少年擬古閨怨三首為郎縫春衣春盡郎未歸羞見庭下花一雙胡蝶飛二良人久在外想像裁香羅放下金粟尺無言顰翠蛾三花開復花謝墮在藩溷邉不惜花落盡惜無長少年粧樓怨并序曽開府有內嬖二人置之别第曽死夫人逐之扄其門無為王宰曽客也為賦粧樓怨蜀人韓毅伯賡之毅伯過臨湘話其事因出詩藁炎亦賦一篇長安甲第凝丹碧門外如雲珠履客主人對客懶將迎别有洞天雙國色簾幃不動春風香乃翁但醉流霞觴緑絲垂地細君惜從今可老溫柔鄉歡樂短憂恨長鳯飛何在遺其凰不言不笑念恩怨明月無情窺象牀春暖花枝啼曉露此身今是花無主可憐髙冢卧麒麟不許畫樓棲燕子薄薄酒薄酒可成禮何必飲上尊醜婦可成室何必求麗人人生有欲皆求得誰能有得終無失多藏未免誨穿窬厚味亦能生疢疾青鞋緩步可當車不用駟馬黃金羈茅簷之下庇風雨不用丹碧文榱題緼袍布衾亦自暖不用狐裘蒙錦衣萊羮脫粟亦自飽不用五鼎羞鮮肥月盈不償闕物盛必有衰逐客可相亦可夷餓𨽻為王又為菹欲從意滿神所忌吉凶反覆相乘除吾聞猩猩罵人非不智以醉就禽猶惜屨黿鼉窟穴深更深卒為人得由貪餌古來達識照其幾外物視之雙弊屣於陵辭聘寧灌畦禦冦辭粟寧忍飢逃榮無辱二疏去今是昨非陶令歸請君莫嫌薄酒薄瓦甕匏尊任斟酌請君莫嫌醜婦醜荆叉布襦與偕老天寬地大得自由如此足矣何多求雙溪類稿卷一
