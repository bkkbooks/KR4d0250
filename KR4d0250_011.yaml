body:
  text: 雙溪類藁卷十一宋王炎撰表賀太上皇帝慶夀表代天開華旦永垂統於千齡嵗發熙春初儲祥於八帙集邦家之殊慶混夷夏以同歡中賀竊以唐堯釋在位之憂勤乃登上夀黃帝全此心之清靜覬獲長生孰能獨存而常今茲方一遇乎大聖中賀恭惟尊號太上皇帝陛下退藏於密允執厥中雖淵默以凝神何思何慮然海涵而施澤益逺益深刑好生而盡仁兵不殺以為武故上帝垂休於罔極俾斯民受賜以無疆矧惟與聖子以御圖可以葆道真而養性宜安榮之寖久膺戩榖以滋多禮備玉巵豈特至再至三而未已䇿增寶鼎殆將時萬時億以難窮臣外守魚符遙瞻象魏乾坤喜氣屢騰嵩嶽之呼臣子真情猶效華封之祝太上皇后箋太帝垂無疆之統共享康寧嗣皇承莫大之休永勤尊養洊蕆儀於上日益儲祉於長秋中賀恭惟尊號太上皇后殿下德備坤元化行隂教參堯道巍巍之大興舜心業業之思父母尊而親具全華旦之慶天地長且久愈見歷年之多臣仰被榮光欣逢嘉會夀曰五福之一既並崇髙歡呼萬嵗者三願兼祝頌今上皇帝表堯仁天覆永膺眉夀以儲祥舜孝日嚴復即首時而稱慶凝兩宫之喜氣溢諸夏之歡聲中賀竊以漢前殿之奉巵唐淩煙之置酒非有無疆之景福莫能申講於上儀顓是宏休屬于華旦中賀恭惟皇帝陛下欽承慈訓纘紹皇圖乾稱父以至尊大函三極日為君而久照光著重輪事無傳於千古之前禮再舉於十年之後毋兼乎愛翟衣愈共於康寧下被其恩鳩杖寖多於耆艾臣外居侯服遙望宸廷象煥鈎鈐仰覩聖人之至德䇿增寶鼎願齊太帝以長生今上皇后箋日謹三朝贊中宸之欽愛嵗登八帙奉慈極之康寧儼褘翟以蕆儀偕衮龍而增喜中賀恭惟皇后殿下德全柔靜行備肅雍千億之多子孫益衍周家之慶五十而慕父母克同舜孝之誠共迎葭管之春再上玉巵之夀臣幸膺屏翰欣際休嘉依光離日之華永瞻繼照觀象軒星之次仍見重暉賀太上皇帝慶夀表代黃屋非心久儲神而自逸玉笄嫓德並受福以無疆稱盛禮於中天沸歡聲於薄海中賀竊以坤配乾而稱母廣大惟均日有月以齊明照臨不息偉矣無前之盛事見於有道之熙朝恭惟尊號太上皇帝陛下凝命穆清遊心淡泊始齊家而治國終與子以御圖在中得大姒之賢克傳隂教配極並帝堯之夀申錫天休慈孝交孚邇遐來賀臣乘軺于外委佩無繇考六籍之傳聞尊榮獨盛想兩宫之娛樂祝頌彌深太上皇后箋長秋正位肅慈壼於九重端月始和衍夀祺於七帙享嗣皇之孝養齊太上之康寧歡洽宫中慶流宇內中賀恭惟尊號太上皇后柔恭粹美慈儉宣昭方紹興三紀之憂勤既資輔佐宜德夀萬年之福祿同極尊榮豈但見春秋之彌髙蓋將同日月之久照臣逺乘驛傳阻接廷紳春滿玉巵遙想衮龍之喜氣雲深紫殿莫瞻禕翟之榮光今上皇帝表慈壼儲祥既並堯年之永昕朝展寀益彰舜孝之隆喜溢宫闈歡傳宇縣中賀恭惟皇帝陛下膺圖出震繼照重離繇成德之溫文兼事親之欽愛萬年為父為母福既駢臻四海悉主悉臣養斯極至假有家之燕喜推錫類之龍光臣原隰驅馳雲霄髙逺遙想奉巵之慶莫側鴛行俯同扶杖之民但深雀躍今上皇后箋偕九重而侍膳祗奉母儀慶七帙以奉巵庸昭婦道新盛時之縟典騰諸夏之歡聲中賀恭惟皇后殿下位配乾剛德全巽順形慈儉於萬宇著肅雍於兩宫禮始內朝迎春祺而展慶化行寰宇勑天敘以移風臣越在外臺莫陪邇列聞熙朝之為夀如隔九霄慶象服之承顔當彌萬祀賀太上皇帝慶夀表代慈極自頥凝萬年之景命中闈偕慶紀七秩之宏休喜溢堯廷歡均禹服中賀竊以德之大者斯能得夀道之妙者乃能長生居乾父坤母之尊在日君月妃之上匹休如此振古無斯恭惟尊號太上皇帝陛下誠極粹精心潛清淨玉螭有受獨觀昭曠之元禕翟與娛宜襲康寧之福難老並膺於天錫又新永受於春祺榮光瑞氣無逺而不周盛事縟儀自今而繼舉臣幸逢殊慶限在外僚仰望紫微聮鈎陳而一色俯同黃髮效嵩嶽之三呼太上皇后箋蘭殿居尊並慈皇而介夀玉巵行慶朝聖子以蕆儀喜浹兩宫歡傳萬宇中賀恭惟尊號太上皇后殿下中臨戊位大配乾元弼成揖遜之風並受康寧之福陋金母之坐少廣同黃帝之得長生柏酒浮春及時以禮自樂椒觴錫嘏受命無疆惟休豈但七十嵗自古所稀惟曰萬億年由今以始臣與聞盛事越在外寮占南極老人之星彌新瑞證望鉤陳太帝之坐永煥祥光今上皇帝表母儀正位配慈極之無疆聖孝竭情喜夀祺之有衍盛儀行於廣內和氣溢於區中中賀竊以禮莫大於奉親福尤難於得夀惟中心欽愛根於獨至之誠故上帝監觀錫以非常之慶恭惟皇帝陛下震亨主器離照繼明為人君止於仁克廣因心之善以天下養之至益彰順志之誠固將膺戩榖於千齡豈但紀春秋於七帙榮光上著日月為之增輝惠澤下覃夫婦宜於偕老臣身隨漢傳心在堯廷不須占天紀之三星始知至德但願呼嵩髙之萬嵗遙罄愚衷今上皇后箋象服在中謹晨夕問安之禮燕朝行慶見春秋紀嵗之多歡洽兩宫孝刑四表中賀恭惟皇后殿下俔天作配應地用柔彤管無違恭肅俯齊於嬪御禕衣有翼愛欽仰事於舅姑衍七帙之宏休偕九重而共喜臣驅馳原隰瞻望雲霄有顯德在天廷仰望四星之明潤受介福于王母願齊萬夀之崇髙賀太上皇帝尊號表代定寶命以貽謀退藏妙用罄輿情而歸美益著鴻名皇册屢書帝廷增慶中賀竊以羲皇上聖未彰揖遜之風堯舜至仁僅斂夀康之福惟此宏休之獨盛是宜顯號之兼隆然乾坤廣大或可以形容而日月光輝終難於畫繪尊號太上皇帝陛下龍飛無亢淵默自頥釋黃屋之勤心獨遊於物表撫赤符之仁運嘗濟於區中大業久而寖昌正統傳之罔極赫赫睿謨之著巍巍成烈之崇其中存不測之神豈容擬議所寓皆有為之迹庶可名言臣仰望清光越居外服嘉平紀臘幸傳聞鏤玉之文太蔟回春即遙贊奉巵之喜太上皇后箋位正長秋並慈皇而介夀禮行華旦受聖子之推尊光輝鏤玉之文蔥鬱塗椒之喜中賀恭惟尊號太上皇后殿下行兼慈儉道極含洪方堯居黃屋而勞心既勤輔佐及舜在岩廊而拱手遂極安榮宜都天下之顯名以著帝廷之殊慶允矣母儀之盛粹然壼德之全臣外守價藩幸逢熙事慈專意美無彤管之前聞永見崇髙享紫宸之至養今上皇帝表受命無疆本貽謀之燕翼恱親有道益歸美於鴻名喜溢天廷歡傳海守中賀竊以漢尊太上第為簡略之稱唐奉大安莫著欽崇之典惟顯號有加而無已乃宏休振古而未聞恭惟皇帝陛下心極愛欽德髙揖遜舜其至孝既克紹於基圖堯曰放勳遂兼隆於聲實矧慈闈之均慶宜皇册之增崇炳若丹青一字不聞於溢美寫之琬琰千齡將見於滋多臣逮事兩朝阻陪百執翠輿夙駕遙瞻天仗之嚴龍衮交暉難祝聖人之夀今上皇后箋天子有尊而有父備彰婦道之勤聖人得夀而得名益集皇家之慶禮行前殿歡洽內廷中賀恭惟皇后殿下靜體坤元柔兼巽順下齊嬪御成六宫雍肅之風仰奉舅姑贊萬乘愛欽之德爰增顯號用表宏休臣外守價藩幸逢華旦傳聞丹陛煥鏤玉之彌文遙想藻旒映禕衣之喜色賀太上皇帝加上尊號表時臨江權軍儼蠖濩以凝神心存清淨擁鴻休而建號德寖明昌將披皇册之文丕顯帝庭之慶中賀竊以天子有道惟揖遜之最髙聖人無名豈形容之可擬第歸美以為報難固辭而弗居推崇允屬於九重愛戴實均於兆姓恭惟聖安夀仁太上皇帝陛下成功不宰藏用無為淵衷自得於遺珠塵務悉輕於脫屣雖浩浩其天之逺微妙何窮然昭昭若日之中英華可睹肅雍似文王之聖欽明體堯帝之安夀不止於萬年仁永同於一視出綸誕告已流諸夏之歡聲鏤玉增光行襲兩朝之縟典臣親逢熙事攝守下州瑞氣鬱蔥遙想未央之喜輿情闓懌益知太極之尊太皇太后表配烈祖以造邦永新景命篤曽孫而嗣服宜衍徽音出渙汗於大庭洽歡心於廣宇中賀恭惟夀聖隆慈備福光佑太皇太后殿下厚踰坤載髙在極先韜漢掩姬正四朝之內治孕虞育夏贊三禪於皇家於昭出日之重輪莫測補天之五色答民瞻仰發輝光於專靜之中挈國平寧勤保佑於纘承之始實循名而益顯功與德以兼隆垂百世之宏休無一詞之溢美臣攝官符守聞命郵傳申講上儀因以知九重之欽愛俯殫善頌期於增萬夀之安榮皇太后箋思齊文母儷皇極以貽謀於赫湯孫增鴻名而歸美孝形廣內歡洽寰中中賀恭惟夀成惠慈皇太后殿下夙稟柔恭日行勤儉兼娥英之淵懿際虞夏之明昌色養太皇體愛欽之要道心循昭考開揖遜於後昆以聖聖而相承惟尊尊之為大順存乎惠仁發於慈表章令德之休羡曼熙朝之慶事有光於圖史禮益盛於宫闈臣代匱武符馳誠魏闕金聲玉振獲聞帝典之溫文河潤山容彌覺坤元之博厚太上皇后箋並大帝以宅尊退藏於密順嗣皇之歸美必得其名藹瑞氣於長秋流歡聲於區夏中賀恭惟夀仁太上皇后殿下德方以靜用晦而明坤為母於兩儀震得男於一索方憂勤而相警俄清淨以自頥父子三朝迭揖遜冕旒之下婦姑四世洽愛慈宫壼之中宜紀鴻休以儲燕祉夀方增於未艾仁愈熟而能安將練日而蕆儀備成熙事可移風而成俗克廣孝心臣攝守左符馳誠北闕恭承渙號知天長地久之無窮倍覺輿情覩海潤星暉而胥慶皇帝表若帝之初既誕膺於駿命尊親之至宜丕闡於鴻名喜溢三宫歡騰六合中賀竊以逺稽堯舜嘗聞埒美於勳華下逮商周莫覩親傳於父子惟熙朝之盡善視邃古以無前自非顯號之鋪張孰識宏休之淵懿恭惟皇帝陛下中函睿哲外發溫文出蒼震以御圖協黃離而臨下允矣繼承之有道海潤星暉粹然欽愛之由衷天明地察案六經而校德宣二祖之重光必得夀而得名聿申景鑠資事父而事母並著徽音臣攝守魚符遙瞻象魏雲章在上方將寫琬琰以維新冗見何知但務誦絲綸而胥慶皇后箋前殿宣猷建三宫之徽號內庭協慮廣萬乘之孝思家國榮懷神人恱穆中賀恭惟皇后殿下體坤柔順用巽潔齊依離日之繼明粲軒星而齊色以婦婦偕於子子具嚴大寢之朝自親親達於尊尊克篤重闈之慶搜上儀於鏤玉凝喜氣於塗椒臣攝守下州恭承大號但與旄倪之衆不勝鼓舞之情賀登極表代帝統無疆垂貽謀之燕翼天心所與履正位以龍飛宗社安榮華夷凱懌中賀竊以舜禹之盛非由父子之親傳商周以來莫覩聖賢之相授獨顓厥美創見于今恭惟皇帝陛下德極愛欽道全精粹震亨主器雷聲久發於青宫離麗重明日照遂升於黃道惟天地啓非常之運故邦家襲莫大之休盡孝事親永底一人之慶推仁厚下益隆萬世之基臣假守方州阻趍魏闕乾元正始函生共樂於春回辰極居中在外咸同於星拱賀郊祀表宿齊清廟極德産之精微宵陟圜丘假帝心之歆饗裒時多福惠此黎元竊以天地對祠致百神之受職祖宗作配彰萬世之垂休聿修昭代之上儀茲見聖人之能享恭惟皇帝陛下心傳堯道躬握乾符物阜時康和氣已周於穹壤刑清兵寢成功可告於神明罄四海以職來間三年而郊見璧琮異禮繭栗貴純以德召祥寶祚用申於景命與民同慶綿區遂浹於湛恩臣叨列皇華預聞熙事泰壇展寀莫陪百職之聮宣室受釐但祝一人之慶又泰壇升燎嚴合饗於兩儀法駕鳴鑾行親祠於三嵗百神受職萬國均釐中賀竊以議禮惟享帝之非輕尊祖以配天而為極稽諸周制用迎長至之陽參以唐儀兼陟大祗之位備茲縟典屬是盛時恭惟皇帝陛下繼聖重華躋民纍洽中和兼盡禮樂測乎髙深欽愛彌彰天地為之明察路寢間修於宗祀郊丘復展於精禋奠蒼璧之二純協黃鍾之六變誠心昭假熙事備成薦明德之馨香永膺多福推至仁之慶賜下及兆民臣叨守價藩幸逄嘉會望清光於皇邸莫與駿奔聆渙號於雞竿遙同呼舞賀天申聖節表電繞北樞開皇天之申命日行南陸符赤帝之乘離罄夷夏以歡呼祝乾坤之悠久恭惟皇帝陛下宅心抱一立極函三解帝堯黃屋之勤聖而有繼來王母玉環之獻德則無疆臣逺守郡符夙叨從槖想鈞天之九奏莫望清光效嵩嶽之三呼敬伸善頌乂望氣鬱蔥是日肇無疆之慶遊心淡泊自天增有永之年享至養於九重溢歡聲於億兆恭惟皇帝陛下存誠不息藏用難名既命重華精一傳於此道乃同黃帝清淨可以長生儲祥由北斗之樞斂福有南山之夀臣逖違朝列外守侯藩日著重輪但仰照臨之久嵩呼萬嵗敢忘祝頌之誠又漢統中天開殊祥於震夙堯仁得夀體不息於乾元沸嵩嶽之歡呼伸華封之善頌恭惟皇帝陛下宅心淡泊凝命穆清超黃帝之長生享重華之至養紀千秋之金鑑福祿無疆稱萬嵗於玉巵孝慈兼盡臣逺乘軺傳阻入端門紫氣鬱蔥喜遇光華之旦黃星明潤潛占昌熾之符又申命自天興赤符之熙運遊心于道得黃帝之長生罄六合以贍依祝千齡之昌熾恭惟皇帝陛下存誠精粹玩意穆清乾健乘龍功既成而藏用震亨主器德可久以垂休凝瑞氣之鬱蔥襲殊祥之羡曼臣外留楚澤仰望堯雲玉色晬溫想鈞天之萬舞丹衷悃愊效嵩嶽之三呼賀會慶聖節表電繞樞星運應東南之王氣天旋陽月德全西北之乾剛萬夀無疆四方來賀恭惟皇帝陛下宅中博大凝命穆清治寖明昌握漢符而興統誠兼仁孝行堯道以重華如日常明後天難老紀甲觀儲祥之旦修露囊稱慶之儀臣心戀闕庭身縻郡紱望卿雲之五色猶逺龍顔效嵩嶽之三呼但勤虎拜又慶嘉會於天庭祥開大電溢歡聲於海宇夀祝南山增日月之光華配乾坤之悠永恭惟皇帝陛下體元無息凝命維新孝德冠乎百王仁心浹於萬物山川貢瑞佇來王母之玉環臣庶均歡尚陋開元之金鑑臣逖違象魏分守魚符莫陪漢殿之周行稱觴再拜但效堯封之善頌委珮三呼賀正璿璣齊政行夏正之首時路寢蕆儀循漢京之元會輻湊四方之賀鼎新諸福之祥恭惟皇帝陛下協帝重華紹天明命體乾元之發育迎泰道之亨嘉九賔肅序於鴻臚六典昭垂於象魏奉玉巵為夀接千嵗以承休振木鐸於朝釐百工而謹始臣久違內服逖守左符瞻紫極之居中莫聮星拱慶青陽之布德但有嵩呼又東郊春至潛回萬彚之和南面天臨盛展三朝之禮永膺多福日靖四方恭惟皇帝陛下受命于天重華于帝在璿璣以齊七政爰始嵗功坐明堂而朝諸侯聿修元會垂典章於象魏來規諌於瞽矇聖德惟新而又新神策亦朔而復朔臣叨分外闑久去中都頌美椒觴尚記在廷而稱夀令傳木鐸敢忘恭職以輸忠進賀瑞芝詩表紫宸致孝鞏奕葉之丕圖清廟産祥發成華之上瑞三宫同慶九有均歡恭惟皇帝陛下寅奉貽謀嗣膺寶位視勳華而無愧行曽閔之所難欽愛潛孚神明昭假萬年億載蘄聖父之康寧一祖十宗眷文孫而佑助丹楹有煒瑞草其芳曩者並生嘗在紹興之盛際今焉挺秀乃臨太室之西偏錫此鴻休開其燕衎乘輿稱警方瞻天仗之移大寢問安果見龍顔之喜四方來賀萬福攸同宜敷繹於聲詩以鋪張於盛事臣等濫塵册府欣覩珍符況遇蕆儀行前殿奉巵之禮敢因歸美續齋房案謀之歌進易解表韋編淵永非淺識之能通斧依天髙覬邇言之致察妄陳末學上瀆聖聰竊以道載於經易為之祖馬圖示象犧畫成文首開天地之祕藏微顯帝王之妙用六爻以變乃分西伯之二篇八索既除遂有東家之十翼發揮不隱垂示無窮幽至於行乎鬼神顯足以措諸事業遭秦虐政僅為卜筮之書在漢諸儒未達乾坤之藴末流浸甚本旨俱亡雖竭心思各持臆見京孟失之譎詭是生讖緯之端王韓矯以清虛偏雜老莊之説紛紛如是泯泯至今欲扶正學以示人亦有儒先之名世然繫辭精矣可信而翻疑且互體昭然當詳而反略或説明而義淺或語約而理偏通於數者不及玩辭釋其辭者又迷立象自出新意乃捭闔以為竒兼拾舊聞復支離而多鑿微臣何者獨學無師念先人老死於窮閻以經術竊傳於諸子困斯憤悱晚益鑽研味微言於六十四卦之中望先聖於數百千年之上參之衆説折衷良難斷以已私顓門何取閲朝華之易謝歎春木之方芚卦有畫則其象具存象有意則非辭莫達是謂以蠡而測海烏能得兔而忘蹄幸世道之交興逢聖明之有造微如爝火何禆日出之輪動以震風亦發地鳴之籟兹蓋伏遇皇帝陛下體乾精粹用賁文明比附得民鼎新凝命恱親有道率由豫順之和接下思恭務盡謙光之美升羣賢而交泰育萬物以由頥節不傷財旅無留獄飾法於豐亨之後除戎於萃聚之時善皆出於中孚動不聞於小過以成大有之盛而消未濟之憂行三聖之所傳莫非自得笑九師之甚陋安用多談尚期盛德之日新不恃成能之天縱亹亹政機之少暇孜孜經幄之多聞既知矣而重知故聖焉而益聖仰望虎生而文炳學兼極於髙明俯惟馬老則智專見終慚於精博第大道或存於稊稗而先民亦采於芻蕘成篇頗極於辛勤敷奏覬塵於乙覽持周朴而過鄭賈本自堪嗤用燕説而談郢書或能偶中賀生皇子表代蘿圖垂統茂開昌熾之期椒屋儲祥誕啓元良之正慶關宗社歡洽華夷竊以天子之尊重於繼體聖人之孝貴在寧親兹國本之系隆自帝心之昭假九廟益嚴於主鬯兩宫共樂於含飴恭惟陛下道始正家仁兼育物宜衍神明之胄以綿平治之休果拜貺於燕禖遂協占於熊夢值藝祖興王之嵗始同祥符育嫡於宫中春入青陽潛助震亨之起人知赤伏永傳離照之明臣幸託洪私欣逢嘉會祝帝堯之多子何待華封歌大姒之百男請賡周雅進日厯表時為著作郎祗遹燕謀並受得天之統鋪張鴻烈輯為繫日之編巨典一新奏篇惟謹竊以聖如堯舜載在典謨至於禹績之巍巍繼以夏書之渾渾繇今凖古同三聖之相承首事表年宜一經之有作恭以太上皇帝秉英睿之德撫明昌之辰方謳歌歸已之初雍容巽位及付託得人之後清靜凝神規模具見於五年軌轍可行於千載不疑不蔽臨照臣工克寬克仁惠恤黎庶恪守祖宗之成憲樂聞諫諍之盡言左戚右賢經文緯武纍洽重熙之甚盛久安長治而無窮雖修身以道之真莫窺其妙而應世有為之迹可見而知欲謀烈之昭垂必事辭之俱稱矧德夀重華之授受屬乾道紹熙之討論以著帝興而王成且明父作而子述將萬世並藏於祕府豈一朝可緩於成書恭惟陛下嗣守丕圖欽承慈訓得諸面命允執其中加以力行同歸于治參稽載籍信咸五而登三申飭著庭俾襲六而為七秩若編年之備粲然傳信之詳臣幸與贊襄獲顓庀領文臻麟止敢言序事之工喜動龍顔蘄助恱親之道請皇帝御正殿復常膳表時權禮部郎官為民閔雨極軫念以憂勤修德應天尚飭躬而抑畏既潛消於沴氣盍亟復於彞儀輒籲衆言進干聰聽竊以湯后罪已有桑林六事之辭宣王側身著雲漢八章之詠初嘗自警終以弭災恭惟陛下恩洽黔黎誠參蒼昊和無不應氣宜玉潤而燭明數有適然嵗或木飢而火旱稍愆膏澤過有焦勞避前殿而弗居減大官之所奉清思眑眑與造物以潛通興雨祁祁喜良苖之無害益顯上仁之庇下願裁變禮之過中分有常尊涖彤庭而聽治用當備物享玉食之供羞兹惟俯徇於人心是乃仰承於天意又天人相與既能動以精誠君父至尊豈可過於貶損重陳愚欵丐賜俞音竊以路寢當陽崇髙無敵宫垂侑膳豐腆有常借曰懼災若何廢禮陛下恤民慘怛事帝嚴恭導協氣以周遊致頻年之皆稔屬當朱夏偶爾愆陽遂發玉音喟然引咎推至仁而厚下降清問以求言凡所施為悉皆詳盡雖卑宫菲食亦惟誠意之所安然辨等設儀豈可邦彞之未復況雨膏之灑潤致民氣之昭蘇三日以往為霖共欣沾足一年之計殖榖可卜豐登宜答人心稍寬聖慮亟朝前殿會百辟以天臨仍詔內饔奉庶羞於日舉竭情控告得請為期又羣心合慮屢瀆天威聖志執謙未回淵聽竊以參天地之化雖帝王自致其誠道隂陽之和在輔相實司其職豈有遇臣之甚恕而惟責已之過嚴恭惟皇帝陛下以欽愛之道承事兩宫以寬厚之仁寵綏四海論富庶之見效文景何加若水旱之為災堯湯不免乃緣閔雨專務省躬申敕諸臣並祈羣望蠲逋散利弛禁緩刑詢訪盡言講求闕政以致祥而消沴皆務實而非文施德無私與天為一尚體扶持全安之意深存嚴恭寅畏之誠未稱警蹕於大庭不備珍羞於列等一人如此羣下何安伏望陛下外示尊榮中潛修省所以致隆於君體蓋將垂庇於民生謹酬酢於萬微益修善治責燮調於三事永底豐穰雙溪類稿卷十一
