body:
  text: 雙溪類稾卷十九宋王炎撰書見程司業丁亥比至都下盖浹辰矣一介之賤仰視朝廷之大夫卿公非介紹則無自而前惟鄉邦之先達則庶幾乎可以進於其庭盖其足迹固嘗屢至於執事之門驚顧却走而不敢遽入竊惟古之為士者將欲進趍於長且貴者之前則必有贄以自將其誠故不懼猖狂之罪而自薦其區區盖嘗聞之天下之勢已高則物下高者不可及而下者不能攀天下之定理也孟子曰孔子登東山而小魯登太山而小天下聖人固无勝物之心也不求勝之則不求小之而彼不能不小焉則是其勢之莫吾抗也聖人知天下之莫吾抗是故返顧其一已之道見其尊而畏其不傳是以未嘗絶天下之求天下之人自愚不肖等而上之為士為賢為聖人其别有四而聖居其極賢者次之為士者又次之愚不肖斯下矣愚不肖人情所甚不欲也而不能免焉則於聖人之道必且絶望於其心其愚者曰吾惟智不足也而聖人則曰是何害於明者丁寜而詔之烏知其不足以有見也其不肖者曰吾惟力不足也而聖人則又曰是何害於敏者徐徐而進之烏知其不足以有行也李翺皇甫湜之不能幾乎韓愈也侯芭之不能幾乎揚雄也公孫丑萬章之不能幾乎孟子也固也而終身得以自託於其門曰韓曰揚曰孟非固卑其道以狥人也其道則未嘗不高其心則未嘗自高盖其術固自夫子傳之矣自有生民以來未有天子之盛也得夫子之道而深者曰顔淵而止爾曰曾參而止爾曾顔之賢固不可以多得也天下之愚不肖者不足以道授之而可以授之者又難乎其人然則夫子之道其將何以傳嗟夫秘其道而不以傳天下且議聖人以為吝傳其道而不能廣天下又議聖人以為私吝則學者无所望而不敢求私則學者苦其難而不肯求天下皆无所求於聖人則亦何貴於聖人其无所貴於聖人也聖人不恤也而道之不傳聖人能自己於心乎吾决知其不能也貨殖之賜短䘮之予學稼學圃之遲其見陋而非逹其說甚鄙而不足觀而其有求於夫子也夫子未嘗絶之不絶其求故不拒其來而夫子懼門人之不知其心故曰二三子以我為隠乎吾無隠乎爾其為顔淵曾參也非夫子之厚之也其不能為顔淵曾參而為賜予之徒也非夫子之薄之也夫子之心存則夫子之道存曰孟曰揚曰韓吾以其道望之矣以其心而許之矣士非生乎其世非見乎其人而皆知其為孟為揚為韓者為其以道而傳於天下也生斯世也見斯人也可以自託於其門逆謂其不以道而授之也奚可哉不能傳之以其道是天下无聖賢也天下何嘗无聖賢昔者歐陽子以古學先天下而南豐之曾眉山之蘇在其門天下皆曰歐陽子即韓子也蘇子以文章先天下而宛丘之張淮海之秦濟北之晁在其門天下又皆曰蘇子即歐陽子也夫天下之士惟其來之廣也故所得者多二君子之門來者盖無絶法也是故天下之英才皆在焉必曰如是四五人者而後獲進於其門則天下之後學固將掃迹於先進之庭何者此固有以絶之也執事之名滿天下天下皆曰今日之程子即前日之歐陽子蘇子也炎也不佞或可以自託於程子之門而附名於不朽其道之深者雖未敢與聞而其淺者願有承於議論之餘子游曰子夏之門人當洒掃應對進退則可矣抑末也本之則無如之何子夏曰噫言游過矣盖非其離本未以為二也君子之於道也其趍必有途其進必有階其歸必有地無所趍何以進無所進何以歸趍者其明也進者其行也而歸者其至也其至則為學之力其明其行則為敎之功執事幸恕其狂而與之所以請益所以質疑則非書之所能盡言執事幸勿罪其瀆而許之干冐師嚴不勝戰越見洪宰炎所居去邑纔十里而遥閤下視事旣一載而炎通名於閽吏者僅一再以為賢令尹不可干以私而炎亦无所事乎私謁至於僕僕然拜伏以為㳟苛禮也閤下於炎乎无責為是故其進見也䟽雖然抑嘗聞之凢事可以誦言而无怍者則為公炎也不敢謁以其私今將有公事情義至切有不容黙者閤下幸而垂聽炎請言其詳夫王氏家于婺源之武水者逾十世而炎一房獨困弱不能振田土之存者无幾而自高曾以下其墳墓皆為強有力者所奪百年之木縱㝷斧焉以為材未拱把者亦剪焉而薪蒸之環其地加鋤耰以為桑麻菽粟之畦町塊然孤塚殆將剗而夷之矣嗟乎人誰无祖其害乃若是酷也過其下使人痛心墮睫不能止退而太息以思為之切齒不平然隠忍不發者私心盖有待也故至于今而後敢愬焉盖不可不愬者凢三而可畏者亦三所可恃則有一夫為人子孫其祖考墳墓殘毁于他人之手隂拱而不誰何是忘本也忘夲則不義不義則不祥此不可不愬者一也舉宗伯叔父曁羣從昆弟衆矣而迫於飢寒者過半炎始竊一第皆交相賀曰祖考尚有靈也哉繼自今墳墓必可以完今三年矣而攘奪者如初故宗族又以是來責此不可不愬者二也死者其无知乎則已矣如有知固曰待子孫之能自立者雪耻焉不然地下之目必不瞑此不可不愬者三也不可不愬者三然且不敢愬故曰可畏者亦三畏浮議畏怨仇畏訟而不勝何也訟非可已而不己之事也彼囂囂者不知其故必以為喜訟夫喜訟鄉黨自好者不為而炎肯為之乎不為何可受此名故曰畏浮議犯強有力者之鋒與之爭一旦之是非其力孤其為敵者衆是禍之招也故曰畏怨仇雖然古語有之禮義不愆何恤乎人之言則浮議可畏尚可以无畏无故而摶犬賁育有難色刺虎以救其親怯者奮臂而直前則怨仇可畏亦可以无畏所可畏者其惟訟而不勝矣乎有不平而訟以求直也一訟之不勝再訟之又不勝則終身氣塞而止矣故隠忍不發者為是故也至于今而後敢愬盖亦有所恃而一發之閤下剛不可犯明不可欺而將之以公老胥黠吏不得一揺手㺯法而強宗豪族皆惕息䑕伏无敢動凡事之屈有閱數令尹不能直者一旦而伸炎之所恃者在此故敢訟而无疑盖嘗觀春秋至於強大之兼小弱者如取根牟取邿取剸聖人皆直書不諱特書屢書不殺不以侵不以伐而以取為文者志其奪之易也奪者可怒見奪者可矜使聖人行王法以正其罪其地必有歸矣晉實據虎牢春秋以鄭書楚實兼彭城春秋以宋書吁春秋之㫖盖於是焉表㣲閤下執古經義以佐律斷獄弊訟必權其是非曲直之平炎得其所恃不見其所畏求直夫不可不愬之事向之隠忍不發也非緩而今之决於訟也非狠然理之所在寜過乎不敢毋過乎敢寜詳審熟慮於初母徒悔于其終炎猶慮閤下未審已之情如是其切而不平者如是其甚也故將訟于庭而先言其詳且炎以為天下之事强則易振弱則難立積弱則難立也滋甚何者勢不便而氣先索也炎固備嘗險難者也强有力者嘗陽擠而隂中之至于今日方痛定不敢忘亦不敢報氣之索乆矣恃閤下之剛之明之公而釋其畏心閤下幸而留聴豈特某與宗族舉手加額以无忘閤下之德九原如有知也或者其猶結草以報焉見張南軒炎聞少事長賤事貴不肖事賢有願見之心不可有亟見之意外不失人内不失己然後其道兩盡是故學者謹之三揖而進一辭而退古人於去就之際有義以權之禮以為節也炎㓜而學學而仕非為道也而出於為貧是故浮沉於下位不敢求當世君子之知而敷文劉公惠然顧之衆人之中引而進之炎之所以事劉公者有公事而无私請劉公亦察其麤能安於分義也而以其不肖之名聞於下執事執事者以劉公之言為信以炎為可敎也亦引而進之炎於是踴躍一來其意以為學問而非敢有他求也炎嘗聞學聖人之道若顔子曾子則見而知之若孟子則聞而知之孟子之後道之正統絶而不傳由漢以來士非不學而所以學者不以章句而以言語文章章句之學膠於陳言而不知古人之用心其以言語文章為重者亦未能入聖人之門而窺見其奥也今世論道學所傳學者往往曰自孟子之後漢有揚氏唐有韓氏然揚子以言語求道韓子以文章求道惟以言語求道故為法言曰吾以擬論語也為太𤣥曰吾以凖易也无西子之美而效其嚬亦増其醜而已矣惟以文章求道故為之說曰易竒而詩葩盤誥聱牙而春秋謹嚴與荘騷太史一槩而論之而六經之㫖晦矣且言語非不可以求道而道則非言文章非不可以求道而道則非文何者不落其華不探其實也炎之所謂學者不過舉子事業云爾言語之辨也文章之工也而其技極矣道則未之有見也夫易始於伏羲明於文王書始於堯舜詩始於商周而春秋筆削於夫子方其未有易書詩春秋也而禹臯陶伊周之徒其學何從得之數君子者為聖為賢靜而正心誠意動而開物成務天下之故不能眩其所見之明成敗死生不能揺其所立之固也則其學固有超乎言語文章之外而得之心傳黙授者炎返而求之心索之以思茫然其未有得也故願見先生而請益焉炎以為學道者其始必有所傳而其終有以自得之有所傳者學之方而自得之者其至也孟子之學傳於子思子思傳之曾子曾子則親見聖人而師之一貫之妙夫子不以語門弟子雖賜之逹不與也而獨以告曾子曾子曰唯一唯之外曾不容聲而門人問焉乃以忠恕語之忠恕非一也非一則曷為語之忠恕非一而可以入道故也子思之所傳者忠恕爾曰中庸曰至誠子思有以自得之孟子之所傳者中庸爾曰盡心曰飬性孟子有以自得之故曰自得之則居之安資之深取之逢其原而自得實難其入有門則其初不可无傳也盖自孟子之後道之正統絶而不傳二程先生鳴道於伊洛之間則道之正統絶而復傳今世語伊洛之學者非无其人然其下者不見於踐履其高者未免於差也夫不見於踐履則言逺而㫖近似逹而實蔽而不免於差則將以明道適以害道而已矣先生之學其傳之也得其宗其行也力其守也篤其自信也堅此今世學者之指南也語曰君子食無求飽居無求安敏於事慎於言就有道而正焉夫學者於其所見毫釐有所必討懼其差也故必即有道者正之况未有所見者而可无以發其聵聵乎炎為舉子時廹於伏臘之不給甘㫖之無以奉親也而假館於他人之門得學之功十三及出而為吏雖不敢一日捨學而嬉然有公家之事食其食亦不敢茍也而得學之功十一今將挈其孥以歸杜門却掃于歙山之陽早作夜寐以求増益其所未能䇿勵其所不逮是故願一見先生以發藥其愚夫櫽括多枉木不然則不直良醫多病夫不然則不瘳聖賢之門來者无絶法也先生以為可教而敎之則幸矣論十篇以為贄固以占其是非也詩曰高山仰止景行行止先生之道四海學者之所尊仰也詩曰中心藏之何日忘之先生肯賜之敎誨之言炎不敢不奉以周旋也干冐台嚴不勝悚懼見林鄂州子中炎聞物无必貴亦无必賤荆山之玉天下之至貴也而方其未有所遇也獻之者三刖其足不龜手之藥天下之至賤也而及其有所遇也用之者裂地而封物之貴賤无定如此炎推求其故而為之太息以悲夫天下之士誰肯甘心於无聞然不幸而无所遇則困於布衣沈於下寮卒與草木俱腐者不可勝計幸而有所遇則䇿足於青雲之上取富貴立功名者千百人之中不能一二也嗟夫士欲有聞於當世誠可謂至難也已炎生十五年而學為文三十有二年而僅登進士之科犬馬之齒四十而蹭蹬於九品之賤激昻之氣已衰飛騰之念已絶矣天假之幸獲趍走於明公之門不惟奉令承敎可以免罪又辱矜憐而奬提之炎之始望本不及此夫木落故榮水涸故溢月虧故生虫蟄故伸天下之理得失相乗窮通相因損益相權也炎之不才自揆無以求知於當世之君子於無所僥倖覬覦之中而獨遇明公人所賤而肯貴之人所弃而肯收之豈不龜手之藥或可以裂地而不止於洴澼絖耶貴賤在炎之終身而可否在明公之片言隻字炎不敢不言亦不敢凟也㕍之不鳴則不才而金之踴躍自言則不祥不言則是不鳴也言之之凟則是踴躍也明公必有以處此矣雜文一編因以為贄非敢以為文也干冐台嚴不勝恐慄上林鄂州炎一介書生始出而從仕獲居属吏之末无半面之識无游談之援无葭莩之奥助无左右之先容明公察其臨事不茍而信其亷謹无他取其寸長而略其所短降辭色以待之無以異於哲父察兄之愛其子弟古人所謂知己者不過是也雖然士之遇知己也固難而不負知己者尤難炎退而深思熟慮求可以獻其區區之誠者而未有以藉口今有所聞於道路之言亦不敢黙抑嘗聞之不可以言而言謂之妄可以言而不言謂之隠妄非也隠亦非也何者有所隠則不忠也炎荷明公知而愛之豈可不忠於下執事事有利害關於民而出於明公之所專行者不揆愚戇輒有所言不識明公肯恕其狂而聴之乎且天下之事不過利害兩端而已矣有利則行有害則止天下莫不知其然惟利害之相半者不可不審也自紹興中經界之法一行而江浙閩蜀之地寸量尺度无有隠漏惟湖右之田屢經兵火蕩為瓦礫之場鞠為草萊荆棘之墟狐狸所居豺狼所嘷人煙幾絶故經界之法不行焉比年以來朝廷寛恤州縣招誘四方之流移者稍稍聚集而疆畎漸修然民之占田者往往廣作四至侵耕冐佃故租賦不均而爭訟不息明公盖憂民之不能無擾也故以請之於朝立為三月之期而使民自陳占田之多而不自陳與自陳而不實不盡則告者得田浮浪之人而告焉不得田而得賞炎以為明公之意本以利民而求息詞訟然詞訟未必遽息也竊聞閭巷誹謗之議皆曰使民違期而不陳彼且以不陳告之先期而自陳彼且以不實不盡告之夫民雖自陳而有不實不盡者盖湖右之地旣未嘗方量凢佃田者只以十分紐計為畆炎未知明公欲民自陳之實之盡者必以六十歩為角四角為畆歟抑亦只紐計分數多増苗役歟夫苟止於紐計分數多増苗役則凢自陳者若用畆角打量隠漏尤多告訐者得藉以為辭官吏亦无由可絶其辭也若必積歩為角積角為畆則去年户部看定葉承議所請已曾行下謂方量之法恐至括責搔擾不可施行今欲遽用歩角打量民田則與行經界之法何異哉必不得已使民依方量之例有十畆之田必以十畆自陳有百畆之田必以百畆自陳而後欲告者無所容其喙竊恐民有所甚不堪也夫田野之利病惟出入於田野者能知其詳且今占田之廣大抵其初斬荆棘翦草萊而耕之固有以數十畆為一畆者雖接次自陳然猶以數畆為一畆本欲誘民使耕故寜捐閒地以予之而不欲校賦役之多寡然毎畆所輸於官者役錢以四百八十文為率苗米以一斗為率崇陽如此他邑恐多寡不齊而計其所得於田者膏腴之田一畆收榖三斛下等之田一畆二斛若有田不能自耕佃客稅而耕之者毎畆所得一斛二斗而已有牛具糧種者主客以四六分得一斛二斗若無牛具糧種者又减一分且以三斛計之秋熟之時糶榖一斛得錢二百五十足是二斛之榖方能辦一畆役錢餘有一斛用以輸米一斗凢諸色費用皆取辦於是若以四角為畆毎畆所收盡以輸納猶不能足况下等之田所收不多佃客耕之者其入尤少民何以堪其責哉大抵湖右之田與江浙閩中不同雖有陸地不桑不蠶不麻不績而卒歲之計惟仰給於田縁其地廣人稀故耕之不力種之不時已種而不耘已耘而不糞稊稗苗稼雜然並生故所藝者廣而所收者薄豐年樂歲僅可以給一或不登民且狼顧非江浙閩中之比也今江浙閩中之田毎畆所納役錢不過三四十文所納苗米不過二三升而已未有納役錢五百苗米一斗者則湖右之民占田雖廣亦一畆供數畆之稅矣或曰江浙閩中苗役雖輕然有夏秋税絹與折帛茶租銀錢及豆草之属至於絲綿紬布隨其土産之所有者各有所輸其數不鮮也是則然矣然江浙閩中能耕之人多可耕之地狹率皆竭力於農毎畆所收者大率倍於湖右之田又其秋熟而收新陳之交而糶所得緡錢較之湖右則又數倍矣兼其人旣勤於本業必蠶必績故所輸雖多而民力可辦是未可以一律齊也然炎世家於徽江東之人也竊見比年中産之家困於輸賦之難舉債鬻産以應縣官之期限者十室而五在彼猶有所不堪則此土之人不少有以優之不可也夫御乆安之民者其法猶可嚴撫新集之衆者其令不可急何者寛之則聚而急之則散故也向也惟患地之不闢民之不集故誘之使至今也耕墾猶未能徧則責其占田之多而開告訐之門民其能無觖望乎夫浮浪之人游手而不事生業无頼而喜訟平時惟恐無以挾持良民之短長今明告之曰我許爾告人占田之多者爾能告吾以賞與爾又明告之曰所得之賞凢百緡夫訐人之罪而已獲厚利彼何惮而不告哉是官之所得者不多而民被其擾有不勝言者矣或者必曰使民有田者自陳以實雖喜訟之徒亦不能告也是不然今使人有百畆之田必以百畆自陳而後實以九十有九畆自陳謂之不實不盡可也則可告者連墻接屋矣如盡其實以自陳民力不堪逃者必衆自陳必實因人之告籍其田而歸之於官苗役旣重誰復承佃已墾之田一二年又復荒而不耕則是自陳不實所以長告訐之風自陳必實又以致逃移之患二者均有害也炎以謂若欲優厚於民則往年李顯謨所請之說為善凖乾德四年詔書誘民開耕已耕之田更不通檢夫寜使官之所入者少而不使民弃田而不耕故曰此優厚於民之說也若欲斟酌其中而處之則去年戸部看定胡知軍所請之説為善凢民田之荒者立限一年如一年之外猶荒而不耕許人陳請仍不許請己耕熟田夫熟田雖多而不問荒田不荒而可奪故曰此斟酌其中之説也若欲盡其詳則莫若盡行方量而以分數從輕起税夫方量則均均則詞訟可息以分數從輕起税則民不告病民不告病則安其業而不至於流移故曰此盡其詳之説也雖然前之二説在明公旣不可以復行而後之一説在明公亦未可以遽議幸而明公之敷奏欲民自陳畆角而未曾該説打量炎有二策敢以為獻其一欲乞明出牓文行下諸縣詳諭民以自陳之説凢隠匿之多者則十畆之田使之再増十畆百畆之田使之再増百畆如隠匿之少者則十畆之田使之再増五畆百畆之田使之再増五十畆崇陽通城蒲圻大率如此他縣可増益者不能盡知所陳已及此數雖有告者却而不受則民有所恃頼矣其一欲使民自計在戸之田所收之數若干田隣保明同共罪罰自陳于官令佐總其一縣之大數以均敷其租於舊額之外而倍増之則公家固有所益矣不必待姦民之告訐也然増田之䇿不能无欺其事簡而易行均税之䇿可以无偏其事繁而難舉更在明公擇而用其一說不然寛其期限兼是二説以喻民使之各從其便而行焉則可矣捨是非特長告訐之風致流移之患也以崇陽一縣言之又有甚可慮者聞之土人曩者人煙㫁絶荆棘彌望暴客嘯呼出没於其間白晝操戈殺人掠取財物縣之官吏非特熟視而不敢誰何且惴惴然不能自保紹興末有鄭提幹者來治是邑始置鎗手防護數與賊闘无慮殺數十人自是盗賊之蹤稍絶然所謂鎗手者多流徙而至者也今一旦窘於賦役且散而他之則道塗鄉落不能无枹鼓之警也炎之愚何足以謀事然荷明公知而愛之是以馳心於門下懷不能已輒有所言不然以属吏之卑望專城之重兢兢焉奉令承敎猶恐有咎豈敢若是喋喋哉干犯台嚴无所逃罪見劉司業文潛炎聞為下能緩於求知為上能急於求士則踈賤者必不見遺而所謂賢且才者皆可以有聞於當世自夫上之求士也略而下之求知也重夫然後貴賤之交始離而不合而士之湮没老死而无聞者始衆盖當今之世爵位通顯而號為當路之貴人者其自處甚高而微官小吏之事之者趍走於門廡之下傴僂而升堂屏息拱手而却立其勢若不可聆其謦欬之音而冀其一顧間有預使令䝉薦寵者問其所自則宦學之舊也姻黨之私也權要之請求也茍无是其見遺也必矣故夫布衣寒士孤立而無援者學而仕仕而求逹也實難幸其自知之明自信之堅則寜不逹而止爾而不肯撓而為非自知之不明自信之不堅則相率而為躁競茍可以媒身者无所不為而恬靜剛介有守之士不以為僻則以為拙矣家有拱璧其直千金韞櫝而藏之扣人之門而願鬻則其物必賤士誠顧其中而稍有所挾豈其果於自輕其身不知進退去就之有義窮通之有命也而逐逐焉舍己以狥人則其人之賢否不問可知矣炎新安之賤士也流落湖外于今二年其仕不居人之先其齒不居人之後固不敢謂自知之明自信之堅者苐惟其至愚不肖无以求知於當世是故進則不敢有僥倖之心退處其賤而安焉明公持節鼎來未踰時也而道路往來者之言曰今之君子是是而非非見惡必怒聞善必喜未有如明公之别白无疑也炎方以未得進見於堂下為恨繼又聞之太守林矦通守趙矦忘炎之亡用而以其姓名聞於執事明公不待識其面目而以二矦之言為信遂有意於收録之甚矣明公急於求士殆不啻在下者急於求知也然炎於此有所甚喜而繼之以懼夫明公居今之世不狥今之俗其學足以明天下之至正其氣足以全天下之至剛其節足以守天下之至直後進之士尊而仰之如太山喬嶽惟恐不獲附託於門墻炎獨何為者未及拱揖拜伏於前明公乃欲一舉手而振之泥塗之中此天下之至幸也豈特炎以為喜僚友交游實為炎喜之雖然明公以部使者之尊亷訪一路此天子耳目之寄也有所可否好惡所以示天下之公豈其於一介无聞之士獨私喜之而私與之其與之也則必有以望之也而炎也為貧而仕携其孥以就斗升之粟其計本以糊口而其愚且不肖无所堪用也明公有以望之而炎无以應固懼夫見與之亟其不免於見弃之驟矣雖然此小人之過計也君子之於人也待之以恕而不嚴茍嚴矣其望之者厚而責之者重人始病乎為善之難而至於自弃君子惜其自弃也故待之者恕則望之者輕而責之者不詳其可用也則用之其未可用而可敎也姑敎之炎以為士之自立於世而著見於不朽者有三其上以德其次以功又其次以言有德賢者之事也有功才者之事也旣不能賢又不能才其身未寒其名先沒矣故嘗畢力於區區之空言而其文之鄙陋近不可以行於今逺不可以傳於後者則无師法之病也孟子曰大匠誨人必以規矩學者亦必以規矩是故奔走而來齋心而有請也幸明公授以規矩而使之守之非明公之不遺㣲賤則炎隨羣而進逐隊而趍而已矣不敢若是凟也干冐威嚴無所逃罪惟執事者貸之雙溪類稾卷十九
