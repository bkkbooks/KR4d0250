body:
  text: 雙溪類稾卷十五宋王炎撰啓賀趙總領冬啓黄鍾肇始甫當來復之時金節有光倍擁類升之福某官才周世用望著宗盟華貫翺翔旣含香於郎省上游控帶暫餽餉於師干宜同陽德之亨益茂神釐之介某叨乘使傳阻造賔墀敢伸削牘之恭遥贊稱觴之慶吳提刑象候清堂日躔南至灰飛緹室卦直中孚繇議獄之持平用對時而迪吉某官端莊而無偽簡易而有文雖宣布詔條凛若清霜之肅物然哀矜鰥寡温如和氣之嘘枯宜五福之類升協一陽之來復某宻鄰使傳阻造賔閎敢伸削牘之㳟少贊稱觴之慶吳提舉七日陽來協天正之肇始二星光著映雲物之殊祥旣復而亨為泰之兆某官高文炳蔚敏識清通布上湛恩日可愛而羣情胥悅係時公望春未回而萬物先知黙觀天地之心當啓明良之㑹某宻依使傳阻造賔閎敢伸善頌之誠以贊繁禧之介馬提刑日躔南至卦直中孚繇簡書議獄之持平宜玉節對時而迪吉獲預同寮之好敢忘善頌之私某官體道据中秉心迪哲輟名卿之聞望増膚使之光華雖吏膽俱寒凛若清霜之肅然民情胥附温如愛日之和迪五福以類升恊一陽之來復某乘軺伊邇望履無繇莫順下風舉一杯而為夀敬因榖旦修尺牘以將誠汪提舉時當來復㣲陽潜應於黄鍾物以類升和氣先隨於玉節獲預同寮之好可無善頌之勤某官喬木故家渾金厚徳分持一節雖專筦山海之饒恭布六條不但挾風霜之肅宜神休之滋至與陽德以俱亨某幸近乘軺稍踈㑹弁舉鸞觴而為夀阻造賔閎修魚素以将誠敢陳記室京運使天正謹始氣旣協於三㣲星使觀風祥宜膺於百福某官受材英特毓德清明入處烏䑓隂自消於見睍出持龍節物俱望於回春况黄鍾應律之時兼畫㦸凝香之樂宜神休之滋至與陽德以俱亨某望履非遥登門無自莫致稱觴之慶敬伸削牘之誠賀蔡總領正啓辰起蒼龍日行青陸王正肇始氣旣協於三陽使節揚休慶宜膺於百福某官英猷經逺敏識見㣲結宸眷於九重陞華嚴近總邦儲於六路借重將明宜翕受於春祺即茂承於天寵某分符有守望履無由輙修削牘之恭用贊稱觴之喜京運使蒼龍移陸青帝司春式迎端月之和茂迪使星之慶某官德温而理氣肅以清暫輟直於烏䑓出董輸於驪駕湖山清逺散一節之仁風天地和同擁雙旌之喜氣旣協泰來之吉即承晉接之榮某目企門闌身縻符竹阻奉觴而為夀但削牘以寓誠吳提刑春王謹始迓淑氣之潛回星使觀風擁殊祥之滋至某官處心豈弟應物清明分瑞節之皇華光臨南楚鞠圜扉之茂草仁轉東風即承晉接之榮用協泰來之吉某屬縻符竹莫望茵慿但修削牘之恭遥贊奉觴之喜趙丞相斗指孟陬律諧太蔟日行青陸和方散於東郊星拱紫㣲光下臨於南楚對四時之攸始集萬福以惟新某官秉德格天體仁育物曩者運璣衡於左揆四海回春今焉擁牙纛於上游一方蒙福肇兹人正介以神釐三之日開泰以時欽承注意萬斯年匹休於國永頼調元某目想台閎心驚歲籥莫陪旅進奉椒醑以輸誠但祝公歸冠槐庭而正位曹守攝提紀次太蔟宣和道迎木德之亨裒集竹符之慶甫寫誠於一紙重委貺於朋緘恭惟某官摘伏精明撥煩閒暇旣積優而治最洊假寵於侯藩惠浹四郊方班春於漢詔喜隨一節行就日於堯庭某敬閱雲牋莫瞻星弁遥贊履端之吉但勤善頌之私趙丞相辰起蒼龍日行青陸儼上公之衮繡德與時新擁大府之旌旄喜隨春至三朝謹始萬福來宜某官道妙彌綸志存康濟乾坤洪造資金鉉之調元江漢上游屈玉麟之出守兹履端於人正彌受益於天休佇聞晉接之勤用協泰來之吉某職縻剖竹心感頌椒望雙節之煌煌莫陪旅進占太階之兩兩但祝公歸蔡總領斗指孟陬律回太蔟王春頒朔肇開泰道之亨卿月凝暉益介鼎新之慶某官才推秀整氣備清温茂對寵光擁使軺而星指總司餉饋護師壘之雲屯迓三陽奏地之和申百福自天之祐歸承晝接道與時亨某借潤雖深趍風無自介兹眉夀愧莫奉於椒觴寫此心期敬逺馳於魚素汪提刑青規發育肇開泰道之亨玉節光華宜受鼎新之福某官清和兼備寛厚有容折獄哀矜歛威嚴之霜肅問民疾苦宣德意之春温茂迎端月之和益介自天之祐佇見雙旌之喜色歸瞻九陛之清光某阻望星軺洊更歲籥鄰封相比獲依棠茇之隂賔序非遥莫獻椒觴之夀陳運使辰指孟陬歲開朔旦占門庭之色澤喜與春浮擁繡斧之光華福承天錫某官韻諸宫角德韞圭璋將使指以轉輸宣德心之温厚茂迎端月丕介殊祥政貴鼎新方喜雙旌之至時逢泰吉佇聞一節之趍某借潤有初披雲無自介兹眉夀歎莫奉於椒觴寫我心期但逺馳於魚素趙守日行青陸方肇三陽春擁朱轓宜増百福某官才稱梟俊志在鷹揚未施金匱之六韜暫總銅符之千騎民歌襦袴東郊旣散於仁風上錫璽書北闕即承於晉晝某載馳軺傳莫造鈴齋重勤行李之音但感頌椒之咏馬提刑王春謹始化方運於青規卿月迎輝和自隨於玉節茂對三陽之泰坐迎五福之升某官氣肅而温德剛以順執法嚴理官之守讞疑増膚使之華荐對東風變圜扉之草色更觀遲日轉茇舍之棠隂行膺晉接之榮以迪鼎新之慶某濫司戎閫獲邇星軺苐修尺牘以將誠莫舉一杯而為夀汪提舉斗指孟陬律回太蔟璿璣黙運四序更端金節道和百祥並集某官德則温其如玉氣亦煖然似春將指乘軺六轡有光華之盛推仁發庾百城在涵養之中道旣與時而行進當承晝之接某定交旣舊聮事惟新逺想賔閎但感頌椒之咏敢干記室用伸授簡之誠與交代區權縣啓小邑備員得下澤葭葦之境賢侯攝事借春風桃李之隂苐愧續貂不能睎驥未敢趣装於下走合先修敬於𨽻人某官文掞春華學通時務積年頓挫而不試養之使全遇事醻酢而有餘見者稱善屬一司之瘝職資三異以承流有如游刃之才高所恨割雞之用小諸公推轂將下轉而上聞要路着鞭亦先鈍而後利炎不嫺吏治偶脫選曹乆矣諱窮無一㕓而寄足急於就食為五斗而折腰雖瑟調不可以更張然錦美豈容於學製顧瓦礫在後必無趣辦之能毋金玉爾音惟幾告新之益與鄧敎授啓承乏校官嘗近德星之里社備員屬邑獲依泮水之先生適有此縁不勝其喜敬致雙魚之素仰塵三鱣之堂某官行必踐言志惟狥道韞圭璋而内映所飬者醇決江漢以東流其文有本聊作外諸侯之客不卑郡博士之官豈惟膏馥之品儒正要淵源之灌注雖布衣承學之士願公少留然金馬著作之庭以賢為重不煩推轂即有賜環炎近脫選曹未聞縣譜繇銅章之俗狀望絳帳之清姿偶然游宦之同逈若仙凢之隔惟儒學詩書之化一變民風庶訟庭牒愬之稀少寛吏責區區所藴喋喋難窮與趙節推啓開青雲而覩雉緬懷鄂渚之舊游泛綠水以依蓮屬在巴邱之下邑其為間濶之日乆矣願申疇昔之好可乎摇我心旌望公眉宇某官圭璋其德斧藻以文脫腕萬言藉藉有聲於江漢摘髭一第駸駸可上於星辰繇黄綬以借資贊朱轓之畫諾千里隂受其賜居多入幕之謀諸公交薦其賢行見追鋒之召炎浪隨宦牒偶脫選曹朅來親㕍鶩之塵乃墮在蒹葦之澤未知縣譜恐戾官箴頼有故人可講一日從容之雅庶幾明府肯垂二天覆護之恩悃愊之情編摩罔旣與饒節判啓有事拙謀墮葭葦瀕江之地人誰庇已仰芙蓉幕府之英敬自逹於姓名因少攄其情實某官識精而敏德簡而文有飛黄致逺之材不行㨗徑具結緑含章之美可敵連城惟史君撫千里之封故賔佐極一時之選陪畫諾黄堂之上挹凝香畫㦸之間赤壁江寒洞庭波穏胡床談笑不妨風月之平分魏闕進趍即看雲霄之直上炎學非有用仕本為貧蕞爾井疆之㣲蕭然風景之陋雖所製固非美錦而在前乃有覆車自顧腐儒曾未聞於縣譜幸依君子庶無戾於官箴祈向之私有言莫旣與梁知録啓脫選曹而試縣拙矣割雞攀府掾而事賢難乎附驥妄意快景星之覩終期借慶雲之隂某官族系光華材猷膚敏長離之文五色歛翮將翔豫章之榦百圍深根自養屈居上佐糾正同寮以哀矜察庶獄之情以精練了公家之事英聲藉藉已聞推轂於當塗緩歩翩翩即見着鞭於要路炎得邑蕞爾揆才闕然豈惟未辦種河陽之花抑亦無以藝彭澤之秫幸逢明府君寛厚之政可以少安更頼大君子挈提之私略其不逮上林倅啓與生徒誦說古今夲無他技為䑓府督催租賦未必能官幸而依半刺之寛洪或者容一夫之遲鈍敬修奏記仰告戍期某官卓爾真賢起於華胃龍文赤鼎獨立可以鎮浮驥足青雲緩歩終於致逺深袖經綸之手不萌進取之心曩嘗撫花縣之封民懷其惠逮此貳竹符之守衆頼以安聞將觧綬以造朝必有追鋒之急詔儻或趣舍人之装於踰月尚能通閽吏之謁以趍風炎無尺寸之長急斗升之禄拙於擇地一鄉蕞爾而甚㣲責以取材千户蕭然其無有雞户之小如此䑕技之窮謂何拭目緹屏所恨事賢之日淺束身墨綬不勝依德之情深與巴陵郭簿啓談詩書半水之宫技止此爾分民社一雷之地人謂斯何幸魯柝之相聞有潘花之可䕃自惟依德之情切矣願講交鄰之好可乎某官佩明月之珍抱青雲之噐豈但勾稽之縝宻吏不能欺至於剖决之精明民皆相慶發於小試動則有聲飛舄雙鳬安得回翔於壯縣剡章一鶚即當軒翥於亨衢炎不憚折腰正縁糊口所謂米鹽之務惟旣厥心更期金玉之音俾提其耳庶見發硎之銳免為製錦之傷與巴陵吉尉啓葭葦之中為縣甚矣拙謀蘭菊之芬襲人幸哉接境謂其聞魯之擊柝而以借楚之餘波詎得無言以申此意某官敏無滯事清不近名凛然綵棒之風生里閻相賀隱若洞庭之波穏舟楫不驚雖雅意不貪於着鞭然諸公願為之推轂摶九萬里之翼宜致逺於天衢照十二乘之珠幾分光於鄰邑炎正縁糊口不憚折腰將欲束装而來若為撫字之䇿儻獲傾盖而語可得箴規之詳欣幸之私有言不旣上岳州盧守啓法有所限莫辭墨綬之塵勞事非敢專必聴黄堂之約束雖所製未為美錦而在前乃有覆車惟厚德恢乎其能容故私心恃此而不恐三薫身而修敬九頓首以馳誠某官淵靜鎮浮清明燭逺律吕自黄鍾而始氣備中和圭璋乃白玉之文道兼華實乆儲公望寖著民庸閱栁子黔山巫水之銘旣招懷於蠻獠訪周郎赤壁巴邱之跡荐綏輯於兵農燕寢凝香胡床坐嘯得其體要足矣不親細務之米鹽何以督責為哉稍寛屬邑之轡䇿新賣劍買牛之習興無襦有袴之謡公盍少留争願借竹符之守上所注想當徑陞荷槖之班炎無尺寸之長急斗升之禄謬於擇地一鄉蕞爾而甚㣲使之理財千户蕭然其無有雞户之小如此䑕技之窮謂何䕃樾焉依儻容其遲鈍之恭職散材無用但誓以庶勤而奉公悃愊之情編摩罔旣荅隂學諭啓作縣之難今世以為通患從政之敏儒者未必皆能幸而在君子之鄉或者寛長官之責某人詞華之美操履之純為領袖於諸生廣絃歌於千室與邑子游鄉校而議政固所願聞使里人望廬舍而息争尤為有頼未遑修記驟辱貽牋陳誼甚高愧於得錦繡之叚而無以報依仁孔邇庶乎入芝蘭之室而聞其香心之所懷言不能旣上趙丞相啓賤有司之為邑怵惕於中大丞相之開藩照臨其上自顧挈缾之守素無製錦之能孰為廣厦之帡幪幸近洪鈞之坱圠三薰身而修敬九頓首以馳情某官惟德格天以誠許國言皆可績副聖主之所願聞事在必為任諸公之所不敢然而道大則難合所以位高而弗居進退以時卷舒自我身雖逺而在外義則顓於愛君寛朝廷西顧之憂司管鑰北門之寄以整暇練三軍之歩騎以慈祥輯四鄙之耕桑緩帶輕裘威譽旁行於邉瑣清香畫㦸仁聲充滿於江臯竊聞道塗之言歴數將相之舊惟公耆德為世重臣與其鎮撫於山川曷若謀謨於廊廟俯觀物望仰察帝心即上玉麟再調金鉉展經綸可大之業成恢復無疆之休炎出自困窮安於瓠落雖有脫選曹之喜而思為縣吏之難蕞爾一郷蕭然千里欲撫字則財於何取欲趣辦則民所不堪厥或曠官若為苟禄望繡裳之宻邇歎墨綬之拘縻三事掄材尚不遺忘於㣲賤十連察吏庶其覆護於孤寒欣畏交懷瞻依在念迎賀荆南帥閻侍郎啓上初嗣服欲得封疆之重臣衆有公言無踰䑓閤之舊德自漢中而移鎮撫荆渚以臨邉隠如長城扞此方國某官淵源之學經緯之文䟽通之才剛大之氣潛蓄者如此其厚發揮之自然不窮間關出蜀道而來風采在漢庭之右夫内則處六官之列與外而位九牧之尊是曰得時便於行志衆人視此鮮不以利逹動乎其中君子居之必欲以功烈見於當世况方面之輕重係敵情之屈伸兹為上游之衝古稱用武之國幸而無方内之犬吠可以集目前之燕安民兵散於田畆而虚有其名未能熟旗鼓之節官健聚於營壘而不作其氣徒以耗金布之藏私商盛則盗伏其間緩之必縱而急之必變常賦輕而民窮於下督之不可而弛之不能朝廷為是選文武之英㑹府所以兼兵農之寄惟閒暇經營之不苟毋務因循則安坐談笑而有餘何憂倉卒在今日清明之初政宜此邦屬望於元侯然而為之藩垣特一方之福爾至於授以魁柄又四海之願然炎以一陋儒在此彫邑遇事多掣其肘字民徒勞於心𦕈然無異於庸人何以求知於先進踴躍自喜欲少見平昔依歸之誠猖狂妄言不但作尋常賀慶之語其為悃愊罔旣編摩迎賀岳州田倅啓外諸侯之守鎮撫斯民半刺史之尊通行其政上所識擢衆皆觀瞻某官實浮于名德見於行噐堪致逺常陪玉節之英游智在養恬不問青雲之㨗徑從題輿之借重承剖竹之維藩三江五瀦雖據形勝之地四邑萬户未復承平之時藹然仁厚之聲慰此旄倪之望專城畫諾固資别乘之功當宁思賢行拜出綸之召炎不暇擇地正縁為貧有如投足於薄氷憂其不免兹幸庇身於廣夏或者少安欣抃之私編摩莫寫迎賀梁總領啓重兵宿於要地以信臣領其轉輸明詔謀於大庭許諸公有所論薦竟繇親擢乃得實能綸命流傳輿情欣愜某官才全而識敏志定而氣和術業足以濟時聲名著於將指觀風行而草偃推善人去殺之仁知川竭則谷虚體王者富民之意帝念上游之萬竈日殫經費之千金選擇自乎淵𠂻光華増於星使固吾邦之守衛形敵國以富強操六路之贏資錢流地上入九關而計奏敵在目中即綴近班盡攄素藴炎起家寒甚得邑蕭然繭絲保障不可以兩全簿書期㑹若何以逃責一官乃身之累髮種種以彫殘萬間為庇之多心摇摇而瞻遡與周知録啓英躔所次榮居府掾之先法守至詳糾正官寮之失依芙蓉而増麗萃棣蕚以聮芳某官學積於身仕行其志高足安於徐歩終到亨衢敏手妙於撥煩常新游刃使所居之官大見有用之才全吏不能欺財何憂乎不足獄無所枉民自喜於無寃佇聞推轂之裏言别拜出綸之新渥炎𨽻於屬邑仰止清規遥睇茵慿心雖馳而身縶敬修竿牘詞則淺而情深回唐觧元啓待有司之公選抱先聖之遺經笑談場屋之中自期得雋睥睨譙門之下果見飛英䑕輩何為龍媒遂出某人文無蹈襲行亦雅馴雖懷璧不可以越郷幾於賈禍然發矢必期於破的所以運竒從容畫史之神閒披靡小巫之氣索取青氊之舊旣可壓於争心奪錦標而歸當更觀於巧手回胡解元啓寉書求士鶚薦推賢姓名在百里以單傳詞賦於一州而獨歩喜英材之翔翥起老令之摧頽某人學務汲深識思致逺擔簦乆出素有志於功名挾䇿來歸果獨先於流輩聞陽春之寡和合月旦之公評樂止一夔所謂少之而為貴經聮千佛即當自此以超凢贊慶之私有言不旣回徐尉啓里門宻邇廼無識面之因宦牒差池適有同寮之幸喜蕞爾蒹葭之渚來蔚然蘭菊之芬某官學非空言文得正法决科入仕議論直而無欺歴考借資志意恬而不躁德兼慰畏盗必逃奔綵棒在門將快百里之先覩金閨通籍佇有羣公之裏言炎翰墨陳人簿書俗吏慚無仁術致桑下之雉馴尚倚英風止花隂之犬吠敬酬函賜翹想車音回彭秀才啓蒼蠅㸃璧物惟其潔而易汙鴻鴈傳書事或以虛而成實然知過貴於能改而止謗在乎自修某人將出幽而遷喬無惡濕而居下誰能膠其目而不視未免困於心而後懲雖無桑中之期難學栁下之可往者不可諌矣勿蹈前非此物奚為至哉盍思自返長牋委貺雅意甚勤敢陳藥石之言愧匪瓊瑶之報賀趙倉啓平糴惠民顓任皇華之胄使䟽榮將指孰踰棣蕚之懿親方析魚符就頒龍節先聲藉甚輿誦藹然某官體道据中見幾廸哲屬尊且近先周室之宗盟政簡而寛冠漢京之循吏所以蓄儲於公望不惟撫字於侯藩天空而日月自髙仰聖心之繼照夲固而枝葉必茂閱燕齒以求賢暫凝坐嘯之香即攬按行之轡八政先於足食農末何傷六條顓以察州官曹皆肅不待奏甘泉之計即當陞文石之班炎困頓半生艱危萬狀只縁糊口未免折腰繭絲保障不可以兩全簿書期㑹若何而逃責一官乃身之累髮種種以彫殘萬間為庇之多心摇摇而瞻遡賀薛漕啓命出中除任顓外計部刺史之選上欲寄以咨詢諌大夫之來下熟聞其風采輶軒壓境輿誦載塗豈無他人可以付漕轉之事必有君子乃能蘇凋瘵之民某官人物超乎漢唐師友得諸洙泗潜心黙識養以湛深之思正色盡言見其剛大之氣第知許國不自為謀調萬物之鹽梅鼎方折足蓄九淵之雷電龍有逆鱗肫然獻忠聞者動色惟仁人獨勇於義雖昔賢猶病其難用之則不負所學而求容捨之則自得於中而無悶然有德去留之决乃本朝輕重之幾盖為之兆而賜環故起於家而持節先聲騰湧協氣薫陶姑慰一方之情尚違四海之願謂宜端委盡發經綸㫁國論於文昌紫㣲之廷還士風如慶歴元祐之際炎未煩䥴遣將近終更慮折族庖之刀願歸間道之璧自悲俯啄而仰顧孰肯右挈而左提三年飽百里之艱難一旦有二天之臨照雖未瞻於履舄如素出於門墻萬金書扎之中尚䝉慰薦六轡茵慿之側豈忍弃捐仰瞻鴻㕍之飛不勝燕雀之賀賀張總領啓逺聞使指近在王畿竊謂一時人物之英豈顓平糴是以千里音書之賀未徹記曹不踰朞年果有新命升中郎於華貫總外計於上流喜溢三軍風行六路某官有雄識雅健之文而加之篤實有正大高明之學而揆以中庸暫擁皇華而按行獨當上意之選擇倚之於封疆扞禦所以飬其望處之於錢榖浩穰又以觀其材江漢數屯半天下勁兵之聚湖廣四面供軍中經費之湏實難其人可付此寄今以明公之至盛際於昭代之有為春秋如大川之方增聲譽如北斗之高掲行其平生德業之所蓄願以逺大規模而自期憂民憂國之深固其素志足食足兵之外别有逺猷勲庸當自此而益新富貴亦鼎來而未艾炎乆拘吏鞅忽近師門輿誦藹然皆動色而相語私心喜甚不待言而可知未侍茵慿倍增向仰賀張倅啓詔璽疏榮題輿借重外諸侯之守職在藩宣監御史之嚴事皆關决先聲藉甚衆志悚然某官今事指南儒流華盖倚徙藍田之千竹已著真清徊翔葉縣之雙鳬輙騰治最不行㨗徑以訖外庸對畫㦸以交輝擁緹屏而競爽得湖山之勝於坐上雖可登臨聴雞犬之聲於民間未能富庶特煩半刺來貳五符佇歌别駕之功即拜賜環之命展一編於籌䇿復三㦸於門庭炎不憚折腰只縁糊口有簿書即有期㑹觸事懷憂為保障不為繭絲視民多愧轍中之魚涸矣幕上之燕危哉活窮鱗以一勺之清波棲倦翼於萬間之廣夏依歸之切咏誦奚殫謝岳州劉守啓宦牒縻於墨綬幾不自量薦牘出於黄堂素非敢望未去覺吏民之改觀將歸傳親舊以為榮竊以作縣之難今世以為通患入官之意古人亦或為貧苟無㧞萃之才難副陟明之選炎繆於擇地何以字民蕭條百里之窮瑟縮三年之乆繭絲保障理不可以兩全刀筆簿書罪易盈於百謫幸玉音之有㫖削版帳之無名部使者亷問至詳明府君奉行惟謹蘇疲民於憔悴之後脫小吏於煎熬之中已及終更未煩䥴遣念厥初之移病恐至噬臍及其後之丐祠又憂濡尾豈謂升階之漸乃承褒衮之華某官恕以及人清而容物假借屬縣輙符移趣辦之嚴收羅滯材借廊廟平章之用顧如炎輩所謂鯫生學術盖空空然何能純正吏事又碌碌耳烏得詳明弃之如犛牛之一毛取之非鴻鵠之六翮誤䝉慰薦莫稱品題炎敢不行所聞知厲其遲鈍進修則勉諸在已窮逹則歸之於天無累知人斯為報德謝薛漕啓邑下效官初無善狀䑓中取士俯及臞儒不止一諾重於黄金是謂隻字踰於華衮未去覺吏民之改觀將歸傳親舊以為榮且知人莫貴於知心而守已必先於守道習俗之流弊也甚矣操履之有常者難哉自非卓爾之賢安得介然之節炎學非適用仕不逮人與物多違雖佩韋而自儆蒞官不敏顧製錦以何堪繭絲保障難至於兩全刀筆簿書易盈於百謫幸玉音之有㫖削版帳之無名遂獲終更免煩䥴遣此心自揆竊憂日暮之倒行敢意深知乃謂歲寒之可保盖某官斯文司命善類主盟聲名震於一時許與信於四海顧如炎輩出自寒鄉憐其困躓之孤蹤借以吹噓之餘論苐慚固陋莫副品題炎敢不行所見聞審於義利視桑榆之將晚素髮雖生睎松栢之後彫丹心猶在益修志意以荅恩私雙溪類稾卷十五
