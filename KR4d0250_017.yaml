body:
  text: 雙溪類稾卷十七宋王炎撰啓回高舍人璧水談經甚慚不學木天挾册尤愧非才洊玷公朝之誤恩悉繇先達之借譽伏念炎拙於瓦合坐是陸沉已分此生終迷朱墨自憐垂老乆棄鉛黄詎期脫州縣之勞輙獲綴師儒之末未知奥義姑誦陳言不能亹亹而解頥豈辦錚錚而折角方憂官謗忽奉除音讀未見之書雖獲酬於夙志負寡聞之誚實難厠於時髦非藉吹噓曷膺選擢某官斯文司命吾黨主盟未嘗恃己之長顓務成人之美承顔侍教旣許摳衣緩頰游談遂勤推轂偶縁請告稍稽造謝之恭敢意撝謙特枉贈言之寵躬俟進趍之際面陳感怍之情謝余丞相代銓綜之難盖繇德進論思之命乃許序遷仰玷誤恩逺承褒語念乆隨於宦牒乃晚綴於朝紳俄備諍臣洊班常伯時無營繕何以鳩工世旣敉寜幸而偃武盖甚慚於尸素敢有兾於陞華况古號冢卿實位六官之長而今稱劇部仍兼四選之繁借曰充員得無曠職顧兹假寵必有先容某官廸哲爽邦奮忠衞上當少海日升之始冠泰階星拱之聮備著勤勞不居寵利黄金駟馬暫優丞相之告歸赤舄衮衣旋命上公而為伯乃心王室有意人材顧嘗被於陶鎔獲供噐使尚不忘於推輓遂至階升甫傳郵置之音即枉記曹之敎撝謙已甚拜賜難安將睎行儉之知人雖无藻鍳若效巨源之啓事猶有朴忠當自竭以奉公或可期於報德回黄少卿將指觀風固須膚使刺經議禮尤藉通儒某官秉德高明禔身荘靖有元元本本之學素號洽聞明是是非非之公堅持正論昨繇諌省出奉詔條周行嶺海之間旣騰異最光奉絲綸之寵入冠清流方欲謄書驟䝉貽問雙魚甚美空懷拜賜之慚四牡且歸日佇同朝之喜回武舉李状元龍飛䇿士將收天下之竒才豹變發身遂占廷中之前列某人英姿卓越壮氣激昻早厭儒冠思登勇爵欲跨雲霄而直上果超流輩以先鳴臚句一傳僉言無間未及面陳於賀臆乃䝉首貺於華牋由韋布以起家今見奉親之喜屬櫜鞬而從事更堅報國之忠佇觀富貴之鼎來以副交游之屬望賀京丞相恭惟大廷讀命亞保升華明良㑹遇之難期諸千載家國榮懷之慶寄在一賢旣有茂勲可無醲賞某官出逢昭代超處宗工有包四海之量而其動也中有周萬物之智而所居者正㫁鰲足以立極底定丕基攀龍鱗而升雲大符公望志惟安於社稷心無怍於神明翊我聖君享于烈祖開清廟成華之瑞兆慈皇介福之祥定省從容愛欽浹洽雖感格本繇於孝德然彌縫全仗於忠誠喜溢三宫懽騰六合豈錫類不遺於黎老而疏恩可後於元臣畀以篆車俾正貳公之位授之青社仍關大國之封將恨無官爵之可酬方奮起事功而未艾繄主上擬勲華而不愧則我公視益稷以何加炎鈆槧孤生茵慿下走金門待詔裁詩幸繼於諸儒石室紬書記事又陪於太史念朝野之共喜曰君臣之俱榮為父母億萬年方展盡悅親之道上符瑞百千所又寖彰受命之休凢有識知悉同祝頌用是敷陳於賀悃初非修飾於䛕辭賀高内翰中宸疏寵内相升華乆虛位以俟賢下皆属目今正名而申命士悉降心豈惟儒者之至榮抑亦朝廷之盛事玉堂増美素推訓誥之最工金鉉在前即見經綸之有日炎辱知甚厚贊慶尤深納謁賔閎寜鳬趍之敢後貢牋記府蘄燕賀之争先賀陳舎人疏寵中宸陞華左史雖曰序遷於清貫實惟妙簡於淵𠂻斯文有光善類相慶盖歩武聮於法從而眡瞻際於清光此吾儒之至榮非他職之可比兼書言動旣載筆於螭㘭顓掌訓辭即揮翰於鳯沼屬趍朝而奏對仍被命以校文仄聴除音阻陪賔序喜雖盈於心曲意莫盡於毫端回趙敎授宗盟之秀獨立不羣文藝之高屈居第二敢謂謙勤之厚意肯貽駢儷之華牋某官頴異出於神明清苦同乎寒素耻隨俗靡欲以文鳴劉子政經術冠於諸儒李長吉篇章傳於天下雖公族之希有豈今人之不如暫為侯泮之明師即簉王庭之諸彦願充逺業企及前修㧞茅茹以同升雖有見賢之喜投木𤓰而莫報空懷愛我之私賀許國正掌璧沼之規旣膺妙選通金閨之籍驟進華階在雅懷寜計班級之崇卑然吾黨共喜英豪之選擢向雖偃屈今則騫騰嘗幸同寮尤深贊慶適拘謁禁阻造賔閎敬以寸誠寓於尺牘其為頌咏罔旣敷陳謝范舎人掌書藏室已玷英游汗簡著庭洊叨新命惟記事繫於日月如編年謂之春秋孰謂非才可充此選盖昔者聮名於虎榜而今焉承敎於麟䑓内揆僥踰悉繇汲引属拘謁禁尚阻造門敢意謙光首勤削牘其為感怍罔旣名言賀易秘書綸綍之恩並登二妙圖書之府獨至三遷是曰蘭䑓之英可増蓬山之重逺業益深於涵飬亨途即見於騫騰念辱在於同僚且叨聮於新命其為欣愧罔旣名言謝謝給事史觀充員已慚非據郎闈攝事尤恐弗勝悉繇汲引之私辱在選掄之數盖以主張於國是因而愛惜於人才皂盖蕃宣嘗厠登門之列黄扉獻納不忘推轂之勤方圖面控於謝悰遽荷首攽於褒語罙深感怍莫旣名言賀姚中丞疏恩北闕進位南䑓大司馬列於六官第修邦政中執法長於三院實正朝綱未得其人乆虛此職兹自宸𠂻之親擢俯稽輿誦以僉同公論固待之而後明善人亦恃焉而無恐炎密叨大庇且辱深知非徒幸小已之有依抑實為清朝而贊慶尚俟雁行而進併攄燕賀之誠賀京丞相金鑾作命誕告大庭玉鉉増華晉居上宰德望足以鎮四海宜加體貌之崇名位至於絶百寮愈覺觀瞻之峻三宫燕衎九鼎尊安某官聖域真儒熈朝元老以寛大納萬殊於度内以精深照庶務於幾先光輔一人逮今五載正邪有辨君子進而小人之道消信義不踰内治伸而外侮之情屈刑清兵寝人懷其生物阜年豐天錫以福成功若此輿誦翕然如漢蕭何任已顓於一相視周姬旦位合首於三公豈惟主上虛心而待之抑亦中外屬目者乆矣自右弼而升左輔可殫經濟之謀以聖主而得賢臣允属亨嘉之㑹不移魁柄益煥階符道將追稷契以為徒治可繼勲華而無間炎自惟困吝初無先容誰賜生成乃有大造衮繡又加其舊搢紳相賀於朝旣幸而逢交泰之休可無以致私心之喜言雖不敏誠則難緘伏乞鈞慈俯垂鑒念賀謝右丞相誕布制麻晉升宰席運樞機而經武旣展壮猷秉鈞軸以調元宜膺大任三宫燕衎九鼎尊安竊以二相經綸一人垂拱並立有同於柱石相資當似於塩梅亦惟謀國之協心斯可仰成而共己某官氣和而心肅學奥而識精當龍飛御極之初冠鴻漸在庭之列間於兩社今也五年造膝輸忠虛懷納善清明中正君子進而小人之道消安靖和平内患寧而外憂之途屈五兵不試人懷其生百榖屢豐天錫以福成功如此輿誦翕然宜啓金甌以光玉鉉物情所願思如姚宋當國之太平帝㫖一頒果同文富並命而相賀炎自惟困吝初無先容誰賜生成乃有大造衮繡有加其舊搢紳皆有所依旣幸而逢交泰之休可無以致私心之喜言雖不敏誠則難緘伏乞鈞慈俯賜鍳念賀何知院顯膺命䇿晉位元樞顓藉壮猷本萬兵而立武仍贊同德次二相以經邦朝廷恃此而體尊强敵聞之而氣懾竊以邦國之勢以人而重輕政事之機因時而舒卷廟堂正色百辟承風樽爼折衝六軍増氣兼二者之大任必一時之偉人某官學高明而不羣氣剛大而有守君子倚其特立盡卻邦邪異論折於公言大明國是遂以初潛之舊學亟參鬷假之明謨彌縫輔贊道合於一堂安静和平福加乎四海宜處東西之兩地庶攄文武之全才自行人玉帛之徃來盖歴歲干戈之包裹孰言選將智愚未分孰議練兵健懦無别軍儲欲裕邉瑣尚嚴雖旣和而戰非可忘縱不戰而守宜有備圗之亟切事未立而衆先譁救以舒徐弊漸去而功可集竊窺逺慮必有成規炎無為先容乆分平進晚逢知己敢不歸心苟可酬恩寜辭隕命輒因賀慶之語一吐狂愚之言伏乞鈞慈俯垂鍳念賀許同知繼治慈皇勤成巨典疇庸近弼序進崇資君臣俱榮中外咸喜某官秉心廸哲體道据中進翊鴻樞攄忠精而衛上系隆駿命贊孝治以奉親乃作一經以垂萬祀侈家邦之盛事著明聖之宏休今迄終編旣上陪於清覧曩嘗載筆宜特渙於恩章體貌加隆股肱増美炎仰䝉大造稍振孤蹤豈惟私已之有依實為公朝而共慶明良嘉㑹親逢千載之期富貴鼎來將進羣公之表其為欣抃罔旣編摩回王守鷁首泝江間關萬里虎符畫壤鎮撫一圻慰逺俗之觀瞻布朝廷之德意某官起於華胄濟以真才風流覺談笑之多聞慷慨以功名而自許奔電躡雲之足中亦少休㫁蛟裂兕之鋒今方小試遥知洗篆條敎一新已遂凝香剸裁多暇吏立春氷之上人行古鏡之中即有賜環不容煖席炎自憐寡與乃幸納交懷綬來朝雖喜從容而晤語衘杯話别驟驚隔濶於英姿欲伸竿牘之寒温浩嘆關山之遼逺敢期高誼貶賜華牋妙語難酬虛辱雙魚之厚貺中心所願惟蘄五馬之遄歸悃愊之誠敷陳罔旣謝范侍郎麟䑓抱槧誤玷除音鳯沼揮毫驟貽褒語惟唐虞之二典宜輯成書有遷固之三長可顓實録何下資於寡見盖旁借於游談曩共取青聮姓字於慈恩之塔今將垂白追歩趍於著作之庭薄技且窮殘膏可丐回林判院哲人制行可為法於將來孝子顯親欲揚名於不朽謚雖一惠法有兩端限以班資之崇在乎貴貴參諸德義之善又以賢賢豈特廣恩盖將示勸先正侍郎位不登於三品望實重於一時以淵源六學之精㣲有充塞兩間之剛大事當立斷詔㫖奪之而必行義有力争舉世非之而不顧去就之際雍容可觀死生之間清明不亂是當求之古人爾可不謂之賢者乎朝惜鑑亡士悲梁壊難拘禮寺之條例當凖淳熈之制書惟簡可以見其正直而無私惟肅可以示其剛方而有守考諸謚法揆以公言用此易名初無浮實方聞奏牘之所請深喜承家之有人逮綸誥之疏榮辱華牋之委貺摛辭有爛陳義甚高念昔年隨牒於長沙以晚學備員於泮水敎之話言以開其固陋賜之薦墨以振其孤寒顧渉世之多竒嘆知心之無幾緬懷舊事契濶堪傷今見後昆風流尚在偶獲陪於末議覬少發於幽光因念仰高無復九原之可作惟蘄濟羙庶幾千載以猶生饒州到任上吳提㸃中都結綬嘗陪一日之雅游支郡把麾遂竊二天之大庇敬裁奏記仰告戍期某官今事指南名流華盖春陽温厚外示德人之容止水清明内潜君子之智三異仁孚於衆志十竒聲徹於宸聰雉監考工方晉在儲才之地虎符分守乃果於請郡而行望實浸高眷知彌篤盡提泉貨專属星軺總十道以鑄山運一鞭而流地但見阜通於九府不煩分𨽻於三官佇看外庸即登近侍炎曩縁超躐自速顛隮散吏祝釐方思循省誤恩起廢盖有夤縁靖言抆拭之由皆仗吹噓之賜分憂所寄志雖切於字民治劇非長心甚虞於曠職瞻承在望欣懼交懷仰藉帡幪幸獲依於德宇更期儆䇿庶無戾於官箴翁提刑祝釐閒館驟剖魚符受察外䑓幸依龍節敬裁奏記仰告戍期某官體道据中秉心廸哲清而容物使人鄙吝之意消善不近名與世浮誇之趣異慈祥布政一駕朱轓明恕平刑三持繡斧望日邉而密邇環江表以咨詢旣訖外庸必歸近列其鴻博可演綸於西掖其剛方宜端簡於南䑓召節且來促装可俟炎曩縁超躐自速顛隮竊食祠官投閒地冷承流支郡起廢恩深僥倖為多夤縁有自昔逺游湖外嘗親飛舄之郎官今假守楚東獲事褰帷之膚使瞻承在望欣懼交懷四牡光華獨近照臨之末六條亷問尚期寛假之私于倅引買臣之綬假守何堪題仲舉之輿同僚是恃方將聮事敢不通名某官識逺見㣲才高便劇嘗紆墨綬流豈弟之仁聲肯駕緹屏狥安恬之雅志惟是蕃宣之寄資於按察之嚴旣信立而令行即民懷而吏畏正恐下車之未幾即聞召節之鼎來炎垂老投閒誤恩起廢固欲盡心於撫字頗憂臨事而鈍遲頼半刺之通行容一麾之畫諾勉其不逮雖自加儆䇿之勤増所未能實有待彌縫之益陳敎授倚席上庠識英才之㧞萃分符支郡得益友於同僚某官學博而識精行修而志立取漢庭之上第訓魯泮之諸生職號師儒豈止講論於綘帳義同賔客尤資諷議於黄堂自顧陳人决非能吏力加鞭䇿不無曠職之憂頼有箴規庶遂輔仁之願諸縣宰垂老投閒未能忘禄誤恩起廢亦許為州方欲謄書遽勤貽問某官以才自奮其譽甚休負抱旣高合着鞭於雲路進趍有節聊飛舄於雷封念假守之无堪惟曠官之是懼理財患乎苛亦患乎弛聴訟欲其恕尤欲其明恃有縣大夫之賢共修職業庶幾明天子之德下究閭閻少叙鄙懷用酬來貺趙路分属目戎㫋仰止護軍之貳縻身郡紱𨽻於属部之中恭職有期通名敢後某官天資敏銳人品高明抗子政之忠精懷道宗之方略天山三箭有志矦封金匱六韜不顓古法道本无殊於文武上方並用於親賢暫屬鞬櫜總列城之歩騎佇分旄鉞建上將之鼓旗炎垂老投閒誤恩起廢幸而假守可以依仁横槊賦詩願熟聞於健論治民振旅尚少起於衰懷職官垂老投閒旋開三徑誤恩起廢獲把一麾幸擊柝之相聞愧謄牋之不敏某官才猷精練閥閱光融自治横翔聞青雲而覩雉不嫌小却泛緑水以依蓮便坐凝香可无婉畫諸公推轂必有裏言炎正為食貧未能忘禄不嫺吏事恐戾官箴思竭力以支梧藉同僚之佽助用酬來貺薄叙鄙悰通問陳待制誤恩與之便郡幸薄官期先逹居於是邦可為師法敬修奏記仰徹㳙人某官諌省名流文昌雅望先知不惑獨能明乎天下之是非自信甚堅未始眩於衆人之毁譽卷舒有道進退無疵琳館飬高松班寓直公固无心於經世上方有意於任賢一代偉人乆如砥柱之特立四朝耆老今乃靈光之獨存雖欲追赤松而與遊恐復為蒼生而強起炎昨於日下嘗獲瞻承退在山中无由候問因剖魚符而撫字可陪鳩杖之從容有社有民敎誨願聞於餘論事賢事貴敬恭務竭於誠心謝宰執祠庭賦禄旣叨抆拭之恩鄰郡字民遂玷蕃宣之列便安如此糜殞以之伏念炎坎壈孤生棲遲拙宦晚荷聖明之采擇遍更學館之清華兼攝郎曹徑升戎監不思超躐宜速顛隮察物理之乗除災生於福順天機之徃復困極而通再閱朞年洊承新命暫祝釐而置散即假守以分憂惟徽饒兩郡之間封圻相望然顔范二賢之逺風烈如存得近地以欣然企昔賢而愧甚自知駑緩難稱鴻私兹盖伏遇某官道揆公平德心廣大瑕瑜不掩豈因一𤯝而廢人長短兼收將集羣材而立政雖如庸陋亦未弃捐炎敢不厲已勤亷問民疾苦廣朝廷寛大之意專務撫摩消田里愁嘆之聲稍蘇彫瘵謝臺諫三徑屏居祝釐閒散一麾假寵得郡便安抆拭恩濃挈提力大伏念炎倦游寡與平進无階晚䝉上聖之誤知遂玷中朝之清貫超踰至此顛沛從之初如鷁退於過都今乃馬還於出塞旣賦祠官之禄洊分長吏之符惟徽饒兩境之交封圻相望而顔范二公之逺聲烈如存得近地以欣然企前賢而愧甚伏遇某官秉德剛方而有守持心仁厚而不苛謂長短兼收將集羣材而立事則瑕瑜不掩難因一𤯝而廢人特賜主盟免為弃物炎敢不省躬玷闕厲志亷平專務撫摩上體朝廷之寛大庶蘇彫瘵下消田里之嘆愁通致政王温州郡太守分憂之職顓以字民鄉先生得謝于家宜先問政行將入境可不通名某官德齒俱高人門兩重其通介不隨乎流俗其亷㓗可厲於貪夫握銅虎以開藩盖嘗小試杖玉鳩而佚老隨即居休細考行藏可無悔吝在諸生當日陪於几席如長吏合時造於門墻炎備數祝釐䝉恩起廢江城假守願克己以奉公星社依仁請委心而承敎檢法由祠官假守於銅符幸䝉抆拭有仁者為僚於綉節可藉帡幪未敢俶装合先奏記某官通才無滯華問甚都自宜接金馬之英游且復贊軺軒之臬事其處心仁厚則民无所枉其用意精密則吏不能欺豈止讞疑可執䑓中之法行將擢用以為天下之平炎三載投閒一麾起廢叨居長吏兼蔽要囚先德後刑當體上心之欽恤稽經諏律願承使指之哀矜尚丐函容可逃瘝曠陳主管抆拭恩深玷銅符之假守帡幪地近有玉節之同寮敬馳奏記之誠預逹依仁之意某官人門兩大才德俱優百年喬木之故家于今有幾千里青雲之逺噐其進无難暫佐星軺兼司泉貨足國用者在此將聞貫朽於中都選世臣而用之即見階升於清貫炎投閒三載起廢一麾盖平生懷覩鳯之私而今日有登龍之便撫耄倪於封内受約束於䑓中職在藩宣敢不講求於民莫心祈覆護庶幾免戾於官箴陳知監殊庭賦祿誤䝉起廢之恩便郡分憂適有依仁之幸某官起於華胄濟以真材陪星次之輶軒衍泉流之寳藏貫朽而不可校佇聞九府之充盈歲計之則有餘何待三官之鼔鑄苐超升於清貫難乆屈於賢勞炎三載投閒一麾假寵曠瘝是懼撫字何堪將合魚符可講同僚之好先慿鯉素稍攄慕誼之誠湖州到任謝宰執掃軌窮山分无榮望分符近甸誤有恩除自量困躓之餘難稱使令之意惟吳興之一郡近魏闕之九重丁黄之籍浸繁金布之輸不給與之共理將以分憂若非通材必且曠職炎壮猶无用老復何為嘗抱槧於瀛洲亦把麾於鄱國皆因速謗再至投閒敢期賜對於便朝尚許攽條於輔郡非平心何以折民訟非㓗已何以率官僚不特投諸繁劇之中未免拙於催科而已某官以凖繩揆萬事以陶冶噐百工掩其瑕疵加以抆拭炎敢不切於補過期不負民内顧夙心豈衒引㑹稽之綬願全晚節行當挂神武之冠倘不辱身是為報德謝從官屏居三徑越在窮山起把一麾密依行闕抆拭之誤恩甚寵吹噓之大造為多伏念炎碌碌亡竒惸惸寡與瀛洲抱槧鄱水分符誰謂數竒動而速謗自知識暗謀不周身此宜終老於樵漁何敢希榮於牧守况古稱苕霅為浙右之名城而今視京畿乃日邉之輔郡寛厚者長於撫摩而短於治劇精練者急於辦集而緩於字民於斯二端未有一得付以藩宣之寄擢於廢弃之餘曽是傷弓若何全璧伏遇某官嚴於律己輕以待人推君子包荒之心廣朝廷使過之意雖菅蒯以无廢或桑榆之可收炎敢不振衰遲之蹤殫牧飬之力使之彈治諒无梁國之能督以催科寜若道州之拙謝孟漕鳯闕非遥虎符有守便朝賜對詔㫖趣行主上之德意寛仁䑓治之敎條簡易於斯撫字可謂便安載念此州殊非曩日三賢祠在誰希前哲之高風六客堂空无復宦游之樂事旣紛紛於牒訴又汨汨於簿書征𣙜之利日取之若甚多金布之輸歲計之常不足何以免催科之拙庶乎為保障之謀伏遇某官令問冠於朝端名門甲於天下以能治劇兼兩道以裕財其實留中近九重而駐節炎幸縁一日之雅素可竊二天之庇庥雖无御黠馬之嚴稱為能吏願戒烹小鮮之擾加惠齊民荅韓總管假守朱轓將合符於近甸董戎玉帳亦稅駕於是邦方欲謄牋遽勤貽問某官受才英特執德靖㳟系胄出於貂蟬韜略通乎虎豹未際功名之㑹小施整暇之能暫佐中權總千羣之歩騎行登上將護一面之金湯炎老矣无堪懦而不武念仰高之有素幸借潤之可期悃愊所懷編摩莫盡荅魏倅外諸侯之守在於撫字其民半刺史之權所以通行其職辱講同僚之好首䝉枉敎之歡某官世閥光融才猷敏邵展士元之驥未足究其所長題仲舉之輿是宜借以為重何期天幸獲共官聮庶幾繾綣以相依必肯彌縫其不逮瞻風非逺披霧有期胸次所懷毫端莫盡荅長興安吉知縣朱轓蒞事固无取夫煩苛墨綬近民尤貴察其肥瘠欲為循吏難矣願與執事圗之某官行已清修撥繁敏决方縣官之意雖專於保障而郡守之責在拙於催科要當處之適中相與去其太甚黄堂不至束手而无措赤子亦可息肩而少休但使田里无嘆愁之聲不負朝廷有寛大之意佇觀優課即上亨途聊發鄙懷用酬先施荅烏程歸安德清武康知縣隼旟假守偶及戍期鳬舄同僚遽來敎賜某官疏通無滯亷謹自將小試民庸暫行邑事若以仁厚之意寓於催科之間萬户按堵而居不病烹鮮之擾諸公推轂而上何憂展驥之難自顧陳人豈堪劇郡所願同心而共濟必無䄂手以旁觀悃欵之情敷陳罔旣荅項敎授上庠倚席識英才於廣座之中近甸分符得益友於同寮之右引領至止開緘洒然某官行無瑕疵文有警䇿拜優恩而觧褐入膴仕以彈冠自宜登道家之蓬萊乃肯采侯泮之芹藻小褰絳帳使知模範之良間造黄堂必有箴規之助謝王縣丞拏舟甫至素非識面之交曵履相迎遽有贈言之寵為公歛祍而荘誦使我置書而永嘆追憶舊游恍如昨夢乃䝉綴拾其陳迹曲畀褒嘉之過辭見謂全才誠為溢羙是非不詭豈應專於頌而无規直諒相資尚兾有所聞而必告荅嘉興程寺丞蓬户諱窮乆借卿雲之潤竹符分守又依鄰燭之光方欲謄牋遽勤貽問某官䟽通之學雅健之文馳妙譽於搢紳之間无能先者升華貫於荷槖之列姑少徐之自請一麾小觀治最行攽二節入覲清光上以贊朝廷之逺猷下以増鄉曲之榮觀炎貧猶戀禄老復為州自顧繆悠深慮奏刀之折尚祈庇護或能全璧而歸悃欵之情敷陳罔旣交代吳仲寛老上挂冠之請強此行春衆期慿軾之來甚於望歲旣為公而供洒掃敬遣騎以問寒温某官喬木故家渾金厚德寛和樂易恢然有長者之稱詳練清通蔚爾在人材之選自合繼論思於瑣闥胡為煩畫諾於黄堂顧是一州號今三輔衣冠雖衆掣肘者稀金布无贏究心亦辦苐蝗旱之相繼未免凶荒若蠶麥之皆登可无餓殍專俟撫摩於新尹盡蘇彫瘵之窮民恐未駕兩轓而行即聞趍二節之召炎貧猶戀禄倦亦懷歸松菊荒凉桑榆晼晚緬思少壮同難兄題淡墨之名敢意衰遲與執事有合符之契是謂託子孫之好豈徒交季孟之間心曲所懷毫端難盡熈春寒往君子道亨願調護於鼎茵益介綏於戬榖雙溪類稾卷十七
