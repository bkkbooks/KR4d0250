body:
  text: 雙溪類稾卷二十五宋王炎撰序送曾鴻父序慶元元年夏炎與鴻父解后于豫章時鴻父方召還匆匆語未竟即别去二年冬炎自臨江來中都遂與鴻父偕為博士尋相繼入三館自念場屋陳人流落已久而鴻父春秋鼎盛蔚然有聲於一世志趣所向疑若難於契合而鴻父與予交意良厚鴻父數丐補外丞相愛其材堅留之不可遂剖滁陽之符以行於是寮友相與酌酒賦詩以餞之炎短於詩拙於文而又不得無言鴻父是行以奉親為請夫起於布衣諸生甫踰弱冠對䇿大廷臚傳第二一旦聲滿天下今年僅三十有三即處顓城之重具慶在堂其騶從供給之人趍走先後以待頥㫖之使令而朝夕甘膬之奉不索自辦足以遂其承顔養志之願為子如此親亦榮矣滁陽又淮上佳郡泉甘壤沃而民風朴厚易以撫摩其賦入至簡部使者無所督辦他郡所罕及也求其山溪登臨之要則醉翁遺跡在焉暇日婆娑覽琅邪之深秀聴醸泉之潺湲游觀甚羙他郡所無有也夫為天子守千里之地入則有以娱其二親出則無符移督辦之煩而有林壑游觀之樂鴻父之自為謀誠善然吾君吾相狥其孝養者将以責其忠報不奪其私者所以望其奉公竭節也燕坐江沱之南無意北方昔人以為深譏劉琨敗祖逖沒晉之君臣終置河洛於度外至今無以杜議者之口今自滁陽北望不滿百里衣冠淪於草莽封畧阻於烽煙志士獨能無感乎三國鼎立南北𤓰分之際兩淮間常為天下戰場孫仲謀立塢濡湏曺操先計後戰不能爭也謝㓜度師于淝上苻堅擁衆山立不能抗也沈璞守一盱眙佛狸傾國南向徃復再攻其城不能下也若謂兩淮無險阻决不可守抑過矣且挽強執銳儒者誠有不能料敵情虚實决兵機勝負亦曰不能可乎哉羊叔子杜元凱貌甚不武其於軍旅之事如何也世之俗吏非習因循以苟目前則尚誕慢而饕富貴此二人者顧何足與有為而腐儒又多不通世務由是士稍有所負抱語及功名衆且姍笑愚心殊不以是為然故於鴻父有望焉鴻父才力精悍試以一州盖安坐談笑而有餘在予不能有所規甲科朝廷所重又以才諝将之異時入處華要猶階而升堂在予不必有所祝故苐以逺且大者期之某老矣結茅南山種黍東臯不以世事攖懷老者所當務也養其經綸之業以俟事功之㑹無令已失時壮者所宜有志也與鴻父處㡬二年非不深語而未始及此炎宜去而暫留鴻父宜留而姑去要之人生㑹聚少而離别多故於其將行索言書之以為贈二堂先生文集序炎昔從先大夫讀書于不窺齋是時北山翁即世方十有四年其遺文編次整整無遺佚者然炎才年十四五學作舉子文字未能詳觀縱使詳觀亦未能識其指趣其後挾琴書鬻文以糊口既得一官又隨牒奔走於四方曩時家集雖欲一見無由矣中間解臨湘縣印歸里中其孫畤属炎為序炎即如江西寓居久之為序一通附歸而翁之文寔未嘗得熟復披閱也去年自楚東罷歸首求家集已散失不存再三捜訪乃於其曽孫從之處得書啟雜文二帙又於族孫實處得古律詩一帙合所得編次之分若干卷盖所有者十之六七亦非全書編次畢喟然嘆曰此天下之傑作也其初也秘而不傳其後也佚而不傳失今不捜訪且將湮沒無傳今幸傳矣雖然所傳者翁之文也文之外有不傳者炎咨嗟痛惜不止於喟然而嘆也翁守上饒日青溪之盗因時升平俶擾東南䧟睦䧟杭䧟歙䧟處䧟婺䧟衢處之守臣彭汝方死之其餘不走則降賊乗銳來犯上饒翁以孤城捍其鋒屹然如巨防之制水奏用其属吏鉛山宰王舜舉為倅使城守監鑄錢院髙至臨使提軍出戰而翁調兵食籌守戰之䇿以授二人使行之賊攻城不能得志其氣稍衰退屯栁家都至臨夜率銳士衘枚火其營鏖戰賊狼狽敗走乗勝遂復衢州奏功徽宗皇帝嘉歎降詔褒奨進官職二等王甫方當國與翁舊有嫌􅎱其功用御筆改知嚴州上意悟復還信州翁於是作二堂摘詔中語榜以示後人盖以侈聖上之賜而甫衘之不置嗾御史摶吠所憎以快意㑹憲臣張苑者希甫意以事中翁翁論爭之辭色甚厲甫等愈怒益媒孽之是以詔㫖逮翁欲泄積忿鍛鍊無所得獄吏曰如是不免煩朝散一行翁慨然曰天乎有是哉吾為人子豈可牽連垂白親入牢户乃自誣服坐是流離竄逐久乃還家髙宗中興吕元直丞相當國知公之寃乃為上言其無罪盡還舊秩驛召詣行在所連降詔促其行未至以淮上多盗遂知無為軍繼而戚方擾江東漕使朱公異奏知信州張琪踐蹂宣徽制置使權公邦彥奏知徽州而公已老矣遂解印綬以歸歸六年終于牖下近年郟升卿師古為守属羅愿端良修新安志有族子館于郡壁端良問翁出處本末族子無逺識不能為翁辨誣又不能明翁之功翁之子孫亦不以告端良遂略而不書然信州之功有天子之詔有内翰汪公藻二堂之碑有信州寓公寄客數十人破賊保城詩頌粲然如五緯七宿光芒在天志雖不書未足多恨炎嘗執筆𨽻太史氏石室金匱所藏皆得見其副墨意公姓名必載諸汗青然非特不得立傳并徽宗皇帝紀中於公破賊一事不書又求之方臘傳中首敗於信州一節亦不書盖王甫用事於内既娼公之功而童貫握兵于外又欲自專其功故汝方死賊之節見録而吾翁破賊之功見遺史臣所不得而書也昔者漢之韓安國唐之郭元振皆凛凛為時名臣而晚節偃蹇困躓而不振然名在冊書千載之下尚得見其行事而知其為賢翁之智略才氣足以傑立於萬夫之上見於小試不見於大用而聲烈竒偉如此儻翁得志謀謨中朝則其所成就者從可知矣不幸以無罪為小人所誣以有功為小人所掩重不幸其姓名不著於冊書日逺日忘且將無傳於來世炎之咨嗟痛惜者在此故因而次其遺文懇切言之不能已也翁之詩大篇舂容而力常有餘短章清羙而意無不足他文亦有典有則皆非苟作識者當能辨之無待炎之稱賛翁諱悰改諱愈字原道官至朝請大夫職至秘閤修撰晚自號北山老人今題其遺文曰二堂先生文集者著信州保城庇民之功也緑凈文集序緑凈文集族伯父萬載丞所著也古律詩四十詩頌三偈一表牋十有七書二序二述一墓表一樂語一長短句一釐為上中下三卷公諱昭徳字子輝北山翁長子才氣秀邁輔以淹博之學由鄉貢入太學三試南宫始中選未及廷對而沒某少時聞諸父皆推公能文然不獲見其片言隻字近方於公從孫從之處得詩文一帙亦非全書編次篇目如右其漏佚者不可復得矣公少從三衢毛逹可學其文逼真逹可見之擊節稱善今所編次其詩文皆有典則節奏清越歩驟蹀躞而超卓之才秀傑之氣於文字中尚可見其髣髴而某於心有感焉集中所言三二叔者族祖墻東先生也真老者從伯父小雲溪翁也文剛者族伯父鎮江通守氷玉老人也方其時王氏為婺源著姓而人物文采彬彬如此墻東氣豪健自負不薄而老死於布衣公與小雲溪翁又皆早世其年僅及三十北山翁悼公詩有云皎然玉樹照珠林俊逸天材夐不羣天上樓成要作記地中宫闕去修文當年暫泊嘗經此今日重來獨念君撥置清樽雙涙落人間此恨豈堪聞嗚呼三復此詩云亡之嘆豈特父子真情宗族中有識者所共也兩翁二父某皆不及見惟於氷玉老人獲侍杖屨承教誨然捐館舎亦四十有二年矣山川如舊人物皆非此某所以起九原可作之念不覺為之堕睫也南窻雜著序先大夫平生詩文遺藁題曰南窻雜著諸孤不天先大夫捐館舎于今四十有五年其不肖孤某用先大夫之學僥倖登科處則鬻文以補伏臘之不給出則隨牒轉徙糊其口於四方嵗月侵尋許久而遺文未及編次追念先大夫事祖母太夫人極愛敬問起居視飲食日日皆有常節有疾不離左右藥必嘗而後進承顔養志惟謹執䘮苫次三年不飲酒不茹葷不入私室事兄嫂致恭且順行之以禮終其身無違言教兄子以詩書不啻如已子間有違之者待之泰然如常時未始含怒燕居與先太宜人相敬如賔未嘗見其疾言遽色臧獲有恩意蓄産二字不出諸口隠徳奥行如此可以追配古人某不肖既不能發揚其幽光而遺文在篋手澤如新又不能編次成書跼天蹐地何所逃罪曩自臨湘解官歸里中携遺藁如分寧及臨江解官入中都歸故里遺藁留分寜寓居逺不可即致儻更失於㑹粹大懼湮沒無傳無以見先大夫於泉下乃訪於親舊得其副墨所傳者輯為一編分數十卷盖所佚者三分之二尚俟他日取分帙所藏本足之冰玉老人集序某弱冠時見先大夫與諸父唱酬有上元雪詩用崢嶸字韻某不揆斐然成一篇綴卷尾有鼇山聳處尚崢嶸之句先大夫為一啟齒傳至諸父處族伯父鎮江通守見之莞爾笑曰上元用鼇山事於押崢嶸韻有意思吾軰不如後生乃能為此語當是時羣從昆弟數十人而伯父獨每見某欣然談笑忘倦其教誨奨提良厚後四年當紹興辛巳先大夫弃諸孤又三年當隆興甲申伯父捐館又五年當乾道己丑某始登科而先大夫與伯父皆不及見某心切切以為恨自己丑距今三十有七年某髪種種而伯父之後亦衣冠零落不振矣每一念此喟焉太息以悲去年其曽孫師楚持畵像來某敬賛之曰不問有無知其如玉石之清不校通塞知其如金石之靜所懷不試是曰有命繪事彷彿神清氣定凛然如生見者起敬文雖不工盖紀實也今於族弟夢宣處得家集編次釐為若干卷讀誦其詩文而味其意㫖竦然如立乎几杖之側慨然如聞乎其謦欬之音詩曰髙山仰止景行行止中心藏之何日忘之某於伯父雖欲勿思烏得而勿思自伯父云亡某雖竊進士第學不加進而曩時為儀曹郎因牋表諸公頗相稱許追惟所自伯父教誨之力為多今編次遺文不敢無語敬叙其編首曰伯父今人與居古人與稽内不立城府外不事邉幅故發於詩文易直平淡如行雲流水讀之文從而字順翫之理到而味長與繩削織繢以為工者異矣自號氷玉老人故題曰氷玉老人文集若其出處本末某将為小傳以著其詳本草正經序本草舊三卷藥三百六十有五種梁陶宏景附名醫别録亦三百六十有五種分七卷唐顯慶中蘇恭増百十有四種國朝開寳中盧多遜重定増百三十有三種元祐中掌禹鍚補注附以新補八十有二種新定十有七種合一千七十有六種分二十有一卷新舊混并經之本文遂晦今摭舊輯為三卷序之曰衣有蔽膝樽有𤣥酒樂有土皷葦籥存古也存古者何不忘其初也世莫古於上古人莫聖於三皇伏羲有易神農有本草黄帝有素問等書醫在後世㨿方投疾則聖人濟天下之仁術也古書竹簡火於秦易以卜筮存本草素問以方技存其天乎西漢去古未逺班固蓺文志序醫四種三十有六家獨弃本草不録淮南王安曰神農嘗百草滋味一曰七十毒醫方始興樓緩少誦醫經本草方衍數十萬言平帝元始五年舉天下通醫術本草者吏為駕軺傳遣詣京師時重本草如此固不録何也梁七録始載神農本草三卷或者謂初未著文字師學相傳謂之本草頗疑其不然今考其書論藥性温凉味甘苦多異殆後人所附益非本文古之人能謹起居薄滋味嗜慾故受病少醫又神聖則用藥三百六十有五種有餘矣後之人不能攝生風濕寒暑侵其肌膚勞苦無極弊其筋骨飲啖無度傷其腸胃嗜慾無已竭其精髓故受病多醫又上非和緩巧非扁倉故用藥一千七十有六種而猶若不足是以刪取本文三篇以存古又以儆庸醫和緩已逺扁倉不生藥視古三倍庸醫借此射利幸而中攘臂有矜色不中病者死醫盖自如與操刅殺人者相去㡬何噫五顯靈應集序凢郡縣必有明神司禍福之柄庇其一方在吾邑則五顯是也闔境之人旦夕必祝之嵗時必爼豆之惟謹神之靈應不可殚紀然當論其大而略其細何也地方百餘里民近數萬户水旱有禱焉而無凶饑疾癘有禱焉而無夭折其庇多矣餘威遺徳溢於四境之外逹於淮甸閩浙無不信向靈應孰大於是若夫時出變異以聳動愚民之耳目此特其小小者耳邇者太常加封以聰眀正直之徳著於顯號非論其大而略其細歟夫神人一也神廟食於一方如長吏禄食於一州一縣也為長吏者亷以潔其身公以平其政愷悌以撫其民是謂循良若其貪若其私若其薄則於善之大者無稱焉或能决一疑獄察一隠慝豈足以為賢哉故論神之靈略於其大而詳於其細非特識者疑其近誣神亦且以為凟矣或曰如公所言則神之靈應皆無庸編輯乎曰事神者敬而已矣不因靈響而敬心常存者君子也因靈響而不敢不敬否則慢者愚民也神之意将假是以警愚攝其凶戾而生其善心存而不議不亦可乎樗叟詩集序樗叟王氏子字至卿於先大夫族孫行也少從先大夫學某與之友良善先大夫既沒某宦游四方而至卿浮沉里中挾琹書鬻文以為生某每歸與相見惟話舊論文不厭塵俗事一毫不挂牙頰不相見雖千里尺牘問寒温無虚嵗及某自中都罷歸而至卿已亡其子天隲裒至卿詩文釐為若干卷属某為序至卿少時意亦欲馳騖當世其為文引筆亹亹不休然性簡率胸次無城府好莊周書李白歌詩頗自放於酒累試有司不得志晚自號樗叟遂弃舉子事業而專於詩雖若不甚經意而属詞精確用韻妥貼他人竟不能過又愈出愈富前後無一語一聮相犯詩之大略如此可傳已至卿始薄有田園不計有無久而貧桑柘數畝茅茨數椽處之泰然不特其詩可傳其人固可尚也故併著于篇首歸諸天隲使藏之松窻醜鏡序三山鄭中卿來宰婺源予郊居杜門相見不能數間一見相與論古人成敗得失商天下事利害如指諸掌而緖餘及於文章其言纚纚使人属耳忘倦予因知其蓄之淵淵軫之源源也久之中卿始出平日所著示某其别有六一梅隠二哦松三南游四北轅五經論六詩餘而總目為松窻醜鏡且曰廬陵曽㓜度嘗為序請益之予視㓜度之序已詳尚何言然不可以無言也先秦古書不論西漢以文名世者自賈誼始政事一疏過秦一論鵩鳥一賦筆力頓挫卓詭此天下傑作也誼之後文章支而為三晁錯之文出於雜學主父偃徐樂嚴安似之而廣博不及董仲舒之文出於經術公孫宏劉向似之而純正不及枚乗司馬相如之文出於楚騷王褒揚雄似之而玅麗不及是三者如淄澠合流而異味非易牙莫能辨也自漢而下以文鳴者雖接踵而古人秀傑之氣渾厚之質蕭散之趣衰矣至有唐詩稱李杜文稱韓栁然後唐之文方駕乎漢之文至我朝有宋文有歐蘇古律詩有黄豫章四六有王金陵長短句有晏賀秦晁於是宋之文掩迹乎漢唐之文夫自漢至今上下二千年間卓然名世者不三十人噫難矣哉今前軰彫謝翰墨中未聞有與古人比肩者予得醜鏡閲之議論以意勝詩以格勝詞以韻勝中卿雖慨焉以文鳴自許是誠無與多遜而乃自以為醜不以為美何也豈不足則夸詡有餘則貶損故耶雖然此一說也而予又有一說予觀韓栁元和聖徳詩與平淮夷雅十琹操與鐃皷歌送文暢髙閑與送浩初序未知其孰優孰劣至羅池廟碑鄆州溪堂詩奔軼絶塵子厚不止交一臂而失之矣是故東坡歛波瀾而為簡嚴金陵去繩削而為閒雅豫章罷追琢而為髙古皆其老筆如此夫文生於才養之以學將之以氣中卿才髙而學博其氣不挫今日之文可㡬於古他日之文又過於今其名世也孰禦送曹成之序談地理吉凶如魏管輅晋郭璞唐泓師世不可多見予本不曉此亦不甚信此中更憂患三子短命老婦淪謝或者歸咎先壟不吉予始惑之自楚東罷歸謀𦵏亡婦慮術者不可信捜集諸家地理書考其本末如入式歌八分歌指意或可取其言已不雅馴其次如銅函記金華經宗廟秘訣等書未免溺於一偏不可盡用又其次有所謂行程記龍子經等猥俚士大夫不復可稱說矣古書惟狐首經及郭璞葬書尚存論地理者當以是為祖而庸術徃徃不讀或讀之句讀既誤字音又訛其義則懵然不曉所挾以求售者貪狼巨門星有吉凶紫褥紅旗氣有吉凶青嚢飛星壺中放水之類皆變換名目務為廋隠欲使人不可曉者其大要不過變卦生絶五行盛衰而已而專務誑惑流俗縱横射利䧟人於禍患者良多予察見其誕凢登予門者多却而不受同郡曹成之獨不然狐首經郭璞𦵏書尋龍七星歌覆誦如流其論地吉凶皆有據依非臆說罔人於地理家鐡中錚錚者也然性戅直不肯巽詞色以求容故聴其言者皆不喜術雖精反不如庸術能售予謂此非成之失聴其言者之誤也順我者言甘而用其言後必有禍忤我者言苦而用其言後必有福善擇禍福者不以言甘為善言苦加憎斯謂之智矣成之不可謂世無智者堅守其術而不變可也讀易筆記序未有書契之初羲皇首畫八卦文字生焉則易之有書由有畫也畫以數起數之用於占者世雖未之能學至其本元河圖起於天一地二而變於九六七八天一之畫竒其數以太陽之九地二之畫耦其數以太隂之六蓍之用衍以少陽之七七卦之重定於少隂之八八此學易者所通知也由數起畫畫者象之所寓象者理之所託也捨象則理不著矣捨畫則象不眀矣故三畫為八卦六畫為六十四卦畫變則象異畫不變則象同象有體而理無迹也有體則顯無迹則隠本隠以之顯聖人立象之意也即顯以索隠學者觀象之方也文王猶懼後人未能有見故發其凢於卦之彖周公又本文王之㫖著其變於卦之爻爻彖之詞具而於象與理可以見其端倪矣雖然聖人之經或言約而㫖博或語宻而義深讀者未必遽了非文王周公故隠而不發也開其端於言之中而存其意於言之外欲學者深思而自得之則象所藴畜義味深長可玩而不可厭也尼父生知之聖也而讀易韋編三絶且曰假我數年則於易道彬彬矣十翼訓釋不惮辭費學者豈得易言之哉秦焚古文字易以卜筮之書幸存此天地鬼神之所䕶持以詔來世而自漢以來易道不明焦延夀京房孟喜之徒遁入於小數曲學無足深誚而鄭𤣥虞翻之流穿鑿附㑹象既支離理滋晦蝕王弼承其後遽弃象不論後人樂其說之簡且便也故漢儒之學盡廢而弼之注釋獨行於今然木上有水為井以木巽火為鼎上止下動為頥頥中有物為噬嗑此四卦雖弼不能削去其象也夫六十四卦等耳豈有四卦當論其象六十卦可略而不議乎弼之言曰筌所以在魚得魚而忘筌蹄所以在兎得兎而忘蹄言者象之筌也象者意之蹄也捨筌蹄無以得魚兎則捨象求意弼亦知其不可而猥曰義苟在健何必乾始為馬類苟在順何必坤始為牛是未得魚兎先弃筌蹄之說也或者知象不可去既不能盡通又不肯闕所不知則為之說曰易之有象猶書有譬諭詩有比興也象不可去亦不必泥得其意足矣此與弼說無異亦未為確論也夫易三聖人所盡心也立義深於詩書而措辭嚴於春秋書之有譬詩之有比惟意所之初無定㫖易象反是以竒耦之畫摹冩天地萬物之形似而寄於六十四卦之中一卦六畫畫有此象聖人即著之於辭畫無此象不泛然旁引曲取也豈得執詩書比諭為例哉前軰嘗有疑其不然者故於象數求之加詳然掇拾先儒舊說嚼糟粕之餘失甘香之味其所發明無㡬耳炎讀易三十年不得其門而入嵗在辛亥始脫為縣之厄明年歸自中都僑寓古艾杜門却掃尋繹舊學久之若有所悟譬猶徃來熟習於山海之間雖未能手探其玉然寳氣所在或望而見之因釋然笑曰觀六畫之象而未合於爻彖之辭是未得其象也玩爻彖之辭而未合於六畫之象是未得其辭也象與辭未能融㑹而曰得聖人之意其中否特未定也管蠡之見何足以窺測髙深本之於畫驗之以辭對觀互考二者如合符契則筆記之其未逹者闕焉以為聖經不可易知固不可強通也而河南邵氏曰畫前有易刪後無詩不特以象為可忘且併以畫為可遺其說髙矣易而可以無畫但不知三聖人盡心於此以垂世立教者其㫖果安在也或曰然則易盡於畫乎曰易者變也其變始於乾坤天地闔闢一乾坤也吾身動靜亦一乾坤也而畫能盡之乎自乾坤而上不可以象求以通變而不窮者命之曰道藏用而不測者命之曰神立獨而無對者命之曰太極而畫能示之乎雖然無畫而可以體易伏羲文王之事也有畫而後可以語易學者之事也不玩周公尼父之辭而曰吾求易於六爻之外此係風捕影之類而炎則不敢已矣将以此得罪於傳道之賢哲未可知也將以此見取於好古之君子亦未可知也懶翁詩序詩文當論工拙不當論窮逹逹者未必皆工窮者未必不工也唐人尚詩士以能詩取髙科登逹宦者接踵然王昌齡孟浩然孟郊賈島之徒其身至窮而言語之妙有不可揜沒者文章天下公噐其品級髙下當定於公論非私意所能翕張富貴利逹則其言語常重貧賤隠約則其言語常輕乃區區世俗之論識者顧安取此予從兄懶翁壯年慨然欲以翰墨自見於世題所居之室曰鐡硯其學貫穿經史其文自出杼軸不肯蹈襲而終以不耦今老矣惟誦佛氏書不輟其意若有所悟解而不能釋尤喜蒔花卉欲以觀造物之巧其心樂之不厭也出則徜徉里巷間好事者飲以酒即徑醉絶口不談世事入則蕭然茅茨之下淡泊無營素嗜詩今亦不復吟咏親舊間從索所作乃裒其舊稿凢若干篇以書來属炎為序炎誦之終編見其語精而意婉如孤桐之琹清玉之佩節奏鏘然知音者聞之自當属耳非炎之私言也郊島困窮詩誠工語多酸寒且有怨懟翁則不然辭氣恬淡而和平不激不戚其所得有在詩之外者可以為賢矣翁名綱字徳維姓王氏晚自號懶翁東都紀年序東都紀年三十卷炎述九朝厯年行事成書也慶元三年八月炎奉詔自太學博士入秘書省為郎眀年兼實録檢討尋入著庭為佐郎又明年為軍噐少監而職兼檢討如故於是金匱石室所藏炎皆窺見副本因念漢人荀恱唐人栁芳吴兢軰於當代正史外皆别自著書成一家言恱有漢紀三十卷芳有唐厯三十卷兢有唐春秋三十卷獲與正史並傳炎今援是比用國史本紀叅校為紀年一書於三朝本紀其辭頗有所損於兩朝四朝本紀其事或有所増視李燾長編熊克通略炎不如其博王稱事略本紀炎竊病其簡豐約中度炎固不能而私有志焉又随所紀附以提要為三十卷提要之目有二曰注則有所辨曰證則旁叙其事也炎又伏念神宗皇帝嘗詔曽鞏以三朝兩朝國史合為一書鞏雖承命書不果成炎愚乃欲採掇九朝故實合三為一甚見其不知量然所述止於本紀不及志傳是以忘其狂斐懐不能已畢力編摩書未及成㑹某負罪去國居閒處獨再加考訂今方脫藁不敢閟在私室謹齋戒練日進于大庭故序所以記述之意如右起建隆庚申終靖康丁未百六十有八年一祖八宗創業守文宏逺之規模與夫庶事之弛張忠邪之消長敵國之屈伸其大略可覩矣雖不足以發揚宋徳之代光紹明惟陛下寛蕭斧之誅賜以一覽若幸而獲傳庶㡬無愧於荀恱栁芳呉兢輩某死且不朽謹序雙溪類稾卷二十五
