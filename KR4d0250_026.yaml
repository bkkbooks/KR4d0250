body:
  text: 雙溪類稾卷二十六宋王炎撰考古雜論禘祫論禘祫宗廟之大事也祫者合也禘者諦也毁廟之主陳於太祖未毁廟之主皆升合食於太祖是故謂之祫此公榖二氏所傳也王者禘其祖之所自出以其祖配之諸侯及其太祖以審諦昭穆是故謂之禘此戴氏所記也周官以宗伯掌邦禮禘祫無見焉然六享之目一曰肆獻祼二曰饋食皆在時祭之上即為禘祫不疑矣鄭康成之傳禮其論禘祫甚詳而有四失焉其亂禮之經者有一其失禮之節者有三祭法記四代之禘虞夏皆禘黄帝商周皆禘嚳所記雖未必皆是而禘固宗廟之事也康成則曰周頌廱之禘祀文王也商頌長發之大禘祭天于圜丘而配以太祖也出一已之臆說汨郊廟之定制所謂亂禮之經者此也既虞而升祔謂之祫事與大事之祫實異而名同祥禫而後禘以定昭穆之序禘而後祫其先後不可易置康成乃以升祔祫事為證遂言先祫而後禘此失禮之節者一也禘祫之祭廟祧之主或在然祫則太祖東向禘則祖之所自出者東向而太祖配之祫大於時祭禘大於祫眀矣康成乃謂禘小而祫大此失禮之節者二也祫非不酌祼也而以食為主故周官饋食又謂之朝享以是知其為祫禘非不薦食也而以祼為主故周官肆祼獻又謂之追享以是知其為禘康成乃以肆祼獻為祫饋食為禘此失禮之節者三也去此四失禘祫之禮正矣然則捨康成之失議禘祫可以無疑乎自漢以來諸儒異論其不可不辨者猶有三焉天子有禘有祫諸侯有祫無禘一疑也三年一祫五年一禘二疑也祫禮行於三時禘禮行於孟夏三疑也夫祫祭太祖東向則天子諸侯之禮同禘非常之祭也諸侯止於及其太祖而王者及其祖之所自出則隆殺有辨而曰天子有禘有祫諸侯有祫無禘此因大傳不王不禘之說而失之也國語言荒服終王此蕃國世一見者也顔師古釋之曰新王即位乃來助祭此乃禘祭之時非是則不禘故䘮服小記論虞祔祥禫之祭而及於不王不禘則天子新即位而後禘其義甚明而謂天子有禘諸侯無禘不已踈乎此不可不正其誤也三年一祫五年一禘此公羊五年再殷祭之說也公羊盖失之矣而韋元成乃為之說曰五年而再殷祭言一禘一祫也禮緯因之張純又為之說曰三年一閏天道之小成五年再閏天道之大成以是為禘祫之節鄭康成又因之且謂魯禮三年䘮畢而祫太祖禘於羣廟自後五年而再殷祭其説益以乖異不同夫新主入廟昭穆逓遷則有禘自是而後有祫而無禘此不可不明其失也禘之時月經無眀文而戴記則曰天子礿犆祫禘祫嘗祫烝諸侯礿犆禘一犆一祫嘗祫烝祫春祠夏禴周禮也春礿夏禘殷禮也文獻不足夫子不能討論夏商之禮漢儒何從知之乎是以知其說之不足證也張純曰禘以四月取純陽之在上祫以十月取百物之皆備也其說未為皆得也春夏難於備物故礿祠之禮薄盖不可以祫於斯時而秋薦新故謂之嘗冬備物故謂之烝祫於秋冬夫豈不可安用必以十月乎若夫禘禮取四月之純陽則失之矣明堂位記魯禮季夏六月禘於太廟鄭康成從而遷就其説曰周六月夏四月也則尤失之矣春秋書禘于莊公則以五月禘于太廟則以七月未聞其必用四月也盖禘行於祥禫之後祥禫既無定時則禘禮亦無定月此又不可不明其失也議禮者不能正其誤明其失故自漢至唐禘祫不合於聖人之經顔其卿曰禘祫懿祖東向而太祖以下列於昭穆則禘祫無辨非經也韋武曰祫宜獻祖東向禘宜太祖東向則以禘為祫以祫為禘尤非經也經文固殘缺矣其意猶可考也而諸儒汨之輯諸儒之論用經以折衷其是非此吾所以著論之意也郊祀論上郊祀國之重事也先王之禮猶可以考之於經而諸儒異論者經之所著不同也盖其不同者有四郊丘之制也天帝之號也天地分合之異也春冬時日之差也郊丘之不同者有三周官謂之圜丘戴記謂之南郊又謂之泰壇鄭康成之説曰祀昊天于圜丘謂之禘祀五帝于南郊謂之郊而泰壇無説康成之言非也兆於南以就陽位於郊故謂之郊夫子嘗有是言矣王肅曰築丘以象天體是謂圜丘圜丘人所造也是謂泰壇兆於國南是為南郊然則南郊也圜丘也泰壇也其名有三其實一也天帝之異有三曰昊天曰上帝曰五帝天洎五帝為上帝孔安國之説也天為昊天元天為上帝五方之帝為五帝鄭司農之説也孔鄭之説質之於經固已不合而鄭康成則又曰昊天上帝者天皇大帝也五帝者始於青帝靈威仰終於黒帝黒光叶也以緯亂經雖不辨可以知其無稽夫徧覆無外故以天名主宰造化故以帝名在書言類于上帝而又言告于皇天在周官以為禋祀昊天上帝則昊天上帝一而已矣是故詩書所載有皇天上帝之言有昊天上帝之言而周官始有五帝之名夫上帝至尊無二而有五帝何也上帝天帝也五帝五人帝也何以知之以周禮而知之掌次大旅上帝則張氊案朝日祀五帝則張次上帝在朝日之先五帝在朝日之下則五帝非天帝其證一也宗伯兆五帝於四郊四類四望亦如之郊兆於四類之先則五帝非天帝其證二也司服祀昊天上帝則大裘而冕祀五帝亦如之既言上帝又言五帝則五帝非天帝其證三也吕不韋之月令嘗言五帝矣春則太皥夏則炎帝秋則少昊冬則顓頊夏秋之交則黄帝不以五帝為天也魏相之奏亦嘗言五帝矣太皥乗震炎帝乗離黄帝乗坤少昊乗兌顓頊乗坎亦不以五帝為天也秦漢間言五帝者皆五人帝而已其說必有所從受也古之祭天者主於上帝其配以祖周公既成洛邑用牲于郊牛二其一帝牛其一稷牛夫禮簡則嚴嚴則敬是故事天所以報本尊祖故以配天嚴敬之義也合上帝與五帝而謂之六天則近於誣矣天地分合之異先儒考於經者未審也春秋傳曰天子祭天諸侯祭土尊天而親地隆殺固有辨焉猶之宗子祭父支子不得祭父而可以祭母父尊故也天子祭天諸侯不得祭天而可以祭土天尊故也古之祭地者有社則又有大社大社謂之冢土未有北郊方丘之名也社祭土主隂氣也祭帝于郊以定天位祀社于國以列地利而子思曰郊社之禮以事上帝明地不可與天相並尊天之義也周官論國之神位左祖右社此王社也澤中方丘此冢土也即古人所謂大社也書謂之冢土禮謂之方丘而戴記謂之泰折折則方矣其名有三其實亦一也至漢匡衡乃有南北郊之説則失先王尊天親地之意矣新莽始有天地合祭祖妣並配之說則又失先王之意益甚矣雖然莽之說因周頌之言而失之也周官夏日至祀地于方丘冬日至祀天于圜丘則曰此天地分祀之證也夫春夏祈榖其詩為噫嘻祈有二祭而所歌者噫嘻一詩也秋冬報其詩為豐年報有二祭而所歌者豐年一詩也昊天有成命之詩可歌以祭天豈不可歌以祭地乎以先王之行事質之武王東伐告于皇天后土矣告于皇天則類于上帝是也告于后土則宜于冢土是也是天地未嘗合祭者一也周公之祭于洛邑丁已用牲于郊戊午社于新邑是天地未嘗合祭者二也以武王周公之行事而求其制禮之意則天地未嘗合祭無疑矣冬春時日之異則戴記之言失之也其言曰郊之祭也以迎長日之至又曰郊之用辛也周之始郊日以至而繼之以卜郊夫日至而郊周禮也卜日用辛魯禮也雜周魯之禮而兼記之而郊之時日紊矣盖周人之郊有二皆無所用卜日至而郊報本之郊也故其禮行於一陽之初復啟蟄而郊祈榖之郊也故其禮行於農事之將興制禮之意坦然易眀戴記言周之始郊其月以日至其日用上辛吾是以知其合周魯之郊而紊其時日也諸儒異論為禮經之蠧者多矣去其異論之蠧而究其禮經之正經雖殘缺禮意則固可知也已矣郊祀論下郊丘之辨有三圜丘以事上帝方丘以事地祗而四郊以事五帝圜丘謂之南郊方丘不謂之北郊何也因理而處其當然者義也因義而制其節文者禮也苟無節文不足以為禮是故祭地之位戴記謂之泰折周官謂之方丘詩書謂之冡土而正其名曰大社不曰北郊所以定天地之尊卑也記曰天子祭天地諸侯祭社稷而公羊氏亦曰天子祭天諸侯祭土諸侯既有社矣謂之祭土不謂之祭地何也吾於孔安國韓嬰之言有證也天子封土五色以立大社其命諸侯惟以方色之土予之使歸而立社則諸侯之國有社而無五土之大社等級有間是故諸侯可以謂之祭社其祭社可以謂之祭土不可以謂之祭地而天子祭天謂之南郊其祭地不謂之北郊皆所以謹禮之節文也夫子曰禮者義之實也祭天於郊南靣陽也祭地于社北靣隂也天尊地卑王者父天母地不敢悖尊卑之大義也漢儒記禮之言曰祭帝于郊以定天位祀社于國以列地利以帝對社則社主於祭地其證一也禮行於郊而百神受職禮行於社而百貨可殖以郊對社則社主於祭地其證二也天子大社必受霜露風雨以逹天地之氣夫社壇而不屋謂之逹天地之氣則社主於祭地其證三也天神莫尊於上帝地祗莫尊於后土是故事天於郊所以祀上帝也事地于社所以祭后土也而鄭康成則曰方丘所祭神在崑崙者也北郊所祭神州地祇也甚矣其説之不經也若夫四郊之祀五帝亦謂之郊則與祀后土者有異義焉天地相配疑於相敵五帝貴於百神而降於大祇是故祭地不命曰北郊嫌也祀五帝命曰四郊無嫌也故凢經之言上帝者皆天也其言五帝皆人帝也記曰天子祭天地祭四方諸侯方祀祭四方則祀五帝于四郊是也方祀則祀五神之在其方者也郊丘之義天神地祗人鬼之等於經皆有見焉則先王之禮意猶存自鄭康成引緯亂經持詭説以汨正論而先王之禮遂晦而不明盖漢儒之論經黨同伐異求伸其專門之説自世祖以來䜟緯之學盛行是故何休假緯書以言春秋康成假緯書以言禮皆欲因時君所好借緯為重而求其説之勝也昔人固有知其失者矣王肅曰鄭氏學行孔氏之路枳棘充焉盖詆其以緯亂經也後世之言禮者考信於經合於經則得之不合於經則失之故吾之論郊祀詳於稽經而略於議史也周禮論周官六典周公經治之法也秦人秉竹簡以畀炎火漢興諸儒傳於煨燼之餘藏於巖穴之間其書已亡而幸存漢既除挾書之律武帝時六典始出帝不以為善作十論七難以排之藏於秘府不立於學官其書雖存而如亡天下之治不可無法猶之為圓必以規為方必以矩為平直必以凖繩六典之備也武帝之志欲馳鶩於規矩準繩之外雖四代之書且以為朴學而弗好其於周禮何有立論排之宜矣東都諸儒知有周禮而其說不同以為戰國隂謀之書者何休也以為周公致太平之迹者鄭康成也六官所掌綱正而目舉井井有條而詆之以為戰國之隂謀休謬矣而康成以為致太平之迹其説亦未然也治法至太平而大備而所以致太平者不專係於法之詳也周公輔政管蔡流言不安於朝而之于東都及其鴟鴞之詩作金縢之書啟然後成王逆公以歸既歸之後伐管蔡作洛邑遷殷民管蔡既平殷民既遷洛邑既成公則歸政於成王矣當公歸政之時成王蒞政之初淮夷猶未定也而况公未歸政管蔡未平殷民未遷洛邑未成雖有六典安得盡舉而行之成王即政廵侯甸伐淮夷中外無事還歸在豐作周官之書以戒飭卿士大夫則周公之經制盖施行於此時吾是以知六典之法至太平而後備非用六典而能致太平也夫為治有定法天下無定時時異則法異雖堯舜禹相授一道法亦不能無損益也分畫九州堯之制也至舜則析而為十有二州分命羲和堯之制也至夏則羲和合為一官聖人察人情觀世變立法經治雖不可變亦不可泥古此周公之意也而讀周禮者至今不能無疑王畿不可以方千里也五服不可以分為九服也三等之國不可斥之以為五等也井田之制積同為成積丘為縣都内外不容異制也或者見其可疑則曰周禮非周公之全書也盖漢儒以意易之者多矣漢儒之言周禮誠不能無失然亦不敢遽變其意也考之於經見其可疑舉而歸罪於漢儒豈得為至論哉且夫禹之五服服五百里各指一面言之故東西相距而為五千周之九服方五百里則以其方廣言之東西相距其地亦止於五千又何斥大封域之有且梁州之地職方所無周公豈不能復先王之故土而治之然而不在封域之内者務廣徳不務廣地可知矣言其斥大封域而為九服考之不詳之故也周之洛邑雖曰天地之中北近大河東西長而南北狹不可以規方千里然温在今之河北下陽在今之河東皆畿内地不以河為限也若曰洛在河南不能規方千里則商人之都在河北涯邦畿千里何以見於商頌則言千里王畿之非實者亦考之不詳之故也井田之法凢九夫為井皆以成田言之溝洫道涂不與焉内而鄉遂外而縣都其法一也然在鄉遂則自一井積之方十里為成又自一成積之方百里為同所以定鄉遂授田之數也在家邑則自一井積而為邑為邱為甸四甸為縣四縣為都所以定公卿之采地也鄭康成不察内之成同外之邑都皆自一井積之見其廣狹不同而以為井田異制又為之説曰一甸之地旁加一里以為成一都之地旁加十里而為同此康成之誤有以汨經之文而遂謂先王井地之制不應内外異法此又考之不詳之過也若夫三等之國分為五等則周公之意盖逆慮世變而求有以制之也唐虞之世天下號為萬國然強則肆弱則屈敵則爭於是迭相兼并至周之初宇内不過千八百國則向之萬國社稷邱墟十七八矣周公於是欲分而為五等自公以下所食之地少附庸之國多欲其以大比小以小事大庶㡬可以小大相維然必建邦國之時方定其地初非取先王經制之國盡從而更張之也盖周公雖定六官之制亦度時措之宜而行之盖有定其制而未行者矣亦有已行之後世随時而變者矣定鼎郟鄏謂之建國以為民極然成康未嘗都洛幽王之敗周始東徙此所謂定其制而未行者三等之國分為五等法雖立而未行亦此意也五刑之罪二千五百穆王變為祥刑凢三千條穆王去成王未逺也然不用周公之法吕刑一書夫子盖有取焉此所謂後世随時而變者也若曰徙封數大國則諸侯盡擾司徒之制言封國不言徙國以封為徙此又攷之不詳之過也雖然前軰之所疑者吾固推經意而辨之矣周禮猶有可疑者先儒盖未之疑也祀昊天上帝則服大裘而冕祀五帝亦如之且祀昊天于南至服裘為宜祀黄帝于季夏盛暑之月而亦服裘可乎王搢大圭又執鎮圭以朝日考工記謂之大圭其長三尺杼上葵首鄭康成謂玉方一寸其重一斤若圭長三尺設若其博二寸有半其厚四分則其重殆三十斤而王能搢之乎王乗玉輅建太常維者六人服皆衮冕夫衮冕王與上公之服也維太常者徒行于車後乃亦衣龍衮與王同服不㡬於尊卑無辨乎太宰六官之長也其属六十而内小臣寺人九嬪世婦女御之職皆與焉以天子之正卿而宦寺宫妾悉為之属不已䙝乎天官既有世婦春官又有世婦且曰每宫卿二人謂之婦則不得以為卿鄭康成乃曰如漢有長秋亦以士人居之夫士人為卿則又不得謂之婦矣且王后六宫而天子六卿若宫有二卿則卿十有二人何其數之多耶周禮一書今學者所傳康成之訓釋也則康成可謂有功於周禮矣雖然六官之制度以康成而傳亦以康成而晦盖康成之於經一則以緯説汨之一則以臆說汨之是以周公之典其意不得不晦也周公之典既晦是以學者不得不疑也前軰之所疑者不揆其僣而釋之而吾之所疑則世未有辨之者後必有能辨之者矣故表其說以待來者考正焉明堂論郊以事天廟以事祖禰三代之逹禮也明堂以享帝則非郊以享親則非廟夏商所未有也而周始為之故夫子曰昔者周公郊祀后稷以配天宗祀文王于明堂以配上帝武王之伐商而歸也祀明堂以教民知孝其禮行于朝覲耕籍養老之先而嚴父配天之義夫子不属之武王而属之周公者盖明堂之禮武王主其祀而行之其制度則周公明其義而為之也夫義者禮之質也故禮雖先王未之有而可以義起周公逹於義者也其在周頌思文后稷配天之樂章也我将祀文王于明堂之樂章也后稷始封之君而以配天于郊故曰后稷生於姜嫄文武之功起於后稷故推以配天尊祖也萬物本乎天人本乎祖尊祖以明有本此百世所不變者也而周之王業實成於文王夫易始於乾坤以定君臣之分則北靣事商者文王之心文王非有意於王天下也雖然詩之國風始於闗睢小雅始於鹿鳴大雅始於文王頌始於清廟皆文王之詩也闗睢有王者之化鹿鳴有王者之政大雅始於文王則受命作周矣頌始於清廟則盛徳有百世之祀矣武王之伐商也誓於孟津誓於牧野其伐商而歸也告於羣后無不以文王為言則王業成於武王而所以成之者文王也配天于郊則不可以二太祖之尊烝嘗於廟則不足以明文王之徳是故宗祀明堂以配上帝此義之所當然禮之所從起而非厚於其禰也知此則周公制禮之義明矣而所可疑者明堂之制度也考工記固嘗言之矣夏有世室宗廟之制也殷有重屋路寝之制也而周有明堂其制一堂而五室鄭康成曰或舉宗廟或舉路寝或舉明堂互言之以明其同制康成之言固不足證而考工所記亦未可盡信也其未可盡信者何也若有堂室而無壇墠則嚴父配天當在宫室之中矣先王之禮非特禋祀上帝于郊丘也祀日月星辰祀四郊祀方望山川皆壇而不屋漢文帝作廟以祀五帝于渭陽夫五帝五人帝也祀之于廟人且議其非禮况祀天帝之尊乃即宫室行事而謂周公為之乎故曰考工所記未可以盡信也夫考工記先秦古書也且難以盡信則諸家之異說紛紛從可知矣是故莫若求之於經夫傳記有之經無之不得已而從傳記可也傳記有之經亦有之捨傳記而從經可也捨經而從傳記可乎哉此理至易曉也二禮周公之經也周官司儀將合諸侯則為壇三成宫旁一門此明堂之説也然畧而未詳儀禮所載則詳矣諸侯覲于天子為宫四門為壇其深二尺加方明於其上而設六玉焉上圭下璧祀帝也圭璋琥璜祀四方也於是拜日禮月祭天燔柴此則明堂之壇而祀神以為盟也既盟王設几即席諸侯之駕不入王門奠圭繅上此則明堂之宫而明諸侯以為朝㑹也其盟㑹詔於明神是故謂之明堂鄭康成曰王廵守至于方岳諸侯來㑹亦為此宫以見之康成以知方岳之為此宫而不知此宫之為明堂是説也吾於孟子有證焉齊國於泰山之下者也宣王之時明堂尚存趙岐曰泰山下明堂本周天子東廵守朝諸侯之處也是説也吾於班史有證焉漢武帝之東封也泰山東北阯有古時明堂處則宫壇不存而其阯猶在也雖然鄭康成趙臺卿知時㑹殷同之有明堂而未能明夫所以朝諸侯祀五帝之義也周公祀文王於明堂以配上帝盖即其壇而祀之輔成王負扆以朝諸侯盖即其宫而朝之由此言之明堂制度與其禮典曉然如指諸掌可以决千載之疑議擯諸家之異説矣夫諸家之説不一皆臆度而意之也是故或失之誕或失之譎或失之陋或失之侈或失之雜皆非所以論周公之典禮也吕不韋之月令南有明堂左右有个與月遷徙以眂朝而布政此失之誕者也大戴之記則曰上圓下方九室每室四户八牖元譚新論又從而廣之以為有四闥以法四時十二坐以法十二月此失之侈者也蔡邕所論又以太廟靈臺辟雍合為一區此失之雜者也晏子春秋所傳茅茨蒿柱則陋而不中禮公玉帯所圖複道曽樓則詭而不經折之以二禮其說盖不攻而自破也大抵聖人制禮必有大經而寓於度数則有節文大經本也議禮者之所當重節文末也議禮者之所當輕明堂之禮下則以朝諸侯上則以事上帝大經存焉若夫壇墠之有崇卑堂室之有廣狹區區節文之末酌其宜而為之雖或異於古人何病焉自漢以來儒者之議明堂至今不决而考禮經殘闕之文斷以臆見則備矣雖然漢儒所傳不敢盡誣以為非亦不可盡信以為是故詳其義於禮經而折𠂻焉所以不避其僭也宗子論仁義人道之大端也仁莫重於親親義莫嚴於尊尊下治子孫旁治族属親親之道也上正祖禰尊尊之道也祖逺而易忘族散而易踈先王於是因仁義而為之節文故禮必有宗所以繼祖於上而合族於下也諸侯不敢祖天子不可以二至尊也大夫不敢祖諸侯不可以二一國之尊也是故諸侯之世子繼統為君世子之昆弟同所出者為適子異所出者為庶子而適子則先君之别子也曷為謂之别子不得彌其先君也曷為不得禰其先君公廟不可設于私家也是故旁出者以是為始故曰别子為祖别子之適長君命其族人宗之故曰繼别為宗别子之庶長子與庶子之庶長子其兄弟宗之故曰繼禰者為小宗宗之為言尊也上繼祖禰是故族人尊之也祖者本也本不可二大宗一而已矣此百世不遷之宗也故曰宗其繼别子之所自出者百世不遷者也而小宗有四其所繼者禰祖曽髙此五世則遷之宗也故曰宗其繼高祖者五世則遷者也夫親親者以三為五以五為九骨肉之戚主於恩愛以為仁因其逺近而辨其等差以為義而又修其節文以為禮自斬衰三年而殺之四世而緦五世袒免而服盡矣服盡則宗易宗易則祖遷昭穆之踈且逺者不復可相属也是故有百世不遷之宗明祖禰之正體也均公子也而正體以適為重有適而無庶則有大宗而無小宗有庶而無適則有小宗而無大宗所出惟已而已則無宗亦莫之宗是三者公子未必皆然君命其大夫士之庶者使宗其大夫士之適者儻適子非止一人適長必有君命然後為宗此則宗道之正也是故有適而宗適此大宗也其服齊衰九月其母之服如小君其妻之服齊衰三月無適而宗庶此小宗也其服大功九月而其母妻無服夫為之服者敬宗也敬宗所以尊祖也齊衰之服重大功之服輕大宗繼祖小宗繼禰而不得繼祖是故降殺其服所以致察於小大之辨也庶子不祭祖禰其祭必於宗子明正體之重也庶子不繼祖禰故不為長子斬尊正體而不二其統也適子庶子雖富貴必以寡約入宗子之家衣服車馬獻其上牲獻其上若非所獻不敢入宗子之門以祖之正體為尊且重不得以爵禄加之也宗子為士庶子為大夫大夫則有廟矣而以上牲祭於宗子之家祝曰孝子某為介子某薦其常事不可以爵命之貴賤而紊適庶之辨也宗子去國庶子為大夫而居者其祭謂之攝主祝曰孝子某使介子某執其常事不厭祭不旅不假不綏祭不配不歸肉避正主也其無爵而居者祭則望墓而為壇宗子既沒告于墓而後祭于家不可遽以庶而代宗也夫緦之為服之窮也袒免之為無服也自是以徃踈矣昭穆各以其属相從宗則一而不變也繫之以姓而弗别綴之以食而弗殊雖百世而尊卑長㓜親可序者由有宗也故曰尊祖故敬宗敬宗故收族公族異於庶姓而仁義行焉人道竭矣後世宗子之法既亡非緦麻之服相視㡬如路人冠婚不共其喜䘮𦵏不共其憂又稍踈焉則昭穆不復可齒是無類也譜牒不存則曾髙而上不知其世系之所自出是無本也仁之薄而遺其所親義之失而忘其所尊禮之廢而無以為仁義之節文公卿大夫之貴莫能繼祖而收族也其流及於庶人人情日薄風俗日壞又何怪焉運氣論五運六氣之説不見於儒者之六經而見於醫家之素問夫素問乃先秦古書雖未必皆黄帝岐伯之言然秦火已前春秋戰國之際有如和緩秦越人軰雖甚精於醫其察天地隂陽五行之用未能若是精宻也則其言雖不盡出於黄帝岐伯其㫖亦必有所從受矣且夫寒暑燥濕風火者天之隂陽三隂三陽上奉之木火土金水火者地之隂陽生長化收藏下應之而五運行於其間即五行之化氣也天數中於五戊居之地數中於六已居之戊己土也化氣必以五六故甲己化土而居於其首土生金故乙庚次之金生水故丙辛次之水生木故丁壬次之木生火故戊己次之此化氣之序也地之三隂三陽亦五行爾而火獨有二五行之妙理也葢木王於東火王於南金王於西水王於北而土王於四維戊附於戌而在乾已附於辰而在巽而未之對衝在丑故辰戌丑未寄王之位也未在西南其卦為坤其時為長夏以其處四時之中吕氏月令謂之中央土此土正王之位也春木生火秋金生水冬水生木而夏火制金生氣絶矣惟土王於西南然後以火生土以土生金四時之序循環不窮然火方王於午土遽王於未則火氣必耗故君火以名其氣温而未熱相火以位與太隂同處未申之間奉君令以行暑氣於是火不耗於土不屈於金故丙盛則庚伏此火所以獨分君相之位也天氣始於甲地氣始於子子甲相合命曰嵗立曰行四周而為一紀天以六為節故氣以六朞而為一備地以五為制故運以五嵗而為一周運統一嵗於四時之表氣分六位於一嵗之中風雨燥濕寒暑其應有候其至有期然用以占焉徃徃不効非素問之無驗用其説者知常而不知變故也凢物理有常必有變雖天地之運動徃來消息盈虚可以逆其必然者常也若其變則無所不至可知而不可必也嘗試即其常而言之五太之運是為太過其至先時五少之運是為不及其至後時惟平氣則不疾不徐其至以時其大畧如此火運上臨少隂水運上臨太陽木運上臨厥隂金運上臨陽明土運上臨太隂謂之天符木運臨邜火運臨午金運臨酉水運臨子土運臨四維謂之嵗㑹五太與在泉氣同謂之同天符五少與在泉氣同謂之同嵗㑹若是者其氣和土運上見厥隂火運上見太陽謂之天刑運水運上見少陽金運上見厥隂謂之運刑天若是者其氣乖此皆五運之常也主氣各居一歩厥隂主初少隂少陽次之太隂陽明又次之太陽主終六位不遷客氣與嵗推移子嵗太陽之水為初丑嵗厥隂之木為初迭相徃來而少陽之為初氣乃在太隂之後半嵗已前司天主之半嵗已後在泉主之其大略如此若其情則有相得與不相得其位則有順有逆相得者木火相臨火土相臨之類也不相得者金木相臨水火相臨之類也父臨子則順木居少陽之位是已反此則寒水居金位斯逆矣君臨臣則順君火居少陽之位是已反此則相火居君火之位斯逆矣此皆六氣之常也及論其變則有正有邪於是有變有勝有復有鬰有發有滛有承當時而行者正也非時而行者邪也當時而行其過則為變非時而行其至則為勝其救則為復抑而不伸則為鬰鬰而怒起則為發陵其所勝則為滛極而必反則為承假如太角之化為啟拆而變為摧拉太徴之化為暄燠而變為炎烈正化之為變者然也少角木氣不足清勝而熱復少徴火氣不足寒勝而雨復邪化之正復然也寒甚而無陽燄是為火欝熱甚而無凄清是為金欝抑而不伸者然也水欎而發則為氷雹土欎而發則為飄驟欎而怒起者然也風淫所勝則克太隂熱淫所勝則克陽眀陵其所勝者也相火之下水氣承之濕土之下風氣承之極則有反者然也然摧拉之變不應普天悉皆大風炎烈之變不應薄海悉皆燔灼清氣之勝不應宇宙無不明潔雨氣之復不應山澤無不蒸溽欎也發也淫也承也其理皆然凢此者其應非有候其至非有期是以可知而不可必也其應非有候則有不時而應者矣其至非有時則有卒然而至者矣是故千里之逺其變相似者有之百里之近其變不同者亦有之即其時當其處随其變而占焉則吉凶可知况素問所以論天地之氣化者將以觀其變而救民之疾也夫大而天地小而人之一身五行之氣皆在焉天地之氣有常無變則人亦和平而無災天地之氣變而失常則疾癘之所從出也是故木氣勝則肝以實病脾以虚病火氣勝則心以實病肺以虚病此醫者所能致察儒者不得其詳也至於官天地理隂陽順五行使冬無愆陽夏無伏隂春無凄風秋無苦雨和平之氣行於兩間國無水旱之災民無妖孽之疾此儒者所當致察醫家未必能知也素問亦略言之矣五行之精是為五緯與運氣相應有歲星有畏星以此察其行之逆順而占其吉凶然必曰徳者福之過者罰之則是運氣之和平而為休祥有徳者召之也運氣之乖戾而為災𤯝有過者致之也雖然其說略而未詳吾儒之經則詳矣洪範九疇始於五行中於皇極終於五福六極聖人建極於上以順五行之用是以天下之民有五福而無六極有五福皆可以康寧矣無六極皆免於疾病此其道固有行乎運氣之外者是謂大順成周之時嘗見之由庚之詩作而隂陽得由其道華黍之詩作而四時不失其和由儀之詩作而萬物各得其宜此建皇極順五行使民有五福而無六極之驗也是故素問方伎之書而洪範則聖人經世之大法也知有素問不知有洪範方伎之流也知有洪範不知有素問儒者何病焉卦變論卦變之説謂乾坤為父母而姤復為小父母六畫成卦凢一陽五隂皆自復變一隂五陽皆自姤變二陽四隂皆自臨變二隂四陽皆自遯變三陽三隂皆自泰變三隂三陽皆自否變其説不聞於先儒而言於邵氏至漢上朱氏從之且乾坤為父母其交則為三男三女復卦上坤下震震乃乾一索而得男姤卦上乾下巽巽乃坤一索而得女若復姤為小父母則姤有乾復有坤乾坤反係復姤所生而震巽二卦亦非出於乾坤不知從何而來且夫子彖易嘗言剛柔之變惟賁尤詳曰柔來而文剛分剛上而文柔諸家即曰賁自泰來盖祖邵氏説也然賁上艮下離坤體得乾一剛而成艮是謂分剛上而文柔乾體得坤一柔而成離是謂柔來而文剛剛柔相反出於乾坤之變夫子之言如此未聞其言泰變為賁也且雜卦首曰乾剛坤柔自乾坤生六子則剛柔相雜故六十四卦其剛皆出於乾其柔皆出於坤剛來下柔為隨柔進上行為晉剛來而不窮柔得位乎外而上同為渙皆剛柔之變也且随上兌而下震初上二爻不變則為乾坤變則坤之初居上而為兑乾之上居初而成震故曰剛來而下柔晉上離而下坤離卦在上六五以柔而居君位故曰柔進而上行渙上巽而下坎坎得乾之剛而為中爻今居二而得中是謂來而不窮巽得坤之一柔而為初爻今居四而附五是謂柔得位而上同然則凢卦二隂二陽變於臨遯三隂三陽變於泰否夫子未嘗言是邵氏之徒言之諸家皆從其説此吾所未曉也朱子發用卦變以解經至无妄而力主其説且曰无妄上乾下震若震一爻其剛自乾來則上卦未嘗損乾一剛是卦四剛二柔自臨遯而變明矣然詳觀夫子之言於随於渙皆曰剛來則是上卦一剛來而為初二兩爻於无妄獨曰剛自外來加一外字則其初未嘗損上卦之一剛也盖大畜上艮下乾則一剛在外反為无妄則艮變為震或謂大畜一剛在内自外來者自大畜而來也序卦先无妄後大畜謂大畜剛上自无妄而變可也謂无妄剛自外來由大畜而變於序先後不合殊不知序卦先旡妄而後大畜雜卦又先大畜而後无妄謂剛自外來由大畜而變何不可之有其説亦未盡盖旡妄儲貳之卦上乾為父下震為長子不損乾之一剛所以見其父道之全震為長子初有一剛實自乾而得之故夫子加外字以别之也况反對自與卦變不同子發以反對為卦變則尤失之盖邵氏之學長於占筮文王之演易不專為占筮用也靜而正心誠意動而開物成務易皆具焉惟以占筮論之則古人如管輅郭璞闗朗之徒足以盡易之道矣不特邵氏能之也讀易者捨夫子所已言求夫子所未言恐非聖人意也卦變之說存而勿論斯可矣雙溪類槀卷二十六
