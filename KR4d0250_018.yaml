body:
  text: 雙溪類稿卷十八宋王炎撰啓賀徽州趙守守股肱之郡選擇非輕任肺腑之親藩宣惟允一麾風動千里春回某官系胄出於神明操履同乎寒素以凖繩之行矯貴游之習以經緯之文决英俊之科三緩帶於蓮池一鳴絃於花縣雅懷平進題輿姑駕於二車治最升聞給餉遂班於六院上欲試之馮翊公非薄於淮陽乃眷此邦今為近輔輿賦之催科已重閭閻之疾苦頗多自明府之開藩聞老氓之相語必寬平而無擾庶雕瘵之有瘳豈止文吳冠漢京之循吏當如毛畢首周室之諸卿炎需次里中受廛宇下百本薤一畦韭方遵奉於教條三鍾粟十束薪又薄沾於稍食其為贊慶罔既名言回交代周郎中昨登三館幸接英游今合五符又叨交契雖在後難攀乎逸駕然告新必授以成規遙睇茵慿敬修竿牘某官學深聖域文掞國華是謂勝流嘗已紬書於金匱如其小用亦宜演誥於黃麻乃欲訖其外庸而暫違於帝所逺追冉季擅政術於四科高視趙張騰治聲於三輔衆雖詣闕難以借留朝有賜環趣之來覲嘉猷告于后即升獻納之司利澤施于民盡展經綸之藴炎侵尋未路困吝孤蹤起廢恩深撥繁才短恃有教條之井井可以䝉成更蘄誨約之諄諄使之免戾賀吳興郡王大庭讀命亞傳升華鏤玉增徽慈孝洽兩宫之慶篆車彰采友恭形四海之風盛事流傳歡聲洋溢某官端莊而好禮靜厚而尚仁晨趍辨色之朝其儀唯謹日致承顔之養於志無違屬聖君方駿惠於先猷為太母衍鴻休於顯號令眷懿親之近無踰介弟之賢視公府之多儀未為異數詔王朝之特揖庸示殊恩蕚樓益美於相輝棘位超升而在左慈闈喜懌兹惟系出於孝皇屬藉榮華豈止事同於信邸炎贅員間館依德高墉夢斷日邉阻進瞻於衮繡身居林下但傳誦於絲綸通孟守馮軾徐驅鼎來千騎結廬屏處幸受一廛行將伏謁於道周可不通名於記室某官蒞官之清如水接物之和似春於進取也甚亷以宏深其所飬豈不二邉城之守衛亦嘗提民部之𣙜酤欲訖外庸暫臨近輔仰瞻行闕在今日則地優舊號富州視異時而民瘠先聲所至衆志已孚必知以撫字而為先非曰置催科而不問苐恐未下車之際已聞不俟駕之招炎困吝之餘棲遲於此聽父老扶杖而相語謂史君合符之有期日望班條風行闔境遽䝉謙抑先委貺以五雲之書倍喜衰遲獲託迹於二天之庇與王監丞曩嘗傾蓋解后日邉今獲受廛棲遲宇下可無一紙往徹雙旌某官負卓越之才懷經綸之志萬言落筆四海無人自合橫翔徑處紫禁玉堂之上曷為小却尚留清香畫㦸之間惟其所飬者閎深是以獨亷於進取暫臨近輔可訖外庸發摘吏姦如神明撫摩民莫如父母此士庶之所屬望亦君侯之所優為苐恐賜環不容暖席炎平生多難垂老投閒屬慿軾之鼎來方杜門而屏處阻干典謁莫陪賔從之追趍但與野人共喜閭閻之清晏賀石宰一元天統肇始三微百里人和集為多福某官屈金閨之步武試墨綬之剸裁飛舄將朝鳴絃無事爰體復亨之動以迎泰吉之來氣感荔藝共借此時之冬日隂成桃李姑留嗣歲之春風炎掃軌潛身望門矯首莫持杯而為夀徒削牘以將誠回蔡尉物萌赤色律應黃鍾察其時則隂已極而生陽探其道則復必亨而成泰矧文豪之栁子為吏隱之梅仙宜其迓天正之三微可以擁神釐之百順一杯為夀莫陪賔客之下陳尺素馳誠姑綴耄倪之善頌回浮梁趙宰時當亞歲氣變新陽溢父老之歡聲祝令君之介福某官藹才華於天族屈步武於雷封民不忍欺蓋前政之所未有事皆迎解亦今人之所難能逮兹復反之亨即有泰來之吉舉杯為夀莫陪賀客之聮削牘修辭又在記曹之後回鄭宰山川改觀逢新尹之鼎來田里即安與老農而胥慶稍稽奏記遽辱貽箋某官學識俱高人門兩大宜青雲之直上無白璧之小疵已嘗佩銅墨於日畿聊復寄絃歌於岩邑雖然小却决不久淹政術素優豈憚煩於盤錯治聲難掩即躐處於清華炎屏迹無堪依仁甚幸非公事不至武城之室殆所當然以老人獲升單父之堂諒難及此尚期一見以寫百懷回浮梁趙宰班厯清臺肇新歲紀鳴絃壯縣茂介春祺某官由國懿親為時循吏迓三陽之開泰集五福之類升必有裏言豈淹外服念閒居之掃軌幸近花隂想賀客之稱觴徒馳椒頌回鄭宰太史授時肇新歲事令君布政茂介神釐况當㳙日視篆之初即有頒春勞農之喜仁風披拂和氣冲融馴雉田間聲即騰於三異飛鳬天際薦豈待於十竒自顧陳人方依明府一杯為夀愧趍進之莫前尺牘將誠又稽遲而不敏徒深祝頌罔既名言生朝謝惠詩揆楚客之庚寅適逢初度問堯時之丙子未至疑年䝉分銜䄂之珠璣尚記懸門之弧矢念劬勞於此日倍覺凄凉息飄泊於頽齡已成衰朽過勤祝禱彌極感藏謾談赤松子之長生寥寥安在愧無青玉案之厚報負負何言回石宰一元紀歲符鼎象之取新百里承流協泰爻之迪吉某官清修律己平易近民馴雉中牟方布班春之惠飛鳬葉縣即膺晉晝之榮炎投老薾然依仁幸甚掩荆扉而掃軌坐閲流年想椒醑之稱觴阻陪賀客回鄭宰三朝之始天令惟新百里之間人情胥慶某官凝郎宿之采迓王春之祺椒酒浮杯奉慈顔而介夀葭灰從律導仁氣以發陳自此泰亨宜於晉接靖言羸老阻陪鶴蓋之隂徒有賀悰敬致魚書之獻回翟丞送臘迎春於一日之間歲時既正去故取新於三朝之始福祿攸宜某官恬靜自將剛方有守以精練通行於邑事蓋回翔久鬱於賢勞兹乘交泰之亨必有允升之吉炎侵尋晚節涉歷年華望松竹以依仁茍安里閈酌桂椒而為夀阻造賔閎回浮梁趙宰鳯厯當三朝之始天令惟新鳬仙撫百里之封人情胥慶某官凝郎宿之采迓王春之祺椒酒浮杯奉慈顔而介夀葭灰從律導仁氣以發陳當內外之修攘兼親賢而晉用既騰治最必有裏言即乘交泰之亨茂迪允升之吉炎竊依桃李屏處枌榆引領門闌方阻陪於賀客將誠竿牘又反後於記曹回希聖大饗均釐小邦疏爵方屏處蓽門之陋亦叨分蒲璧之榮敢曰亢宗復青氊之舊物乃䝉共喜貺黃絹之新詞感刻之私敷陳罔既回鄭宰祿不及親未免抱百年之憾人皆欲夀姑强為一日之歡家童具湯餅於厨中兒輩薦觥籌於席下豈意上勤於執事亦䝉軫念其初生祝以修齡賜之妙語晼晚桑榆之景衰殘蒲栁之姿假寵何多拜嘉有靦高處定勝郢人之白雪許我聞之索居恨無樊素之朱櫻為公歌此若為摧謝第有珍藏謝縣官祿不及於二親終身有憾年又過於七袠來日無多敢意謙撝記其弧矢之初度俯憐衰朽貺以瓊瑶之雅辭自顧蒼顔雖欲具一杯而為夀但無皓齒莫能發三嘆之遺音徒劇感悰曷酬厚施謝士人生我勞瘁悲不見於慈親俾爾夀臧荷曲形於善頌雖耋老歲增其齒而歡悰日去於心敢期褒衮之華尚記垂弧之始自慚衰朽莫能致下叟之辭但有感藏無以報仁人之贈回趙丞時頒鳯厯辰起龍躔適值贊公之賢攝行令尹之事藹然和氣散在東郊宜集春祺用迎夏正况以宗盟之俊兼之吏治之優開泰之亨豈淹外服允升之吉必有裏言俯念陳人又更獻歲舉一杯而為夀莫預進趍裁尺牘以修辭徒深贊慶又龍躔起度鳯厯更端惟我少公之賢暫安吏隱當兹端月之始茂介春祺用乘泰道之亨允迪升階之吉念桑榆之暮景依蘭菊之清芬屬以病軀踈於㑹面與趙宰擢秀宗盟撥煩壯縣將寄受廛之迹可稽奏記之恭某官英俊萃於一門聞望高於同姓漢邸賢王之胄繼以才華慶元上相之家篤於行義宜騫騰於雲路尚盤薄於雷封蒲穀所臨枌榆孔邇既熟知其疾苦必加惠以撫摩製錦之優即收異最追鋒之召豈待終更炎昨分竹符偶在珂里乃於今日獲際下風老矣無能守蝸廬而屏處喜而不寐幸鳬舄之鼎來賀趙宰璿璣占象天令鼎新榖璧字民春祺輻凑以間平之令德藹卓魯之仁聲上方眷於宗盟棣華競秀人共期於泰吉茅茹同升佇聞趍召之來允協履端之慶念庇身於宇下方屏迹於田間納謁公庭莫預鳬趍之列修辭記室敬伸燕賀之誠賀趙丞迓王春之謹始方值三朝亞郎宿以為丞宜新多福而况宗盟之重且兼吏道之優豈得淹留黃綬之間自可騰踔青雲之上因履端而有慶即趣召以來歸念方却掃於荆扉莫陪旅進雖欲效勤於椒醑徒激歡悰賀趙宰天正一陽方回淑氣雷封百里共溢和聲福以類升道斯來復暫弦歌之小憩即璽詔之遄歸一杯為夀之勤莫陪旅進尺牘修辭之敬薄寫歡悰又時當亞歲律轉新陽沸里社之歡聲增縣公之介福某官聞望高於天族才猷見於雷封人行古鏡之中吏立春氷之上盤根游刃有成不俟於三年要路著鞭來復可期於七日炎投閒已老賴庇為多望賀客之下陳進趍不逮干記曹之清視祝頌惟深又青帝回春黅天司化三朝伊始萬福惟新某官帝室懿親相門華胄自合登日畿而結綬肯來蒞岩邑以鳴絃其清潔足以為吏師其惠慈足以孚衆志宜迓泰亨之吉即承晉接之榮炎久矣倦游退而屏處幸桑榆之暮景依桃李之穠隂自憐扶杖而後行阻陪賀客不獲舉杯而為夀徒有祝辭答劉宰分守江城昔嘗聨事受廛岩邑今獲依仁遽辱緘謄未忘衰朽某官久懷才諝克紹家聲雖韜藏不急於人知而抱負可供於世用需章交薦終著休聲便殿通班遂升華秩尚安外服亦小試於民庸必有裏言即入登於朝著炎風波跌足林壑藏身以老人可升宓賤之堂敢希眷豫非公事不至言游之室可逺嫌疑賀劉宰頒厯清臺肇興歲事字民壯縣茂輯春祺某官迪德惟新對時有俶孝友內行於閨梱慈祥外洽於閭閻宜乘泰道之亨允迪升階之吉炎受廛耕牧掃軌郊坰椒酒獻酬悵莫陪於下客魚書祝頌敬自逹於中㳙又三微之始天正更新百里之間人情歡洽某官中和迪德豈弟宜民榮領金章散仁風於花縣喜隨綵服增介福於萱堂宜即復亨遂膺晉接炎論交惟舊賴庇尤多遙睇賔墀莫奉一杯而為夀仰千記室苐修尺牘以將誠答詹守歲時告朔謹始三朝宇宙回春後期十日以預迎於協氣可增鬯於繁禧某官近雙闕以開藩迓三陽而交泰占龍躔之常度于以勸耕考象魏之舊章因而布治事施行而有序民觀聽而惟新行即還中寧容久外炎受廛宇下卧病山中阻造臺門即首時而展慶謹修竿牘祝眉夀以將誠答陳宰緬懷先世嘗接迹於朝端今見象賢復受廛於宇下未遑奏記遽辱貽箋某官學自家傳仕由才奮諸公推轂宜騰踔於雲霄百里鳴絃暫徊翔於岩邑靖言弊俗久負惡聲在賢大夫必不鄙夷其民如古循吏將行平易之政但憂坐席之未暖已見鋒車之鼎來炎與世無求投閒已久朵雲拜貺念其老病而不遺元日履端知與耄倪而更始謝陳宰絳人甲子嘗有疑年楚客庚寅不忘初度門懸弧矢空思昔日之劬勞袖出珠璣乃辱令君之祝頌度英詞於白雪動清唱於朱唇生也不榮念衰遲之已耄報於何有嘆駢儷之非工賀孔守雞日履端甫應丹天之運龍躔起度即回青帝之春沸闔郡之歡謡介專城之景福某官寬仁迪德樂易近民中朝慶賜之行茂迎協氣近輔藩宣之善必有殊榮迓此泰來宜於晉接佇拜紫泥之詔入登文石之班炎俯念老羸仰依庇護椒杯為夀悵莫與於進趍藜杖扶衰但遙伸於祝頌答永興鄭宰壯縣鳴絃子姓有續貂之喜窮山掃軌老夫辱烹鯉之音得此為榮若何圗報某官七閩名士兩學勝流旋奏第於南宫宜飄纓於上國雷風盤薄乃亦有三年之淹雲路軒騰終難遏千里之駿由兹入覲必有裏言平遷即上於蓬山小却亦游於璧水炎生平困躓晚節浮沉非宦路之多艱乃拙謀之不耦英才得用尚為衰朽之光來裔不忘永念交承之契納幣瓜葛相依追尋舊好蘋蘩可薦締結新姻乃因媒妁之言遂得閨房之秀炎孫璋粗聞詩禮已登受室之期某人令女素習組紃當遂宜家之好吉諧占鳯美類食魴信必踐言諾重黃金之百菲難廢禮意踰白璧之雙請大媒掌男女之判固藉行媒議婚姻之親必由尊屬兼是二者豈同他人可無一言以告下吏炎孫璋年過既冠粗聞詩禮之傳某人令女歲已及笄自是閨房之秀昨得百金之諾今修五兩之儀仰賴主盟永堅好援媒人合姓有婚姻之好知名賴媒妁之言將欲宜家既資緩頰今方納吉何以將誠尚冀仁慈特垂容納賀孔守氣回緹室垂半仲冬福集黃堂茂迎亞歲某官以魯國真儒之後居漢庭多士之先姑暫守於武符宜超登於文陛論其道則復必亨而成泰察其時則隂方極而生陽即當趍以還中豈得淹於報政靖言衰朽仰戴帡幪處圭竇以潜身望臺門而矯首一杯為夀莫陪賔客之下陳尺牘修辭但綴耄倪之善頌其為欣愧罔既敷宣雙溪類稿卷十八
