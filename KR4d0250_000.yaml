body:
  text: 雙溪類槀别集類三宋提要臣等謹案雙溪類槀二十七卷宋王炎撰炎字晦叔婺源人乾道五年進士官至軍器少監與淳熙中觀文殿大學士王炎名姓偶同非一人也所著有讀易筆記尚書小傳禮記論語孝經老子解春秋衍義象數稽疑禹貢辨考工記鄉飲酒儀諸經考疑編年通紀紀年提要天對解韓栁辨證傷寒論總題曰雙溪類槀今已無傳惟詩文集僅存仍以雙溪類槀為名世所行者凡二本一本為康熙中其族孫琪所刋凡十二卷一即此本乃明萬厯丙申尚寶司丞王麟得沈一貫家舊本為校正開雕者也凡賦樂府一卷詩詞九卷文十七卷炎初與朱子相契朱子集中和炎寄弟詩有祇今心事同千里靜對簞瓢獨喟然之句炎亦多與朱子往還之作交誼頗篤其詩文博雅精深亦具有根柢程敏志輯新安文獻志所採最多而此外議論純粹引據典確者尚不可悉數蓋學有本原則詞無鄙誕較以語録為詩文者固有蹈空徵實之别矣乾隆四十六年七月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀雙溪類槀序余為丞尚璽少保四明沈公雅好雙溪集惜其祕於金匱石室中世人徒耳而嗜也圖欲表之余因請得拜受退而鳩工梓焉竟則辨其首曰王氏自始興文獻公導以來散居江左衣冠與六朝相始終其間豈乏作者惟文憲公儉集傳不朽夫深山大澤有龍有蛇呵風雲而陳琰琬三尺赫蹄之紙直紆其胸臆以夸詡藻繪世亦卒無以摩其壘而攻其瑕如右丞之句昌齡之詩也者可謂後先競爽矣嗣是諸王欲求文憲公集而讀之發已藏於名山大川寥寥不可得懷耿慨者徒賦夕陽野草爾有宋肇興諸儒輩出三槐半山後先柄國則始興哉固不少遜要之斷霞零露銷歇有時如我雙溪公者辭不粉飾而道徑摛章政不峻急而懇惻流惠性不脂韋而嚴毅立朝論不詭隨而和平定是其起家也登乾道進士而敡厯中外也始為臨湘令精于吏治下有所濫見以為棘心故釐假手之士而風清罷無職之祿而幸塞上有所索見以為剝肌故杜前任之舊靡羡餘拒和糴之令靡侵蠧至策襄陽為國之門户而恃江陵為唇齒鄂嶽為根抵也非封疆之臣石畫耶苐非凡所見誰報可爾比入中都官博士以夀皇在殯而開講宴閒為非禮朝議凛凛于公矣慶元四年為實録檢討尋入著庭為佐郎由是有東都紀年之典焉嗚呼方大奸之戮也世皆以為無憂公謂霍氏之滅漢宣嘗收權矣其微附貴要者漢宣不能盡察也太平之誅明皇嘗收權矣其交通近習者明皇不能盡禁也弊在元帝肅宗憂方大耳知言哉宋事如左劵矣所謂廟廊臣者非耶大扺公學傳于南軒而自得之趣則公之所自許故遺文不藏名山大川而以金匱石室為山川其藏固矣詎能負之而趨抵今學士得捧而讀焉信非文憲之寥寥者比乃知江左風流靳禳侯印為未易奪者其視公之印可真天壤哉公世居婺源武水之曲雙溪合流因以為號邑有端風祠祀先哲也雙溪名在祀典中楚楚精神駕文螭而肹蠁是為不朽之盛典亦為衣冠之世族也集今行於世賦樂府一卷詩詞九卷文十七卷沈公有定論矣余姑論其道術徽猷以為後學仰止云敬序之以復沈公也時萬厯丙申春三月穀旦賜進士第尚寶司司丞海陽見菴王麟謹序
