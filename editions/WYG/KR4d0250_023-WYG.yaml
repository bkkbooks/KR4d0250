body:
  text: 雙溪類槀卷二十三宋王炎撰劄子上户部薛侍郎炎近嘗具竿牘申禀并録論𣙜茶劄及論和糴書仰干台覽當已徹几格炎陸沉久矣血氣浸衰筋力向憊順命以定窮通循義以定出處不復敢有進取之私而區區持愚陋之見欲自獻於左右者其說有二炎昨在臨湘彫縣頼侍郎先生持節鼎來削去版帳無名之需身獲自全民亦少蘇其所感者一也炎始出隨牒辱司業劉公南軒張公待之異於稠人二公云亡炎流落下位無復有照其肺腑者矣而侍郎先生收錄姓名於薦牘之中許以介然之節可保嵗寒炎何足以當此而奬借之意則厚矣其所感者二也為是之故所以欲效千慮之一得今再條列和糴事目具于别緘更乞台慈推詢于蒭蕘之意察其歸向門墻之誠不責狂斐特垂采擇不勝幸甚又畫一劄子炎伏承判部侍郎先生正位地官盡掌邦用丁此凶嵗舉行荒政下諸路州軍和糴米斛以救飢民炎門闌下士不揆其愚輒殫宂見揣度事宜列為數條仰備采擇謹畫一如後一凢米價豐年必賤不可挈之使貴凶年必貴不可抑之使賤自朝廷行下沿江諸郡不許其遏糴又責其和糴然米價低處不敢遽増其直古人謂知與之為取者為政之寳凶年至於艱食米價聴其自髙商賈既來米價自賤以與為取其理較然今若下流郡縣不増其直即商賈遲疑富民觀望是趣之閉糴適以病民不若行下和糴諸州許其随宜増價則或逺或近皆可收糴仍合使諸郡具水脚支費之數以會子付之逐時起發事理為便一諸路和糴所產之多者不如所聚之多當相地勢𦂳要去處措置收糴則簡而易辦且如湖湘唯鄂渚最為要地盖南則潭衡永邵西則鼎澧江陵安復襄陽數路客旅興販無不輻凑鄂渚若於鄂渚專一置場荆㐮湖漢之來盡可收糴無疑自鄂渚浮江下至中都亦不甚費日最為利便推此比類他路㑹府望郡亦當只擇要地官増米價招邀客人轉販一州縣受納秋苗皆有水脚錢貫秋收之後辦米則易辦錢則難今若行下江浙荆湖凢沿流州軍受納苗米所有水脚錢貫曉諭人户或願從便折納米斛因令州軍開具合用綱運錢數給官㑹還之所有折水脚錢米斛併行起發即正苗一斛之外其所收米少者二斗多者三斗總而計之納苗米二百萬斛可得米五六十萬斛矣民免納錢官又得米亦公私兩便之一策也此策如或可用即宜及早施行若稍稽遲輸納已終更無此米一官㑹諸處行用雖曰準錢一貫官省至於比並見錢或只可代見錢七百二三十文其下或只可代見錢六百七八十文亦合許諸州郡從實供申詳酌施行方可辦事右畫一開具在前如蒙台慈特賜采覽斟酌可否敷奏施行不勝幸甚上宰執湖州炎恭惟今日朝廷紀綱一正號令一新聖天子收還威柄於上某官經文緯武兼東西兩地之寄開言路以逹下情黜邪佞以定衆志頒賞給以作士氣朝廷清明萬姓欣懌雖干戈未息和議未定然敵人前日所以藉口者今也無辭使軺既行輿誦皆謂自兹可以繼好息民炎疎逺在闕門之外區區管見固無以禆廟堂末議然聞諸道路外之而邉鄙下之而閭閻亦有利害數條不揆狂瞽輒僣言之謹具列於左一前日敵人和議未定以首事之臣藉口今朝廷大明誅罰則敵人無以為辭其怒亦怠自此和議可定矣然而征伐之兵與攻守之備昔人嘗有是言炎竊惟今日廟堂之議當主於和諸將之計當主於守求和之使雖行而沿邉守備尤不可少懈也若諸將觀望朝廷欲和而不欲戰備禦稍弛士氣沮䘮萬一和議不成士馬奔衝出吾不意何以捍之炎妄謂和議未定朝廷宜明戒諸將使之嚴飭邉備常如㓂至庶幾緩急無一旦意外之警兵法曰無恃其不來恃吾有以待之盖此謂也一朝廷昨嘗下令申嚴保甲之法不問官户不問單丁例出一丁使之具器械謹要塞以備盜賊夫備盜賊者廵尉之職耳責其隨舊法措置可也而朝廷施行之詳異於平時官吏一切便文不無騷動今既定矣又凖制置司指揮保甲中每百人選三十人壯丁就加教閱民間徃徃驚疑夫選壯丁教閱何所用之將以防境内之盗賊歟則保甲編排久矣不必為是擾擾也將以外防敵國歟此非策也且内地之民不可驅之出戍若使之起而征行則其憂不在外而在内此固不待論辯其利害甚顯然也若沿江州郡之民平時不識戰闘一旦率而列於江上與官兵雜處彼前有死亡之憂後有妻孥之戀望敵而潰豈不反為官軍之累乎不特如此夫民鎮之以靜尚患其擾示之以擾安能保其無變乎選丁壯而教閱之非所以安衆也國家飬兵以備戰闘及其有事兵不足恃復欲使赤子從事於干戈敵人聞之不待間諜得以窺見吾之虚實矣非所以待敵也炎竊謂此事不若自朝廷行下寝罷則民間幸甚一自兩淮至於荆襄皆有民兵平時稍立隊伍每嵗稍加教閱此可以防䕶鄉閭助守州縣不可使之出戰也若與官軍雜處驅之在前勝則官軍專有其功敗則官軍不相救援自用兵以來聞荆襄與淮上民兵損折者多今若欲率而用之則荆南之萬弩手荆㐮之義勇皆有總首宜將民兵團結自為一軍為總首者於武階中與一名目使之仍前部其所属又别選一健將將之用以守城或有緩急間出策應庶可為官軍一助亦不至於魚肉吾民决不可使分𨽻諸軍出戰也一諸縣有弓手諸寨有土軍本以彈壓盗賊爾人數不多精悍絶少今諸州禁軍已起赴軍前若弓手土軍亦例行調發前出後虚州縣無備鼠竊狗偷或因此出為良民之害不可不慮也又弓手土軍若驅之戰闘不能禦敵徒以餌敵亦不可不恤也使之城守猶或可以備數若使之出戰徒為魚肉而已不若不行調發也一今之姦民為盗者有竊盗有劫盗竊盗者不過杖罪刺環而縱之劫盗者或配𨽻牢城徒費官糧已而逃竄又復為盗而已事固有一時之權宜而不可拘於常法者炎謂凢為盗者亦多剽悍之人今以兵少為慮則凢劫盗一犯者竊盗再犯者其人若稍壯健皆刺𨽻軍前亦可為用非特足以増吾卒伍又足以消鄉閭枹鼓之警是一舉而有二利也已上數事不足以盡當世之務姑以自獻其誠嘗聞饔人治庖君子食之愚夫獻言明智擇焉炎所言者不過書生常談其可用與否在某官英鑒擇之而已矣干冐鈞嚴下情震越申宰執乞權住造甲照對炎於二月初十日曾裁書仰凟鈞聴乞權停罷本州造甲工匠至今未蒙行下區區管見懐不能已再有陳懇竊見紹興二年其時正當敵人慿凌中國多故之時然只御前軍器所増募民匠造甲不曽抛下諸州打造是年五月二十二日臣僚論列民匠所得逐日錢糧不無减尅天氣漸熱監官督責程限雖與本所兵匠通同執役終是虐用諸路和雇之人遂中暍而死今後不得减尅工匠錢粮役使之際必均勞逸遇有酷暑量减工料令日中少休詔令户部措置於是户部言支給錢糧則無减尅縁所雇民匠多是大爐近火費力慮日後暑熱多致疾病權行放散至九月天凉令本處依元數發遣前來且紹興之初朝廷草剏色色不備然軍噐所造甲所雇民匠暑熱放停秋凉㑹集今本州准指揮日造甲二副所用工匠並是追逮則非應募其人在甲局每日等差支錢日二百下至一百五十文固不敢减尅然只能養其一身而不能養其一家今已過春入夏所謂工匠者雖以鍜鍊為生亦豈不務蠶桑事耕種今已失時但目下向去天氣漸熱一二百人聚在一局大爐近火終日鍜鍊流汗浹背不得休息因此致病必不能免欲望鈞慈早賜行下權許本州放散若㑹計中外軍兵之數與衣甲之數或無闕少則諸州皆可住工若軍士之數多衣甲之數少不免打造則候秋凉再令赴局用工如此則上可以備噐甲下可以寛民力區區愚慮如此儻蒙鈞慈特賜行下住工不勝大幸申宰執乞降度牒造甲劄子炎照對本州去年先准省劄打造鐵甲日一副續准省劄小郡日打一副大郡日打二副本州遂日造二副除已節次解發鐵甲赴内軍噐庫交納通計四百六十副訖本州雖曽申乞截撥月樁錢至今未䝉給降㑹計上項已造鐵甲長甲一副計鐡二十九貫文鐡甲一副二十八貫五百六文共用過錢一萬三千三百二貫四百六十五文向後日以造甲二副為限又以二年為期則費用錢數又數倍於已用之數切縁本州嵗計窘乏軍糧不足而每月收糴起發錢多係酒稅趂辦與他郡事體不同事勢廹切所以控告朝廷前此具申非不詳細止蒙批送户部勘當户部吝於歳計恐有虧折不肯遽從所請縁此至今未蒙撥還且本州本自闕乏兩年應辦軍期買船造船又兼打甲皆係軍期非泛支用浩瀚目今委實不能支吾欲乞朝廷徑行下截撥月樁錢應付支用若朝廷或恐截撥月樁錢於户部歳計有戲欲望給降度牒三十道令本州逐時變賣挨那支遣非特官吏事稍辦集免遭督責民間亦獲稍甦干冐鈞嚴下情皇懼俟命之至與臺諫劄子竊見去年朝廷令諸州打造鐵甲大郡一日二副小郡一日一副役使工匠未有休息之期嘗裁書上宰執乞行住工不報繼嘗具公劄申朝廷乞暑月暫停工役亦未報炎竊謂鐡匠等人追逮在局抛家失業人情甚以為苦兼之向去天氣漸熱終日大爐近火鍛鍊不輟極非所宜朝廷革去權臣之弊政此事合宜减省稍慰民願兼自去冬無雪今春至夏不雨田疇枯燥未能栽種秧苗加以蝻虫旋至長大若於人事稍寛民力不使咨嗟嘆息亦或可以感召和氣即暑月暫停造甲亦當行事件之一也所有申朝省公劄録本繳申干凟台聼如蒙不弃愚者之慮特賜論奏自夏至秋暫停工役庶㡬為鐡匠者非特稍得休息亦可各自還家營趂日食免致妻孥失所實為大幸申省論馬料劄子照對本州管下有下菰城係每年歩司牧放之地四月馬一匹日支料榖一斗自五月至八月馬一匹日支料榖七升九月回程馬一匹日支料榖一斗開禧三年共支馬料七千四百八十七石九斗嘉定元年共支馬料五千九十五石一斗三升上件料本州即無儲蓄每年係朝廷截撥上供寛剰錢内用錢㑹中半隨時價髙下責付牙儈收糴官吏凛凛常恐收糴愆期支散不給况去年蝗旱禾稼消折本州管内多係晚田少有早稲可充料榖兼之早稲去年盡被蝗喫損每年收糴已自艱難目今小民飢餓赴訴于官乞行賑救若更如每年收糴馬料之數奪民之食充馬口腹小民必然飢餓性命不保炎竊見古者行軍用師糧食以供士卒芻茭以供牛馬故費誓曰魯人三郊三遂峙乃糗糧峙乃芻茭不聞峙榖粟以食戰馬也又孫武兵書亦曰食敵一鍾當吾二十鍾此言軍士之粮也􅠇秆一石當吾二十石此言牛馬之草也又按漢書烏氏善畜牧至用谷量牛馬夫馬牛之多以谷量之則不過放牧水草之地而已安得有榖以食之古禮惟國君有馬在閑廐者食榖與草凶年則否故記曰嵗凶馬不食榖又曰國家靡敝則馬不嘗秣秣者剉草與榖雜而食之也况今之馬出於西夷南蠻不過嚙草飲水於山谷之間豈嘗有榖養之今湖州遭旱蝗之患百姓絶糧可謂凶矣公私匱竭州縣素無凶年之備民間自兩年和糴之後宿藏已空亦可謂靡敝矣目今六縣之民近市井者或買糟粕近碓坊者或糴糠粞安吉山縣最少米榖山居之民或掘野葛或掘野鼠而食之馬之食榖粟者豈可不省昔者廐焚夫子曰傷人乎不問馬人貴而馬賤故也古者師行則秣馬非師行之時盖有芻而無秣今幸邊防休兵馬牧于郊水甘草美足以養矣不用於戰陳何必食之以榖武王休兵歸馬華陽魯僖重榖牧于坰野其不食榖明矣民食糟糠食野草而馬反食榖似非仁民愛物貴人賤畜之意炎妄意謂食馬以榖理當盡數住支縱未能住支則四月九月馬日食一斗當减而與之四升自五月至八月馬日食四升當减而與之三升如此則上可以合古人之禮又可以見主上愛民之仁又可以减縣官之虚費又無損於國之武備欲望鈞慈詳察所陳特賜行下須至申聞者申宰執撥米賑糶劄子炎縁本州旱蝗之後百姓絶糧烏程歸安徳清三縣人户狀乞賑濟者已總計二千九百四十六紙安吉知縣何儒林申居民多掘野葛長興知縣趙通直申居民多買糟粕炎又遣人出烏程歸安管下鄉村詢訪近碓坊居民又多糴糠粞在法减放不及五分雖未當賑濟即與賑糶本州常平米不過一千餘石已申倉司行下許用以賑糶此如一杯之水不可救車薪之火向去望麥熟又望禾熟日月尚長若更無米接濟困弱者必致餒死強壮者恐為盗賊炎曾三次申尚書省乞撥和糴米接濟賑糶至今未蒙行下且救荒之政行於百姓已餓死已為盗之後不若行於百姓未餓死未為盗之前炎所以前後懇切哀告廟堂非是沽名非是市恩非是避罪實以百姓係國家根本為守臣不可坐視窮民飢餓縁此上凟鈞聴今來事勢已急本州旋那融官錢糴米分去歸安之郎耶一鄉烏程移風崇孝兩鄉及徳清武康安吉長興畧减價出糶然每處不過二三百石若不蒙朝廷行下將和糴米賑糶委是無米接濟此係痛切利害又况出米賑糶收囬價錢樁管在庫秋熟糴還於朝廷無分文之損而於窮民有莫大之恵且炎竊聞建隆三年户部郎中沈義倫嘗言揚泗饑民多死郡中軍儲尚有百萬可貸至秋乃收新粟有司沮之曰歳荐饑將無所取償義倫曰國家方行仁政自宜感召和氣立致豐年寧復憂水旱耶太祖說遂命淮南官吏發倉廪以賑饑民盖自祖宗以來勤恤民隠涵養生靈感召和氣屢至豐年實繇於此况如義倫所請春貸秋償太祖且不以為難今糶米收錢民有所利官無所損何憚而不為逺而言之江淮之民民也近而言之嘉興之民民也江淮請錢糴米而得錢不厭其多嘉興請米而得米不拒其求湖州之民亦民也獨屢請而不從炎不知其故豈謂災傷减放之少而不與之以米歟然湖州雖號出米之地苗米僅數萬石不及姑蘇二十分之一不及嘉興十分之一而户口繁滋過於他郡所以歳纔凶歉即便闕食若不賑救豈特困弱餒死強壯為盜亦非召和氣致豐年之道也不控告於廟堂將安所赴訴州治去行都一宿可至而守臣為民有請如訴於天此炎所以夙夜徬徨不知措手足之地也不免再具狀申尚書省欲望鈞慈察炎之懇切念民之無食早賜施行以救老穉之命不勝大幸申省乞休致狀照對炎昨閒廢七年蒙恩差知湖州以開禧三年冬十二月十三日交割職事至今年十二月十三日已書一考縁炎命薄數竒晚途顛沛加以私門多難齒髪早衰諸子夭折今止有男恕一人為紹興府酒官身伴並無子弟起居飲食失節日覺憔悴兼炎現在年已七十有一方炎少壯之時猶且無用今已衰頽徒耗廪禄無補公家而况湖州事又繁劇尤非炎衰病不才所當竊處欲望朝廷矜憐特為敷奏許炎守本官致仕保全末節歸老林下須至申聞者與雷知院劄子炎孤冷之蹤起廢試郡近在修門之外日依帡幪幸書下考未至曠敗皆大庇所及也然炎命薄數竒立朝則以罪斥試郡又以罪罷念復玷闕之艱難黽勉一出欲竭力自效庶可湔滌宿垢然呉興事繁財匱甚非踈拙不才所堪兼炎平生多難有子七人其六短折今惟恕一子又在紹興官所炎惸然一身獨在郡齋衣食起居将攝失宜衰病交攻若更不去非特郡事廢弛羸老之身亦恐不能自保古語有云失之東隅收之桑榆炎再得罪投閒八年東隅之失多矣今又年過七十更不丐歸或至毁璧則終身不免玷闕見具狀申尚書省乞守本官致仕欲望鈞慈矜念向來綴名龍虎榜尾察其衰遲無用而憫其憔悴多艱特賜敷奏俯從所請譬如山鹿野麋放之櫳檻縱之林藪則未先朝露填溝壑皆門下之大造也喋喋有請無非真實之情干冐威尊下情震恐與樓同知劄子炎備員近郡幸書一考未以罪罷皆頼萬間帡幪之庇自顧孤逺不敢數貢竿牘若其感徳慕誼一飯不置今有肺腑真情不得不一干鈞聴炎一介書生少猶無用况已衰遲向者再負罪戾家貧未能忘禄不免一出而湖州號稱繁劇本非炎之所堪而又郡計闕乏一切趣辦又非炎之所能勉強在此日憂曠敗且平生悔吝已多今仰干造化之地求觧郡歸老山林盖炎進退狼狽有不可不休致者三説請試言之古語云失之東隅收之桑榆桑榆之收雖晚尚或可救東隅之失炎才踈智短不能自衞其身昨在中都以罪罷繼得郡楚東又以罪罷東隅之失多矣今在此凛凛恐不免百謫及早收身尚或可全晚節此炎所以乞休致者一也又縁命薄數竒晚嵗多艱昨在中都連䘮二子及歸山間又䘮荆婦平生七男六人夭折今在者唯恕一子爾念其壯年初得一官不欲留在身伴恕秋間當赴官遲遲不行炎強之去也於十月間到官炎惸惸一身獨在官所既無壯成子弟又無可用臧獲飲食起居色色失節夫以郡事之繁日夕憂慮而衣服飲食又自失節更遲遲不去未免䘮生每竊自憐中夜感嘆此炎所以求休致者二也夫才徳繫朝廷重輕者年至耆艾或不得謝盖國家之所倚賴而君父之所眷顧資其謀猷仗其忠力則不可以飜然引去如炎者一介散才譬如九牛一毛有之何益無之何損兼以多難之餘氣衰膽薄稍有憂慮便覺頭目昏瞶心志怔悸若更不求引去郡事未免廢弛縱使為貧戀禄豈可貪得不止此炎所以求休致者三也炎舊因陳舎人英仲劉郎中碩夫獲登門墻瞻拜不過一再及流落去國之後亦不曾一貢記府之問其跡若疎然蒙鈞慈顧念異於他人所以肺腑有懷輒敢罄竭言之炎又伏念若其不能揣分有所希求則不可以仰凟鈞聴今欲歸老山林全晚節保殘喘度相公必然矜念是以言之不厭其詳也澤雉野麋放之籠檻縱之林藪仁人君子不使一物不得其性若蒙大造獲從所請即未填溝壑之日皆門下生死骨肉之恩也冐犯威尊下情震恐申三省樞宻院公劄照對本州於六月十五日未時承受兩浙西路安撫司牒備准江淮制置大使牒備准三省樞宻院劄子津遣泗州人北還炎即合遵從發遣但於四月三日准三省樞宻院劄付湖州守臣分明該説雖係事目中指名之人如不願行者只作刷㑹回報自餘元無姓名官吏兵民等凢不願行者皆不欲強遣将所管北來人按時支給錢米常加撫存照管毋令疑懼炎遵從劄内事理倍加撫存於今月初二日准安撫司牒出給文榜曉諭如願歸北人前來自陳仰守臣躬親撫諭支給盤纏津發續於初十日准江淮制置使司給下鏤榜如有願歸北人許知委自陳守臣躬親撫諭申取朝廷指揮當議支給盤纏津發本州先出榜曉諭三日無人自陳再展兩日又無人自陳及承制置使司鏤榜掛在市曺亦無人自陳遂申安撫司稱本州無願北還之人今來却准安撫使司牒備准制置大使牒准發回與先來有願北歸之人令守臣開具人數姓名以申取朝廷指揮前後施行不同兼此事頗係利害守臣不可輕率本州先來存恤泗州人不行發遣係承受宰相執政公劄行下令本州遵守今來發遣泗州人北行本州既無自陳之人可以申取朝廷指揮又不曾被受朝省指揮准發若欲不行津遣即違制置司指揮於事不便若欲即行津遣則元來撫存不遣係有省劄行下本州今來一旦津遣本州却不曽有省劄執守於理不安須至申聞者右謹具申三省樞密院伏乞廟堂籌度開坐行下以慿遵守施行不敢違戾伏候指揮内小貼子大口四百四十一名小口一百九十一名共支銀一千七十三兩市價每兩四貫二百文官㑹計程共約支錢二千四百七十貫文米約用三百一十九石有零見在市價每斗四百五文官㑹總計一千二百九十一貫九百五十文已上總約錢八千二百六十八貫五百五十文雇錢差人夫在外不算本州無錢可以那代欲乞朝㫖或於樁管錢内撥支或於月樁錢内截支乞賜行下以慿遵守支用津發伏候指揮再申省照對本州先准省劄存恤泗州人不令疑懼繼於六月十五日准安撫司牒備准制置使司牒津遣泗州人北還於六月初十日又准制置司鏤榜行下令泗州人欲得北歸具狀自陳為申朝省支給錢物發還牒與榜内事理不同兼本州又不曽承受朝廷指揮將泗州人津遣北還於六月十六日具申三省樞密院乞省劄行下以慿遵守尋准省劄令詢問泗州人願還者支給錢銀遣還部送至鎮江府都統司交管不願還者不得強遣仍闗㑹平江嘉興府江隂軍先次遣還訖湖州次第遣行炎今遵守上件省劄指揮子細訪問泗州人有願還者令入狀優加津遣有不願還者從應月給錢米不敢強其北去仍續行關㑹平江嘉興府江隂軍發遣已有次第本州方當准朝㫖發行炎又竊詳此事急廹則易擾寛緩則無變此亦不在匆匆除已遵禀省劄指揮外須至申聞者申省狀昨准省劄行下令本州候平江嘉興府江隂軍津發泗州人北還本州續後發遣今來本州知嘉興府等州軍見行發還今不敢稽緩又恐運河人多舟船擁併宿食亦不便今先将有官人李謙等一十户共計大小五十五口次日将閻本等四十九户共計大小二百四十三口日下雇船津遣外有郭珎等七十四户再三詢問稱歸與不歸不敢自必乞本州申取朝廷指揮又外有官人董進一户并鄭二等三十九户願在本州不願北歸所有願北歸李謙等支給盤纏不願北歸董進等依舊月給錢米所有乞本州申取朝廷指揮郭珎等七十四户候朝廷指揮行下或津遣或留住當遵守指揮施行所有夾細姓名人數候津遣定續次申聞須至申聞者内小貼子郭珎等七十二户僧兩人其意欲住本州又不敢自言所以狀申乞朝廷指揮欲乞鈞慈詳酌若欲存留或欲津遣早賜行下候得指揮或留或遣本州即當遵守施行再申省照對本州准朝㫖津遣泗州人北還去留隨其情願由有願北還人李謙等五十九户已於七月十五日已時支給錢銀津遣前去訖有願留董進等四十户已遵朝㫖存留依舊月支錢米外却有郭珎等七十二户僧二人再三詢問堅稱發遣與不發遣乞申朝省聴候指揮炎於今月十二日已具申訖欲乞早賜行下若朝廷矜恤此曹欲行存留即當遵禀存留朝廷欲行發遣即乞明降指揮即當遵從津遣前去恐泗州人多已北去獨有此郭珎等七十二户僧二人不當更津發遲滯須至申聞者雙溪類稾卷二十三
