body:
  text: 雙溪類槀巻二十一宋王炎撰書上劉岳州炎竊謂臨湘敝邑也炎拙吏也以拙吏爲敝邑事之不集宜也其無敗事者非能也直幸爾近准朝㫖爲命監司守臣爲闕乏縣分蠲減無名之錢而禁其違法聚歛之事舉岳陽四縣臨湘闕乏之尤也炎備員於此三年矣前此違法取財下則懼人户之訟訴上則憂臺府之按劾今日議臣有請聖天子有命洗滌其既徃之罪而禁止其將然之非炎將逡廵而去矣雖緘黙不言可也然喋喋不已干冐威嚴以取不韙之誅炎誠有罪又况縣令賤有司也今太守古諸侯之貴也其於属吏喜則有福怒則有禍炎何苦不觀氣色而有狂瞽之言哉願判府少霽威嚴容炎畢其說炎之初至官也視其庫則無錢視其庾則無粟視其市井則百家之聚終日閴然視其西境則烟火蕭條老稺菜色其心爲之愴然以悲問之於吏則蹙額而言曰本縣縁有版帳無名之錢官司所以煎熬也問之於民則蹙額而言曰本縣縁有版帳科罰之錢百姓所以重困也問之父老究其弊所從來則曰吾邑之病其所從來者久矣二稅歸州受納此焚林竭澤之舉也加之以馬草煮酒供給錢而縣則大困矣又加之以揀汰使臣招軍捕盗等錢而縣不復可以支吾矣前此知縣有受命而不敢之官者侯通直馬宣教李承事是也有以病而丐去者胡宣教是也有以按劾而罰者井宣教是也有以憂慮而物故者張通直是也炎聞此悚然而懼其初也不敢共職首䑕久之既已交割度其不可為也欲以尋醫去官申聞本州至於再三而前史君盧大夫不容其去是以勉彊在此至於今日自早至夜對邑人汲汲然以乞覔錢物為事而不及其他此何等舉措哉不暇憐民而心實自憐如粘􅤽之禽投穽之獸不特不能脱去而已性命殆不可保也故因朝㫖既下反復思念縣中公私俱困皆因無名之需幸而當可言之時因循不言縱一身可以茍免如邑人何如後人何况未有代者則炎亦未能脱去於此也失今不言他日府中按月督責而卒無以應則終不免於有罪是以不得不言積弊雖去根原猶在亦不免為他日之患言之不切則無以動上官之聽而其臨事踈拙不能精思出言狂妄不能致曲以此得罪於門下蒙判府追逮典吏炎固不能不恐矣然炎嘗聞之夫子之言曰不得中行而與之必也狂狷乎至於鄉原之徒閹然自媚於世者則曰徳之賊也夫中庸聖賢制行之凖也而中庸實難狂狷異乎中庸者也夫子不得已而與之鄉原似乎中庸者也而夫子惡之判府天下之仁人也其處已也寛大而有容其待人也和緩而不怒則其好惡必與夫子不異炎又恃此而不恐傳曰山藪藏疾川澤納汙瑾瑜匿瑕此盛徳者之事也是以敢僣言其情惟判府以其言不中節而薄怒之察其心之無他而終恕之不勝幸甚干冐威嚴伏紙皇恐上孫漕炎出於一介孤生辛苦半生之久方得一官蹉跎一紀之餘方脱選調法當試縣無所規避因念民户爭訟詣縣赴愬者所以求决其曲直之情為縣令者於剖决之際自宜審之重之不可茍也若平心定氣用一己之見猶未必每事皆中若不由己見用胥吏之說則必至於十事九錯無疑矣臨湘為縣地止一鄉民止數千户視江浙間繁難之縣其詞訟不及百分之一也然以炎之遲鈍不才處之則不可以民訟為少而不盡其心况一縣之人所謂詞訟半是論訴田疇官司理斷爭田之訟先慿干照既有干照須問管業則條令自有眀文如契要不眀限以二十年是也或問開荒則指揮自有眀文如已耕熟田不許執舊契剗奪是也然據兩辭所供則管業開荒難以見其虛實其勢又須問及鄰保則事之曲直人之情偽方别自而不可逃而臨湘人户爭競田土又與他處不同或有契據不眀界至交互之人或有雖納稅賦並無契據之人或有不納一文一粒賦稅亦無一字契據之人炎為因事之宜斟酌人情依傍法意平心理斷不敢狥一己私意有所偏曲亦不容吏軰執覆有所眩惑此邑人之所通知也若其兩辭紛拏即呼之使至案前反覆論辯未嘗敢臨之以鞭朴亦未嘗敢拘之於囹圄區區之意欲與百里之人情意相通因是以理斷曲直庶㡬可以無失然人之情偽固難盡知而一己所見豈能皆當即又准條令為給斷由其斷由之中必詳具兩爭人所供狀詞然後及於理斷曲直情理恐人户以為所斷未公即當執出斷由上詣臺府陳訴庶㡬上司見得元斷是非若元斷之是則虛妄者無以肆其欺若元斷之非則抑塞者可以伸其枉而小民之詭詐者又或不然自度縣出斷由則必盡見其無理之情狀遂有不肯收領前去者却埋藏元斷事頭改變情節装飾虛詞或赴上司陳訴而其所以為詞者則其說有二以為知縣偏曲者其一也以為吏人執覆者其二也炎竊謂知縣親民之官也在己偏曲而斷民訟即是徇私而背公罪也若信吏胥執覆而斷民訟則是庸繆而不眀亦罪也萬一上司未知元斷因由炎恐縁此䧟於罪戾而無以自解是以不避罪責以情控告欲乞日下或有臨湘人户赴使臺陳訴户婚公事願賜台㫖索出炎元來所給斷由酌事情之是非如無斷由願賜指揮行下令炎詳悉具元斷因依供申或索元案委清強官吏看詳如炎所斷或所見未到㣲有失錯乞原恕其過如容心其間不合人情不遵法意至於偏曲不公則亦無所逃罪干冐威嚴下情不勝皇懼之至與朱侍講炎近讀邸報伏見八月八日㫖揮増置講讀官且於中旬擇日開講夫始初清明祟尚儒學以輔聖徳此固帝王之盛羙然擇日開講則炎竊有疑焉且三年之䘮三代之逹禮也二十七日而公除後世之權制也其意葢曰軍國之務不可以不躬自聴斷則公除而蒞政亦勢有不得已焉耳服釋於外哀存於内則禮之節文雖變而禮之情實未冺也古禮不復可見其詳矣記曰斬衰唯而不對齊衰對而不言大功言而不議夫大功之視衰麻其情有降殺故服有等差而記又謂大功廢業或曰大功誦可也可以誦不可以議大功且然况衰麻之至戚乎居䘮未𦵏讀䘮禮既𦵏讀祭禮左右講讀之官以備顧問䘮𦵏之禮欲得其詳每事問焉可也一日萬㡬不得已而親事於法宫之中聴斷有疑時以訪焉可也大行至尊壽皇梓宫在殯復土未有定期而開講於清閒之燕炎為是有疑焉三代之禮固無所考漢唐之事亦不足證未審祖宗典故有是乎炎晚生何足以議禮然待制鄉邦之先進後學宗之且處經帳之長炎為是有請焉乞賜垂教以開釋所疑幸甚上趙丞相炎竊謂食人之禄者必憂人之憂此事君之明義而位卑言高者未免有罪又為下之至戒也炎陸沉州縣踰二十年髪既種種自甘流落此心灰冷不復萌進取之念矣考古驗今私計過慮亦嘗懷嫠不恤緯之憂然此身孤逺邈焉在闕門之外若不顧其狂瞽輒議朝廷之事則躐等踰分犯聖賢不韙之戒是以欲言而不敢近者伏準朝㫖取撥江西常平米一十萬石又下隆興府和糴米二十萬石此州縣利害細民休戚係焉炎州縣之吏也不避誅責引喙一言其可乎共惟某官以明徳茂親專面正朝處伊尹周公之任必能虛心克己以受天下之言炎為是有激于中不能自黙炎側聞輦轂之下畿甸之内與兩淮之間適丁凶嵗粒米翔貴張空頥而待哺者無所告糴若救之少緩則餓殍相視有溝壑死亡之虞所以上勤廟堂之慮轉漕江東西湖湘之宿藏而振其垂絶之命也然他路與他郡之利害炎不敢浮言止以臨江一郡計之倉司所撥米凢二萬斛用錢無慮近二萬緡浮江入閘茍無風濤之阻亦必一二月而後至于中都夫民之饑餓有朝夕之急而米之轉漕於他路者積旬踰月而後至恐非救急之䇿也如曰中都所藏輔郡所運自可解目前之急而他路之所轉漕去中都差逺者姑以為嵗杪來春之用則炎竊謂不若設䇿以來商賈之販出大家温户之藏可以免斯民之饑餓似不必為是擾擾也夫商賈所趍者利也大家温户藏粟既多必待凶歉而後糶其所求者亦利也傳曰將欲翕之必固張之將欲奪之必固與之今若不抑低米價凢商人之興販者㳂江諸郡既不得邀阻因明出牓文諭之曰兩淮嵗歉米價既貴商賈有能轉販至兩淮者或鹽鈔或茶引或官交或度牒随其所欲而收糴其轉販至兩浙者亦然若夫兩浙之地蘇湖秀三州號為産米去處豐年大抵舟車四出其豪右之家占田廣收租多而倉庾富實者縣邑之吏鄰里之民固能指數其人也然則自于臨安若蘇若湖若秀凢居人素有儲蓄者朝廷既不抑其價直明以上之徳意諭之曰凢蓄米百萬斛者以五十萬斛糶於官降而下之蓄米十萬斛者以五萬斛糶於官或鹽鈔或茶引或交子或度牒或告身亦惟其所欲計直而售之則商賈必且輻凑而豪右之家亦爭願發其所藏矣夫鈔引交子盈尺之紙爾告身度牒半幅之帛爾而可以易米活吾赤子則官髙其價而糴之然後平其價以糶於民何不可之有又况米藏未出其價必髙米來不已其價必賤此公私兩利之一䇿也若夫轉漕他路常平義倉之米以給中都則未能無害炎請詳言之且今州縣所通患者常平本錢之少也如臨江一軍去年旱潦相仍官糶常平倉司定價每升七文今漕米萬石費錢亦近萬緡即運二萬石之米有四萬石之費矣常平本錢之折閱深可惜也且天災流行不可料其必有亦不可幸其必無今日一路錢竭米耗無一嵗之備萬一來年方二三千里水旱為災細民狼顧無所得食郡縣長貳其將何以救之乎州縣之倉庾既空矣而一路和糴凢二十萬石米價驟髙細民即以貴糴為患來年春夏之交新陳未接艱食可知兼之區區支郡間有土瘠民貧去處和糴之後所存無㡬它日或有水旱欲勸富民賑糶彼亦何從得米乎當是之時吏或無以賑救其民強者攘奪弱者流亡縁此坐罪一官外物不足惜也受命于上職在撫字熟視其民之饑而死於心安乎為今之計既有以來他路之商賈諭畿甸之豪右若得米粟可濟饑民則他路和糴命漕帥二司斟酌可否勿拘定數其所糴到因以散於諸州補其所發常平義倉之數元數之外猶有和糴之見存者儲以為他日之備是則兩得之矣孟子論伊尹曰匹夫匹婦有不被堯舜之澤者若已推而納之溝中某官以伊周之心處伊尹之位所宜軫念炎是以冐犯威尊而僣言之也且炎自度其才之踈拙命之竒窮不敢求聞於當路久矣為貧求仕未能忘禄而他則無所覬也惟某官賜頃刻之間省覽其說芻蕘雖賤或有千慮之一得如蒙鈞慈斟酌而施行之不勝大幸干冐鈞嚴下情震越上趙帥炎竊謂事無小大慮之早則可以無患而其説若迂言之緩則其説雖切常苦於患至而難救故自智者觀之則以曲突徙薪為有謀自常情觀之則以爛額焦頭為有功而曲突徙薪之説則迂而可笑矣某官之智足以照天下之㡬㣲炎不懼狂瞽輒獻迂濶之説可乎炎昨覩朝㫖以浙中旱潦支撥江西常平米一十萬斛繼又有㫖下使司和糴二十萬斛其時未下臨江分糴十萬斛也炎妄意浙中一路饑歉似不應至於騷動他路嘗作一書告廟堂乞将和糴米斛填還所支撥常平之數尚恐輦轂下凶荒之甚炎所言未必可用而今準朝㫖許本軍以新易陳將和糴之米補常平之米炎又以是揣之則江浙間米價既高商賈亦必旋集菜色之民免填溝壑其勢亦必不如前日之急矣今合筠吉臨江與使府所糴米數共六十萬斛旁郡利害炎不能盡得其詳而贛吉商賈無一米舟過臨江岸下者則官塲和糴之急可占矣官之急民之病也臨江之民以為病則炎實目擊之盖臨江軍市為牙儈者例皆貧民雖有百斛求售亦無錢本可以收蓄每日止是鄉落細民歩擔入市坐于牙儈之門而市之細民大槩携錢分糴升斗而去故米賤之時負販者則有不售之憂米貴之時計日而糴者則有絶粒之病兩日雨雪繼作民遂大窘父老軰已來赴訴于庭夫官之和糴既有朝㫖不可住罷則艱糴之患在於目前長民者固不得邈焉如秦越之肥瘠不動其心然猶有可諉曰此朝廷之命事有不獲己者也然去年旱澇之後凋瘵未蘇今嵗臨江即非大熟贛吉亦自小歉而數十萬斛之米不藏於一路民間又不蓄於諸郡倉庾一旦轉而東下萬一來年春夏之交富民閉糶則鰥寡旡告必至於大困又萬一來年或有凶荒之患公私兩無宿藏上下俱困則弱者殍死壯者流移強者攘奪恐事之可憂者或甚於和糴之患耳江西楚地俗本輕剽不可忽也天下之患不生於人之所畏而生於人之所忽所可畏者在前若可忽而大可畏者在後此炎所謂曲突徙薪迂濶不切之論不敢告於他人而不可不以告於門下也炎陸沉州縣窮通斷於天命久矣庇身節下碌碌在此者為貧未能忘禄爾古之人有言曰屋漏在上知之在下是故諸路利病廟堂或不能知州縣利病諸路或不盡知閭閻利病州縣或不盡知所以愚者千慮或有一得願某官恕其狂瞽而加察焉所上趙丞相書録在别緘一併申呈干冐威嚴下情戰越上留丞相炎竊謂人主天下之至尊而民者天下之至卑也宰相之職於至尊者為近而縣令之職於至卑者為親故人臣之等級莫貴於宰相莫賤於縣令然民雖至卑天下之根本也朝廷之徳意欲下逹於斯民則宰相始之而縣令終之故自近嵗以來士之為縣者若朝廷不遺其㣲賤稍加擢用非以今為可重而以國之根本為不可輕也炎新安之下士也其足迹固亦屢至於都門矣嵗在己丑始竊太常之第陳丞相用事不敢見焉則以未嘗試吏也歲在己亥始獲關陞趙丞相用事不敢見焉則以未脱選調也嵗在丙午始脫選調王丞相用事不敢見焉則以猶未試縣也今者承乏岳之臨湘終更而來故敢有所謁於丞相之前天下之事淺者不足言也其深切者炎又不敢盡載於書請試畧言之相公論道經邦之暇儻賜觀覽炎敢畢其區區之說炎聞聖賢之論治必有本末源流本源不差末流自治故孟子曰人不足與適也政不足與閒也惟大人為能格君心之非此端本澄源之論也治之所出心為本源心之所主誠為本源誠天理也不誠人欲也思誠者去人欲而返天理也天理人欲存於方寸之地一消一長而庶事之有得失人心之有從違風俗之有厚薄君子小人之有進退中國夷狄之有屈伸舉繫於此是故虚靜恬淡存其本心以酬酢萬㣲經緯四海此五帝三王之事也秉徳狥道致其忠誠格君心之非成天下之務此伊傅周召之事也士大夫有列於朝者衆矣主徳之有闕治道之未善諫官得以言之賞罰之未公賢鄙之未分御史得以言之而所以格非心者臺諫不預焉盖臺諫耳目之官也故諫諍論辯救人主之失於己形之後迹顯而功淺宰相腹心之臣也故輔賛彌縫止人主之過於未形之先迹㣲而功深共惟相公篤實而不欺清凈而寡欲剛方而有守偉然為一時之大人而天下之望歸之膺夀皇之眷顧副主上之倚毘則用力於治之本原使無毫厘之差以新盛徳以復大業豈特相公以此自任聖明固以是望之朝野固以是期之矣詩曰徳輶如毛民鮮克舉之我儀圖之惟仲山甫舉之愛莫助之相公之視伊傅周召有其道有其志而又居其位其於天下之重任不患其舉而莫勝也而愛莫助之之意炎之私心盖拳拳焉惟相公恕其狂瞽幸甚雖然炎之來為貧而仕之念未絶也昔者虞廷用人之法既納其言又明其功孔門知人之法既聴其言又觀其行四方之下吏輻凑於都城之内而相公之言其可用者與其可弃者固亦不逃英鑑之明矣顧炎何為者望虞舜之廷升孔子之門貴賤相逺而實情未孚不得無以藉手也故為湖北末議八篇以自獻其所言為臨江剗弊一編以自見其所行而其意猶有不能自己者故又以書先焉詩曰采葑采菲無以下體古人不遺㣲賤意盖如此惟相公矜其愚𠂻幸甚干冐鈞嚴俯伏俟命下情不勝戰慄之至上葛樞宻炎嘗聞為天下計者不可以喜於多事亦不可以習於無事喜於多事則有輕躁妄動之憂習於無事則有茍且偷安之患夫惟靜而有逺慮動而有定守者然後足以撫天下之勢待天下之機制天下之變以成天下之務不然輕躁而淺謀者固多敗矣而茍且偷安者因循不振亦不能以有成是故聖人經世之心不畏多難而畏無難盖無難而深畏者所以為多難之不畏也自南北解仇行李徃來玉帛交贄方内無犬吠之警此宗廟社稷之靈生民之福也然兵偃而不用其久安之計歟抑亦養威蓄力以為觀釁而動之資歟天下幸而無事戰守之備少弛三十年於此矣恭惟主上奉夀皇之睿謀紹髙宗之盛烈相公以真材碩徳周旋兩地且專右府本兵之寄深略逺算獨運於帷幄之中而折衝於萬里之外此固非賤有司所能測知而其淺者炎請試一言之相公機政之暇試一觀之可乎今日壤地東起海濵西入巴蜀綿亘㡬萬里有爭天下之全勢而荆襄乃天下之脊膂也自襄陽出鄧州精騎疾馳不一二日可至於洛陽之郊則進取之策以荆襄為重昔諸葛孔明周公瑾為蜀先主孫仲謀言之詳矣在今日固未可以深論也至於守禦之策則荆襄之地尺寸有所必爭盖自古國於江左者得蜀則重重則強失蜀則孤孤則弱呉蜀相去逺矣朝廷所恃以有四川之地者荆襄扼其孔道也今荆襄之間其重鎮有三一曰襄陽二曰江陵三曰鄂渚兵聚於此而信陽漢東郢亭徳安等處嵗分數百軍士戍之夫分戍於㳂邉之支郡城小而不堅兵少而不精此不足以自固則江漢上游之所恃以為金湯者特三鎮耳大將在鄂渚戍卒凢五六萬人其副在襄陽戍卒纔二萬人江陵介於襄鄂之間戍卒不滿萬人夫襄陽國之門户也而恃江陵以為唇齒恃鄂岳以為根柢疆場有事其伸縮舒卷之機雖不可以預圖然鄂岳諸地逺江陵兵少則襄陽易危其表裏重輕之勢不可不素定也惟相公熟籌之古之用兵者有勇力之士有智術之士智術之士運籌䇿而為之謀勇力之士履行陣而為之用二者不可闕一也其大則漢髙之有子房其次則曺公之有賈詡先主之有法正其下則田忌之有孫臏以為軍師袁紹之有田豐以為謀主此數人者非能身犯矢石也然謀之用否勝負隨之自文武分為兩塗士大夫不服習於騎射而軍旅之士属之武夫士有談兵者人必笑之夫力扼虎射中逺為士者誠有所未能至於料虛實决成敗較之挾匹夫之勇者固有間矣今議者徃徃謂世無人才炎獨以為不然事以才而後濟才因事而後見天下無事則深謀竒計之士無以見其所長自古英豪不遭興運恐亦未免湮沒銷鑠與草木俱腐而謂天下果無人則過矣廟堂垂意於選用取其智不責其勇用其謀不求其力則天下之竒才乃可以網羅而無遺惟相公圖之將者國之爪牙三軍之司命也二三大將出於朝廷之所擢用愚不敢妄議自諸統制以下至於副將雖曰偏禆然緩急之際朝廷亦恃以為干城有勇而無智者且患其寡謀而易敗甚者其力不習於甲馬其技不熟於弓矢亦或使之當偏禆之任一旦遇敵其不足恃亦明矣夫聚數萬人於轅門豈無驍勇沉鷙之士可以備戎行千夫之長者若責二三大將各秉公心視其怯懦者黜之察其勇敢者陞之則此曺莫不踴躍鼓舞以功名自許戎容可肅士氣可壯矣惟相公圖之将帥所恃以用三軍者非威無以使之畏而不驕非恩無以使之附而不離李牧之犒饗竇嬰之分金皆以恩意撫摩其下也既以恩而固結之然後以威而整齊之則驅之於死地可使如臂指之相隨今軍士之貧甚矣將帥視之若秦人視越人之肥瘠不甚顧恤平居無事以勢相持以法相制固不敢為亂萬一有羽書之警率而用之恐難於盡其死力耳惟相公圖之神州赤縣淪於敵國之版圖者踰六十年士大夫慨然有意於北向而不肯燕坐於江淮之南義當然也然事以宻成以泄敗炎竊見印報或言布衣某人上書論邉防利害或言布衣某人上言論恢復事宜夫廟堂之上君相謀之邉鄙之上将帥謀之彼書生猖狂之言果何為者安用傳之四方哉且夫有謀敵之意而使人知之者踈也無謀敵之意而使人疑之者殆也惟相公圖之炎新安一介下士也隨牒州縣二十餘年自知其不才無以求聞於當世固未嘗一開口論天下之事亦未嘗一舉足至公相之庭嵗月侵尋試彫縣於江湖之外百憂薫心而身將老矣故終更而來仰望相公之賢願掃門一見焉而不可無以藉手也故為湖北末議八篇以自見其所言為臨江剗弊一編以自見其所行而其情猶有不能自己者故又以書先焉天下之事其淺者不足載之於書而其深者難以筆舌盡也張敞曰心之精㣲口不能言言且不能而况於書乎雖然炎之來未能忘情於仕者也相公略觀其言察其愚陋而弃之則炎之分也矜其蹭蹬而收之則炎之幸也干冐鈞嚴俯伏待命上胡參政炎嘗謂有一鄉之賢有一國之賢有天下之賢賢於一鄉者一鄉之人信其行可以治一鄉而不可運一國賢於一國者一國之人服其善可以治一國而不可以運天下至於天下之賢則天下之望歸之而天下之任随之朝廷之重輕華夷之治忽係於其一身之進退盖三代之盛時與漢唐之昭代為輔相者事與時並名與功偕髙下小大雖或不齊而要其大略未有非天下之望而能論天下之業者不待累數而知也恭惟相公正大之學渾厚之噐精㣲之識端莊之行可以特立於士大夫之上故奮起坤維數千里之外進登揆路以輔佐聖天子初政之清明言雖未發而人信之事雖未行而人從之功雖未成而人許之炎不肖何足以論天下之事然足迹至於都門聞為士者之公論皆以相公為天下之大賢是以願一見焉抑古人有言曰屋漏在上知之在下炎賤而在下者也天下之事雖非炎所能知請試一言之相公試一聴之方今天下何如哉中外安靜捲甲櫜弓而不用者垂三十年此無事之時也自淮海至於巴蜀煙火萬里未嘗騷動而吾民不樂其生宿邉之師一二十萬未嘗戰闘而縣官不足於用金繒之餌嵗入敵國而輿地之圖不歸職方者甲子既一周矣此非無事之時也天下之事非才不濟而涵養其才至於清明髙逺者非學不能也三代而上士之事業由學術發之小大判然不同今天下學者衆矣上焉者剖析性命之精㣲而不通於世務則體用不全次焉者馳騁言語之菁華而不究於徳業則本末不具故道術愈裂而人才愈偏非有以作而新之不可也士大夫風俗之不善莫甚於有黨而近歳以來一大臣之當位人必竊議於下曰某人其親也某人其故也且將攀援而遂進矣已而朝廷果用之一大臣之去國人又竊議於下曰某人其所厚也某人其所暱也且將牽聯而去矣已而朝廷果出之夫朝廷當以黜陟之公消弭士大夫朋比之私而乃進退羣臣各以其黨則是不才者或以有助而見容或以無與而見逐非有以矯而正之不可也人主與二三大臣㑹聚於一堂之上豈能盡知天下之才而用之故内而臺諫侍從外而監司守臣皆得以論薦其所闈所以收拾天下之才也然考其所薦非進士之髙第則學舎之優選而浮沉於下位流落於州縣者不預焉夫有所薦引取天下之虛名而不求天下之實用及於朝廷之所素知而不及於君相之所未聞盖其意不在於簡拔人才而在於自為之地士之懷竒抱異始有湮阨而不伸者矣非有以振起之不可也仰惟主上紹重華之綂承髙宗之烈賢哲佐之逺猷深策當大有為於天下而愚以為事業未成不足憂而人才不足深可慮是以獻此三說不自知其言之僭躐也且炎隨牒州縣二十餘年疇昔未嘗一至於公相之庭歳月侵尋齒髪衰矣沒沒焉與草木俱腐此心有所未忍也故吐其區區之愚筆之於書以自見其情若夫目擊州縣之利害條列其事而論之則有湖北末議八篇疲精神於彫縣庶幾撫摩憔悴之民以無負朝廷使令之意則有臨江剗弊一編併以獻於丞史夫抗之而在青雲抑之而在泥塗如萬物賦形於造化之爐洪纎髙下一皆聴命而不能違焉炎則不敢喋喋也干冐鈞嚴下情恐懼之至雙溪類稾巻二十一
