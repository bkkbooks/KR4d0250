body:
  text: 雙溪類槀卷二十七宋王炎撰疏天申節功徳疏長發其祥共慶流虹之節必得其夀交騰嵩岳之呼既修玉帛之彛儀仍集緇黄之善禱尊號皇帝伏願内心淵默剛徳乾行合黄帝之必靜必清授伯禹以惟精惟一佳氣非雲煙之紛郁中天如日月之照臨五百嵗王者必興乾符有永千萬年聖子相繼厯數無窮祝光堯聖夀疏堯仁得夀誕膺福禄之崇舜孝事親茂集邦家之慶下仰清光而就日天開喜氣以回春歡騰嵩岳之呼交致華封之祝恭惟尊號太上皇帝陛下伏願游心于淡受命無疆玉巵申講於上儀寳鼎愈増於神策閲蟠桃之屢實觀厯莢之維新四海悉主悉臣聖子益勤於尊養萬年為父為母庶民永喜於瞻依福萃堯廷與皇天而齊壽禮行漢殿罄率土以同歡敬輸臣子之情增衍聖神之筭恭惟尊號太上皇帝陛下伏願垂休罔極凝命无彊付託得人永享安榮之至養從容體道遂繇清净以長生下騰嵩岳之呼上煥鈎陳之色視三百六十年之神策以莫不増紀一萬八千嵗之始元於斯為盛㑹慶節疏虹流瑞氣肇開元聖之祥鰲抃輿情胥慶吾君之夀望清光於旒冕集善禱於緇黄俯罄愚𠂻仰増睿算皇帝陛下伏願基圖有永戬榖惟新上帝垂休夀星明潤羣神薦祉嵩岳歡呼觀厯筴之無窮閱蟠桃之屢實奉玉巵稱萬嵗孝慈洽父子之仁獻金鑑紀千秋祝頌副臣鄰之願皇天既付有家開明兩作離之運大徳必得其夀増泰一授筴之祥披寳笈之秘文賛珎符之錫羡寺云披西竺之被文賛中宸之景命伏願乗乾行健恊帝重華潤澤浹于淵泉久照同乎日月百姓與能而謳歌無斁群神受職而瑞慶具來厮伯僑役羡門彌萬年而御極發渠捜撫交趾混六合以同仁千嵗而生聖人彌月應流虹之瑞萬年而介景福普天騰嵩岳之呼敬披珠笈之文申祝蘿圖之慶皇帝陛下伏願能長且久俾熾而昌握赤劉之乾符受黄帝之神䇿如山如阜増莫大之宏休非煙非雲靄無窮之佳氣長發其祥誕受皇天之命退藏於宻默存至道之真遙瞻瑞氣之鬰葱仰祝宏休之昌熾至尊夀聖皇帝存誠不貳立極函三聖明累洽而重熈清凈長生而久視備得位得名得夀之羙受福無疆兼為天為君為父之尊貽謀罔極火徳明昌慶千齡之嘉㑹淵衷清凈増萬夀之宏休佳氣鬰葱歡聲洋溢夀聖皇帝存誠不息凝命惟新居髙先太極之函三繼照有重離之明兩陋漢帝之神䇿參天皇之始元自本自根自古以固存退藏於宻如山如阜如川之方至受福無疆重明聖節疏兌正秋而說萬物肇開彌月之祥離繼明以照四方新應得天之綂襲家邦之有慶嗣厯数之无疆皇帝受命穆清宅心精粹髙厚之誠配天而配地福禄之益如阜而如岡萬嵗玉巵首極孝慈之徳千秋金鑑永題熈洽之期瑞慶聖節開啟疏龍戱宸廷月適符於盈數鳯司寳厯天宜衍於宏休披貝多譯潤之文増黼依崇髙之筭恭惟陛下伏願聿申駿命益固鴻圖以海為家悉効華封之祝諸神受記亦騰嵩岳之呼坐臻純嘏之常永芘函生之衆滿散疏十月為陽體乾元之不息萬年介福凝鼎命之惟新飜秘典以輸誠望嚴宸之增慶恭惟陛下伏願安於仁而得夀懋厥徳以致祥山髙日昇大三聖明昌之祚竹苞松茂開百男繁衍之休永觀華夏之清夷翕受天人之祐助功徳疏聖人千嵗而生祥開是日天子萬年之慶福及多方紀休證於虹流罄輿情而鰲抃恭惟陛下伏願道全常久治假豐亨厯筴無窮應封人之善祝蟠桃難熟笑方士之虚談永握乾符益増神䇿堪輿共喜琛寳四來辰在紫㣲之中瑞彩下臨於南極日行黄道之上榮光竚覩於重輪望氣鬱葱應千年之興運對時熈洽衍萬夀之宏休披西乾譯潤之文祝北極崇髙之算陛下伏願存誠不息凝命無疆接基緖於蘿圖蕃本支於椒實仰承太母端居少廣之瑶池下俾臣工永慶開元之金鑑濬哲長發其祥丕承帝綂大徳必得其夀茂擁天休望喜氣於觚稜紬秘文於貝葉陛下伏願誕増神䇿永握乾符浹慈孝於兩宫保和平於六合天長地久已同宣后之萬年海潤星輝佇見帝堯之多子天申節戒壇疏菩薩五戒具在當敬歸依皇帝萬夀無疆咸資外䕶聖徳如天徳之悠久佛法與國法以流傳伏願體清凈心詣真實際有是父有是子俯觀舜孝之隆無量佛無量僧歛作堯年之永㑹慶節戒壇疏合掌誦菩薩言敬依具戒稽首祝聖人夀仰報洪恩惟天心申錫於殊祥則佛法永資於外䕶伏願慈雲廣大慧日光融徧世界之三千威靈易顯過恒沙之萬億睿算難窮摩頂授記具戒敢不奉持祝髪出家聖恩若為報答九霄電繞四海嵩呼誓披西乾譯潤之文仰祝北極崇髙之算皇帝陛下伏願後天難老如日常明慶嘉㑹於千齡介鴻禧於萬夀福徳過須彌之大不可形容佛法行震旦之中永資覆䕶請宗一住龍牙疏小釋迦演法叢林不妨宴坐老圓暢開山古刹又渇潮音道人亦何心於去留諸佛以此事而付嘱某人承月庵老門户為寧道者嫡孫前人望重湘中今日聲行江右虚空一片雲不可釘着華表千年鶴自合歸來莫使龍牙久虚猊座拈出舊時鼓笛還它本分鉗鎚淵黙而雷有聲聊示廣長舌相水清而月不現當開秘密藏門請智老住廣福疏談禪若露機鋒半成魔説傳法不落窠臼方是正宗分臨濟之派流得逹摩之皮髓可續祖師命脉能開衲子眼根某人宗說俱通行解相應有竹菴之文采只務遮藏其佛眼之圓明未嘗吐露諸方尊宿漸覺凋殘南岳叢林亦見衰落不是滴獅子乳如何勘野狐涎雲在岫中雖無出意舟逢水後自有行時直饒不打葛藤也且一拈黄葉請承祖住髙臺疏六祖一印不從文字傳來老南三關只許上根透過不到黄龍山中法窟豈識赤肉團上真人要教漆桶生光難得金箆刮膜某人山堂震之嫡子草堂清之諸孫見解分明機縁宻熟前人家風著於江右今日道價行於湘中若還時節既來自是沈埋不得光孝近市既曽在十字街頭髙臺傍山正好住孤峰頂上不宜靣壁便可披襟請僧住資福疏抛磚引墼公案雖則分明㸃鐡成金哲匠不可多得識逹磨無文之印承臨濟正傳之宗若是得五色摩尼珠便可擊一聲塗毒鼔某人及見向來尊宿專說近上機縁能承寂音尊者家風不墜真凈老人門户要為祖師出氣須将佛法利生黄蘖山中既是渡河香象資福坐下豈無趂塊韓盧若未容推倒禪床亦何妨拈起拂子請南首座住岳麓疏時節未來孚上坐不曽出世宿縁既契千沙彌亦去住山道人固是無心前輩各自有見某人不入葛藤社久住枯木巖逺成佛日門庭親得拙庵衣鉢雲歸岳麓正好依棲月在湘江本來顯現拈起拂子豈無馬祖宗風踢倒凈瓶更有溈山公案不須退歩便可當仁龍興長老開堂疏臨濟單傳迺是全提正令楊岐一派真能截斷横流除非深入宗門方可大開叢席某人分明雲窟之子親切月庵之孫大道如肘屈伸不離般柴運水宻用是眼開合豈在植拂拈槌㡬年觧腰包於大溈山中今日度禪版於龍興堂上儘教攪長河為酥酪未是真機只消拈黄葉作金錢亦非誑語闡揚義諦賛祝皇圖請僧住真身疏一笑拈花此事本無傳授羣盲摸象是人各說異同除非眼根見得分明方始舌頭語無欺誑某人久習禪定深識色空薝蔔林惟清凈香萎花寳無染着相若能為已亦可利生不二法門摩詰雖然無說第一義諦逹磨未免有言平分岳麓清風獨占湘江明月徑乗機㑹莫更推辭請照老住谷山疏達磨正印雖從教外别傳臨濟頓門最要句中有眼叢林久衰落矣此道誰振起之某人宗說俱通事理無障獨得簡堂真相欲興圓悟家風若能接物利生何妨呵佛罵祖谷山勝地湘水名藍風林堪演法音藤蘿不覆古路當作獅子吼一勘野狐涎只消真下承當不必逡廵退避請宗璨住開福疏能解類眼中金屑有即當除性空如色裏膠清看之不見雖則難為擬議豈真無可商量某人透過一重關出得千尺井親切别峰之子流傳圎悟之宗泛觀衆手淘金半是羣盲摸象頻歳石霜林下未曽說犬吠鷄鳴今朝開福堂中也不是風生浪起便當領畧莫要持疑請僧住白雲疏截斷横流一句不離兎角龜毛引接後學三關且說佛手驢脚所以老南宗派謂之臨濟正傳若要勘它沒眼禪直須用此無文印某人飽參尊宿徧踏叢林及到大溈山中如在靈源席下拄杖頭佛百雜碎方能不錯打人法堂前草一丈深又却如何利物在我試拈黄葉從渠只見赤斑下演真乗仰増睿筭請法舟住岳麓疏心不逐境而生雖務坐禪習定事或有縁而合亦須説法為人若能出處随宜乃是卷舒自在某人清潭皎月深岫孤雲言下商量已是葛藤斷下衆中推許正當梅子熟時堪増岳麓之光輝莫戀西峰之安穏請紹南住開福寺疏閑禪師古刹泉石雖則清竒寧道者叢林魚鼓不當冷落况是曾居衆首豈宜外覔堂頭某人法海之珠禪關之鳯山林靜處既不知葉落花紅城市閙中亦非是風生浪起出去如順流之棹歸來為入岫之雲莫更狐疑便升猊座請徳遂住禪寂疏臨濟一喝聞者直得瑣口無言黄龍三關到此却要轉身有路除非親入法窟乃可主張叢林某人早負見聞晚忘解縛獅乳一滴即如甘露清凉龜殻六藏不被浮塵染汙任是揚眉瞬目豈離運水般柴頑庵室中既得祖師心印禪寂堂上試開衲子眼根請便披襟不須面壁請行能住岳麓疏海内衲僧競說楊岐宗派湘中梵刹亦惟岳麓叢林要須人境相當即副祖師所属某人育王妙智之子徑山大恵之孫馬駒踏人昔日門庭尚在獅子出窟而今衣鉢相傳誰能無筏渡川何惜以標指月未宜挂拂便可披襟法舟衡岳開堂疏對春後桃花而一笑解悟元自有時指庭前柏子而再言問答却成戱論雖則不容擬議未應盡斷見聞某人深得宗乗更無理障誰知白牯自然不犯稼苗若問黄龍即是正傳流派試為抛磚引墼要當煉酪成酥法鼓有聲叢林増氣拈出佛香一瓣祝延聖夀千齡請法夀住定林疏拄杖頭劃碎佛祖方是全提衲子中混雜龍蛇只消一喝設若拖泥帶水便成摘葉尋枝某人獨得髻珠分傳心印捻紙雖能度火彈琴本自無絃衡岳山髙何惜孤雲出岫定林境勝更令枯木囘春瓶錫肯來鍾魚變響請法雲住西峰疏狂惠不除狗子却無佛性正如自悟風林亦演法音若徒㑹得如來禪未可倒用魔王印某人臨濟之派竹庵之孫片心悉聚海沙雖則不明宗㫖一口吸盡江水也且未是上根方當孤月圓時試住西峰深處便有水雲清衆徑作粥飯主人上封惠月開堂疏拈花笑後此事雖則流傳擊竹悟時玅處不容擬議羣盲認白雪為粉米古徳將黄葉作金錢若還不識正宗未免盡成誑語某人見聞剝落解縛冺亡繼佛鑑懃宗支起龍牙才門户上封勝境南岳名藍祗縁時節到來便被衆人推出鍾魚不改父子相承貌得先師真不妨展看塞却衲僧口無可商量仰賛丕圖俯開秘藏石室宗祁開堂疏六祖衣鉢不傳是誰得法五宗門户雖别總要明心後學若無上根頓教却成謾語某人覺照之子惠通之孫向來三世出㫁漢東今日一枝分來湖外承洞山老人正派住石室寳相叢林莫說古佛無光直須刮眼要為祖師出氣未可忘言開龍象之法筵祝乾坤之睿算請僧住岳麓疏第一義諦迦葉所以傳心不二法門凈名只得杜口雖未可認標指月亦豈能無筏渡川某人宗說俱通行解相應坐禪悟道煉酪遂是醍醐出世為人烹金須要爐冶莫墜潙山門户能承佛日家風得摩尼珠久在羅扶林下擊塗毒鼓更來岳麓堂中休要閉闗便當攜錫請僧住北禪疏向上宗乗本自不容湊泊全提正令元來無可商量直饒截㫁横流已是放開一線某人去事理障了心法空踏破草鞋親到真歇席下打飜漆桶頓脫石霜林中靈龜雖則六藏獅子也嘗一吼歸去三家村裏懶打葛蕂出來十字街頭試拈黄葉且說雲還深岫如何月印清江不可杜門便當飛錫光宗皇帝小祥疏四海傳聞遺荆山之弓鼎九重追慕游原廟之衣冠遽閱朞年適丁諱日悵陟方之易逺念流澤之難忘尊號皇帝神則在天心非遺物久照雖淪於日轂博臨永御於雲車喪帝堯如考妣之三年烏號曷已繼文考有子孫之百世燕翼無窮髙宗皇帝大祥疏君父之喪以三年而為極聖神之澤厯萬世而不忘海隅遏金石之音天子見羮墻之像髙宗皇帝光膺駿命再造丕圖躬勤儉以保邦體寛仁而厚下修文偃武先徳後刑四方物阜而時和三紀海涵而春養措大器覆盂之固視敷天脫屣之輕黄屋非心既釋萬㡬之務玉巵為夀方延億載之休龍忽上而遺弓駟難追於過隙漢京父老不聞警蹕之歸禹穴山川空悵文冠之掩然功配乎少康之祀夏而號同於武丁之宗商服既禫而將除廟不祧而罔極戴天履地恩悠久而愈深就日望雲徳照臨而如在太上皇帝發引疏燕翼無窮宜享九重之孝養龍髯易逺曷勝萬姓之哀號黼翣啟行玉衣永閟敬假佛乗之秘密仰陪仙仗之逍遙伏願變化無方清明在上御風雲於碧落之路挾日月於大㣲之庭四海黎元永涵濡於惠澤諸天帝釋同拱扈於神靈聖徳如存皇圖益固太上皇后發引疏母儀配極遽㢮衞於椒庭仙仗返真空纒哀於栁翣攀號何及冲漠難如諒歸兠率之宫永證菩提之果伏願得甚多福悟最上乗慧日照十二縁之空端居佛土慈雲覆三千界之廣垂佑皇家太上皇帝發引祭文帝統有傳方喜大庭之宴處神㳺不返遽聞仙仗之上賔流澤深長函生摧慕粤自尹京之始洎于議事之時洞察民情熟知政體謳歌所與發青陽洊震之聲揖遜而升繼黄道重離之照進忠擯偽省賦緩刑遵彛憲以無愆受盡言而不諱憂勤再閏經緯萬㣲措宇内於丕平超域中而高蹈挈提大器畀付儲闈既清凈以凝神宜康寧而介福豈期厭代竟至登遐視武王九十三歳而終稍愆夀考如黄帝二百餘年之久難輟哀號違太母之慈顔畢嗣皇之孝養漢京父老徒思警蹕之下臨禹穴山川但悵衣冠之永閟乾坤慘戚夷夏酸辛臣等麻苴衘悲藻蘋薦敬白雲空濶望已絶於攀髯銀海沍寒痛共深於泣血恭念詒謀之逺誓輸衛上之誠雖竭愚忠難酬洪造又聖賢相授莫盛舜禹父子相繼莫若文武於赫我宋度越千古繼世内禪獨顓盛美皇矣孝宗纂堯之緒篤志事親寧釋機務帝遂出震從容巽位其明如日洞察真偽其仁如春涵育黔庶容受直言持循法度揖遜三朝熈洽萬宇經緯神心過於勤瘁乃出玉音授諸聖子退處北面以燕以豫宜夀而康萬有千嵗豈遂彌留迄于厭世軒星一淪杞日亦墜遺誥下傳同軌畢至丹鼎空存玉衣不舉禹穴山川百神來衛風慘雲愁龍輴難駐臣庶號慟聲悲笳鼓私念㣲生自傷薄祐㷀㷀穉齒已失所怙仰戴皇慈實兼君父地坼天傾罹此大故敬薦蘋蘩具寫情愫望㫁攀髯銜哀莫訴西峰禱雨疏人情恐懼同苦旱乾佛道慈悲稍沾膏潤欲丐渥優之澤敢伸悃愊之私再具忱辭仰干明聴恭惟垂正法眼具大悲心閻浮提世中未嘗過去兠率陀天上本自如來言念衆生可通危悃方亢陽之為沴恐南畝之無成已聞閭閻有嘆息愁恨之聲豈免道路致攘奪流移之患方千室共嚴於齋戒而四郊漸沐於霑濡伏願一錫飛空羣龍起蟄㡬聲鐡笛化為天下之雷音五色錦衣散作人間之雲蔭沛然甘雨興此槁苗當俾凶年復為樂嵗引手加額果獲免於阻饑以口語心顧敢忘於大造祈雨疏農夫是藨是蓘方懐仰膏澤之勤旱魃如惔如焚大懼失豐年之望衆所甚急吏其敢安念遷徙之新民耕汚萊之瘠土百夫有洫千夫有澮僅築鑿於陂池二歳為菑三歳為畬始翦除於荆棘儻灌溉失水泉之利則老羸有溝壑之憂天雖髙而其聴甚卑人可矜而必從所欲是用敬諏剛日訊掃公庭瞻上帝之傳臨祈羣靈之並集興雲雷於瞬息之頃垂雨露於枯槁之餘懇懇私心敢意潜通於蒼昊蚩蚩生齒庶幾沾丐於鴻私又環地百里非膏腴之田務農三時仰灌溉之利凢老幼張頥而食者皆家室垂磬之蕭然矧自夏以徂秋方炊新之有日仰昊天其星有嘒雲霧不興嗟農夫我稼既同水泉且竭懼官吏不任於撫字使閭閻未免於嗟咨是用恭布忱辭仰干聰聴惟風馬肯臨於壇宇庶雲龍並㑹於空虚渰淒淒雨祈祈洗除旱暵黍與與稷翼翼同樂豐年謝雨疏人以食而為生患莫深於饑饉天不言而善應誠則可以感通兹因南畝之旱乾懼失西郊之秋歛閔閔雲霓之望喁喁老穉之情仰止蒼穹監其丹悃恕吏之罪恤民之災變巖間一滴之泉為郊外千畦之澤衆方憂而共喜禾将槁而盡蘇曰雨曰暘之時和既同於玉燭如坻如京之積嵗可獲於金穰曲荷鴻私願終隂相又地無沃壤每憂種藝之不收民有空頥况值新陳之未接稍旱乾而告病即饑饉以為灾仰蒙諸佛之憫憐俯度衆生之苦厄散慈雲於天上流甘雨於人間萬室清凉不啻飲醍醐之味四郊豐稔乃如獲珠玉之珍尚祈隂相於其終但愧銜恩而莫報祈雨疏人以穀而為命必望豐登苗非雨則不生有妨種藝矧兹瘠土加以惰農稍潤澤之愆期即田疇之告病敬伸愚欵仰叩髙真願成三日之霖普及一雷之地何蓑何笠既可殖於良苗如櫛如墉庶終收於多稼謝雨疏麥秋之後方欲移苗梅熟之時未宜憫雨控㣲誠而伸禱幸甘澤之下流宜冀洪私終垂隂相四郊白水必無夏旱之災萬頃黄雲庶獲秋成之利祈晴疏一年之計殖榖皆望有秋三日以徃為霖乃成滛雨禾將生耳民有空頥若非慧日之光明難破隂雲之霮䨴願慿諸佛之力通懇惻於羣神庶畢三農之收免阻饑於卒歳謝晴疏一念之誠諸佛應答四郊之外田家歡欣方隂雨之潺潺忽秋陽之杲杲民亦勞止天其佑之三時務農既築場而可穫十月納稼將實廩以多藏徳有所歸愧無以報謝雨疏土薄水淺之地既無良田金伏火老之辰易成常燠粳稻秀而將實雲雷鬱而不興人所欲天必從控精誠之悃悃旱不苦禱而雨流甘澤之祈祈歳㡬歉而獲豐徳無窮而莫報又下地田萊無土厚泉甘之利惰農耒耜失水耕火耨之時故於秋夏之交易有旱乾之苦為民而禱惟佛可依果蒙兼覆之慈雲散作無邉之甘雨龍骨挂於屋壁野水自流馬尾蔽於溝塍田家相慶有豐年而不害戴大造以難酬天慶觀祈雨疏三農刈穫雖在秋成百穀萌芽實由春作乃以此時而不雨難乎卒歳之無饑况乏盖藏公私凛凛未能播種老稚喁喁輒控丹誠仰干洪造吏如有罪敢免譴訶民實何辜願垂矜憫雲雷一動沛為三日之霖穜稑並生終獲千倉之積天慶觀謝雨疏三時有務農之急春則物生一日不再食而饑穀為民命比因憫雨函以籲天甘澤既流良苗漸秀然而壤地之非沃且或陂池之不脩所以是邦豐年盖少况於今日艱食者多願帝徳之溥臨覃仁恩而下濟五風十雨無愆時令之和千里一圻均浹土膏之潤天寧寺謝雨疏民生所資穀為之命農事攸始春即于田比因膏澤之愆期敬欵精廬而致禱靈雨既降良苗稍蘇然而人率下農兼以地無沃壤故兹闔郡罕有豐年尚冀佛慈肯終隂相五日一風十日一雨不乖時令之和千夫有澮萬夫有川均浹土膏之潤祈晴疏蘋蘩薦敬將涓吉日以蕆儀葵藿傾心共幸太陽之委照念百神之咸在而四衆之俱來欲獲便安無如清霽皇天雖逺難遽達於高明大道無私可潛通於悃愊願垂顯相庶廸吉祥升杲杲之新暘答喁喁之衆望又穡事幸而有成可瘳民病霖雨久而不止必害農收雖致禱祈未能感格慮因政事之失或干隂陽之和吏誠有愆民實何罪况凶年之後公私既竭於宿藏苟新穀不登農末必臻於俱困是用再披丹悃仰叩蒼穹伏望上帝溥臨高真來下憫此閭閻之苦相其銍刈之功日氣晏温雲隂解駁尚獲金穰之利免罹水潦之災四府疏子惟一母有疾必憂佛與諸神無求不應昨伸忱悃實為慈親拘三嵗之沉痾徒多方而療治冀慿佛力可保色身但大數已窮竟致此生之永訣而真常不昧亦應精爽之尚存敬設凈筵用酬宿志欲界色界無色界合四府之明靈小乗大乗無上乗遍十方而印證悟聖賢不生不滅之法結福徳無量無數之因下及債主寃家悉皆解脫上與諸天帝釋同共逍遙上五顯華嚴經疏了一性真六通無礙具諸福徳四衆所依故佛菩薩凢有敷陳雖天帝釋悉皆諦聴徧五十三界善財所歴成八十一卷華嚴之文各有入門不離實際恭惟五顯爵列真王庇此一方恩如慈父内行秘密外示威權歳有祈禳人俱敬信即梵宇修伊蒲之供集緇徒譯貝葉之詮仗此良因達于聰聽豈止獨全妙覺現毘盧之法身正應廣度衆生滿普賢之行願水陸疏三界差殊悉由心造萬靈依向惟有佛慈故如來名曰導師而平等謂之法㑹惟兹里社之聚乃以仲春之初共集緇徒敬瞻金相具香積之凈饌誦貝葉之秘詮盡十方世界之中合一切聖凢之衆見聞者皆宜輻凑悟解者盡脫輪迴或有沉淪同登彼岸因資利益共作福田禳瘟火醮疏五行既順豈有融風四序不愆斯無厲氣故作咎者神司其柄而祈禳者禮著於經輒控㣲誠仰干大造屋廬相望老稚雜居咸共保於康寧斯永無於災害丁夘祈雨疏孟秋之始方近農收浹辰以來遽憂旱暵且三時所務最為勤苦而一時不食未免阻饑合老穉之忱辭修禱祈之故事翻經精舎取水靈湫叩諸佛之慈悲丐神明之佑助水泉竭而得雨雖珠玉之不如稉稻熟而有年庶丁黄之相保不勝悃欵仰冀矜從罷祈雨疏山焦石裂方憂旱甚之災雷動雲興遽沐沛然之澤稼穡變乾槁而秀潤閭閻息愁嘆而懽忻保我秋成賴誰隂賜佛之道以慈悲而濟物神之徳以正直而依人有如父母之愛心不忍旄倪之枵腹憫其渇雨丐以餘波敢謂禱祈可逹幽明之際第深感激不忘生育之恩謝晴疏隂雨㝠㝠懼失收藏之利新暘杲杲喜終刈穫之功人所欲而必從天不言而善應消愁嘆於為霖之後獲豐登於艱食之餘稲稉徧場圃之間不無遺秉雞犬在茅茨之下亦有懽聲吏釋其憂民得所養凢仰父而俯子皆右粥而左飱隂賜無窮名言難既又苦雨之多方為農病新晴之後遂畢田功上有以輸於縣官下足以養其私室豈懇祈而必應乃隂相之有終釋吏隠憂免曠字民之職拜神休貺徒銜報徳之私普利院建藏疏教法來從鹿苑天下通行寳藏起自龍宫山中未有将使四衆團欒圍繞除非八面具足莊嚴兩手握空拳如何成事一心發願力只得向前要増蘭若風光全仗檀那喜捨法布施豈可無財布施人結縁便是與佛結縁抺綠塗金管取鼎新有日吹螺擊鼓須教輸轉無窮天慶觀疏三江五渚據地勢之要衝清都紫㣲儼帝居之法象必也因人而成事庶乎捨舊而圖新貝闕蘂宫難覩九天之髙逺虹梁藻井用嚴千里之瞻觀願集勝縁同増介福請杲師住灌溪疏諸佛爲一大事出世只要利它祖師以正法眼相傳未嘗無說失其㫖則醍醐飜成毒藥得其訣則爐鞴可鑄精金縱饒衲子難瞞豈可叢林久廢某人徧參尊宿飽負見聞禪定自如已曵轉一頭水牯機縁素熟當衮出三箇木毬今以劈箭路頭漚麻池上鳴鐘動鼔欲還舊日門風植拂拈槌宜得作家手段雖片雲不可釘着然孤鶴偶爾飛來若未容推倒禪床也自當抝折拄杖花開五葉本來是臨濟之兒孫熖續一燈何惜嗣灌溪之香火無勞退歩便請當仁雙溪類稾卷二十七
