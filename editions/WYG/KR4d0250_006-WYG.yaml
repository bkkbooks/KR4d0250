body:
  text: 雙溪類槀巻六宋王炎撰古律詩和祝聖予送行韻少年困裋褐妄意取圭組徒為出岫雲不作潤物雨三年葮葦叢鳬舄堕江滸憂患鬢先凋驚呼髀空撫過期釋重負揆日趨在所投簮誠未能束擔亦良苦漢庭士冀北不可一二數顧我㝡平凡辱君誤推許皇明照百工天髙日亭午海嶽雖兼受涓埃諒無補汲汲為身謀人生㡬寒暑軒冕既儻来金璧又難貯試㸔轅下駒何如黄鵠舉莫待婚嫁了徑為松菊主大隱在城市髙人戀衡宇相期數過従脩綆同汲古次韻孫居易送行着鞭欲為功名起椎鈍不堪加礪砥感君雅意重金玉餞我新詩粲桃李我扵吏事非清通向來妄意圖民功本無仁心致三異豈有遺愛留一同鬂毛斑白眼昏黒身外榮枯從造物恥擕奏牘到公車千慮懸知無一得陳宰生日花枝㸃綴深淺紅溪山二月春融融琴堂清曉氣葱鬱躡鳬此日來仙翁姓名已久書綘闕骨相元自居紗籠君王厚下為保障郎宿垂光臨一同兩行吏立薄氷上四境人行明鏡中三年妙手巧製錦藉甚治聲聞九重桃李隂邉共歌舞勸君飲盡玻瓈鍾着鞭由此登要路推轂豈必由諸公未教曳履侍文石亦合峩豸乗花驄中堂朱紱映綵服瑶池無日無春風摩挲銅狄閱人世何止他年方兩瞳和王宗禮送行韻羊腸官路困躋攀為米低頭亦厚顔尚欲束装趨帝闕未能盡室返家山青雲新貴争先進空谷幽人去不還我獨行蔵兩無取狐疑丘壑市朝間和陸簿韻士龍才氣極超然奕奕家聲見象賢慣學詩翁歌白雪懶従舉子選青錢三年小試淹巖邑千里來歸近日邉流落倦逰吾老矣㸔公騰踏上凌烟和黄子山韻二首三年凋縣積憂虞幸脫拘囚氣始蘓已愧淵明辭五斗尚晞聱叟住三吾潜心道義須加進垂世功名莫浪圖前日趍營今斂退看人髙歩上天衢閉門聖域妙鈎深霧豹文成照士林顧我一生求勝已與公數面可論心㬠蓑溪上今陳迹嘯白堂中久絶吟雙井獨為風月主欣聞緑綺奏遺音用元韻答徐㓜文身行宦路固多虞夢到清都厭積蘇欲返初心觀易老懶開辯口學巖吾有懐擬作西征賦無䇿堪陳北伐圖才具如公宜頴脫不應空谷老唐衢學道工夫要汲深塵生麈尾坐書林何妨緩歩時過我試共𤣥談一洗心翠岫遶溪雙鷺下緑隂覆屋亂蟬吟是中别有無聲句莫笑遲遲不嗣音謝黄子山賀得孫侵尋及頽齡憂患催霜鬚是身如老木枯枿生孫枝自念非逸少屈指無七之日願榖豐下今見鳯有兒安得夀喬松及渠成立時追念十年事欣戚更乗除𤓰葛自延蔓葮莩相因依賴此一雛生兩家釋猜疑飛鵲遶屋鳴織翠来華裾相視一粲然英詞出瓊琚醴甘不醉人湯餅浮銀絲只欠解語花遏雲歌此詞知公本惜飲嘗試覆一巵因之酹梅塘騎鵠何時歸和麟老韻五絶詩清雖為竹庵編禪妙元従佛眼傳用處縦横能殺活匣蔵不肯試龍泉清如野鶴有仙骨閒似片雲無俗情試問老人那得病定應金粟是前生客塵悟了息攀援萬事虛浮一聚烟挂佛壁間趺坐穩遶簷翠柏解談𤣥白雪蒙頭卧佛廬筆端亦解世間書無情安用詩陶冩有病何須藥破除居似鷦鷯巢一枝意如倦翼怯髙飛尚憐身是他鄉客夢遶松楸賦式㣲王倅成老挽詩二首末俗輕浮甚斯人有古風持身無表襮為吏極清通學似武平一仕如張長公龜趺宜篆刻潜徳照無窮二珠玉山淵潤仁人久里居低徊嘗結綬强健即垂車長厚皆堪法循良亦可書惜哉懐逺業小試只題輿和陳丞彦能韻已上並分寧所作東山林壑自盤旋健歩翩翩似壮年退不求名如避世清而寡欲可成仙懸知身外渾無事不羡壺中别有天珍重與君頻問信二松遺愛滿脩川方漕躬明挽詩三首行蹕留吳㑹神州久陸沉君王經逺志臣子復讐心慷慨披丹悃褒嘉拜玉音騎箕何太速有識共沾襟二吳蜀蜂腰勢荆襄控上㳺羣公無逺慮天子有深憂此事須成筭何人更熟籌黄圖三輔近北望不禁愁三一節方將指千兵競力耕江淮如富實河洛可經營許國忠誠切謀身寵辱輕空遺今日恨公論付臺評謝江潭諸公相逢一解頥欵曲吐肺腑主人愛敬客童孺亦呼舞擊鮮倒家釀花枝照樽爼善謔時絶倒惜飲亦徑醉十年一㑹面此身㡬寒暑不見即相念臨分無可語翰墨要淘練飲食謹調護行役今何時天寒嵗將莫故鄉松梓荒他鄉寓兒女豈不念之深秖覺丹心苦天機馬出塞人事狙賦芧都門桂玉地久客憚覉旅東風染春紅歸程渉溪滸經過不厭數弛擔更少住禮簡情乃真惟宜具雞黍題童夀卿博雅堂㑹道莫如約要識胸中真講學亦貴博不廢紙上陳王充與李邕世豈無若人中秘未許見市肆何所聞童君家多書乃為我軰慮安用蓬萊山萬卷皆聚此又復附益之秦碑及周鼓剡溪来楮生歙穴㑹石友持此分雅俗清渭映濁涇不賄屋自潤無爵身亦榮好事時相過不憚倒屣迎揮麈言有味寂如無市聲孰如漢中郎孰似楚左史孰能誦亡書孰解作竒字是中猶淵海随取即随有或問賈㡬何還可商度否掀髯笑謝客吾非鬻書叟題秋山圖我本山中人築室依澗岡世故驅我來緇塵滿衣裳見此山中景我思更深長老樹何離離瘦石何蒼蒼借問此何時天寒鴈南翔西風有摇落蘭桂含幽芳題逺山平林圖山色㣲茫疑有無木葉半脫殊蕭踈雲根更著數椽屋此屋當有幽人居墨妙逼真乃如此畢竟非真惟近似何如屐齒飽經行是處溪山皆畫笥還君圖畫吾且歸家在江南依翠㣲題潮山海門圖已上四詩為童夀卿作潮来濺雪欲浮天潮去奔雷又寂然海上兩山元不動更添此意畫中傳送許士龍秘校南山霧豹隱北海風鵬飛顯晦不在人屈伸各有時之子後来秀躡屩飄長裾俗眼變青白論士相目皮父執謝艮齋片言借吹噓聞君方逺游行李将何如食梅不免酸彈鋏不免悲易盡床頭金難浣衣上緇白髪倚門望豈宜去庭闈林烏能反哺人亦稱其慈勿徒走踆踆而更歸遲遲志定學始進身臞道方肥譬如汲深井脩綆斯得之持此為親榮玉潤山含輝苦言當贈策申以南陔詩題韋同年聚逺閤此以下臨江所作塵蒙萬家市中有壺公天翬飛倚空翠吞納無中邉江逺益淵回山逺益清妍雲霞之斂散竹樹之芊綿羽鱗之翔泳舟車之往還物色四面來輸入簷楹間境逺心亦逺意将隘人寰我嘗觀洞庭水與天相連流光浮玉鏡萬象皆包涵又嘗登天柱衆丘如髻鬟孤鴻滅沒處寓目行中原蓬轉堕江城此身縛㣲官今代韋表㣲懶着進取鞭尚記千佛名亦許時扣闗自疑脫凡骨揖此樓居仙江山開畫笥使我思悠然是中有真趣可得不可傳客至勿揮麈但與浮觥船送房陵倅韋同年二首白玉難求市青雲緩作程小煩乗别駕逺去護邉城斥堠烽烟冷譙門鼓角清採桑遺戒在約束要堅明二徳齒皆兄我曾聨淡墨名揮犀方晤語浮鷁又催行今日惟櫜矢何人更請纓戰塵猶未息北望若為情贈輪上座念舊今歸楚尋師久入吳有縁依梵釋何事走江湖休問傳心印當先覓髻珠直須言語斷方不堕凡夫寄蒋主簿并簡劉判官過我怱怱去難淹長者車嵗華今又晚官况近何如不是無才具渠憂少薦書因君問公幹久不寄雙魚用元韻荅劉判官解后章江上知従五馬車君才猶未用吾老更焉如間濶思眉宇殷勤得手書喜聞衣綵樂入饌有江魚用元韻荅戴簿緑衣随宦牒綵服侍安車問齒君方壮論才我不如清新哦五字博洽貫羣書尚肯求龍尾容交華子魚用元韻荅蒋簿北去方休駕西行又出車身勞雖僕僕心静自如如儻得重揮麈全勝數寄書詩來驚老眼筆力掣鯨魚蕭參政挽詩二首正學無阿世危言不顧身旁觀多側目獨立屢攖鱗八葉均衡後三朝柱石臣晚方陪國論終不盡經綸二東府纔登用南園即退蔵不欺身自正無欲氣能剛士共悲梁壞朝應惜鑑亡臧孫宜有後世出甲科郎送施宣教施㕘政子翩翩貴公子和氣如春温傾盖一晤語肯吐胷中真江頭雨新霽浮鷁波鱗鱗騎鳯吹玉簫歸歟覲慈親我老無所營君方富青春後㑹未有期人来時嗣音毛頴二十軰深𠂻致殷勤助君賦子虚髙飛到青雲和吳夢授韻卷舒有道在随時隱約何須感慨為末路老夫甘退縮華途吾友尚驅馳凖繩行義當趨正淘練文章自出竒舉世豈無人具眼未應終不貴和随題徐秘校達軒洙泗之學心為宗以心㑹理俱圓融皎如日月猶有蝕豈可講習無深功仲祥家自有師友箇中嘗指入門否磨礲浸灌更覃思道不外求皆我有靈臺四闢如八忩面面髙明悉通透此道周流無定名此心㣲妙無定形知随物誘心失位思而不達空營營為君再下一轉語敬以攝心思乃精壬子春羅端長贈别憶昔始相識公歸自中都時方擢上第緑髮青衫紆論交兄弟間意氣和笙竽瓌文得要攬快語相為娛一别間何濶流年走暘烏髙情自浩浩風骨乃仙癯顧我蒲栁姿雪霜凝鬂鬚囬思鴻鴈行淚落衣袖濡相逢慰棲遲此道評精麄稔聞充素藴諸老推通儒又知治劇縣民瘼刪繁須清才為世用洗目亨天衢監州尚小試稱屈非超踰敂門喜重来新詩遺明珠傾倒念有陳草具陪觴壺自愧學不講議論無根株殷勤謝雅貺披索中腸枯壮志已愴悢俗情厭﨑嶇正湏心所欣日與鐫迂愚奈何復作逺攬袂還躊躇公猶寄異邦同是江南區但慮懐與安久客非良圖終當念墳墓速歸三徑蕪昨言亦云然嵗寒勿盟渝和王文州咏雪韻老盡青青江上山漁蓑如畫過前灣玲瓏氷玉光相射㸃綴寒花意自閒甕面春風消寂寞爐中宿火䕶尫孱請君試跨白霓去鶴氅凌空我願攀再用前韻一穂香雲擁博山毛錐吸盡墨池灣詩如驪頷生明月人似龍媒出帝閑洒落髙情忘固陋峥嶸健論起衰孱蒼髯半雪吾休矣却怕飛騰不可攀冬雪行并序甲寅嵗雖小稔縣官和糴米價遂增兩日雨雪市中貧民有無炊烟者艱糴反甚扵去年之凶歉父老軰遂具公牘赴訴于庭因成冬雪行一篇其辭如古樂府其義則主文譎諌言之可以無罪者也擁衾展轉夜不眠細數更籌知苦寒角聲未動紙忩白兒曺報我雪滿簷玉妃剪水出天巧飛花萬㸃争清妍朱門貴人對之笑初見一白来豐年金甖玉爵雜蔬笋飲罷敲氷煮新茗繡幃中有紅麒麟輕暖勝春尚嫌冷窮巷小家真可憐典衣糴米無炊烟江頭津吏日来報往徃上流無米船縣官要糴十萬斛天上符移星火速去年秋旱糶陳腐今年秋熟米如玉且願扶桑枝上紅日轂東来却膝六今年冬雪民已臞明年春雪民更飢九闗有路虎豹守欲語不敢空長吁次韻荅簡簿少日牛衣嘗熟暇老来駝褐不䕶寒欲呵龜手拈秃筆怯㸔氷柱懸疎簷東風不解着梅栁翻作六出欺春妍春回臘盡亦何好但為浮生添一年負郭有人如石笋雪裏哦詩自烹茗胷中盎盎有天和户外蕭蕭尚氷冷日炊脫粟不自憐却念野廬無㸑烟此憂未知可解否凖擬為君浮酒船酒酣傾㵼珠百斛定覺揮毫轉神速聞道諸公雙眼青豈終遺此豐年玉倦㳺别駕老更貧自謀慚似龜蔵六詩来謂我清而臞我方忍慾將忍飢短蓑歸釣寒江雪紛紛世事休嗟吁題楊秀才園三亭綉春幽圃春風蕩漾時阿誰綉出百花枝春工不與人爭巧玉笋羞拈五色絲見山忩間酒榼與詩編忩外山光翠入簾山好要人能領略直須胸次似陶潜移春花邊春色可移来遶屋株株手自栽若要四時春不去更添秋菊與寒梅和王文州梅花韻何處東風發春早先傍梅花試天巧新陽一㸃破雪霜春意将回可前料天公乞我人日晴新年屈指将浹旬老懐不似少時好對花黙黙仍循循坐㸔流年如許急嘆息浮生駒過隙與花相見忍相負洗杯一醉樽中碧起来索笑廵踈簷愛渠清絶無中邊君侯肯為花吐句麝媒洒落生雲烟花開花謝莫深問物有榮枯付天命聞道隴頭天正寒驛使不來無逺信可憐桃李品格低誰似玉肌蒙縞衣為花着語只如此更請健筆無停飛題清江常宰道院古人牧民如赤子今人臨民用笞箠孰知官府本無事獨恨庸人擾之耳臨卭有客腰銅章三年為吏先慈祥老農共說長官好桑柘隂中民小康公庭閒暇鴈鶩散燕坐胡床清晝長撥煩何自文書省治道由来貴清静不須柱下五千言洙泗六經無猛政和周南吉二絶才諝諸公争汲引文髙後學共儀刑相逢未覺功名晚鏡裏依然兩鬢青舊逰追記岳陽城莫惜經過憩斾旌容易别離難㑹合為君重酌聖人清題徐㕘議畫軸三首墨梅酷似西湖處士詩雖無半樹有横枝天寒地冷清癯甚故着緇衣護玉肌赤壁圖烏林赤壁事已陳黄州赤壁天下聞東坡居士妙言語賦到此翁無古人江流浩浩日東注老石輪囷飽烟雨雪堂尚在人不來黄鵠而今定何許此賦可歌仍可絃此畫可與俱流傳沙埋折㦸洞庭岸訪古壮懐空黯然嵗寒三友玉色髙人之㓗虬髭烈士之剛可與此君鼎立偃然傲睨氷霜題徐叅議所蔵唐人浴兒圖右相嘗慚呼畫師技癢仍復拈毛錐逼真誰作此贗本亦有妙意生妍姿中庭燕坐必主婦緑雲髙髻香羅衣嫣然嬪妾左右侍前浴能言丹鳯雛娉婷及笄女公子素腕擁項相擕扶兩兩為朋四髫齔乳盧随逐相諧嬉掌中㸔珠二少艾捧顋却立鴉鬟奴屏間擁膝袖玉笋疑是夢闌顰翠眉側身背面按筝者氷肌綽約不自持床前跪起各姝麗為兒理髪抆涕洟有犬斕斑受摩撫與人習熟無猜疑梳粧淡薄服製古如見永徽貞觀時若非侯家及主第人物無此美且都荆釵布襦小家婦生子不如山下麑和潘判官送酒韻由來髙士憐麴蘖為有和氣如三春一朝驟見四従事使我頌徳思伯倫官醅亦自有妙理風味不如家釀醇掀髯抆拭玉荷葉消憂破悶還天真此公胸次有醖籍酒馨且旨如其人平生誤學獨醒客醉鄉有地堪蔵身和王宫教送酒韻不肯獨醒如屈平要扵酒國立詩城蒼頭滿挹鸕鷀杓中有春風習習生和王宫教韻六籍横陳日醉心忍貧不肯問錢神旁人但見門氷冷豈識胸中暖似春送簡簿攝南康令催科撫字意何如吏莫難於縣大夫㳺刅有餘須小試若逢盤錯少躊躇路入天南庾嶺根梅花落盡已春深中年氣體須調護莫受蠻烟瘴雨侵向來倦客寓中都解后嘗瞻五馬車未敢匆匆致雙鯉煩君先為問興居逰閤皂竈臼依然在翠㣲重重臺殿鎻雙扉可憐千載碧杉老不見兩翁黄鶴歸小倚脩篁飛玉子更升虚室奏金徽渺茫且置神仙事輸却清閒屬羽衣陳張甘三道士和篇繼至用元韻併謝之疑有幽人是少㣲支笻特地叩岩扉清風度竹邀人住暗水浮花送客歸鶴在青田違畢弋琴號白雪遶絃徽明朝回首雲山隔撲撲紅塵又滿衣題蒼玉軒羽客家何在翠㣲有仙躅誰謂絳闕逺功行要純熟小築開壺天燕坐媚幽獨室中閱丹經簷外養脩竹竹清不受塵人清不受俗意甚珍惜之命名以蒼玉此玉可種不可餐檀欒秀色青扵藍琅玕碧樹未足貴直節虚心同嵗寒風前歴歴戞球磬雪裏珊珊鳴珮環他年化作蒼龍去紫霄直上追鸞驂題李道士揖雲軒獨酌樽中緑醑自横膝上瑶琴笑揖白雲為伴愛渠舒卷無心題熊道士遐觀閣伐翳旋開清曠樓居便覺超然注目青山有盡㳺心碧落無邉題劉知宫愚圃三首蝸角横戈不解羊腸覆轍相尋争似蔵明納智淡然髙卧山林不羡蘇秦六印不貪范蠡千金身住神仙窟宅當無一㸃機心養性欲虚而一攝生欲静而閒須信道如墻壁絶嫌心有機闗題乗槎石溜涓涓遶屋流山居疑是小瀛洲星槎不渡銀潢去織女機邉客倦㳺和壁間謝艮齋留題寥寥鶴駕人安在洒洒驪珠迹已陳見說仙家能拔宅何妨乗此上天津酬白雲張道士惠詩不但學仙仍學詩年來古錦富珠璣却疑汗漫騎鯨李誤向天台訪子㣲題楊解元夀萱堂二首濟濟斑衣子怡怡白髮親紫萱偏得地玉樹解留春二冬夏勤温凊晨昏㓗膳羞堂中人不老庭下草忘憂除日出江上迓趙憲江風獵獵吹客衣水生鱗甲舟行遲今年江上春信早剰有梅花開北枝問之今日是何日三百六旬當嵗除翩翩鷗鷺定笑我欲得一飽甘奔馳二星移次照鶉尾繡衣持斧生光輝摐金伐鼓聲震動鷁首破浪開黄旗三宫萬夀帝出震周家磐石先諸姬外分符節用肺腑丞相與國同安危書生白頭不解事佐一小壘將何為少年側目望雲漢欲與鸞鳯俱翻飛草黄驥病絡頭老自笑意行身不随人生虎鼠在用舍未用以此相瑕疵兒曹婚嫁雖未了此心久與青山期天無老眼不可問哦詩莫作商聲悲張徳夫園亭八咏梅隠聞君家有十畝園竹踰萬箇花亦繁門楣大字扁梅隠要與梅兄同嵗寒問君小隠亦何好脚踏風波身易老花雖不語解笑人似隠又非何草草破雪暗香先得春青州従事如春温女奴洗玉歌一曲對花舉酒成三人飲酣拔劍氣方怒汴洛神臯難北顧手提萬騎屬櫜鞬未可為梅空隠去山堂四顧盡臯壤此山何可無翠嵐侵户牖瘦石出江湖靈運謾着屐宗文空畫圖釣鰲真有力移得一蓬壺玉椽萬箇龍孫長梢梢上半天清風長滿屋蒼玉總如椽秀色到今日深根凡幾年宜封管城子濡首落雲烟漁村聞道江村好人家罨畫中持杯聽欵乃支策望空濛日落收踈網潮生繋短蓬君嘗詢訪否恐有陸龜蒙兼逺若人胸次中自有萬人敵胡不籌前箸時清偃金革婆娑林壑間亦自適其適凭髙着胡床千里獻物色稻疇碁局方指數皆厯厯海山疑有無雲樹半明沒髙懐安在哉流目送鴻翼冷笑蟻蛭卑偪仄復偪仄淋漓呼酒徒揮洒延墨客不記訾家洲休賦雲夢澤何當従公㳺汗漫揮八極橘渚小揷藩籬護洲渚當年手自種嘉樹春風吹出玉瓏􅋛水面霏㣲噴香霧蕭踈木落候鴈翔漙漙白露朝為霜木奴欲獻主人夀一夜纍纍千顆黄紫蟹螯肥鱸膾好釀就洞庭春色老蒼頭急走喚客來翠勺金壺同醉倒山椒百尺雲根老斑斑長緑苔幽尋穿䆗窱逺眺歩崔嵬地脉元無此人心亦巧哉千年湖底石幻作小飛来可瑩小鑿蒼苔破瀦為玉鑑平最宜孤月浴亦有白雲行須髮盡堪燭肺肝元自清㣲風莫吹皺虚静即生明題謝艮齋畫笥四首團蒲曲几自支頥領略江山入座隅若使右丞知此畫定當閣筆輞川圖萬㸃青山一曲溪門闌疑是辟塵犀筆端更有詩中畫細細㝠搜為品題熟視天機日日新無邉物色盡横陳従教巧手工摹冩粉墨何能便逼真玉軸錦囊無此景何年天巧出丹青艮齋收得供詩眼勝看鸞臺十二屏雙溪類槀卷六
