body:
  text: 雙溪類槀卷七宋王炎撰古律詩送謝庭玉二首舊事十年久故人千里踈喜逢青眼語勝寄錦鱗書草草銜杯酒匆匆返笋輿桂山今健否煩為問興居二話舊情非淺遄歸意謂何杜門元簡出命駕特相過黃鵠仙翁逝青襟子姓多屬渠勤肄業歲月易磋跎送劉都幹本歎儒冠誤因思學六韜侵尋身尚困凌厲氣當豪生理舊良薄親年今已髙匣中雄劍在早去樹旗旄清江勸駕送舉人二首此以上臨江所作藏山有良玉潛淵有明珠寶氣露光彩見者詎肯遺賢士抱良貴又與珠玉殊方其未達時眇然一布韋時來取通顯乘軒而執圭鶴書出閶闔嗣聖清明初彈冠今彚征駸駸上天衢顯親與事君忠孝當無虧二黃堂暫虛位勸駕屬守丞金石方遏密不敢歌鹿鳴吉蠲置觴豆少洽賔主情西風吹桂枝馬首將東行春官奏髙第天子開延英親䇿降清問健論攄丹誠解褐躋膴仕何止為身榮二劉與三孔至今流芳馨願言踵前修勉矣垂令名次韻分寧胡宰贈行别駕無才堪展驥解印來歸私自喜意欲息肩猶未能政坐文窮巧為祟鳬仙傾蓋如舊知氷玉清言心可洗況逢父老誇長官撫字有恩淪骨髓俶裝暫去桃李隂遽勤飲餞枉車騎自憐孤冷仍數竒諸公薦口頗難啓溪上只今梅未花歸時春燕定成壘妙語吹噓恐過情甚慚緑綺奏山水君才過我蓋十倍乃容蹇足陪驪駬異鄉為客更别離寒日纁黃催短晷平生惜飲亦徑醉放歌不記南山鯉次韻巴陵羅簿送行二首旌陽峯下水成淵可約鳬鷗共一川種秫漸營浮蟻甕結茅重理蠧魚編敢期晤語方傾蓋遽有新詩當贈鞭仰望青雲多鼎貴無由換骨學飛仙削去浮夸意味真襟期殊不似今人慶傳於後珠成樹德潤其身玉有筠在昔㕍行嘗並進只今寉髮獨相親仕雖不達俱强健剝復何須問大鈞次韻分寧羅簿贈行二首剛腸厭徇俗老眼飽閲世讀書學經綸亦頗識一二妄意糟粕中啜嚌得馨㫖終然不可用落落多左計慨念古人逺莫救吾道弊修溪有短簿今代習鑿齒貽我瓊瑶章有美而無刺內視才具短不能尺有咫贈言雖甚寵借玉恐未是公等必飛揚我老惟退避二己丑太常第君家登兩翁黃鵠久仙去不亡有流風小阮最逸羣未幾魚化龍江城始解后岩邑仍過從謂豫偕二父聮名千佛中一見辭色莊再欵肺腑通議論到易象或借聽於聾我行踏京塵君棲簿書叢情親不厭久語别殊匆匆回首川陸隔天寒悲塞鴻郊祀慶成詩此以下中都所作燕翼傳丕緒龍飛襲慶基萬年新景命三歲始親祠修已崇仁儉承顔洽孝慈和平調玉燭靜謐偃鋒旗九廟歆禋享三宫集夀祺馨香端可薦降鍳本無私寶律迎長至觚壇蕆上儀貢金來牧伯執玉列丞疑祼鬯清宫後燔蕭太室時青城收宿靄黃道煥晴曦六驥鑾輿穩千牛彩仗移聲文搜舊典誓戒警前期陟配尊皇祖靈承合大示陶匏浮泛齊繭栗用騂犧皎繹圜鍾奏忱恂祝冊辭夜分風籟靜天近斗杓垂聖意彌寅畏臣心盡肅祇欽柴靈下墮拜胙福來綏樂與民同慶寧顓已受釐榮光浮翠輦歡抃擁彤墀日騎屯方罷雲韶樂共隨一聲傳入蹕萬目望華芝丹鳳端門聳金雞渙號施厖恩沾動植協氣暢華夷星拱班徐退天容喜可知乾符宜永握瑞諜遂停披嵩嶽聲洋溢鈎鈐色陸離永承長樂養恭奉未央巵鍚羡均家國儲祥衍本支函生蒙帝力擊壤共春熙送吳司令知金州曩時異姓新安王中興功烈書旗常邊兵不敢窺蜀塞至今恃此為金湯我生久恨在王後幸識王孫人物秀立朝日淺即西還自詭一州宜試守媯墟北望臨咸陽往事令人多感傷清時乘障姑緩帶試問澆瓜兼採桑湖上花光濃似酒紫微惜别同携手一杯為夀謝不能千里關山漫回首春秋鼎盛握虎符此行善保千金軀籌邊熟慮得全䇿歸來却獻平戎書和李提幹携詩相訪古來論人物西蜀名士多李侯有醖籍自愛如隨和不肯扣朱門漫刺獨我過筆端金石鳴音節如九歌小拂榻上塵揮麈傾懸河歲月易晼晚功名忌蹉跎西風向搖落如此羇旅何倦游且西還萬里行江沱士誠有所挾光彩終不磨翰墨更著鞭淵雲可同科用前韻答李提幹交游不厭廣益友未必多晚乃識斯人心肅而氣和薄言臭味同屢枉髙軒過手携緑綺琴絃以白雪歌别易㑹合難預愁隔關河老我無所營豈復憂蹉跎才髙位猶下君意將如何有玉不願獻誰能涕滂沱自可薦藻藉政須工琢磨何以贈君行聖門晞四科九日登寶叔塔同游者楊大著李校書馮正字曾著作易校書湖邊老石立巨鰲背負浮圖千尺髙升髙望逺天界濶海山江樹皆秋毫蓬萊藏室極清靜雖有暇日無遊遨不應令節亦虛度特為茰菊觴新醪樽前一笑豈易得身涉百憂今二毛茲游回首便陳迹事如逝水流滔滔明年九日定何許未用感慨增煩勞半生隨牒落州縣莫年結綬來神臯去留聚散偶然耳且覆一杯持蟹螯用元韻答楊大著李校書蓬萊雲氣依海鰲中有詩仙流品髙子雲抄書自㸃勘方瞳炯炯分纎毫仲元公退便燕坐日涉藝圃當遊遨烏衣裔孫不解此但摘青蘂斟官醪壯年落筆無好語況復衰颯垂霜毛二豪拔足立塵表下視流俗徒滔滔詞鋒健鬬取一快往復險韻不憚勞旁觀微之敵白傅自分司馬優枚臯倡而不和當受罰丐公酌酒羞二螯送王巽澤侍郎今代王文度聲名滿日邊中年登近侍早歲悟深禪要路頻回首名藩小息肩卷舒無不可胸次本超然二屈指桃溪上差池二十年知心寧易得識面豈無緣離别何須恨平安可數傳異時如索我小隱翠微邊張尚書挽詩魏國扶天力荆州貫日忠堂堂惟此老凛凛尚英風地寄陪京重名加祕殿隆望徒髙四海身不到三公二細數青雲士如公有幾人登龍心不遂烹鯉字猶新後進思髙誼中朝念信臣百年喬木折有識共酸辛李少保挽詩潔已惟清德攖鱗有格言位雖居鼎鼐心已在丘園身退名增重年髙道愈尊哀榮無可憾餘慶子孫蕃二昭代多諸老惟公有典刑上方思舊弼天亦畀修齡竟委元成笏俄傳有道銘只期麟閣上遺像拜丹青太皇太后挽詩弧矢能天授詩書德日新中興扶漢祚內禪贊堯仁鏤玉三朝慶塗椒四世親乘雲今不返垂白泣遺民二離日升黃道簾中出玉音位髙踰薄竇德盛掩姜任七紀哀榮備三宫愛慕深補天生萬物何以答仁心從范祕監過城南陳亦顔讀書樓客來揮麈對觥船客去焚香閲簡編車馬軟紅塵裏走不知委巷有壺天軒冕浮夸不繫情山林清奧可逃名如何結屋依廬阜又却移家近玉京次韻楊祕監館中即事簾箔風清乳燕飛緑隂繞殿覆銅池九衢達宦爭馳轂羣玉詩翁獨下帷鳳餅正當分賜後牙籖又近曝書時管城寫出琳琅句付與神靈為護持次韻午睡不知雨作曲肱幽夢午風凉銷盡熏爐一穗香急雨蕭蕭猶未覺浮塵熠熠更相忘自非靜處心神定誰識閒中氣味長隱几豈容無一事願將竒字問偏旁次韻楊祕監館中留題把杯方喜挹流霞照眼驪珠重拜嘉庭下滿生書帶草胸中宜吐筆頭花敢言䇿足攀賢躅獨幸游心泳聖涯誰謂蓬萊雲氣逺此中清閟即仙家又題紅塵飛不到壺天風月幽懷屬老仙自笑枯腸無好語且呼黃妳曲肱眠九日陪楊祕監游真珠園屬炎賦詩珍重蓬萊老携壺領客來湖山羅畫笥風物獻詩材素髮難重染黃花有再開莫憂身外事且覆掌中杯送黃尚書帥蜀六蜚駐蹕臨東吳益州逺在西南隅君王右顧入念慮選用名德分麟符文章政事俱第一袖手未肯持鈞樞清獻之清過於水忠定之信孚豚魚二賢寂寂未有繼蜀人惟恐公來遲泝江萬里飛鷁首祝公善保千金軀髮須未見一絲白歸來便可居丞疑清時緩帶鎮方面問民疾苦勤褰帷頗聞今蜀與昔異昔日民肥今已臞願言細意護根本要令可與同安危更須推轂拔人物勿念折箠笞羌夷想見明年初下車錦官城裏花正都四郊按堵但耕鑿春風蕩漾隨旄麾遨頭一笑父老賀九重不用憂坤維題徐商叟參議儒榮閣神臯北望幾傷情海上何人議北盟青簡成編裨史事紫泥封璽奬儒榮書藏金匱人爭問身到蓬山志亦亨佩印纍纍真漫耳婆娑林下有香名銛老許相過不至炎約堯章訪之又以事奪銛寄二詩次其韻聞道幽棲好天香坐上飄熟知甘淡泊甚欲識孤髙縱有門關隔元非道路遙恐公真簡出不過虎溪橋二南山藏霧豹幾欲訪幽深詩到如相挽盟寒尚可尋惠初從柳子支遁㑹山隂此事今寥落期公慰我心游劉寺次林子長郎中韻琳琅觸目聚潛郎假日相携入酒鄉小憑笋輿穿野徑却尋蕭寺涉修廊意行塵外襟懷爽身坐梅邊笑語香頭白倦游休嘆息喜迎一線日華長炎十世先隴在婺源不歸拜掃者九年清明有感遂成小詩九陌黃塵裏不知桃李開匆匆春又過逐逐老相催浮脆身如露紛華念已灰松楸無恙否久客盍歸來同李魯二郎中游三茅觀羽衣邀我坐團蒲一穗香雲繞竹爐九陌紅塵飛不到疑從木未入懸壺愁邊無處寄幽懷擬傍梅花把一杯玉靨含香渾未吐嘗携歡伯為重來路入疏梅密竹間俯看水墨畫湖山玉妃妬我清游好剪水飛花作苦寒用元韻答李郎中未問仙家九節蒲且持茗碗對熏爐黃冠也肯迎留客咀嚼梅花費一壺氷玉談清洗老懷興濃亦覆手中杯平生蠟屐登山慣豈必因花特地來地近觚稜雲氣間蘂珠宫殿壓青山雲根盡處天風急疑是人間有廣寒用元韻答銛老人間得喪等樗蒲何似翻經擁地爐尚學湯休頻覔句儻逢元亮一傾壺舐犢酸辛入客懷何堪婪尾更傳杯却思拈拂談名理肯憚携笻數往來墮在黃塵九陌間羡君小隱住南山梅花香裏尋支徑屢有盟言不可寒臘中得雪快晴成古風呈堯章銛老蒼頭熟睡喚不應光射紙窗疑月明更籌可數夜方半杙上一雞先誤鳴曉起飛花堆户外幻出人間無色界九街車馬不知寒蹴踏銀杯翻縞帶杲杲日升東海東須㬰光彩蒸霞紅不憂桂玉頓增價人在冲融和氣中貝闕珠宫五雲際遙知天上龍顔喜麥畦白白覆青青農事來年定豐美用元韻答李郎中何人喚得滕六應遣我通宵銀海明起來無以助清興銅瓶煮茗松風鳴恍疑拔腳塵寰外玉田萬頃無疆界蒼官青士亦改容髙下瑶林相映帶騎鯨人在日華東曉踏天街無軟紅雪車氷柱堪著語何止爭雄郊島中翩翩寉氅凌風際得句搖毫心自喜從渠春笋捧金荷醉倒氍毺貪睡美游水樂洞戊午路向峯腰轉泉從洞口來決渠飛瀑布伐石作崔嵬勝境難頻到幽懷只暫開登臨興不盡日昃故須回出城郊原雨過草萋萋桑柘隂濃麥穗低春色難留人易老落花風裏杜䳌啼即事四首游宦初心改殷憂素髮稀稍閒甘晝寢已暖怯春衣遮眼惟黃卷關心在翠微去留俱有恨不見二雛飛二髮秃憐毛穎才供米帛謀才疏無可用身老更何求燕語催春事花飛惱客愁行藏猶首鼠歸夢繞滄洲三半日肩輿走歸來已薾然倦談懸麈尾清坐炷龍涎有纍緣糊口何時可息肩靈襟要淘洗盥手閲韋編四京國三年夢家山二子喪淚乾昏老眼痛極斷中腸數盡誰無死情鍾自不忘餘生寧有幾回首意茫茫汪祕校携詩併雪月二賦相訪次其韻自從就食寄他州不到鄉關近十秋文采誰能如象齒交游今乃見龍頭携詩過我情何厚落筆驚人語不休雪月賦成凌二謝髙懷肯述畔牢愁送朱大卿歸龍舒觚稜挂曉日浮鷁違都城今代朱伯厚勇去投簮纓津津眉睫間不見離别情問之何能爾內重外物輕聲利誘一世漏盡猶夜行豈不厭逐逐無由息營營若人著眼髙不受世網攖奮身許國久艱險亦飽更乘傳上蠶叢擁旄到龍廷中朝豹尾班詎可缺老成一旦念丘園拂衣即遐征君相雖貪賢欲留終不能班以內閣奧秩之間館清皖山插天翠淮水到海平婆娑山水間可築半隱亭雞豚入新社鷗鷺尋舊盟收身謝危機至此全修名嗟我為糊口偃蹇侵頽齡仰羡冥鴻髙俯慙曉猿驚青山不負約行矣謀歸耕題徐商叟所藏李伯時四天王圖龍眠有巧手幻出汗血駒老衲或戒之回向心地初遂畫白衣仙蘄與梵釋俱北方四天王亦附瞿曇居雜以馬龍像宿習終未除四王名字異且復形狀殊信者謂其有疑者意其無蕩蕩天門髙誰能凌空虛何以信不疑取諸貝葉書子不語怪神從釋恐畔儒語之且不可筆之其可乎因畫議及此於公意何如次韻胡連翁携詩見訪蘄春别駕寡交游獨肯對君青兩眸我亦杜門嫌俗子今方下榻得詩流環溪陳迹幾如掃鄂渚遺文散不收訪舊九京無起日臨風三嘆不能休太上皇后挽詩紫殿尊嚴地黃圖揖遜辰一言裨大䇿萬物賴深仁配極乾坤大重輪日月新遽違天下養氛祲掩鈎陳二大帝資隂德吾皇仰母慈盛儀猶浣服新樂在含飴玉冊將增慶椒庭遽共悲憂勤終損夀天道果難知太上皇帝挽詩揖遜承虞治謳歌與啓賢御圖才五載垂統可千年明有重離繼髙居太極先四朝三內禪盛美古無傳二億兆方同慶三宫洽孝慈坤輿俄㢮衛天極遂纏悲共憾遺丹鼎無由奉玉巵光輝終不熄徽號日星垂題姜堯章舊游詩卷出郭栽花涉小園歸調琴譜輯詩編少年豪健今揫斂休羡騎鯨李謫仙和九日堯章送菊對花懶舉玉東西孤負金錢滿緑枝短髮不堪重落帽枯腸何可强搜詩花品若將人品較此花風味似吾儒秋英餐罷含清思曾有離騷續筆無送陳華文出守當塗同僚餞别分韻得立字今代陳仲弓人門兩難及長離五色羽覽輝早翔集功名雖鼎來未肯心汲汲自請牧一州小民要安輯維時春將半桃李露華濕慈顔御輕軒綵服隨坐立行行即下車嘯諾解苛急凝香宴賔從仁氣散臯隰政恐席未暖追鋒已催入塗轍可通行青雲如陟級即事時寓清化久輟囊中句時看肘後方有家如旅舍無事似僧房梅白墻頭笑榴紅甕面香杖藜如可出溪上探春光庚申元日九陌歡聲合三宫瑞氣開隂雲催歲換霽日迓春回鬱壘還當户屠蘇强舉杯二雛無返日羸老不勝哀和楊郎中北廊梅花不臨水曲與山隈却在天臺獨自開幽韻可居蘭友上孤標惟許竹君陪廣寒仙子雲中下姑射神人海上來氷玉皎然清徹骨南廊亦欲斸根栽和陳右司春雪換却人間色界塵千林别作一家春風姨寒重吹飛絮月姊光凝映爛銀曵履獨游無此士閉門髙臥有何人試從羣玉山頭看似與瑶臺貝闕鄰送楊明夫郎中持節閩中稍覺飛騰疾方知選擇公雲霄移列宿泉嶺度春風問俗窮閻底搜材薦墨中褰帷先辨此續續寄詩筒壬戌立春日寓清化晼晚流年度凄涼短景催月圓疑臘半歲閏已春回一箸青絲菜三杯白玉醅主人無喜事蠟炬誤花開賀吳興郡王生日壬戌花蕚樓臺畔年年瑞氣新慈闈歡愛洽帝殿寵光頻清靜心如水和平氣似春自然眉夀永何必羡松椿登四望亭饒州甲子春老飛花盡園林遍緑隂憑髙聊寓目念逺更傷心劇郡才難稱衰年病易侵不如休歇去吾意決投簮閒居即事自饒州回武口稍稍開三徑徐徐辦一廛歸來非失計老去只隨緣旋蠟登山屐時操泛月船生涯且如此蕭散樂餘年二壯年多旅寓晚歲遽鰥居傷往遂成賦解嘲休著書經營惟種蒔來往但樵漁百念今灰冷雖貧自晏如三四面青山合中藏小隱家謀栽陶令秫學種邵侯瓜笋長多添竹荷髙漸有花林泉宜寂靜鼓吹厭鳴蛙喜晴欲了老妻窀穸事屈指前期日無幾羊腸路險不容車水澀石髙灘齒齒天公憫我憂惱深一雨驟添三尺水黃流又恐舟難行落盡雪花天宇清六龍扶轂日杲杲更乞天公旬日晴襄事歸來閉門坐但擁竹爐多熾火用元韻答秀叔休將世事關身事自數頽齡尚餘幾那堪老賦悼亡詩不見蛾眉瓠犀齒熏染可無知見香澡雪正須功德水風波跌足今憚行林下獨居心迹清冷看世態有翻覆蚌則欲雨鷸欲晴何似消搖常燕坐雪白蓮花生烈火用元韻答秀叔二首人生昏宦只二事憂喜相纒不知幾我今豈可老更癡頰有霜髭口無齒舉案齊眉安在哉獨自飯蔬而飲水半生同住不同行稍感傷悲心亦清雉鳴雌應春日暖鳩喚婦歸天雨晴斷除此念如尸坐調護坎離交水火老身强健幸無事舊日交遊存者幾後來阿秀詩句新露滴金莖寒著齒笑我胸中千斛塵解纓未濯滄浪水翠微嘗約載酒行洗耳潺湲泉石清天寒短策未可出更約東郊春日晴且來伴我窗間坐黃妳在旁同附火秀叔和章自言及再娶之事用元韻戲答之寤寐閒思疇昔事來往于懷日凡幾伯鸞不可無孟光豈為青眉并玉齒阿咸今與我不同蛩蛩得草魚得水流蘇帳暖雙杯行春近梅粧香更清試唱劉郎竹枝曲道是無晴還有晴長夜老夫方獨坐手把楞伽對燈火池邊梅花一株盛開天外青鸞不復歸蕭蕭短髮日成絲寒梅不管人憔悴故著新花滿舊枝老來裘褐怯風吹難傍花邊把一巵嚼蘂嗅香清興在尚呵凍筆欲題詩戲江子大莫年尚戀蛾眉斧平日空談蠟腳禪應笑老夫甘寂寞只將黃妳替嬋姢用元韻答子大桃花映面方留咏藤刺纏身始悟禪短髮鏡中霜薄薄修眉窗下月姢姢追悼親哥昔在清華日明珠掌上新豈期吾薄福不見汝成人荒塜魂長夜空山草自春淒涼無限恨獨坐一沾巾送石宰溪頭雪後梅花發飛鳬東去朝雙闕涉溪父老肩相摩再拜路旁皆惜别問侯何以能得民胸中仁氣如陽春攀轅徒切侯不住金馬石渠須若人雲溪野叟久閉户時枉髙軒肯相顧何不臨分把一杯天寒懶出無他故别離羞作兒女悲此行穩上青雲衢相思要得知健否寄我平安雙鯉魚念舊香銷篋裏舊裳衣回首人間萬事非天濶海寬魂杳杳雲軿何日復來歸老懷易感淚汍瀾塵世分明一夢間精爽乘鸞雲外去空留玉骨葬青山久雨無聊成兩詩呈秀叔并簡繼韓花落雨不止鶯啼春又徂曲肱眠短榻擁雪坐團蒲梅子今堪摘松醪不待酤兩君能坐隱泥濘肯來無二避濕屋多漏怯寒窗不開龍涎時吐霧麈尾任生埃獨與韋編對誰能蠟屐來天知蠶麥病願喚雨師回雙溪類槀卷七
