body:
  text: 雙溪類稾卷二十二宋王炎撰書上執政錢㕘政衞㕘政炎嘗謂人主不任大臣而朝有弊事則其失在於人主人主任大臣而朝有弊事則其責在於大臣恭惟我主上臨御十有四年無聲色之奉無遊畋之樂無賜予之費無玩好之娛其孝友其仁厚其儉約其恭謹其清凈盛徳純一天下之人知之天地神祗知之而又開心見誠委任大臣不忌不疑若大臣輔之以道日新其徳則可以為成康可以為文景可以為仁祖無難事也而前日持國任事之臣專輒自用擅作威福内則昵比羣小交通貨賂以凟亂朝綱外則引用憸人輕動干戈以塗毒生靈而又鉗天下之口以蔽塞九重之聰明老繆者庸陋者纎佞者伴食政府唯唯而從之以養天下之大患天奪之鑒自速罪戾某官以賢佐聖不崇朝而去天下腹心之疾此皆宗社之福斯民之幸也今左右丞相虚席而某官參秉國鈞實行丞相之事則主上之所委任天下之所屬望者在乎反前日之所以失求今日之所以得而已矣不反其失不求其得不能救也而某官於更化之初曾未浹日建立儲闈一正天下之本所以安國家重宗社者無大於此此固天下之所同喜大體得矣苐某官未可髙枕無事也夫天下之患不生於人所憂而生於人所不憂人所共憂識者不憂人所不憂識者憂之其所憂者何事哉紀綱之紊正之而已名器之濫謹之而已邪正混殽辨之而已忠言不聞來之而已廉恥道喪革之而已守令貪殘侵漁吾民䋲之以法而已將帥非才士氣不振易置其人而已敵國侵凌邊鄙未靜急於自治而已此人情之所共憂識者之所不憂也識者所憂有二三事焉非炎所當言也請姑舉其端夫城狐不熏社鼠不灌雖以漢宣帝之察唐元宗之斷而左右近習或得以竊弄威柄此其一也周公制禮竒服怪民不得入宫况女冠輩執左道假鬼神以惑衆者乎此其二也某官欲消此二憂在乎秉公心行正道而已矣何者邪勝則害正而正勝亦足以破邪也漢人賈誼論輔道太子在於左右前後皆用正人使之所聞必正言所見必正行則太子無有不善矣若正人少不正人多所謂一薛居州獨如王何此知治本者所慮也昔至道元年既建東宫以左丞李至吏侍李沆兼賔客左右諫議楊㣲之畢士安兼庶子郎官以下兼諭徳中舎皆極一時人物之選而師傅之官不置也及天禧中皇太子師傅宰臣為之賔客執政為之詹事以下從臣為之因議事於資善堂小事則議定而行大事則禀命盖與至道異矣舊章具在今日可舉而行之否乎酌今日之所宜按舊章之已然理正而事順可以行之不疑東宫寮属無非正人某官秉公心行正道以率之皇太子入則侍膳問安出則從容謀議而以天下之事裁决於上則天下之權一矣夫權一則治散則殆不可忽也是故行天下之正道維持此權而使得其平者宰執之責也持天下之正論審諦此權而不容其偏者給舎臺諫之責也宰執行其道給舎舉其職臺諫行其言主柄一於上國論定於朝衆庶之志定於下然後天下之私邪不得入於其間此如元氣既壯脉絡周流雖有外邪不能為病是醫國之和扁也某官用智精宻而慮事深逺顧何待炎之瞽言又况位卑言高聖人不許交淺言深君子所戒然朝廷方下明詔開不諱之門炎雖踈逺今將去國而西歸拳拳之心不能自已是以告違於庭下卒一言之干冐威尊下情震恐上趙大資炎嘗謂國家不可一日有者權臣也不可一日無者重臣也前日權臣擅命自干天討今既殞滅可勿論矣某官宗室之老勲在盟府聲塞天淵十年去國天下恨其不用一日造朝中外喜其復來其負天下之望如此則今日之重臣舎閤下其誰哉夫天下之重臣天下之責所歸也人臣之道有二而已憂國之心也經國之才也有是心有是才者為上有是心無是才者次之無是心無是才者鄙夫爾閤下憂國之心九牧之人知其忠精經國之才次定大䇿見於己試袖手功名之外如此其久而喜愠之幾㣲未嘗見於顔面今日背丘園趍城闕幡然而來為社稷計不為爵禄計為君父謀不為一身謀豈特閤下自信其然無論賢與不肖識與不識皆知之皆信之主上收還威柄擅權者誅朋姦者逐國人皆曰朝廷清明公道復行可以髙枕無憂未審閤下以為如何若以為必可無憂炎不敢復有言矣若以為不能無憂炎請試言之夫權者人君之所獨執固非大臣之所可擅尤非人所可竊而弄之也霍氏之滅漢宣嘗收此權執之矣其竊而弄之者漢宣不能盡察大臣㣲附貴要是也太平之誅唐明皇嘗收此權執之矣其竊而弄之者明皇不能盡禁朝士交通近習是也宣帝之後有元帝明皇之後有肅宗其弊如何哉愚故曰天下之所不憂者明哲之所甚憂也然則閤下為社稷計為君父謀孰大於此事貴於見幾患貴於防㣲士大夫忠義之氣衰以言為諱闥前數尺之地端秉山立為主上正言此事感悟宸心者閤下當任其責㣲閤下將誰使言之雖然言之難言而聴之尤難聴而行之又難盖此事不可不正亦不可驟正不正則弛弛則不收驟正則激激則生變未審閣下何以處此竊計閣下負當世之重望有經國之逺猷慮之必熟謀之必精矣炎向者懷婺矛牙不恤緯之心嘗作一書以告執政然廟堂倥偬恐未必深察其言謹以録本納於侍史不知可輟片刻之閒而閲之乎炎之所言有舊章可攷理正而事順其説可行閤下勿以人而廢言可也平生景仰下風久矣貴賤殊隔進退差池前日方一千典謁望君子之容温然而不怒是以私心所懷輒一言之炎老矣功名之念息山林之興多起廢試郡為貧所驅不免一出更朞年挂冠神武而歸矣其有言於下執事亦非為進取計也夫子曰言未及之而言謂之躁未見顔色而言謂之瞽炎之所言近於躁疑於瞽閤下以此罪之炎将肉袒負荆於舎人之門若憐其有憂國之心尚可從牛馬走之後塵也與之絶之惟命是俟幸鈞慈察之上宰執論造甲炎竊見湖州先准省劄日造鐵甲一副續准省劄日造鐵甲二副且以二年為期買物料雇工匠並令本州於係省錢内支用嵗終具夾帳備申方行支撥用過錢貫且係省錢州郡所入者少所支者多户部所謂且於係省錢内支用者是不欲直言不行給降姑婉為之辭爾炎近不免再有申陳㑹計本州造甲已支過一萬三千餘貫乞於月樁錢内支撥恐户部以為難又乞給降度牒付本州變賣支用盖縁本州困乏挨那不行不免控告至於哀鳴若蒙鈞慈早賜允許行下豈特可寛官吏之責實亦可寛民力也炎又思之打造鐵甲難於興工不已者其害有三境内匠人逓互用工追逮且遍日支錢米可以養其一身不可以養其一家使之抛弃妻孥供官役使已非小民之便又况終日鍜鍊不得休息日以二副為限比之私家用工極為勞苦則興工不已其害一也士農工商雖各有業然鍜鐡工匠未必不耕種水田縱使不耕種水田春月必務蠶桑必種園圃今已仲春拘而用之使之蠶桑失時種蒔失節終嵗必有困窮凍餓之患則興工不已其害二也季秋以後仲春以前天氣既寒爐冶鍜治可以用工仲春以後天氣向暖仲秋以前天氣大熱當是之時聚一二百人而用之自早至暮親爐韛鍜金鐵不得片刻休息尤非所宜夫強人而用之不恤其勞必窮其力似非朝廷仁厚愛民之意則興工不已其害三也夫人情有害則怨有利則喜未審可以輟其工役而稍利之乎或曰邉防有警鍜甲治兵事不獲已豈容遽輟炎竊以為不然古之論用兵者言城郭不堅不可以固守者有之言糧食不足不可以持久者有之言犒賞不豐無以使人者有之言士卒不練不足以戰者有之言將帥不才不足以御衆禦敵者有之未聞有以甲胄不足為患也去年邉境交兵盖以不練之卒付之愚將士卒逃潰弃甲委兵故䘮失者多且軍器所造甲不知其㡬年矣日造十副以一嵗計之則造甲三千五百餘副以十嵗計之則造甲三萬五千餘副而用兵未及一年則所存者少所䘮者多乃遽責之州縣大郡日造二副小郡日造一副若向後用兵士不精練與前日同将無智勇與前日同雖諸郡造甲山積恐一二交鋒之後又有不足之患矣當是之時雖欲強州郡以造甲恐州郡無以應命朝廷雖欲支撥緡錢使之充用亦恐版曺無以那融也况民力不可使窮乎故炎以為選將帥練士卒備要害積芻粮以為扞禦之計此雖書生之常談實天下之至論也廟堂若肯賜鈞念㑹計諸軍士卒若干甲胄若干内而軍噐所外而諸州所造到甲胄若干若大數稍給於用則工役可罷無疑矣昔者仁宗皇帝之世天下全盛民力殷富然北有耶律之患西有拓跋之憂用兵累年范蜀公為諫官其言曰欲備西夏莫若寛闗中之民欲備契丹莫若寛兩河之民今民已窮而三司取財不已財已竭而樞密益兵不已議者以其言為切中當時之病今日之民力盡矣襄漢兩淮生靈肝腦塗地村落丘墟此固仁者之所動心若夫自江以南州郡或困於運糧或困於防守或困於招軍或困於和糴或困於造船或困於打甲其禍起於權臣擅命自作不靖以干天誅然其害流於天下至今未息朝廷更化慨然欲與天下盡去宿弊改絃易轍誠不可因循亦不可苟且則炎之所言不為過也權臣誅殛之初朝廷首下詔以求直言所以防壅塞通下情則炎之所言不為僭也干冐鈞嚴下情悚懼荅吳學諭衰遲之迹備員于此戀禄而來今欲去而未能形神衰悴蒙教以修煉要㫖及禱雨之法仰荷愛予然炎細思二事其一則炎所不能其一則炎所不暇吕文穆公禱雨携雨具而徃冐雨而歸此古今異事文穆公之賢能行之炎論脩身則無徳可稱論治民則無政可紀𦕈然一庸人爾為旱不敢不禱于鬼神其應否敢自必乎前日禱而得雨者再三此偶然爾神眀相此邦之人不使有赤地之患炎何力之有焉故曰此一事炎之所不能也凢人至老誰不貪生畏死然以黄帝堯舜之聖而死烏獲孟賁之勇而死齊威晉文之強而死樗里張良之智而死但修短不同爾執事所惠要㫖炎亦豈不願得此少延嵗月然郡事之殷加以旱蝗日夕憂慮若欲修煉則郡事不無廢弛故曰此一事炎之所不暇也承示秘宻之文今且歸納文府候旱得雨蝗出境西郊有收吏事稍閒執事雖不見賜炎當齋祓請教千萬痛察炎平生不善養攝但區區愚見薄滋味簡嗜慾時起居省思慮免致形勞神憊精竭少疾病之苦今冐當劇郡起居不能時思慮不能省無以養其生矣他日叩教尚祈開發與杜仲髙前日從者回轅偶病中不得叩教繼蒙攽示杜詩發㣲兩日小愈方得披玩執事之於杜詩如杜征南之於左傳顔秘監之於班書用工既深敬信亦篤炎於諸家詩文渉獵而已不能如是精緻即執事所評炎豈復更可議論但序文中稱本朝至蘇子瞻與其徒陳無已黄魯直始尊尚杜詩而宗其㫖炎竊謂此一節當有分别黄比蘇雖為後進然專以詩自名書至顔平原文至韓昌黎詩至杜工部二公皆以為得其大全東坡雖尊杜詩然始學李太白晚學劉夢得與杜詩氣脉不同山谷外舅謝師厚孫莘老二人皆學杜詩魯直詩法得之謝孫故専以杜詩為宗然詩法出於工部而句法不盡出於工部山谷所以名世者以此後山論詩其説曰王介甫以工蘇子瞻以新黄魯直以竒惟杜工部工拙新陳竒常無一不佳其尊杜詩至矣然後山自謂其文得之曾南豐其詩得之黄豫章則山谷乃後山之師也後山貧困至骨不肯有所附離東坡欲其見已後山難之盖不欲以師弟子之禮謁之也東坡知其說後山始登其門故後山論詩則為豫章之徒論文則為南豐之徒詩文既成而後見蘇公則為東坡之客今置陳無已於魯直之上而以為子瞻之徒恐未甚安區區所見如此不覺盡言聊謝先施之萬一俟面見方得請教荅凌解元炎汨汨簿書不得欵教承惠長篇不勝慚怍一雪乃蒙朝廷指揮不敢不祈幸而得雪又不敢以為喜而以為憂則古詩所謂長安有貧者為瑞不宜多故也放房金之利及於一市不及於四境雖三尺之童皆知之賑救之法當先於田野之農民不當先於市井之游手炎起家寒冷農家疾苦知之素熟不待執事之言也富家之大斗鄉司之作弊所至有之不獨湖州如此為政者但能去其太甚爾若曰剗除其弊無一毫不盡雖龔黄不能而况炎之不才乎田野之民食糟糠此誠可憫炎前年在山中自十月至去年二月山居之民盡掘蕨根而食之向在臨湘為縣亦遇水災濵江之民盡掘大蓼根而食之為州縣者雖知其弊如之何其救之哉又况湖州户口繁多郡倉常平米斛只有二三千石又如徳清縣近日窮民來求賑濟者數百人縣倉常平義倉僅有一百六十石以之賑濟則不能徧以之賑糶又不能給未知執事何以教我本州之策不過勸豪右賑糶禁牙儈般販出境用錢數千緡糴米斛散去安吉徳清歸安之村舍或者可救一時之急本州有和糴三萬九千石朝廷指揮起赴鎮江總所炎已再申都省乞存留上件米斛以備來春賑糶若得此米則二麥未熟早禾未收以前尚或發廩可以濟新陳之不接未蒙朝廷行下萬一朝廷未從所請又未知執事何以教我天下之事言之易行之難古人所謂旁觀者常髙一着當局者迷執事袖手旁觀必有以處此願聞之况凶年乃民間之不幸荒政自是難事履之而後知爾嘗聞楊大年内翰有詩云鮑老當筵笑郭郎笑他舞袖太郎當若教鮑老當筵舞轉覺郎當舞袖長執事見炎之舞袖長矣若其當筵而舞不知郎當胸中恐有成説幸詳以見教毋吝劄子論請嶽麓書院堂長契勘炎承台㫖發下士人周愚陳劄乞充書院堂長炎前此聞其人頗能為詩至於學問之淺深行義之優劣炎實未能知之不敢輕於所議但怪其人薄有生理久處山林不宜一旦自薦求為職事既而面承誨諭謂其人文采可觀但陳劄有請未甚穏當令炎更退而商度可否夫差一職事在使府徑自行下豈有不可又使炎退而議焉不惟見其重於許與盖虚中待下之徳今之君子所未有也竊謂書院得名由山長周式以行義聞於真廟之朝今日湘中九郡惟一書院書院惟一堂長先生以命世儒宗主盟吾道士之一經品題者聲價便重視他人所謂差充職事事體似不同也士之制行固非一端而去就進退之間亦可以觀其大畧如周愚果堪充上件職事酌之鄉論出自使府招之使來人誰間言如或不然前書院堂長物故其肉未寒遽然有請諸生頗以為疑今若使居其職聞者只謂其求而得之未能厭服士心也顧惟不肖獲出於先生之門不敢稍有隠情乞照炎前狀所申叅酌施行與潘徽猷炎嘗謂貴賤之際位貌有間則其情意隔絶不通此今世士大夫之公患也炎近者一再侍坐仰見先生存心清明洞逹不樂人之狥已而喜聞人之盡言今之君子不能及也然炎獲附於門墻之日猶淺是以有所懐而未敢吐露先生受新命徃鎮海邦炎也一官拘係於此遥睇茵慿繇是有雲山修阻之間矣有所懷而一言之兹其時也雖然愚者言之智者聼焉顧何所益苐曰猶愈於不言云爾炎之所欲言者其一曰治世者以人材為急而薦舉取材之門也今之在上位其為關陞改官舉主嵗有定數剡削之際不狥於私昵不奪於權要有如先生者炎未之多見也况望其於尺度䋲墨之外振淹滯㧞寒畯乎夫十歩之内必有茂草豈有一路之逺連城十數而無一士可薦者近者留帥尚書之在蜀趙帥侍郎之在閩盖嘗薦數士矣謂閩蜀有才而他路皆無有可乎士之名過其實行負其言自媒以進者誠不足舉其有所挾者沈靜自守窮則獨善其身而逹則有益於國是不可不舉也先生用心之公耳目聞見之長苟有才者不患不知今日州縣間善類消汨而不振擇其尤者振而起之使之靡然風動而作其功名之心則将羙才軰出所補於公家不細矣其二曰外任之重者大有㑹府次有職司皆得以按其属部之吏所以禁貪濁懲不職也昔漢部刺史以六條察州五條以察二千石而一條以察大姓強宗墨綬以下不與焉非固嚴於其大而畧於其小也以為大吏有所畏忌則其小者不治而自肅也今外之臺府與内之臺諫均則有所奏劾炎竊謂臺諫不論貴近而論庶僚臺府不按郡守而按小吏則人情不服而法不行炎昔在荆州聞南軒先生之言曰帥桂四年但按四郡守㣲如簿尉縱有姦贓為害也小不若先治其大者此至論也若郡守歛飭則郡自郡丞縣自縣宰以下誰敢復肆為不善哉其三曰天下之事公則平私則偏獄訟之曲直多失其實者起於典獄之吏之私也然彼豈能遽行其私哉上之人喜自用其聪眀而先示其下以予奪可否之意下之人設為游辭鈎以上之㣲意以上下其手而隂濟其私上所欲寛則出之所欲重則入之躁者假是以求知貪者假是以求利而幽枉之情無告矣事既付之有司此不以問彼不以告使之無所觀望平其心而推究焉案牘既備情法既正然後從而察之平其心而予奪焉則庶㡬乎曲直之各得其情也夫人之情不為利誘不為害怵惟卓然有守者能之中庸之人鮮不有所移奪是故示人以予奪可否之意者最决獄之大弊也其四曰凢事無全利立法者惟其害少而利多則可以行之久逺矣二廣塩法或官鬻或商販其法屢變而不定近日許商販而禁官鬻其意非不善其名非不羙然利歸於商賈不惟民食貴塩而州縣經費無所從出葢聞諸道路之言謂廣西州縣之吏有累月不得俸給者夫千里宦游深入瘴雨蠻煙之間而其妻孥乃有號寒啼飢之患若是而責以廉勤其可哉朝廷近日下都省集議盖亦知其法之未便矣廣東煮海而廣西販鬻其事勢固相闗也苟有便於民有益於公家從而議其因革之宜毋徒曰此提轉之職也則惠之所及者逺矣其五曰才有短長職有劇易對移之法使之雨易其職而各盡其才此羙意也今則反是為牧守監司者怒一令則對移以一丞怒一丞則對移以一簿尉怒一簿尉則對移以一監當官所使之對移者間有不曾識其面目况能悉其材之短長乎所謂因材任職者姑以行牧守監司喜怒之私而已矣辨其職之劇易察其材之短長而不參以已之喜怒之私焉則法行而意存人各盡其材材各稱其事不患其有不舉之職也夫炎之所言者書生之常談無高論也然使平平之説得以逹於司聽先生受而不拒焉士之聞風而起願自效於門下者必衆矣九九之術齊侯設庭燎之禮以待之者用此意也干冐威嚴不勝戰慄雙溪類稾卷二十二
