body:
  text: 雙溪類槀卷二宋王炎撰古律詩夏日雨過雲潤日杲杲渠澀泉泠泠羣山曉過雨一沐千髻青岸巾納㣲凉庭户留餘清喬木俯佳色野卉含幽馨昔来挽枯條今来見欣榮榮枯亦何有對此難為情長年心事多撫髀只自驚冰炭交中腸吾生安得寜好風吹我裳頗覺耳目醒暇日可少憇安用心營營髙卧緑隂底𤣥蟬相對鳴村行二篇未第時在大坂作青山䕶村落暗水通溝渠人行禾黍間漫漫迷所之里社壓新醪撃鮮賽叢祠田父相勞苦雨暘無失時龍骨挂屋敖秋熟可預期行行度岡澗泉石多幽竒㣲風發清籟好鳥吟髙枝此中有佳趣豈無幽人知去住兩不可空吟招隱詩雪晴即事宵㸑懸釜星曉光落忩牖烏鵲如謟人賀語亦交口收盡白氍毺青山併還舊門巷未掃除家童具箕帚物色不招挽顧盻左右有梅兄可納交竹弟亦耐久毛錐得竒助引我琢句手酒國百無憂問津其敢後逐逐春意來孤村又花栁吕待制所居八詠半隱舉世競寵利嗜進無肯休山林槁項輩又乏經濟謀朅來半隱寮再拜瞻吕侯袖手辭富貴結廬清且幽我従為兒時久矣聞風流父老數時賢若人真少儔已覆金甌名姑作緑野遊四海望霖雨争欲挽之留向来釣璜老一出扶宗周廊廟方側席公肯幡然不舒嘯黄山峙立髙崔嵬上有飛仙時徃来問之誰作東道主舒嘯亭中人姓回坐對危峰倒樽酒偃仰胡床篆烟吐劃然清響透雲端此意悠悠𦕈千古好是夜深孤月明風松泉石清更清我來擬作叔夜輩一聽空山鸞鳯聲緩歩躍馬乗軒四十年誰知公是地行仙向來曵履星辰上今作逰山杖屨縁總為鼻端清栩栩能令脚底歩翩翩青鞋若許陪行樂早晚誅茅半隱邉月臺我欲登仙換凡骨飛上雲頭窺月窟羿妻問我何自來笑指廣寒令徑入歸来却見半隱翁月臺如在神仙中霓裳歌舞不用覷把酒長嘯生清風藤洞空中一洞足清風上有長藤翠蔓穠說與山靈護持取蒼皮瘦骨恐為龍嵗寒春陽競嫵媚百卉顔色好凉秋風露来徃徃競枯槁一朝受霜雪脫落遽如掃特立金石姿青青未嘗老下視軟美輩摧折不自保古人幾失言疾風知勁草朝陽腷膊雞聲夜向晨東方飛景到雲林簾幃已是曈曈曉庭户全無曀曀隂可是梧桐長得地也知葵藿久傾心日邉早晚来環賜見說清光注意深醉松虬髯鐵榦老嶙峋氣格儼然冠劍臣應為孤髙多絶物未妨偃蹇且全身雪中屈折如頽玉雨後淋漓又吐茵撫手摩娑三嘆息世間那有獨醒人太平道中遇流民己丑丁男負荷力已疲弱妻稚子顔色悲親戚墳墓誰忍棄嗟爾豈願為流移春蠶成繭穀成穂輸入豪家無孑遺豐年凛凛不自保凶年莱色将何如但憂衘恨委溝壑豈暇懐土安室廬故鄉既已不可居他鄉為客将誰依黄雞啄黍白酒熟去家未久吾懐歸農桑不事得温飽見爾令人顔忸怩遊硯山壬辰他山石徒多噐寳匿幽僻産璞芙蓉坑金聲而玉徳岡巒外鈎聮地勢中㫁隔曲塢八九家路入羊豕迹澗水抱石根石骨多紺碧北山上攙天南山勢蟠伏硯工二百指日鑿崔嵬腹篝燈礪斧斤深入逾百尺我行冒風雨周覽不知夕夜宿茅茨下青燈照岑寂酒闌呼匠氏訪之語纎悉冰蠶吐銀絲鮫人織霧縠巧手琢磨之價直黄金鎰㫁嵓半傾欹舊穴久湮塞旁求得他材飲水不受墨堅滑已支庶麤燥乃臧獲信知天壤間尤物神所惜罕見固為貴有亦未易識瑉玉混一區語盡三嘆息摩莎蒼蘚崖此言可鐫刻山間偶成二絶庚寅人家雞犬近相聞村落紆回古木深山客一來塵想盡水聲終日奏鳴琴隔枝啼鳥喚幽夢排闥青山無世情緑樹隂隂遮日影虚忩卧㸔白雲行雪中懐韓毅伯雞罷三號來曉色披衣起見瓦溝白雪花初墮雲遽回天意應憐未歸客男兒鐵石為剛腸忍窮不見可憐色當知曵履郭先生可作餐氊蘓屬國和韓毅伯詠鴈孤飛欲作上林逰塞北来時天始秋世路豈無矰繳慮水鄉聊作稲梁謀摩雲不憚闗山逺刷羽定非雞鶩儔待㸔草青烟浪暖帶将春色離南州梅花嵗暮殺氣惨草木華葉萎寒梅吐新蕚娟娟擁疎枝清意塵俗逺幽香風露知孤絶慣守獨晚出甘後時細推萬物理榮謝相乗除桃李向來繁試問今何如犬捕䑕黠䑕穴居工匿形宵竊吾餘頻有聲狸奴已老無足忌對面侮人渠得志韓盧千載雲来孫平時禦盗嚴司存小施逐兎騰山力不露爪牙潜有獲主人髙枕終夜安論功法吏能掃姦繩以漢家三尺律䑕罪貫盈猫不職春日小凭笋輿行野田麥芒桑蕾春無邊勒回風物未全好小雨班班天護寒入門烏鵲枝頭語鴻鴈好音慈母喜車馬不來門巷窮桃花自作深深紅世間萬事易冰冷春来無處無東風春日書懐二首杜門值春初出門已春莫子規日夜啼為我訴春去萋然草彌望緑暗谿臯路百尺游絲髙摇摇引心緒歸来坐忩底有句不能吐喚取黄嬭來且嘗黒甜味二餘月雨新歇風日亦已和佳木頗秀整好鳥仍嘯歌今我苦不樂如此春意何喧寂有異境窮達元同科此道貴堅壁外物將倒戈有慨懐古人執柯能伐柯荅韓毅伯五首用游子莫何之為韻為别未一日思君如三秋解后孤城中握手復少留士方未遇時鮮不困宦㳺君獨芻豢色胸次回萬牛自愧得之淺誤欲代君憂白璧識者稀駑馬市者稠莫作分外慮輕重終不侔諸公競推轂失士固所羞二情義如投膠去意如激矢險阻要備嘗山川餞行李霜雪衣裘单燈前話兒女下堂辭親去上堂拜親喜燕頷能飛揚何必毛錐子三憶君初至時投宿村店莫門巷冷如氷漫刺来一顧升堂方下榻出户復就屨綈袍寒不温北風攪庭户念君何以堪此意推不去强飯登前塗為親善調護四老松寒不凋古井風無波斯人閲千古所得亦已多句法餘事爾髙處凌隂何寜為擁膝吟無作扣角歌五三書上時宰我常疑退之士窮見素守躁求亦何為蜀客聞此語為我一解頥嵗晚歸未得且過江之西未到意先喜主人賢足依江西魚稲鄉米熟蟹螯肥不妨且醉飽利達自有時漁人西南月未堕白霧吞青山渡口無人行老漁一舟還呵手繋短纜襏襫犯夜寒捕魚養妻子誰謂斯人閒促織春山布榖勸耕事秋園絡緯催機杼大家未織吏索租小家欲織無絲縷無絲可織寒無衣輸租後期罪當笞悲鳴終夜不能已嗟爾候蟲何自苦大水行屯雲墨色日将暮晦明揮霍雨如注水聲夜半摇匡床平旦出門吁可畏盤渦溔瀁吞邉旁悍流洶湧行中央日中雨復綆縻下溝塍水躍皆渾黄黒風抝怒雷撃地浪頭起立三丈彊􅒎枒老木根株㧞崚嶒古屋椽桷裂快馬萬蹄迸突而憑凌靈鼉百面澒洞而砅砰銳兵鏖戰城柵倒猛虎嘷吼崖谷崩旁觀氣奪目力眩瀕流上下俱不寜升髙辟害呌舟楫篙工倚柂不敢行寂寥向晚頗衰落㫁霞返照回新晴鳥飛不盡天界濶蒼烟淡淡山青青衘杯引滿幸無恙收召魂魄猶屏營徃年秋水沈半壁闔門九死得一生今日思之痛方定一見洪波心震驚吾聞山挾河回衝底柱峽束江盤投灧澦魚龍百怪家其中風濤暴横無終窮小溪常時清且淺漪漣不動平扵板淺津可渉深可梁一旦沸騰能漭茫傳聞潰渱山裂破黒蛟夜出作竒禍抉崖走石勢力粗十家六七無室廬百年枯塚尚漂泊變生倉卒人為魚君不見去年四月不雨至七月澗谿一綫皆斷絶川居人曽死扵暍山居人今死扵溺下田黄塵曾蓬勃髙田白沙今障沒嗚呼災害何其頻𠞰民之命誰肯任勦民之命誰肯任蒼天蒼天實照臨冬日即事曝背茅簷下驅寒得曉晴杜門来客少開卷此心清晦迹存吾道端居閱世情南山無改色相對免將迎春興二首蔓長宜誅草花飛可弔梅㫁雲将雨去啼鳥喚春回書亂時開帙樽空久覆杯長年觀景物不復起衰懐二山逺煙蒙樹汀回水嚙沙雲隂初解駁春色已光華土潤麥争秀日蒸桃欲花杜門無可喜鵲語誤楂楂旅興己丑郡中白眼看時事剛腸厭俗流也知蜂有毒未信鼠堪投熟睡消磨日清吟撥置愁倚門應望切早晚賦刀頭蔬食己丑郡中瓠白吾何有人言太瘦生富兒皆肉食我輩但藜羮安得萬錢費應無五鼎烹飢腸雷欲吼一飽亦何營春雨喚雨蒼鳩罷山髙雲更隮泥深妨著屣水足有扶犁索酒無同飲哦詩只自題小忩回午夢鄰舍一聲雞石盆荷葉月明露冷浄娟娟收入窻間一掬泉不用亭亭張翠盖也能細細疊青錢時因新汲分瓶杓暗有㣲香散簡編留待移根栽玉井開花十丈藕如船忩外紫竹踈籬短柵外鈎聮聚立龍孫已嶷然向日斧斤幾不赦而今苗裔尚能全少時秀色青珉潤嵗晚英標紫玉堅借與風煙扶直氣稍加嵗月定參天秋日晚晴㫁霞縷脉淺深紅雨挾凉来助好風心厭亂蟬専美䕃目随髙鳥度晴空此身尚落功名外生理方侵念慮中坐到夜深明月上秋聲故故遶梧桐和毅伯見寄欲問故人歸未歸江湖不見雁南飛青雲未上辭鄉國白璧無因困褐衣客裏書来行李滯江南春盡落花稀倚門望㫁山川逺我却疑君此策非喜祝季通相訪一笑掀髯語不休隻雞斗酒少淹留讀書未療一身困彈劔同懐千嵗憂喬木擁煙村落冷西風吹雨稻粱秋此中可覔離騷句躍馬重来谿上頭和祝季通韻踏破蒼苔馬有聲百金一諾不寒盟揮犀議論髙流輩落筆典刑追老成犯雪方知松節直截河不變濟流清論交獨許吾同調翻覆従渠自世情南齋中秋小酌銀河絡角晚風凉月入庭除滿地霜夜静老翁閒玉斧天寒仙子舞霓裳田家旋斸蹲鴟美野店新篘緑蟻香草草杯盤供一笑暫時耳熱發清狂南齋書懐幽居用拙懶追尋小徑無人苔半侵燕子已歸知社近桃花半破覺春深長編短簡資身策故嵗新年念母心拂拭横床眠未穩匆匆屋角有鳴禽和韓毅伯韻三首鵲寄先聲到敝廬故人回首意何如我方無事能髙枕子亦徐行可當車小甕牀頭新注酒青燈窻下静觀書虀鹽冷淡商今古恐勝朱門食有魚有客回車肯再過天寒冰雪滿闗河家貧草具惟雞黍地僻柴門但雀羅人固剛腸窮已甚天無老眼命如何男兒自許功名事相對肯悲彈劔歌萬里乾坤尚側身諸公青眼拂埃塵平生毛頴義相許今日方兄情稍親信有朱絃能使鬼肯将拱璧暗投人不妨嵗晚留行色梅栁梢頭已報春再和前韻三首扣闗剥啄到吾廬覺我論才有不如道在褐衣懐美玉文成熟路駕輕車而今談笑不携手他日寒温徒寄書勢利之交兒輩事何須有客佩金魚窮巷曾勤特地過瀾翻舌本落懸河君方迹未離塵土我亦身嘗堕網羅幸有吾曺相爾汝肯教俗子更誰何詩成騷雅遺風在壓倒南山白石歌小屈青雲富貴身翻翻倦脚踏街塵黒貂久弊嵗云晚鴻鴈不來家有親客路山川聊緩帶天闗虎豹莫憎人一寒元是功名兆落筆能回桃李春追念鱅谿老人交㳺大半上青雲可使斯人竟陸沈寒日亂山皆慘色北風古木亦悲吟傷情空拜丹青像提耳不聞金玉音舐墨欲書耆舊傳無言三嘆我何心追悼鱅溪老人遶屋青山鎖白雲其人如玉已埋沈瘦笻未掃徃来迹遺墨半存長短吟有客不堪頻墮捷此生無復見知音天寒日短凄凉甚老眼皇天照此心如大坂二絶輕風掠面作㣲凉盡日筍輿行澗岡畦稻欲花新得雨老農屈指計秋嘗盤薄解衣方少休青山白水挽吾留一聲杜宇喚歸意百囀黄鸝生客愁田間閒歩春光挽我出柴扄道上陳根換短青尚怯東風寒料峭已聞好鳥語丁寧晚浴溪上山脚草深樵徑沒溪頭水落石梁髙一川風露無人占古栁𤣥蟬處處號自南齋晚歸二絶返照南山脚西風古渡頭破烟雙鷺晚抱葉一蟬秋二溪凉魚發發山静鳥飛飛草笠兒驅犢荆釵女浣衣到白石先妣新塋淚滴松楸意轉哀欲歸小立更徘徊春風不管人間恨溪上櫻桃花自開新晴二絶初春欲暖未全暖小雨妨晴還得晴多謝東風舊相識少年樂事已寒盟鴝鵒喜晴鳴竹枝一篙新浪拍漁磯春寒稍向日邊破花信欲従風際歸溪上晚望二絶溪深一股渌浮浮橋㫁人歸拏小舟煙淡雲黄来暝色青山數疊不遮愁日墮西山煙水昏寂寥雞犬數家村滄洲歸鷺客停棹古寺踈鐘人掩門春日書懐自憐童穉色凄凉偃伏田廬嵗月長用拙漫令文有冢避愁不慣醉為鄉春来雨禁鳥烏樂天末風回鴻鴈行軒冕山林兩無得諱窮徒覺意蒼茫送詹少㳺之平江溪上相逢把盞時回頭今是一年餘聞君有喜驅都騎顧我無聊守敝廬信道此行騎鳯背未知何日寄魚書月明千里闗山隔莫為新情忘故居春日遣懐感懐細數十年事養拙略無終日閒景物自新春稍稍吾親漸老髮斑斑豈曽有夢到天上且任此生浮世間願約漁樵同小隱謂予不信有南山題古塔主語録震雷動地音元寂白月當空指即迷天下老師應鎖口此公不肯止兒啼田間麥秀因成絶句老穉縁崖鋤草根炊烟不起自酸辛東臯春到青青麥屈指何時可食新麥苗已有生意掘烏稬者未止兒童飯犢女採桑水滿東臯耕事忙稻秧半緑麥半黄天許食新饘粥香田父咨嗟仍笑語赤地一年今得雨紫􅣀有根妻子喜免填溝壑棄閭里雨晴出田間去年龜兆生田臯今年龍骨挂屋敖烏牛告休卧籬落夫耕婦饁亦既勞䄺稗不生白水滿荷鋤出見禾苗髙屈指何時築場圃割雞炊黍觴新醪人言饑饉有豐稔一笑破除心鬱陶得昭叔弟書十年客館出無車倦迹歸来守敝廬林下巢傾烏哺㫁天邊風急鴈行踈欲傳消息苦無便喜報平安今有書行李何時能緩帶對床風雨且幽居梟羮事出漢書日轉槐隂宫漏遲蘭湯新浴生凉颸四方清晏上燕衎千官鳴玉趍丹墀鸞刀象箸薦多品豈無炙鵠兼蒸鳬射聲彈弋不虚發獨取鳴梟供膳夫卵翼深恩作竒禍有此大罪宜翦夷臣工拜手謝君賜惟忠與孝終無虞髙皇盛徳號寛大惡不可赦彭黥菹惜哉雲夢信先縛功盖一世人所疑賜之屬鏤前事失滛刑以逞誰無辜留侯辟榖以智免鄼侯縲紲㡬身危君不見避人不出畏矰繳商雒深山鸞鳯飛聞虎傷人胸臆包蔵不可窺誰能攘臂編其鬚未論犬牛俱受禍飽人之肉人何辜騶虞不肯食生物自古及今長罕出吁嗟虎豹山林多䧟穽弓刀如彼何賀景髙新居百楹夏屋勢渠渠氣象巋然壓里閭庭下紫荆方秀茂階前玉樹亦扶疎門容駟馬于公宅客佩金魚吏部廬莫使烏衣文彩減諸郎勤讀五車書元日書懐年光除日又元日心事今吾非故吾兩板不須書鬱壘一杯亦强飲屠蘓添丁解事尋王母内子傷時念老姑欲報情深恩罔極不終反哺愧林烏到大坂經年不踏鱅溪路此日重来訪舊㳺溪上老人今不見凉風細雨四山秋江夏道中值雪歎息謀身拙棲遲簿領間朔風吹宻霰瘦馬踏窮山㳺宦亦何好浮生元自閒去年溪上雪髙卧掩柴闗蒲圻道中遇雪二首馬上寒生手欲龜田廬人静㸑烟稀疑逢海上雙銀闕想見雲中萬玉妃野店避風聊解轡地爐圍火自熏衣勞生今被㣲官縳何日衡茅獨掩扉天慘雲垂地風寒雪塞塗驟看花滿眼已覺粟生膚冷屋無鳴漏氷枝有立烏馬寒如蝟縮行役厭馳驅再如蒲圻二首雲暝雨将雪天低風正寒簡書端可畏行李不遑安要路飛騰好窮途進取難折腰徒自苦吾亦悔儒冠二北走蓴塘路従公敢憚行凄凉當短日寂寞過荒城薄禄非吾願塵縁窘此生丘園如可樂何必問功名行湖路落日行湖尾重袍不禦寒亂流横短棹入暝解征鞍梅瘦覺春未鴈来知嵗殘何時休跋履猶幸得平安送㳺堯臣歸閩六首荆璞天下珍價重金百鎰誰能玉其徳有亦未易識陸沈黄綬間心不計喧寂挽之置通津誰借一臂力窮山抱白虹緹襲貴燕石良農種嘉榖未必皆嵗豐世間固無巧得喪係其逢汾上百斛鼎嶧陽七絲桐清廟不豋薦造物頗未工不移金石心前哲能固窮攫金不見人士以貪自欺玉壺有清冰皎皎不受緇畏義如畏刑律已吾所師一尉百僚底三嵗袖手歸鄙夫顙有泚行李惟嚢衣宦㳺適四方僚友兄及弟所惡薫有蕕氣味不相似黄鵠來自南俛首啄禾黍意欲摩雲霄石交予與汝雞鶩安用喧短翼無逺舉火流暑將退車馬戒行役可不舉一杯明日川陸隔北堂太夫人緑鬂今未白雝雝鳯将雛此樂豈易得軒冕儻來爾為親謹眠食松楸不掃灑吾甚思江東七閩在其南雲間無去鴻闗山共明月何時一尊同小㳺忘年友努力翰墨中鑄金作龍淵世豈無國工和㳺堯臣出郊二首﨑嶇深谷與崇岡王事有期行李忙玉佩泉鳴清醉耳劔鋩山峭割愁腸鳥鳴花發年華改雨暗雲昏客路長且喜歸来同笑語蒲團棐几似僧房小窻獨坐怯輕寒一穂香雲遶博山鵲語忩忩來屋角梅花㸃㸃下欄干馬蹄破雨休行役麈尾生風共燕閒只恐日邊需振鷺鋒車早晚趣君還送㳺大冶歸建陽西風來鴈嵗欲晚衰栁鳴蟬人語離市道交㳺何足數君家父子總相知讀書要見古人意立事正須年少時話舊班荆尚無日莫忘苦語有箴規送張飾之俗子問寒温吾儕相爾汝二年坐窮山蛛網懸一塵剥啄誰扣闗欲語不敢吐有客騎鯨魚迎之倒雙屣家聲本光融人物亦英偉胸次蟠江湖筆端走風雨贈我瓊瑶章白虹貫囊禇我如穿鼻犢渉世多齟齬君如側翅鷹雲路未軒翥杯酒接慇懃縱談傾肺腑百圍飽雪霜士要嘗艱阻傅說起胥靡夷吾出囚虜淮隂有寄食新豐有逆旅饑饉必豐年乗除乃天理豪傑就功名但問嵗寒爾相對一掀髯窮通忘愠喜題周功甫總領石溪三亭并序周丈有石溪三亭題詠者衆炎為崇陽簿㳂檄到郡周丈作手簡封示南軒三詩令炎留題其意甚厚炎既投三詩又一嵗再見周丈乃云三詩被㳺成之擕去今炎再録一本後二十餘年炎假守吳興朝辭入都周丈子時為寺丞又言及三詩則炎所以見知扵周丈者不過此三詩爾感念知已故詳述扵篇首溪亭表章泉石幽領略鷗鷺閒隂隂楊栁邉小築置曲欄平鋪簟紋緑俯仰眼界寛俗塵不可汚漁艇時往還是心淡如水聲名落人寰身行霄漢上夢遶滄波間我欲従公㳺斫鱠覆酒船三弄噴霜竹月髙風露寒雪亭竹忩環佩聲瓏玲開忩不見山眉青玉妃翦水墮花片龜手入袖膚粟生紫茵錦幕燎爐熾不知酒靣寒欲氷春葱百指酌暖玉似勝煮茗松風鳴亭中主人笑無語雪景佳處未易評詩成呵筆筆随凍㝠搜有味銀海明天風浩浩吹鶴氅欲跨白霓凌太清負暄曝背者誰子此亭可望不可登嫣然亭桃花結子杏花落蛺蝶飛來遶新緑臙脂如醉春意濃嫣然一笑桃杏俗薔薇之露不涴衣玉頰彷彿生頩姿無雙國色自愛惜描貌安用詩人詩雨濕東風三月尾夜寒燒燭照花睡索花勸飲乾百壺美人羞死顰眉翠題陳巽叔適軒消摇鵬鷃㳺小大各有適士墮躁欲中束身就徽墨桃溪有市隱被褐懐拱璧袖手閱世故不變芻豢色小忩一蒲團燕坐琴書側豈不對客語青眼送鴻翼自言肥遯好外物斷欣戚千金戒垂堂一跌在所惜笑我踏風波轅駒窘羈靮黄一翁自郡城回千金一璧傾秦都此璞未剖衆所疑朱絲度曲有山水袖手不鼓無人知黄香裋褐走江漢失脚未上青雲衢此客胸中有佳處笑人論士相目皮敂闗謁我即辭去赤霄孔翠不可呼江城邂逅共杯酒麈尾清風生綌絺歩行觸熱兩足繭别後略無雙鯉魚楚山摇落嵗又晚花信首回南北枝青燈抽穟出金粟喜見間闗行李歸粲然為我啓貝齒知我不見如調飢揮毫妙入斵輪手倒囊盡出驪龍珠朱朱白白顔色好春風爛漫催花時肯留花底共醉倒為君春酒滿眼酤褦襶推之不肯去忍使故人天一涯摩挲老眼望寥廓願見秋鶚凌風飛雙溪類槀卷二
